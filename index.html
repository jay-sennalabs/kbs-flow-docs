      // ─── BUILD SIDEBAR ───────────────────────────────────────
      function buildSidebar() {
        const sidebar = document.getElementById("sidebar");
        // Filter out index doc from sidebar
        const sidebarDocs = DOCS.filter((d) => d.cat !== "index");
        const groups = {};
        sidebarDocs.forEach((d) => {
          if (!groups[d.cat]) groups[d.cat] = [];
          groups[d.cat].push(d);
        });

        const catOrder = [
          "auth",
          "core",
          "contracts",
          "finance",
          "operations",
          "promotion",
          "misc",
        ];
        catOrder.forEach((cat) => {
          if (!groups[cat]) return;
          const div = document.createElement("div");
          div.className = "cat-group";
          div.innerHTML = `<div class="cat-label">${CAT_LABELS[cat] || cat}</div>`;
          groups[cat].forEach((d) => {
            const a = document.createElement("a");
            a.className = "nav-item";
            a.dataset.id = d.id;
            a.innerHTML = `
        <span class="nav-num" style="background:${d.color}22;color:${d.color}">${d.num || "#"}</span>
        <span class="nav-title">${shortTitle(d.title)}</span>`;
            a.addEventListener("click", () => openDoc(d.id));
            div.appendChild(a);
          });
          sidebar.appendChild(div);
        });

        const flowDocs = DOCS.filter((d) => d.cat !== "index");
        document.getElementById("doc-count").textContent =
          `${flowDocs.length} flows`;

        // Stats
        const statsRow = document.getElementById("stats-row");
        const cats = [...new Set(flowDocs.map((d) => d.cat))];
        const totalWords = Math.round(
          flowDocs.reduce((s, d) => s + d.content.split(/\s+/).length, 0) /
            1000,
        );
        statsRow.innerHTML = `
    <div class="stat"><div class="stat-num">${flowDocs.length}</div><div class="stat-label">Flows</div></div>
    <div class="stat"><div class="stat-num">${cats.length}</div><div class="stat-label">Categories</div></div>
    <div class="stat"><div class="stat-num">~${totalWords}K</div><div class="stat-label">Words</div></div>
  `;
      }

      function shortTitle(title) {
        const t = title.replace(/^Flow \d+ — /, "").replace(/^Flow \d+ - /, "");
        return t.length > 38 ? t.slice(0, 36) + "…" : t;
      }

      // ─── OPEN DOC ────────────────────────────────────────────
      async function openDoc(id) {
        const doc = DOCS.find((d) => d.id === id);
        if (!doc) return;

        currentDocId = id;
        hideSearch();

        // Sidebar active
        document.querySelectorAll(".nav-item").forEach((el) => {
          el.classList.toggle("active", el.dataset.id === id);
        });

        // Show loading
        document.getElementById("welcome-screen").style.display = "none";
        document.getElementById("doc-view").classList.remove("active");
        document.getElementById("loading").style.display = "block";

        await new Promise((r) => setTimeout(r, 50));

        try {
          const html = await renderMarkdown(doc.content, doc);
          const view = document.getElementById("doc-view");
          view.innerHTML = html;
          view.classList.add("active");
          document.getElementById("loading").style.display = "none";

          // Render mermaid
          await renderMermaidBlocks(view);

          // Scroll to top
          document.getElementById("content").scrollTo(0, 0);
        } catch (e) {
          console.error(e);
          document.getElementById("loading").style.display = "none";
        }
      }

      // ─── RENDER MARKDOWN ─────────────────────────────────────
      async function renderMarkdown(content, doc) {
        // Replace mermaid code blocks with placeholders
        const mermaidBlocks = [];
        const processedContent = content.replace(
          /```mermaid\n([\s\S]*?)```/g,
          (_, code) => {
            const idx = mermaidBlocks.length;
            mermaidBlocks.push(code.trim());
            return `<div class="mermaid-placeholder" data-idx="${idx}"></div>`;
          },
        );

        const htmlContent = marked.parse(processedContent);

        const catColors = {
          index: "#6366f1",
          auth: "#0ea5e9",
          core: "#10b981",
          contracts: "#f59e0b",
          finance: "#ef4444",
          operations: "#a855f7",
          promotion: "#ec4899",
          misc: "#64748b",
        };
        const color = catColors[doc.cat] || "#64748b";
        const numLabel = doc.num
          ? `Flow ${String(doc.num).padStart(2, "0")}`
          : "Index";
        const wordCount = content.split(/\s+/).length;

        return `
    <button class="back-btn" onclick="goHome()">
      ← กลับหน้าหลัก
    </button>
    <div class="doc-header">
      <div style="flex-shrink:0">
        <span class="doc-num-badge" style="background:${color}22;color:${color};border:1px solid ${color}44">${numLabel}</span>
      </div>
      <div class="doc-info">
        <h1>${doc.title}</h1>
        <div class="doc-meta">
          <span class="cat-pill" style="background:${color}15;color:${color}">${CAT_LABELS[doc.cat] || doc.cat}</span>
          &nbsp;·&nbsp; ~${wordCount.toLocaleString()} words
          &nbsp;·&nbsp; ${doc.fname}
        </div>
      </div>
    </div>
    <div class="md-body">
      ${htmlContent.replace(
        /<div class="mermaid-placeholder" data-idx="(\d+)"><\/div>/g,
        (_, i) => {
          const idx = parseInt(i);
          return `<div class="mermaid-wrap" data-mmd-idx="${idx}">
          <div class="mermaid-toolbar">
            <div class="mermaid-toolbar-label">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h7v7H3zm11 0h7v7h-7zM3 14h7v7H3zm11 3h2m4 0h-2m-2-2v2m0 4v-2"/></svg>
              Diagram
            </div>
            <div class="mermaid-controls">
              <button class="mermaid-btn" onclick="zoomMmd(this,-0.2)" title="Zoom out">−</button>
              <button class="mermaid-btn" onclick="zoomMmd(this,0.2)" title="Zoom in">+</button>
              <button class="mermaid-btn" onclick="resetMmd(this)" title="Reset">⟳</button>
              <button class="mermaid-btn expand-btn" onclick="expandMmd(this)" title="Fullscreen">⤢ Full</button>
            </div>
          </div>
          <div class="mermaid-canvas" id="mmd-canvas-${idx}">
            <div class="mermaid" id="mmd-${idx}">${escapeHtml(mermaidBlocks[idx])}</div>
          </div>
        </div>`;
        },
      )}
    </div>
  `;
      }

      function escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function sanitizeMermaidCode(code) {
        return (
          code
            // Vue/component-like tags inside labels/messages: <ComponentName />, <Widget>
            .replace(
              /<([A-Z][^>\n]*?)\s*\/?>/g,
              (_, inner) => `&lt;${inner.trim()}&gt;`,
            )
            // Generic-like type annotations inside labels/messages: IPagination<Foo>
            .replace(
              /([A-Za-z_][\w.]*)<([A-Z][A-Za-z0-9_,.[\]\s]*)>/g,
              (_, typeName, generic) => {
                return `${typeName}&lt;${generic.trim()}&gt;`;
              },
            )
        );
      }

      // ─── RENDER MERMAID ──────────────────────────────────────
      async function renderMermaidBlocks(container) {
        const blocks = container.querySelectorAll(".mermaid");
        for (const el of blocks) {
          try {
            const id = "mmd-" + Math.random().toString(36).slice(2);
            const rawCode = el.textContent;
            let svg;

            try {
              ({ svg } = await mermaid.render(id, rawCode));
            } catch (rawError) {
              const sanitizedCode = sanitizeMermaidCode(rawCode);
              if (sanitizedCode === rawCode) throw rawError;
              ({ svg } = await mermaid.render(id, sanitizedCode));
            }

            el.innerHTML = svg;
            // Make SVG scale naturally: remove fixed width/height
            const svgEl = el.querySelector("svg");
            if (svgEl) {
              // Keep viewBox, remove hard-coded width/height so it fills container
              const vb = svgEl.getAttribute("viewBox");
              if (vb) {
                const parts = vb.split(/\s+/);
                if (parts.length === 4) {
                  const w = parseFloat(parts[2]);
                  const h = parseFloat(parts[3]);
                  if (w > 0) {
                    svgEl.style.width = "100%";
                    svgEl.style.height = "auto";
                    svgEl.removeAttribute("width");
                    svgEl.removeAttribute("height");
                    // Dynamic min-height for canvas
                    const canvas = el.closest(".mermaid-canvas");
                    if (canvas) {
                      const ratio = h / w;
                      const contentWidth = canvas.offsetWidth || 800;
                      const computedH = Math.max(
                        180,
                        Math.min(contentWidth * ratio, 600),
                      );
                      canvas.style.minHeight = computedH + "px";
                    }
                  }
                }
              }
            }
            // Store original scale state
            el.dataset.scale = "1";
            el.dataset.tx = "0";
            el.dataset.ty = "0";
          } catch (e) {
            el.innerHTML = `<div style="color:#f87171;font-size:12px;padding:8px">⚠️ Diagram error: ${e.message}</div>`;
          }
        }
      }

      // ─── MERMAID ZOOM/PAN CONTROLS ────────────────────────────
      function getMmdEl(btn) {
        return btn.closest(".mermaid-wrap").querySelector(".mermaid");
      }
      function applyTransform(el) {
        const s = parseFloat(el.dataset.scale) || 1;
        const tx = parseFloat(el.dataset.tx) || 0;
        const ty = parseFloat(el.dataset.ty) || 0;
        el.style.transform = `scale(${s}) translate(${tx}px,${ty}px)`;
        el.style.transformOrigin = "center center";
      }
      function zoomMmd(btn, delta) {
        const el = getMmdEl(btn);
        let s = Math.max(
          0.3,
          Math.min(5, (parseFloat(el.dataset.scale) || 1) + delta),
        );
        el.dataset.scale = s;
        applyTransform(el);
      }
      function resetMmd(btn) {
        const el = getMmdEl(btn);
        el.dataset.scale = "1";
        el.dataset.tx = "0";
        el.dataset.ty = "0";
        el.style.transform = "";
        // reset canvas height
        const canvas = el.closest(".mermaid-canvas");
        if (canvas) canvas.style.minHeight = "";
      }

      // Drag to pan
      let dragState = null;
      document.addEventListener("mousedown", (e) => {
        const canvas = e.target.closest(".mermaid-canvas");
        if (!canvas) return;
        const el = canvas.querySelector(".mermaid");
        if (!el) return;
        dragState = {
          el,
          startX: e.clientX,
          startY: e.clientY,
          origTx: parseFloat(el.dataset.tx) || 0,
          origTy: parseFloat(el.dataset.ty) || 0,
        };
        e.preventDefault();
      });
      document.addEventListener("mousemove", (e) => {
        if (!dragState) return;
        const s = parseFloat(dragState.el.dataset.scale) || 1;
        dragState.el.dataset.tx =
          dragState.origTx + (e.clientX - dragState.startX) / s;
        dragState.el.dataset.ty =
          dragState.origTy + (e.clientY - dragState.startY) / s;
        applyTransform(dragState.el);
      });
      document.addEventListener("mouseup", () => {
        dragState = null;
      });

      // Scroll wheel zoom
      document.addEventListener(
        "wheel",
        (e) => {
          const canvas = e.target.closest(".mermaid-canvas");
          if (!canvas) return;
          const el = canvas.querySelector(".mermaid");
          if (!el) return;
          e.preventDefault();
          const delta = e.deltaY < 0 ? 0.1 : -0.1;
          let s = Math.max(
            0.3,
            Math.min(5, (parseFloat(el.dataset.scale) || 1) + delta),
          );
          el.dataset.scale = s;
          applyTransform(el);
        },
        { passive: false },
      );

      // Fullscreen expand
      function expandMmd(btn) {
        const mmdEl = getMmdEl(btn);
        const svgEl = mmdEl.querySelector("svg");
        if (!svgEl) return;
        let modal = document.getElementById("mermaid-modal");
        if (!modal) {
          modal = document.createElement("div");
          modal.id = "mermaid-modal";
          modal.className = "mermaid-modal";
          modal.innerHTML = `
      <div class="mermaid-modal-inner">
        <div class="mermaid-modal-header">
          <span class="mermaid-modal-title">⬡ Mermaid Diagram</span>
          <div style="display:flex;gap:8px;align-items:center">
            <button class="mermaid-btn" onclick="document.getElementById('modal-mmd-content').querySelector('svg') && zoomModalMmd(-0.25)" title="Zoom out">−</button>
            <button class="mermaid-btn" onclick="document.getElementById('modal-mmd-content').querySelector('svg') && zoomModalMmd(0.25)" title="Zoom in">+</button>
            <button class="mermaid-btn" onclick="resetModalMmd()" title="Reset">⟳</button>
            <button class="mermaid-close" onclick="closeModal()">✕</button>
          </div>
        </div>
        <div class="mermaid-modal-body" id="modal-mmd-content"></div>
      </div>`;
          document.body.appendChild(modal);
          modal.addEventListener("click", (e) => {
            if (e.target === modal) closeModal();
          });
          document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") closeModal();
          });
        }
        const body = document.getElementById("modal-mmd-content");
        body.innerHTML = "";
        const cloned = svgEl.cloneNode(true);
        cloned.style.width = "auto";
        cloned.style.height = "auto";
        cloned.style.maxWidth = "100%";
        cloned.style.transform = "";
        cloned.dataset.scale = "1";
        body.appendChild(cloned);
        modal.classList.add("open");
      }
      function closeModal() {
        const m = document.getElementById("mermaid-modal");
        if (m) m.classList.remove("open");
      }
      function zoomModalMmd(delta) {
        const svg = document
          .getElementById("modal-mmd-content")
          ?.querySelector("svg");
        if (!svg) return;
        let s = Math.max(
          0.3,
          Math.min(5, (parseFloat(svg.dataset.scale) || 1) + delta),
        );
        svg.dataset.scale = s;
        svg.style.transform = `scale(${s})`;
        svg.style.transformOrigin = "top center";
      }
      function resetModalMmd() {
        const svg = document
          .getElementById("modal-mmd-content")
          ?.querySelector("svg");
        if (!svg) return;
        svg.dataset.scale = "1";
        svg.style.transform = "";
      }

      // ─── SEARCH ──────────────────────────────────────────────
      let searchTimer = null;
      document.getElementById("search").addEventListener("input", (e) => {
        clearTimeout(searchTimer);
        const q = e.target.value.trim();
        if (!q) {
          hideSearch();
          return;
        }
        searchTimer = setTimeout(() => performSearch(q), 150);
      });

      function performSearch(q) {
        const results = fuse.search(q, { limit: 20 });
        showSearchResults(q, results);
      }

      function showSearchResults(q, results) {
        document.getElementById("welcome-screen").style.display = "none";
        document.getElementById("doc-view").classList.remove("active");
        document.getElementById("loading").style.display = "none";

        const el = document.getElementById("search-results");
        el.classList.add("active");

        if (!results.length) {
          el.innerHTML = `<div class="no-results">🔍 ไม่พบผลลัพธ์สำหรับ "<strong>${q}</strong>"</div>`;
          return;
        }

        const catColors = {
          index: "#6366f1",
          auth: "#0ea5e9",
          core: "#10b981",
          contracts: "#f59e0b",
          finance: "#ef4444",
          operations: "#a855f7",
          promotion: "#ec4899",
          misc: "#64748b",
        };

        const items = results.map(({ item, score, matches }) => {
          const color = catColors[item.cat] || "#64748b";
          const numLabel = item.num
            ? `Flow ${String(item.num).padStart(2, "0")}`
            : "Index";

          // Get snippet from content match
          let snippet = "";
          const contentMatch = matches?.find((m) => m.key === "content");
          if (contentMatch && contentMatch.indices?.length) {
            const idx = contentMatch.indices[0][0];
            const start = Math.max(0, idx - 80);
            const end = Math.min(item.content.length, idx + 200);
            snippet = item.content
              .slice(start, end)
              .replace(/[#*`]/g, "")
              .replace(/\n/g, " ")
              .trim();
            // Highlight
            snippet = snippet.replace(
              new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "gi"),
              (m) => `<mark>${m}</mark>`,
            );
          } else {
            snippet = item.content
              .slice(0, 180)
              .replace(/[#*`]/g, "")
              .replace(/\n/g, " ")
              .trim();
          }

          return `<div class="search-result-item" onclick="openDoc('${item.id}')">
      <div class="sr-header">
        <span class="sr-num" style="background:${color}22;color:${color}">${numLabel}</span>
        <span class="sr-title">${item.title}</span>
        <span style="margin-left:auto;font-size:11px;color:#64748b">${CAT_LABELS[item.cat] || item.cat}</span>
      </div>
      <div class="sr-snippet">${snippet}…</div>
    </div>`;
        });

        el.innerHTML = `
    <div class="search-header">${results.length} ผลลัพธ์สำหรับ "<strong>${q}</strong>"</div>
    ${items.join("")}
  `;
      }

      function hideSearch() {
        document.getElementById("search-results").classList.remove("active");
        if (!currentDocId) {
          document.getElementById("welcome-screen").style.display = "";
        }
      }

      function goHome() {
        currentDocId = null;
        document
          .querySelectorAll(".nav-item")
          .forEach((el) => el.classList.remove("active"));
        document.getElementById("doc-view").classList.remove("active");
        document.getElementById("welcome-screen").style.display = "";
        document.getElementById("search").value = "";
      }

      // ─── KEYBOARD SHORTCUT ───────────────────────────────────
      document.addEventListener("keydown", (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === "k") {
          e.preventDefault();
          document.getElementById("search").focus();
          document.getElementById("search").select();
        }
        if (e.key === "Escape") {
          document.getElementById("search").blur();
          if (!document.getElementById("search").value) {
            goHome();
          }
        }
      });

      // ─── INIT ─────────────────────────────────────────────────
      buildSidebar();
    </script>
  </body>
</html>
