            '# Flow 06 — Agent (โควตาตัวแทน)\n\n> **แหล่งที่มาของข้อมูล (Source files)**\n> - `cms_frontend-develop/pages/cms/agents/list.vue`\n> - `cms_frontend-develop/pages/cms/agents/[id]/index.vue`\n> - `cms_frontend-develop/composables/mock-data.ts` (mockQuotaAgentsTabs line 421)\n> - `cms_frontend-develop/components/agents/dashboard.vue`\n> - `cms_frontend-develop/components/agents/contract-info.vue`\n> - `cms_frontend-develop/components/agents/upload-document.vue`\n> - `main_frontend-develop/composables/api-bff.ts`\n\n---\n\n## Overview\n\nFlow นี้ใช้จัดการสัญญาโควตาตัวแทน โดยแสดงรายการสัญญาที่เป็น `agentFarmer` และเปิดดูรายละเอียดของแต่ละสัญญา\n\nในหน้ารายละเอียด ระบบจะโหลดทั้งข้อมูลสัญญาหลัก ข้อมูล mapping ที่เกี่ยวข้อง และรายการสัญญาในโควตาเดียวกัน ก่อนแสดงข้อมูลผ่าน tabs\n\nภาพรวมของ flow มี 2 ช่วงหลัก:\n\n1. ดูรายการสัญญาโควตาตัวแทนและค้นหาหรือกรองรายการ\n2. เปิดหน้ารายละเอียดสัญญาและดูข้อมูลผ่าน tabs\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| รายการสัญญาโควตาตัวแทน | `cms/agents/list.vue` |\n| รายละเอียดสัญญาโควตาตัวแทน | `cms/agents/[id]/index.vue` |\n| tab ข้อมูลสัญญา | `components/agents/contract-info.vue` |\n| tab เอกสารแนบสัญญา | `components/agents/upload-document.vue` |\n| ข้อมูล tabs | `mockQuotaAgentsTabs` ใน `mock-data.ts` |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| Staff | ดูรายการสัญญาตัวแทน ค้นหา กรอง และเปิดดูรายละเอียด |\n| หน้ารายการสัญญาตัวแทน | แสดงรายการสัญญาและพาไปหน้ารายละเอียด |\n| หน้ารายละเอียดสัญญาตัวแทน | โหลดข้อมูลสัญญาและควบคุม tabs |\n| tab components | แสดงข้อมูลสัญญาและเอกสารแนบ |\n| BFF APIs | ส่งข้อมูลรายการสัญญา รายละเอียดสัญญา และข้อมูล mapping ที่เกี่ยวข้อง |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| รายการสัญญาตัวแทน | ข้อมูลสัญญาตามปีการผลิต สถานะ และคำค้นหา |\n| รายละเอียดสัญญาตัวแทน | ข้อมูลสัญญารายฉบับที่ผู้ใช้เปิดดู |\n| ข้อมูล mapping contract sugarcane | ข้อมูลประกอบที่โหลดเพิ่มจากโควตาตัวแทน |\n| รายการสัญญาในโควตาเดียวกัน | ข้อมูลสัญญาหลักที่ใช้ประกอบการเลือกหรือแสดงผล |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["เปิดรายการสัญญาตัวแทน"] --> B["ค้นหาหรือกรองตามปีการผลิตและสถานะ"]\n    B --> C["ดูรายการสัญญา"]\n    C --> D["เปิดรายละเอียดสัญญา"]\n    D --> E["โหลดข้อมูลสัญญาและข้อมูลที่เกี่ยวข้อง"]\n    E --> F["แสดงข้อมูลผ่าน tabs"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `list.vue` | ดูรายการสัญญาโควตาตัวแทน ค้นหา กรอง และเปิดรายละเอียด | ปุ่มเพิ่มสัญญาถูก comment ออกในโค้ด |\n| `[id]/index.vue` | โหลดข้อมูลสัญญาตัวแทนรายฉบับและควบคุม tabs | ใช้ URL hash สำหรับเลือก tab |\n| `contract-info.vue` | แสดงข้อมูลสัญญา | ใช้ใน tab `contracts` |\n| `upload-document.vue` | แสดงเอกสารแนบสัญญา | ใช้ใน tab `quota-agent-documents` |\n\n---\n\n## Per-Page Details\n\n### 06-A: รายการสัญญาโควตาตัวแทน\n\n#### Purpose\n\nใช้ดูรายการสัญญาโควตาตัวแทน ค้นหา กรอง และเปิดดูรายละเอียดสัญญาแต่ละรายการ\n\n#### Main Steps\n\n1. เปิดหน้ารายการสัญญาตัวแทน\n2. โหลดรายการสัญญาตามปีการผลิตและสถานะ\n3. ค้นหาจากชื่อ-นามสกุล เลขที่คำขอ หรือเลขที่สัญญา\n4. เลือกปีการผลิตหรือสถานะเพื่อกรองรายการ\n5. เปิดหน้ารายละเอียดเมื่อต้องการดูหรือแก้ไขข้อมูลสัญญา\n\n#### Decision Points\n\n| กรณี | ผลลัพธ์ |\n|---|---|\n| ค้นหาหรือเปลี่ยน filter | โหลดรายการใหม่ |\n| คลิกแก้ไข | พาไปหน้ารายละเอียดสัญญา |\n| ปุ่มเพิ่มสัญญา | ถูก comment ออกในโค้ด |\n\n#### Result\n\n- ได้รายการสัญญาโควตาตัวแทนตามเงื่อนไขที่เลือก\n- สามารถเปิดดูรายละเอียดสัญญารายฉบับได้\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ListPage as agents/list.vue\n    participant BffAPI as GET /bff-service/data-contracts/byRole/agent\n    participant DetailPage as agents/[id]/index.vue\n\n    Staff->>ListPage: เปิดหน้า\n    ListPage->>BffAPI: โหลดรายการสัญญาตัวแทน\n    BffAPI-->>ListPage: contract list\n    ListPage-->>Staff: แสดงตาราง\n\n    Staff->>ListPage: ค้นหาหรือเปลี่ยน filter\n    ListPage->>BffAPI: โหลดรายการใหม่\n    BffAPI-->>ListPage: ผลลัพธ์ใหม่\n\n    Staff->>ListPage: คลิกแก้ไข\n    ListPage->>DetailPage: navigate ไปหน้ารายละเอียด\n```\n\n### 06-B: หน้ารายละเอียดสัญญาตัวแทน\n\n#### Purpose\n\nใช้โหลดข้อมูลสัญญาตัวแทนรายฉบับ พร้อมข้อมูลที่เกี่ยวข้อง และแสดงผลผ่าน tabs\n\n#### Main Steps\n\n1. เปิดหน้ารายละเอียดสัญญาตัวแทน\n2. โหลดข้อมูลสัญญาตาม id\n3. โหลดข้อมูล mapping ของ agent quota ที่เกี่ยวข้อง\n4. สร้าง state กลางของข้อมูลสัญญา\n5. โหลดรายการสัญญาหลักในโควตาเดียวกัน\n6. สร้าง state สำหรับรายการสัญญาในโควตาเดียวกัน\n7. อ่าน URL hash เพื่อเลือก tab ที่ต้องการแสดง\n8. แสดงข้อมูลผ่าน tab components\n\n#### Decision Points\n\n| กรณี | ผลลัพธ์ |\n|---|---|\n| เปิดหน้าครั้งแรก | โหลดข้อมูลสัญญาและข้อมูลที่เกี่ยวข้องทั้งหมด |\n| มี URL hash | เปิด tab ตาม hash |\n| เปลี่ยน tab | เปลี่ยน URL hash ตาม tab ที่เลือก |\n\n#### Result\n\n- ได้ข้อมูลสัญญาตัวแทนที่พร้อมใช้ในหลาย tab\n- ได้ state ของรายการสัญญาในโควตาเดียวกัน\n- ผู้ใช้สามารถเปิดดูข้อมูลสัญญาและเอกสารแนบได้จากหน้าเดียว\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant DetailPage as agents/[id]/index.vue\n    participant BffContractAPI as GET /bff-service/data-contracts/:id\n    participant BffAgentAPI as GET /bff-service/data-contract-agents\n    participant BffListAPI as GET /bff-service/data-contracts/byRole/agent\n    participant ContractState as globalContractProfile\n    participant ListState as globalListContactsByCaneQuotaState\n\n    Staff->>DetailPage: เปิดหน้ารายละเอียดสัญญา\n    DetailPage->>BffContractAPI: โหลดข้อมูลสัญญา\n    BffContractAPI-->>DetailPage: dataContractAgent\n\n    DetailPage->>BffAgentAPI: โหลดข้อมูล mapping ของ agent quota\n    BffAgentAPI-->>DetailPage: dataMappingContractSugarcane\n    DetailPage->>ContractState: สร้าง state ข้อมูลสัญญา\n\n    DetailPage->>BffListAPI: โหลดรายการสัญญาในโควตาเดียวกัน\n    BffListAPI-->>DetailPage: listContracts\n    DetailPage->>ListState: สร้าง state รายการสัญญา\n\n    DetailPage->>ContractState: inject reloadData()\n    DetailPage->>ListState: inject reloadData()\n    DetailPage-->>Staff: แสดง tab ตาม URL hash\n```\n\n### 06-C: Tabs ของสัญญาตัวแทน\n\n#### Purpose\n\nใช้แยกการแสดงข้อมูลสัญญาออกเป็นหมวด เพื่อให้ดูข้อมูลสัญญาและเอกสารแนบได้ชัดเจนขึ้น\n\n#### Main Steps\n\n1. สร้างรายการ tabs จาก `mockQuotaAgentsTabs`\n2. เปิด tab ตาม URL hash\n3. แสดง component ตาม tab ที่เลือก\n4. ปิดการใช้งานบาง tab ถ้าสถานะสัญญายังไม่ถึงเงื่อนไข\n\n#### Result\n\n- ผู้ใช้สามารถดูข้อมูลสัญญาและเอกสารแนบได้ตามหมวด\n- ระบบควบคุมการเปิดใช้งาน tab ตามสถานะสัญญา\n\n---\n\n## Exceptions / Edge Cases\n\n### การกรองรายการสัญญา\n\n- ใช้ search พร้อม debounce `300ms`\n- filter หลักของรายการคือ ปีการผลิต และสถานะสัญญา\n- รายการนี้จำกัดเฉพาะ `roleOwner = agentFarmer`\n\n### การจัดการ tabs\n\n- ใช้ URL hash เช่น `#contracts`, `#quota-agent-documents`\n- ไม่ได้ใช้ query param สำหรับเลือก tab\n- บาง tab ถูก comment ออกในโค้ด เช่น `quota-central-info`, `kat`, `my-cane`, `harvest`\n\n### state ในหน้ารายละเอียด\n\n- มีการใช้ state 2 ชุด คือ `globalContractProfile` และ `globalListContactsByCaneQuotaState`\n- ทั้งสอง state ถูก inject `reloadData()` เพื่อใช้โหลดข้อมูลใหม่\n\n---\n\n## Technical Reference\n\n### API Endpoints\n\n| Action | Method | Path |\n|---|---|---|\n| List agent contracts | GET | `/bff-service/data-contracts/byRole/agent` |\n| Get contract detail | GET | `/bff-service/data-contracts/{id}` |\n| Get contract agent mapping | GET | `/bff-service/data-contract-agents` |\n\n### List Filters\n\n| Filter | รายละเอียด |\n|---|---|\n| associateType | `[main, children]` |\n| roleOwner | `agentFarmer` |\n| prefixYear | ปีการผลิต |\n| status | สถานะสัญญา |\n| not.isFirstYear | `1` |\n| search | ชื่อ-นามสกุล / เลขที่คำขอ / เลขที่สัญญา |\n\n### List Columns\n\n| Field | ความหมาย |\n|---|---|\n| `draftContractNumber` | เลขที่คำขอ |\n| `contractNumber` | เลขที่สัญญา |\n| `createdAt` | วันที่ทำสัญญา |\n| `caneQuotaNumber` | เลขที่โควตา |\n| `fullName` | ชื่อ-นามสกุล |\n| `associateType` | ประเภทสัญญา |\n| `status` | สถานะเอกสาร |\n\n### Tabs\n\n| Code | Name | Component | Disable Criteria |\n|---|---|---|---|\n| `contracts` | ข้อมูลสัญญา | `AgentsContractInfo` | `status < ContractStatus.Draft` |\n| `quota-agent-documents` | เอกสารแนบสัญญา | `AgentsUploadDocument` | `status < ContractStatus.Draft` |\n\n### Detail States\n\n| State | ข้อมูล |\n|---|---|\n| `globalContractProfile` | `dataContract`, `dataAgentFarmer`, `dataMappingContractSugarcane`, `reloadData` |\n| `globalListContactsByCaneQuotaState` | `list`, `selected`, `selectedChildren`, `reloadData` |\n\n---\n\n## Known Gaps\n\n- tabs ในหน้ารายละเอียดอ้างอิง `mockQuotaAgentsTabs` จาก mock data จึงควรระวังว่าบาง tab อาจเป็น shell หรือเปิดใช้ไม่ครบ\n- `dashboard.vue` อยู่ใน source files แต่ในเอกสารเดิมไม่มีพฤติกรรมที่ยืนยันได้ชัดเจนว่าถูกใช้ใน flow นี้อย่างไร จึงยังไม่สรุปบทบาทเพิ่ม\n\n### หน้าใหม่ที่พบจาก develop branch\n\n| หน้า/Component | สถานะ | หมายเหตุ |\n|---|---|---|\n| `components/agents/change-payment-agent.vue` — **NEW** | partial implementation | component สำหรับเปลี่ยนผู้รับเงินโควตาตัวแทน; ใช้ `UIBaseTable` แสดงรายการ customer requests พร้อม pagination; มี modal สำหรับเลือกวันที่รับเอกสาร; ใช้ vee-validate สำหรับ form handling |\n| `pages/cms/customer-requests/change-payment-agent.vue` — **NEW** | wrapper page | หน้า wrapper ที่ render `AgentsChangePaymentAgent` component; layout: back-office; title: "เปลี่ยนผู้รับเงิน โควตาตัวแทน" |\n',

            '# Flow 07 — Installment Credit Withdraws (จัดการงวดจ่ายเงิน)\n\n> **แหล่งที่มาของข้อมูล (Source files)**\n> - `cms_frontend-develop/pages/cms/installment-credit-withdraws/index.vue`\n> - `cms_frontend-develop/pages/cms/installment-credit-withdraws/[id]/index.vue`\n> - `main_frontend-develop/composables/api-bff.ts`\n\n---\n\n## Overview\n\nFlow นี้ใช้จัดการรายการเบิกใช้เครดิตที่อยู่ในขั้นแบ่งงวดจ่ายเงิน โดยเริ่มจากดูรายการเบิกใช้เครดิต แล้วเปิดไปหน้ารายละเอียดเพื่อจัดงวดการจ่ายเงินของแต่ละรายการ\n\nในหน้ารายการ ผู้ใช้สามารถสลับประเภทวงเงิน ค้นหา และกรองตามสถานะได้ ส่วนในหน้ารายละเอียด ระบบจะโหลดข้อมูลรายการเบิกใช้เครดิต พร้อม config ที่เกี่ยวข้องกับกำหนดชำระและงวด เพื่อใช้ประกอบการจัดงวดจ่ายเงินจริง\n\nภาพรวมของ flow มี 2 ช่วงหลัก:\n\n1. ดูรายการเบิกใช้เครดิตที่รอแบ่งงวดหรือแบ่งงวดแล้ว\n2. เปิดหน้ารายละเอียดเพื่อจัดการงวดจ่ายเงินของแต่ละรายการ\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| รายการจัดการงวดจ่ายเงิน | `cms/installment-credit-withdraws/index.vue` |\n| หน้าจัดการงวดจ่ายเงิน | `cms/installment-credit-withdraws/[id]/index.vue` |\n| BFF APIs ที่เกี่ยวข้อง | `/bff-service/data-credit-withdraws`, `/bff-service/cog_payment_due`, `/bff-service/cog_installment` |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| Staff | ดูรายการเบิกใช้เครดิต ค้นหา กรอง และเปิดหน้าจัดการงวดจ่ายเงิน |\n| หน้ารายการจัดการงวดจ่ายเงิน | แสดงรายการ ค้นหา กรอง และพาไปหน้ารายละเอียด |\n| หน้าจัดการงวดจ่ายเงิน | โหลดข้อมูลรายการเบิกใช้เครดิตและ config ที่เกี่ยวข้อง เพื่อจัดงวดจ่ายเงิน |\n| BFF APIs | ส่งข้อมูลรายการเบิกใช้เครดิต รายละเอียดรายการ และ config สำหรับคำนวณงวด |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| รายการเบิกใช้เครดิต | ข้อมูลรายการที่พร้อมให้แบ่งงวดหรือแบ่งงวดแล้ว |\n| งวดจ่ายเงิน | ข้อมูล payment periods และ installments ของรายการเบิกใช้เครดิต |\n| config กำหนดชำระ | ข้อมูลประกอบการจัดงวดจาก payment due และ installment config |\n| ยอดคงเหลือจ่าย | ข้อมูลสรุปที่ใช้ตรวจสอบการจัดงวด |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["เปิดรายการจัดการงวดจ่ายเงิน"] --> B["เลือกประเภทวงเงิน ค้นหา หรือกรองสถานะ"]\n    B --> C["ดูรายการเบิกใช้เครดิต"]\n    C --> D["เปิดหน้าจัดการงวดจ่ายเงิน"]\n    D --> E["โหลดข้อมูลรายการและ config ที่เกี่ยวข้อง"]\n    E --> F["จัดงวดจ่ายเงินและบันทึกข้อมูล"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `index.vue` | ดูรายการเบิกใช้เครดิตและเปิดหน้าจัดงวด | ใช้ tab แยกตามประเภทวงเงิน |\n| `[id]/index.vue` | จัดการงวดจ่ายเงินของรายการเบิกใช้เครดิต | โหลดทั้งข้อมูลรายการและ config เพิ่มเติม |\n\n---\n\n## Per-Page Details\n\n### 07-A: รายการจัดการงวดจ่ายเงิน\n\n#### Purpose\n\nใช้ดูรายการเบิกใช้เครดิตที่อยู่ในขั้นแบ่งงวดจ่ายเงิน และเปิดไปจัดการงวดของแต่ละรายการ\n\n#### Main Steps\n\n1. เปิดหน้ารายการจัดการงวดจ่ายเงิน\n2. โหลดรายการเบิกใช้เครดิตตามประเภทวงเงินเริ่มต้น\n3. สลับประเภทวงเงินผ่าน tab\n4. ค้นหาหรือกรองตามสถานะ\n5. เปิดหน้ารายละเอียดเมื่อต้องการจัดงวดของรายการนั้น\n\n#### Decision Points\n\n| กรณี | ผลลัพธ์ |\n|---|---|\n| เปลี่ยนประเภทวงเงิน | โหลดรายการใหม่ตาม tab ที่เลือก |\n| เปลี่ยนสถานะ filter | โหลดรายการใหม่ตามสถานะที่เลือก |\n| คลิกปุ่มจัดการรายการ | พาไปหน้ารายละเอียด |\n\n#### Result\n\n- ได้รายการเบิกใช้เครดิตตามประเภทวงเงิน สถานะ และคำค้นหา\n- สามารถเปิดหน้าจัดการงวดจ่ายเงินของแต่ละรายการได้\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ListPage as installment-credit-withdraws/index.vue\n    participant BffAPI as GET /bff-service/data-credit-withdraws\n    participant DetailPage as installment-credit-withdraws/[id]/index.vue\n\n    Staff->>ListPage: เปิดหน้า\n    ListPage->>BffAPI: โหลดรายการตาม tab เริ่มต้น\n    BffAPI-->>ListPage: credit withdraw list\n    ListPage-->>Staff: แสดงตาราง\n\n    Staff->>ListPage: เปลี่ยน tab ค้นหา หรือกรองสถานะ\n    ListPage->>BffAPI: โหลดรายการใหม่\n    BffAPI-->>ListPage: ผลลัพธ์ใหม่\n\n    Staff->>ListPage: คลิกเปิดรายการ\n    ListPage->>DetailPage: navigate ไปหน้ารายละเอียด\n```\n\n### 07-B: หน้าจัดการงวดจ่ายเงิน\n\n#### Purpose\n\nใช้โหลดข้อมูลรายการเบิกใช้เครดิต พร้อม config ที่เกี่ยวข้อง เพื่อจัดงวดจ่ายเงินของรายการนั้น\n\n#### Main Steps\n\n1. เปิดหน้าจัดการงวดจ่ายเงิน\n2. โหลดข้อมูลรายการเบิกใช้เครดิตตาม id\n3. เก็บข้อมูลรายการลง state กลางของหน้า\n4. เตรียมข้อมูล installments, payment periods, payee list และข้อมูล matching\n5. โหลด config วันกำหนดชำระและ config งวดเพิ่มเติม\n6. แสดงสรุปยอดและฟอร์มจัดงวดจ่ายเงิน\n7. ผู้ใช้แก้ไขวันครบกำหนด เพิ่มงวด หรือปรับข้อมูลที่เกี่ยวข้อง\n8. กดบันทึกเพื่อ submit ข้อมูล\n\n#### Decision Points\n\n| กรณี | ผลลัพธ์ |\n|---|---|\n| `roleOwner == contractor` | ใช้ข้อมูล `includeContractor` |\n| `roleOwner != contractor` | ใช้ข้อมูล `includeContract` |\n| payment period ไม่มี `paymentDate` | กำหนดวันปัจจุบันเป็นค่าเริ่มต้น |\n| ยอดคงเหลือจ่ายน้อยกว่า 0 | summary bar แสดงสีแดง |\n\n#### Result\n\n- ได้ข้อมูลรายการเบิกใช้เครดิตพร้อมข้อมูลประกอบการจัดงวด\n- ผู้ใช้สามารถแก้ไขงวดจ่ายเงินและบันทึกข้อมูลได้\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant DetailPage as installment-credit-withdraws/[id]/index.vue\n    participant BffWithdrawAPI as GET /bff-service/data-credit-withdraws/:id\n    participant BffPaymentDueAPI as GET /bff-service/cog_payment_due\n    participant BffInstallmentAPI as GET /bff-service/cog_installment\n    participant State as appStateDataCreditWithdraw\n\n    Staff->>DetailPage: เปิดหน้ารายละเอียด\n    DetailPage->>BffWithdrawAPI: โหลดข้อมูลรายการเบิกใช้เครดิต\n    BffWithdrawAPI-->>DetailPage: dataCreditWithdraw\n    DetailPage->>State: setDataByICreditWithdraw(dataCreditWithdraw)\n    DetailPage->>DetailPage: เตรียม installments, paymentPeriods, payeeList และ matching\n\n    DetailPage->>BffPaymentDueAPI: โหลด payment due config\n    BffPaymentDueAPI-->>DetailPage: payment due config\n    DetailPage->>BffInstallmentAPI: โหลด installment config\n    BffInstallmentAPI-->>DetailPage: installment config\n\n    DetailPage-->>Staff: แสดง summary และฟอร์มจัดงวด\n    Staff->>DetailPage: ปรับข้อมูลและกดบันทึก\n    DetailPage->>DetailPage: onSubmit()\n```\n\n---\n\n## Exceptions / Edge Cases\n\n### ประเภทวงเงิน\n\n- tab เริ่มต้นคือ `creditYearly`\n- `CreditType.usageContractorMechanical` ถูก comment ออกในโค้ด\n\n### การกรองสถานะ\n\n- ค่า `"0"` หมายถึงรวมทั้ง `pendingSplitAmount` และ `completeSplitAmount`\n- dropdown สถานะแสดงเฉพาะ 2 สถานะนี้เท่านั้น\n\n### สถานะทำจ่าย\n\n- ระบบคำนวณ `paymentPeriod` จากรายการที่ `status != draft`\n- ถ้ายอดรวมที่ทำจ่ายแล้วเท่ากับยอดอนุมัติเบิก และสถานะยังเป็น `pendingSplitAmount` จะแสดงข้อความเพิ่มเติมว่า “รอส่งยอดให้บัญชี”\n\n### หน้ารายละเอียด\n\n- ถ้า `paymentDate` ไม่มีค่า ระบบกำหนดวันปัจจุบันให้เป็นค่าเริ่มต้น\n- summary bar แสดงสีแดงเมื่อยอดคงเหลือจ่ายต่ำกว่า 0\n\n---\n\n## Technical Reference\n\n### API Endpoints\n\n| Action | Method | Path |\n|---|---|---|\n| List credit withdraws | GET | `/bff-service/data-credit-withdraws` |\n| Get credit withdraw detail | GET | `/bff-service/data-credit-withdraws/{id}` |\n| Get payment due config | GET | `/bff-service/cog_payment_due` |\n| Get installment config | GET | `/bff-service/cog_installment` |\n\n### Tab ประเภทวงเงิน\n\n| Code | Name |\n|---|---|\n| `creditYearly` | วงเงินส่งเสริมประจำปี |\n| `creditSpecial` | วงเงินส่งเสริมพิเศษ |\n| `usageBeforeHarvest` | เบิกใช้ฤดูหีบ |\n\n### List Filters\n\n| Filter | รายละเอียด |\n|---|---|\n| `creditTypeCode` | ประเภทวงเงินจาก tab |\n| `status` | `[pendingSplitAmount, completeSplitAmount]` หรือสถานะที่เลือก |\n| `search` | เลขที่รายการ / รหัสโควต้า / ชื่อ-นามสกุล |\n\n### List Columns\n\n| Field | ความหมาย |\n|---|---|\n| `code` | เลขที่เบิกใช้ |\n| `createdAt` | วันที่เบิกใช้ |\n| `quotaNumber` | รหัสโควตา |\n| `fullname` | ชื่อ-นามสกุลชาวไร่ |\n| `debtGroupName` | รายการที่เบิกใช้ |\n| `approvePrice` | ยอดอนุมัติเบิก |\n| `paymentPeriod` | จำนวนหรือยอดทำจ่ายแล้ว |\n| `status` | สถานะรายการ |\n\n### State ในหน้ารายละเอียด\n\n| State | ความหมาย |\n|---|---|\n| `appStateDataCreditWithdraw` | state กลางของข้อมูลรายการเบิกใช้เครดิต |\n| `dataInstallments` | ข้อมูลงวดจ่าย |\n| `dataPaymentPeriod` | ข้อมูลรอบทำจ่าย |\n| `datapayeeList` | รายชื่อผู้รับเงิน |\n| `dataMappingInstallPayments` | ข้อมูล mapping ของงวดทำจ่าย |\n\n### Config Data ที่โหลดเพิ่ม\n\n| Config | Filter หลัก |\n|---|---|\n| `cog_payment_due` | `productionYearId`, `paymentDues.creditTypesCode` |\n| `cog_installment` | `creditTypesCode`, `debtGroupsCode`, `years` |\n\n---\n\n## Known Gaps\n\n- เอกสารเดิมยืนยันถึงการเรียก `onSubmit()` แต่ยังไม่มีรายละเอียดผลลัพธ์หลังบันทึกจาก source ที่ให้มา จึงยังไม่สรุปพฤติกรรมหลัง submit เพิ่ม\n',

          content:
            '# Flow 08 — Loan Contract (จัดการสัญญากู้ยืมเงิน)\n\n> **แหล่งที่มาของข้อมูล (Source files)**\n> - `cms_frontend-develop/pages/cms/loan-contract/index.vue`\n> - `cms_frontend-develop/pages/cms/loan-contract/[id].vue`\n> - `cms_frontend-develop/pages/cms/loan-contract-contractor/index.vue`\n> - `cms_frontend-develop/composables/mock-data.ts` (mockTabContractBorrow, mockTabContractorBorrow line 312)\n> - `main_frontend-develop/composables/api-bff.ts`\n> - `main_frontend-develop/composables/permission-extension.ts`\n\n---\n\n## Overview\n\nFlow นี้ใช้จัดการสัญญากู้ยืมเงิน โดยแยกมุมมองเป็นสัญญาของชาวไร่และสัญญาของผู้รับเหมา แล้วเปิดดูรายละเอียดสัญญาแต่ละฉบับเพื่อจัดการเอกสารและสถานะงาน\n\nในหน้ารายละเอียด ระบบจะโหลดข้อมูลสัญญา ไฟล์แนบที่เกี่ยวข้อง ข้อมูลเบิกใช้เครดิตที่เชื่อมกัน และกำหนดชุด tabs ที่ต้องแสดงตามเงื่อนไขของสัญญา\n\nภาพรวมของ flow มี 3 ช่วงหลัก:\n\n1. ดูรายการสัญญากู้ยืมเงินของชาวไร่\n2. ดูรายการสัญญากู้ยืมเงินของผู้รับเหมา\n3. เปิดหน้ารายละเอียดสัญญาเพื่อดูเอกสารและเปลี่ยนสถานะงาน\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| รายการสัญญากู้ยืมเงินชาวไร่ | `cms/loan-contract/index.vue` |\n| รายการสัญญากู้ยืมเงินผู้รับเหมา | `cms/loan-contract-contractor/index.vue` |\n| หน้ารายละเอียดสัญญากู้ยืมเงิน | `cms/loan-contract/[id].vue` |\n| tabs ของรายการ | `mockTabContractBorrow`, `mockTabContractorBorrow` |\n| การตรวจสิทธิ์ปุ่มสถานะ | `permission-extension.ts` |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| Staff | ดูรายการสัญญา เปิดรายละเอียด และดำเนินงานตามสถานะ |\n| หน้ารายการสัญญาชาวไร่ | แสดงรายการสัญญาตามประเภทวงเงิน |\n| หน้ารายการสัญญาผู้รับเหมา | แสดงรายการสัญญาตามประเภทวงเงินของผู้รับเหมา |\n| หน้ารายละเอียดสัญญา | โหลดข้อมูลสัญญา เอกสาร และควบคุม workflow ของสถานะ |\n| BFF APIs | ส่งข้อมูลสัญญา รายละเอียดสัญญา และข้อมูล credit withdraw ที่เกี่ยวข้อง |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| รายการสัญญากู้ยืมเงิน | ข้อมูลสัญญาที่แยกตามประเภทวงเงิน |\n| รายละเอียดสัญญา | ข้อมูลสัญญารายฉบับพร้อมไฟล์และข้อมูลที่เกี่ยวข้อง |\n| tabs ของเอกสาร | มุมมองข้อมูลสัญญา ค้ำประกัน คำยินยอม หรือสัญญาซื้อขายอ้อย |\n| สถานะงานของสัญญา | ขั้นตอนเอกสารตั้งแต่พิมพ์จนถึงรับเข้าแฟ้ม |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["เปิดรายการสัญญากู้ยืมเงิน"] --> B["เลือกประเภทวงเงิน"]\n    B --> C["ดูรายการสัญญา"]\n    C --> D["เปิดรายละเอียดสัญญา"]\n    D --> E["โหลดข้อมูลสัญญาและไฟล์แนบ"]\n    E --> F["กำหนด tabs ตามเงื่อนไขของสัญญา"]\n    F --> G["ดำเนินงานตามสถานะและสิทธิ์ที่มี"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `loan-contract/index.vue` | ดูรายการสัญญากู้ยืมเงินของชาวไร่ | ใช้ tab แยกตามประเภทวงเงิน |\n| `loan-contract-contractor/index.vue` | ดูรายการสัญญากู้ยืมเงินของผู้รับเหมา | ใช้ tab แยกตามประเภทวงเงินผู้รับเหมา |\n| `loan-contract/[id].vue` | ดูรายละเอียดสัญญาและจัดการ workflow เอกสาร | ใช้ tabs ตามเงื่อนไขของสัญญา |\n\n---\n\n## Per-Page Details\n\n### 08-A: รายการสัญญากู้ยืมเงินชาวไร่\n\n#### Purpose\n\nใช้ดูรายการสัญญากู้ยืมเงินของชาวไร่ โดยแยกตามประเภทวงเงิน\n\n#### Main Steps\n\n1. เปิดหน้ารายการสัญญากู้ยืมเงิน\n2. ใช้ tab เพื่อเลือกประเภทวงเงิน\n3. แสดงรายการสัญญาตามประเภทที่เลือก\n4. เปิดหน้ารายละเอียดเมื่อต้องการดูหรือดำเนินงานต่อกับสัญญา\n\n#### Result\n\n- ได้รายการสัญญาของชาวไร่ตามประเภทวงเงิน\n- ผู้ใช้สามารถเปิดดูรายละเอียดสัญญารายฉบับได้\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant LoanList as loan-contract/index.vue\n    participant TabConfig as mockTabContractBorrow\n    participant DetailPage as loan-contract/[id].vue\n\n    Staff->>LoanList: เปิดหน้ารายการ\n    LoanList->>TabConfig: โหลดรายการ tabs\n    TabConfig-->>LoanList: tabs ของชาวไร่\n    LoanList-->>Staff: แสดงรายการตาม tab เริ่มต้น\n\n    Staff->>LoanList: เปลี่ยนประเภทวงเงิน\n    LoanList-->>Staff: แสดงรายการตาม tab ที่เลือก\n\n    Staff->>LoanList: เปิดรายละเอียดสัญญา\n    LoanList->>DetailPage: navigate ไปหน้ารายละเอียด\n```\n\n### 08-B: รายการสัญญากู้ยืมเงินผู้รับเหมา\n\n#### Purpose\n\nใช้ดูรายการสัญญากู้ยืมเงินของผู้รับเหมา โดยแยกตามประเภทวงเงินของผู้รับเหมา\n\n#### Main Steps\n\n1. เปิดหน้ารายการสัญญากู้ยืมเงินผู้รับเหมา\n2. ใช้ tab เพื่อเลือกประเภทวงเงิน\n3. แสดงรายการสัญญาตามประเภทที่เลือก\n\n#### Result\n\n- ได้รายการสัญญาของผู้รับเหมาตามประเภทวงเงิน\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ContractorList as loan-contract-contractor/index.vue\n    participant TabConfig as mockTabContractorBorrow\n\n    Staff->>ContractorList: เปิดหน้ารายการผู้รับเหมา\n    ContractorList->>TabConfig: โหลดรายการ tabs\n    TabConfig-->>ContractorList: tabs ของผู้รับเหมา\n    ContractorList-->>Staff: แสดงรายการตาม tab ที่เลือก\n```\n\n### 08-C: หน้ารายละเอียดสัญญากู้ยืมเงิน\n\n#### Purpose\n\nใช้โหลดข้อมูลสัญญากู้ยืมเงินรายฉบับ จัดกลุ่มไฟล์แนบ และดำเนินงานตามสถานะของสัญญา\n\n#### Main Steps\n\n1. เปิดหน้ารายละเอียดสัญญา\n2. โหลดข้อมูลสัญญาตาม id\n3. แปลงไฟล์แนบให้เข้ากับโครงสร้างข้อมูลที่หน้าใช้งาน\n4. โหลดข้อมูล credit withdraw ที่เชื่อมกับสัญญา\n5. กำหนด tabs ที่ต้องแสดงตามเงื่อนไขของสัญญา\n6. แสดง subtitle ตามประเภทของเจ้าของสัญญา\n7. แสดงปุ่มดำเนินการตามสถานะและสิทธิ์ที่ผู้ใช้มี\n8. เมื่อผู้ใช้กดปุ่ม ระบบจะเปลี่ยนสถานะหรืออัปโหลดไฟล์ตาม workflow\n\n#### Decision Points\n\n| กรณี | ผลลัพธ์ |\n|---|---|\n| เป็น contractor (`?type=contractor`) | ใช้ subtitle จากข้อมูล contractor และปุ่ม back ไปหน้าผู้รับเหมา |\n| ไม่เป็น contractor | ใช้ subtitle จากข้อมูลชาวไร่ และปุ่ม back ไปหน้าชาวไร่ |\n| อยู่ใน special area | แสดง tabs เฉพาะ guarantor และ sugarcane contracts |\n| ไม่อยู่ใน special area | แสดง loan และ guarantor และอาจมี consent ตาม groupCode |\n| สถานะ `waitingVerify` | ก่อนเปลี่ยนสถานะต้อง upload file |\n| สถานะ `waitingReceiptContract` | เปลี่ยนสถานะแล้วเรียก compare data |\n\n#### Result\n\n- ได้ข้อมูลสัญญากู้ยืมเงินพร้อมไฟล์แนบที่จัดกลุ่มแล้ว\n- ได้ชุด tabs ที่เหมาะกับเงื่อนไขของสัญญา\n- ผู้ใช้สามารถดำเนินงานตาม workflow ของสถานะสัญญาได้\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant DetailPage as loan-contract/[id].vue\n    participant BffLoanAPI as GET /bff-service/data-loan-contracts/:id\n    participant BffCreditAPI as GET /bff-service/data-credit-withdraws/:creditWithdrawId\n    participant State as appStateDataLoanContract\n\n    Staff->>DetailPage: เปิดหน้ารายละเอียด\n    DetailPage->>BffLoanAPI: โหลดข้อมูลสัญญา\n    BffLoanAPI-->>DetailPage: dataLoanContract พร้อม attachments\n\n    DetailPage->>DetailPage: แปลง attachments ตาม type\n    DetailPage->>BffCreditAPI: โหลด credit withdraw ที่เกี่ยวข้อง\n    BffCreditAPI-->>DetailPage: dataCreditWithdraw\n\n    DetailPage->>State: set dataLoanContract และข้อมูลประกอบ\n    DetailPage->>DetailPage: setInitTab() ตามเงื่อนไขของสัญญา\n    DetailPage-->>Staff: แสดง tabs และปุ่มตาม status + permission\n\n    Staff->>DetailPage: กดปุ่มเปลี่ยนสถานะ\n    DetailPage->>DetailPage: onSubmit(newStatus)\n```\n\n### 08-D: Workflow การเปลี่ยนสถานะสัญญา\n\n#### Purpose\n\nใช้ควบคุมขั้นตอนเอกสารของสัญญา ตั้งแต่พิมพ์เอกสาร ส่งเอกสาร ตรวจเอกสาร จนถึงรับสัญญาเข้าแฟ้ม\n\n#### Main Steps\n\n1. ตรวจสิทธิ์ของปุ่มตาม `PermissionExtension`\n2. แสดงปุ่มตามสถานะปัจจุบันของสัญญา\n3. เมื่อกดปุ่ม ระบบจะเลือกวิธีดำเนินการตามสถานะปลายทาง\n4. บางสถานะต้อง upload file ก่อน\n5. บางสถานะเปลี่ยนสถานะแล้วพากลับไปหน้ารายการ\n\n#### Result\n\n- สถานะของสัญญาถูกขยับตาม workflow ที่ระบบกำหนด\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant DetailPage as loan-contract/[id].vue\n    participant Permission as canAccessPermissionExtensions(...)\n    participant LoanAPI as PATCH /bff-service/data-loan-contracts/:id\n\n    Staff->>DetailPage: ดูปุ่มการดำเนินการ\n    DetailPage->>Permission: ตรวจสิทธิ์ของแต่ละปุ่ม\n    Permission-->>DetailPage: อนุญาตหรือไม่อนุญาต\n\n    Staff->>DetailPage: กดปุ่มเปลี่ยนสถานะ\n    alt สถานะใหม่ = waitingVerify\n        DetailPage->>DetailPage: uploadFile()\n    else สถานะใหม่ = waitingReceiptContract\n        DetailPage->>LoanAPI: update status\n        DetailPage->>DetailPage: compareData()\n    else สถานะอื่นใน workflow\n        DetailPage->>LoanAPI: update status\n        DetailPage->>DetailPage: กลับไปหน้ารายการ\n    end\n```\n\n---\n\n## Exceptions / Edge Cases\n\n### tabs ของหน้ารายการ\n\n- รายการชาวไร่ใช้ `mockTabContractBorrow`\n- รายการผู้รับเหมาใช้ `mockTabContractorBorrow`\n- ข้อมูล tabs มาจาก mock data\n\n### การเลือก tabs ในหน้ารายละเอียด\n\n- `isSpecialArea` ใช้เงื่อนไขจาก `groupCode`, `areaTypesId`, `extensionFactoriesId`\n- `showConsentTab` ใช้ groupCode เป็นตัวกำหนดว่าจะเพิ่ม consent tab หรือไม่\n\n### subtitle และ back navigation\n\n- ถ้ามี `?type=contractor` จะใช้ข้อมูล contractor และกลับไป `/cms/loan-contract-contractor`\n- ถ้าไม่มี จะใช้ข้อมูลชาวไร่และกลับไป `/cms/loan-contract`\n\n### workflow สถานะ\n\n- ทุกปุ่มต้องผ่าน `canAccessPermissionExtensions(...)`\n- ปุ่มแต่ละตัวแสดงตามสถานะปัจจุบันของสัญญา\n\n---\n\n## Technical Reference\n\n### API Endpoints\n\n| Action | Method | Path |\n|---|---|---|\n| Get loan contract detail | GET | `/bff-service/data-loan-contracts/{id}` |\n| Get linked credit withdraw | GET | `/bff-service/data-credit-withdraws/{creditWithdrawId}` |\n\n### Tabs: ชาวไร่\n\n| Code | Name |\n|---|---|\n| `creditYearly` | วงเงินส่งเสริมประจำปี |\n| `creditSpecial` | วงเงินส่งเสริมพิเศษ |\n| `usageBeforeHarvest` | เบิกใช้ฤดูหีบ |\n\n### Tabs: ผู้รับเหมา\n\n| Code | Name |\n|---|---|\n| `usageContractorMechanical` | ส่งเสริมผู้รับเหมาจักรกล |\n| `usageContractorHarvest` | ส่งเสริมผู้รับเหมาฤดูหีบ |\n\n### Tabs ในหน้ารายละเอียด\n\n| Code | Name | Component |\n|---|---|---|\n| `loan` | สัญญากู้ยืมเงิน | `LoanContractTabLoan` |\n| `guarantor` | สัญญาค้ำประกัน | `LoanContractTabGuarantor` |\n| `consent` | บันทึกคำยินยอม / หลักฐาน | `LoanContractTabConsent` |\n| `sugarcaneContracts` | สัญญาซื้อขายอ้อย | `LoanContractTabSugarcaneContracts` |\n\n### Permission Workflow\n\n| Permission | แสดงเมื่อสถานะ | Action | สถานะใหม่ |\n|---|---|---|---|\n| `load_contract_btn_print` | `waitingPrint` | ยืนยันพิมพ์เอกสารครบถ้วน | `waitingSign` |\n| `load_contract_btn_send_docs` | `waitingSign`, `waitingVerify` | ส่งเอกสารให้สินเชื่อตรวจสอบ | `waitingVerify` |\n| `load_contract_btn_confirm_docs` | `waitingVerify` | ยืนยันเอกสารถูกต้อง | `waitingReceiptContract` |\n| `load_contract_btn_receive_docs` | `waitingReceiptContract` | ยืนยันรับสัญญาเข้าแฟ้ม | `contractReceived` |\n\n### State ในหน้ารายละเอียด\n\n| State | ข้อมูล |\n|---|---|\n| `appStateDataLoanContract` | ข้อมูลสัญญาหลักของหน้า |\n| `dataConset` | ข้อมูลไฟล์คำยินยอมของผู้รับเงิน |\n| `dataLoan` | ข้อมูลไฟล์สัญญากู้ยืมและรูปประกอบ |\n| `contractSugarcane` | ข้อมูลไฟล์สัญญาซื้อขายอ้อย |\n| `dataContractGaurantor` | ข้อมูลไฟล์ของผู้ค้ำประกัน |\n| `dataCreditWidthdraw` | ข้อมูล credit withdraw ที่เชื่อมกับสัญญา |\n\n### Attachment Mapping ที่เอกสารเดิมอ้างถึง\n\n| Type Prefix | ใช้กับ |\n|---|---|\n| `loan_contract_guarantor_image_signature_<quotaNumber>` | รูปเซ็นของผู้ค้ำประกัน |\n| `loan_contract_guarantor_image_with_person_<quotaNumber>` | ไฟล์สัญญาผู้ค้ำประกัน |\n| `loan_contract_payee_consent_<payeeQuotaNumber>` | ไฟล์ consent ของผู้รับเงิน |\n| `loan_contract_payee_image_signature_<payeeQuotaNumber>` | รูปเซ็นของผู้รับเงิน |\n| `loan_contract_payee_image_with_person_<payeeQuotaNumber>` | รูปถ่ายถือสัญญาของผู้รับเงิน |\n| `loan_contract` | ไฟล์สัญญากู้ยืม |\n| `loan_contract_image_signature` | รูปเซ็นสัญญากู้ |\n| `loan_contract_image_with_person` | รูปถือสัญญากู้ |\n| `loan_contract_cane` | ไฟล์สัญญาซื้อขายอ้อย |\n| `loan_contract_cane_image_signature` | รูปเซ็นสัญญาอ้อย |\n| `loan_contract_cane_image_with_person` | รูปถือสัญญาอ้อย |\n\n---\n\n## Known Gaps\n\n- tabs ของหน้ารายการมาจาก mock data จึงควรระวังว่าในอนาคตอาจเปลี่ยนได้\n- เอกสารเดิมยืนยัน logic `onSubmit()` แบบย่อ แต่ยังไม่เห็น endpoint update status แบบชัดเจนจาก source list ที่ให้มา จึงสรุปไว้ในระดับ workflow เท่านั้น ไม่ลงรายละเอียด request เพิ่ม\n',

            '# Flow 09 — Payment Due & Installment Config (ตั้งค่าดิวชำระ และ งวดสัดส่วนชำระ)\n\n> **แหล่งที่มาของข้อมูล (Source files)**\n> - `main_frontend-develop/pages/system-config/payment-due/index.vue`\n> - `main_frontend-develop/pages/system-config/payment-due/create-payment-due/index.vue`\n> - `main_frontend-develop/pages/system-config/installment/index.vue`\n> - `main_frontend-develop/composables/api-bff.ts`\n> - `main_frontend-develop/composables/api-main.ts`\n\n---\n\n## Overview\n\nFlow นี้ครอบคลุมหน้า System Config 2 ส่วนที่ใช้กำหนดกติกาการชำระเงินของระบบ:\n\n1. `Payment Due` สำหรับกำหนดวันครบกำหนดชำระตามปีการผลิตและประเภทการเบิก\n2. `Installment Config` สำหรับกำหนดจำนวนปีผ่อนและสัดส่วนของแต่ละงวด\n\nโดยฝั่ง Payment Due มีทั้งหน้ารายการและหน้าสร้าง/แก้ไข ส่วนฝั่ง Installment Config ใช้หน้าเดียวสำหรับดูรายการ เพิ่ม แก้ไข และลบ\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| รายการ Payment Due | `system-config/payment-due/index.vue` |\n| สร้าง/แก้ไข Payment Due | `system-config/payment-due/create-payment-due/index.vue` |\n| รายการ Installment Config | `system-config/installment/index.vue` |\n| BFF APIs ที่เกี่ยวข้อง | `/bff-service/cog_payment_due`, `/bff-service/cog_installment` |\n| Main APIs ที่เกี่ยวข้อง | `/main-service/config/cog_payment_dues`, `/main-service/config/cog_installment` |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| Admin | ดูรายการ config เพิ่ม แก้ไข ลบ และเปิดดูรายละเอียด |\n| หน้า Payment Due List | แสดงรายการดิวชำระ ค้นหา กรอง และพาไปหน้าสร้าง/แก้ไข |\n| หน้า Create/Edit Payment Due | จัดการรายการวันครบกำหนดชำระในแต่ละปีการผลิต |\n| หน้า Installment Config | แสดงรายการงวดและสัดส่วนการผ่อนชำระ พร้อมเปิด modal เพิ่ม/แก้ไข และลบ |\n| BFF/Main APIs | ส่งข้อมูล config และรับคำสั่งลบข้อมูล |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| Payment Due Config | รายการวันครบกำหนดชำระตามปีการผลิต |\n| Payment Due Items | รายละเอียดวันครบกำหนดชำระในแต่ละแถว |\n| Installment Config | จำนวนปีผ่อนและสัดส่วนแต่ละงวด |\n| หมายเหตุ | ข้อมูลประกอบของ config |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["เปิดหน้าตั้งค่า Payment Due"] --> B["ค้นหาหรือกรองตามปีการผลิต"]\n    B --> C["ดูรายการดิวชำระ"]\n    C --> D["เพิ่มหรือแก้ไข Payment Due"]\n    A --> E["เปิดหน้าตั้งค่า Installment"]\n    E --> F["ดูรายการจำนวนปีผ่อนและสัดส่วนงวด"]\n    F --> G["เพิ่ม แก้ไข หรือลบรายการ Installment"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `payment-due/index.vue` | ดูรายการดิวชำระ ค้นหา กรอง และเปิดหน้าสร้าง/แก้ไข | คลิกจำนวนรายการเพื่อดู detail modal ได้ |\n| `create-payment-due/index.vue` | สร้างหรือแก้ไขรายการวันครบกำหนดชำระ | ใช้ query `type=add` หรือ `type=edit` |\n| `installment/index.vue` | ดูรายการงวดและสัดส่วนการผ่อนชำระ | เพิ่ม/แก้ไขผ่าน modal และลบผ่าน confirm |\n\n---\n\n## Per-Page Details\n\n### 09-A: รายการ Payment Due\n\n#### Purpose\n\nใช้ดูรายการดิวชำระตามปีการผลิต ค้นหา เปิดดูรายละเอียด และพาไปหน้าสร้างหรือแก้ไข\n\n#### Main Steps\n\n1. เปิดหน้ารายการ Payment Due\n2. โหลดรายการดิวชำระ\n3. ค้นหาหรือกรองตามปีการผลิต\n4. คลิกเพิ่มเพื่อไปหน้าสร้างรายการใหม่\n5. คลิกแก้ไขเพื่อไปหน้าแก้ไขรายการเดิม\n6. คลิกจำนวนรายการวันครบกำหนดชำระเพื่อเปิด detail modal\n\n#### Decision Points\n\n| กรณี | ผลลัพธ์ |\n|---|---|\n| เปลี่ยนปีการผลิต | โหลดรายการใหม่ตามปีที่เลือก |\n| คลิกเพิ่มดิวชำระ | พาไปหน้า create mode |\n| คลิกแก้ไข | พาไปหน้า edit mode |\n| คลิกจำนวน payment due | เปิด detail modal |\n\n#### Result\n\n- ได้รายการ Payment Due ตามเงื่อนไขที่เลือก\n- สามารถไปสร้างหรือแก้ไขรายการได้\n- สามารถเปิดดูรายละเอียดรายการย่อยได้\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Admin\n    participant ListPage as payment-due/index.vue\n    participant BffAPI as GET /bff-service/cog_payment_due\n    participant CreatePage as create-payment-due/index.vue\n    participant DetailModal as UISystemConfigPaymentDueDetail\n\n    Admin->>ListPage: เปิดหน้า\n    ListPage->>BffAPI: โหลดรายการ Payment Due\n    BffAPI-->>ListPage: payment due list\n    ListPage-->>Admin: แสดงตาราง\n\n    Admin->>ListPage: ค้นหาหรือเลือกปีการผลิต\n    ListPage->>BffAPI: โหลดรายการใหม่\n    BffAPI-->>ListPage: ผลลัพธ์ใหม่\n\n    alt เพิ่มดิวชำระ\n        Admin->>ListPage: คลิกเพิ่มดิวชำระ\n        ListPage->>CreatePage: navigate type=add\n    else แก้ไขดิวชำระ\n        Admin->>ListPage: คลิกแก้ไข\n        ListPage->>CreatePage: navigate type=edit&id=...\n    else ดูรายละเอียดจำนวน payment due\n        Admin->>ListPage: คลิกจำนวนรายการ\n        ListPage->>DetailModal: เปิด modal รายละเอียด\n    end\n```\n\n### 09-B: สร้าง/แก้ไข Payment Due\n\n#### Purpose\n\nใช้สร้างหรือแก้ไขรายการวันครบกำหนดชำระของปีการผลิต\n\n#### Main Steps\n\n1. เปิดหน้าสร้างหรือแก้ไข Payment Due\n2. ถ้าเป็นโหมดแก้ไข ให้โหลดข้อมูลเดิมของรายการ\n3. เลือกปีการผลิต\n4. เพิ่มหรือลบแถวของวันครบกำหนดชำระ\n5. กรอกประเภทการเบิก งวดอ้อย และวันที่ที่เกี่ยวข้อง\n6. กรอกหมายเหตุ\n7. กดบันทึกเพื่อ submit ข้อมูล\n\n#### Decision Points\n\n| กรณี | ผลลัพธ์ |\n|---|---|\n| `type=add` | เปิดฟอร์มว่าง |\n| `type=edit&id=...` | โหลดข้อมูลเดิมมาแสดงในฟอร์ม |\n| คลิกลบแถว | ลบ payment due item ในฟอร์ม |\n\n#### Result\n\n- ได้ฟอร์ม Payment Due ที่พร้อมบันทึก\n- ผู้ใช้สามารถจัดการรายการวันครบกำหนดชำระได้หลายแถวในหน้าเดียว\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Admin\n    participant CreatePage as create-payment-due/index.vue\n    participant BffAPI as GET /bff-service/cog_payment_due\n\n    Admin->>CreatePage: เปิดหน้า create/edit\n    alt โหมด edit\n        CreatePage->>BffAPI: โหลดข้อมูลตาม id\n        BffAPI-->>CreatePage: paymentDues list\n        CreatePage-->>Admin: แสดงฟอร์มพร้อมข้อมูลเดิม\n    else โหมด add\n        CreatePage-->>Admin: แสดงฟอร์มว่าง\n    end\n\n    Admin->>CreatePage: เพิ่ม ลบ หรือแก้ไขแถว payment due\n    Admin->>CreatePage: กดบันทึก\n    CreatePage->>CreatePage: onSubmited(...)\n```\n\n### 09-C: รายการ Installment Config\n\n#### Purpose\n\nใช้ดูรายการจำนวนปีผ่อนและสัดส่วนงวดชำระ พร้อมเพิ่ม แก้ไข และลบรายการ\n\n#### Main Steps\n\n1. เปิดหน้า Installment Config\n2. โหลดรายการ config แบบ SSR\n3. ค้นหารายการที่ต้องการ\n4. คลิกเพิ่มเพื่อเปิด modal สร้างรายการ\n5. คลิกแก้ไขเพื่อเปิด modal พร้อมข้อมูลเดิม\n6. คลิกลบเพื่อยืนยันและลบรายการ\n\n#### Decision Points\n\n| กรณี | ผลลัพธ์ |\n|---|---|\n| คลิกเพิ่ม | เปิด modal โหมด create |\n| คลิกแก้ไข | เปิด modal โหมด edit พร้อม selectedData |\n| คลิกลบ | แสดง confirm และเรียก API ลบ |\n\n#### Result\n\n- ได้รายการ Installment Config ที่อัปเดตแล้ว\n- ผู้ใช้สามารถจัดการจำนวนปีผ่อนและสัดส่วนงวดได้จากหน้าเดียว\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Admin\n    participant InstPage as installment/index.vue\n    participant BffAPI as GET /bff-service/cog_installment\n    participant DelAPI as DELETE /main-service/config/cog_installment/:id\n    participant Modal as UISystemConfigInstallmentFormCreate\n\n    Admin->>InstPage: เปิดหน้า\n    InstPage->>BffAPI: โหลดรายการ Installment Config\n    BffAPI-->>InstPage: installment list\n    InstPage-->>Admin: แสดงตาราง\n\n    alt เพิ่มรายการ\n        Admin->>InstPage: คลิกเพิ่ม\n        InstPage->>Modal: showModal() type=create\n    else แก้ไขรายการ\n        Admin->>InstPage: คลิกแก้ไข\n        InstPage->>Modal: showModal() type=edit\n    else ลบรายการ\n        Admin->>InstPage: คลิกลบ\n        InstPage->>InstPage: confirm dialog\n        InstPage->>DelAPI: ลบรายการ\n        DelAPI-->>InstPage: success/error\n        InstPage->>BffAPI: reloadData()\n    end\n```\n\n---\n\n## Exceptions / Edge Cases\n\n### Payment Due List\n\n- ปุ่มลบในหน้ารายการ Payment Due ถูก comment ออกในโค้ด\n- ค่า `paymentDue` ในตารางแสดงเป็นจำนวนรายการ `paymentDues.length`\n\n### Create/Edit Payment Due\n\n- วันที่ทุกค่าในฟอร์มถูก parse ด้วย `parseStringToDate()` ก่อนส่งให้ DatePicker\n- ใช้ query `type=add` และ `type=edit&id=...` เพื่อกำหนดโหมดการทำงาน\n\n### Installment Config\n\n- หน้า Installment ใช้ SSR load ใน `setup()` ตามเอกสารเดิม\n- search ใช้ debounce `800ms`\n\n---\n\n## Technical Reference\n\n### API Endpoints\n\n| Action | Method | Path |\n|---|---|---|\n| List payment due configs | GET | `/bff-service/cog_payment_due` |\n| Delete payment due config | DELETE | `/main-service/config/cog_payment_dues/{id}` |\n| List installment configs | GET | `/bff-service/cog_installment` |\n| Delete installment config | DELETE | `/main-service/config/cog_installment/{id}` |\n\n### Payment Due List Fields\n\n| Field | ความหมาย |\n|---|---|\n| `productionYearId` | ปีการผลิต |\n| `paymentDue` | จำนวนรายการวันครบกำหนดชำระ |\n| `note` | หมายเหตุ |\n| `isActive` | สถานะการใช้งาน |\n\n### Payment Due Item Fields\n\n| Field | ความหมาย |\n|---|---|\n| `creditType` | ประเภทการเบิก |\n| `canePeriod` | งวดอ้อย |\n| `startDate` | ช่วงวันรับส่งเสริม |\n| `endDate` | วันสิ้นสุดรับส่งเสริม |\n| `paymentDueDate` | วันครบกำหนดชำระ |\n\n### Installment Fields\n\n| Field | ความหมาย |\n|---|---|\n| `creditType` | ประเภทการเบิก |\n| `years` | จำนวนปีผ่อน |\n| `periods` | สัดส่วนงวดชำระ |\n| `isActive` | สถานะการใช้งาน |\n\n---\n\n## Known Gaps\n\n- เอกสารเดิมยืนยันการเรียก `onSubmited(e, formProps)` ในหน้า create/edit Payment Due แต่ยังไม่บอกรายละเอียดปลายทางหลังบันทึก จึงยังไม่สรุปพฤติกรรมหลัง submit เพิ่ม\n- เอกสารเดิมระบุ API ลบของ Payment Due ในสรุป API แต่ไม่อธิบาย flow การลบในหน้า list เพราะปุ่มลบถูก comment ออกในโค้ด จึงเก็บไว้ใน technical reference เท่านั้น\n',

            '# Flow 10 — Credit Withdraw Oil & Cash Contractors (รายการขอใช้น้ำมัน / บริการจักรกลเงินสด)\n\n> **แหล่งที่มาของข้อมูล (Source files)**\n> - `cms_frontend-develop/pages/cms/credit-withdraw-oil/index.vue`\n> - `cms_frontend-develop/pages/cms/credit-withdraw-oil/[id]/index.vue`\n> - `cms_frontend-develop/pages/cms/cash-contractors/index.vue`\n> - `cms_frontend-develop/pages/cms/cash-contractors/[id].vue`\n> - `cms_frontend-develop/composables/mock-data.ts` (mockMenuCreditWithdrawOils line 256)\n> - `main_frontend-develop/composables/api-bff.ts`\n\n---\n\n## Overview\n\nFlow นี้ครอบคลุม 2 งานที่อยู่ใกล้กัน:\n\n1. `Credit Withdraw Oil` สำหรับจัดการรายการขอใช้น้ำมันของชาวไร่และผู้รับเหมา\n2. `Cash Contractors` สำหรับดูรายการใช้บริการจักรกลโรงงานแบบเงินสดของผู้รับเหมา\n\nฝั่งขอใช้น้ำมันมีทั้งหน้ารายการและหน้ารายละเอียดที่ใช้สร้างรายการเติมน้ำมัน ดู QR code อัปโหลดบิล และปิดรายการ ส่วนฝั่งเงินสดในเอกสารเดิมยืนยันถึงหน้ารายการและการเปิดไปสร้าง/แก้ไขรายการ\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| รายการขอใช้น้ำมัน | `cms/credit-withdraw-oil/index.vue` |\n| รายละเอียดรายการขอใช้น้ำมัน | `cms/credit-withdraw-oil/[id]/index.vue` |\n| รายการใช้บริการจักรกลเงินสด | `cms/cash-contractors/index.vue` |\n| หน้ารายละเอียด/แก้ไข cash contractor | `cms/cash-contractors/[id].vue` |\n| tabs ของรายการขอใช้น้ำมัน | `mockMenuCreditWithdrawOils` |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| Staff | ดูรายการ ค้นหา กรอง เปิดรายละเอียด และดำเนินงานตามสถานะ |\n| หน้ารายการขอใช้น้ำมัน | สลับมุมมองชาวไร่/ผู้รับเหมา และเลือกปีการผลิต |\n| หน้ารายละเอียดขอใช้น้ำมัน | ดู summary สร้างรายการเติมน้ำมัน แสดง QR code อัปโหลดบิล และปิดรายการ |\n| หน้ารายการ cash contractors | ดูรายการใช้บริการจักรกลแบบเงินสดและเปิดไปสร้าง/แก้ไข |\n| BFF APIs | ส่งข้อมูลรายการ รายละเอียด ราคาน้ำมัน และรายการ order |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| รายการขอใช้น้ำมัน | รายการเบิกน้ำมันแยกตามชาวไร่หรือผู้รับเหมา |\n| รายการเติมน้ำมัน | รายการย่อยของการเติมน้ำมันในแต่ละครั้ง |\n| QR code เติมน้ำมัน | ข้อมูลสำหรับใช้เติมน้ำมันตาม ref code |\n| รายการใช้บริการจักรกลเงินสด | รายการ order ของผู้รับเหมาแบบเงินสด |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["เปิดรายการขอใช้น้ำมัน"] --> B["เลือกปีการผลิตและประเภทผู้ใช้งาน"]\n    B --> C["ดูรายการเบิกน้ำมัน"]\n    C --> D["เปิดรายละเอียดรายการ"]\n    D --> E["สร้างรายการเติมน้ำมันหรือดำเนินการกับรายการเดิม"]\n    A --> F["เปิดรายการใช้บริการจักรกลเงินสด"]\n    F --> G["กรองตามสถานะและค้นหารายการ"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `credit-withdraw-oil/index.vue` | ดูรายการขอใช้น้ำมัน แยกชาวไร่และผู้รับเหมา | ใช้ปีการผลิตและ tab เป็นตัวกรองหลัก |\n| `credit-withdraw-oil/[id]/index.vue` | ดูรายละเอียดรายการขอใช้น้ำมันและรายการเติมน้ำมัน | มี workflow QR, upload bill, close bill |\n| `cash-contractors/index.vue` | ดูรายการใช้บริการจักรกลแบบเงินสด | ค้นหาด้วย Enter และกรองตามสถานะ |\n| `cash-contractors/[id].vue` | หน้ารายละเอียดหรือแก้ไขรายการ cash contractor | เอกสารเดิมอ้างเฉพาะ path ปลายทาง |\n\n---\n\n## Per-Page Details\n\n### 10-A: รายการขอใช้น้ำมัน\n\n#### Purpose\n\nใช้ดูรายการขอใช้น้ำมันของชาวไร่และผู้รับเหมา โดยเลือกปีการผลิตและสลับ tab เพื่อดูข้อมูลตามประเภทผู้ใช้งาน\n\n#### Main Steps\n\n1. เปิดหน้ารายการขอใช้น้ำมัน\n2. เลือกปีการผลิต\n3. สลับ tab ระหว่างชาวไร่และผู้รับเหมา\n4. แสดงรายการตามปีการผลิตและ tab ที่เลือก\n5. เปิดหน้ารายละเอียดของรายการที่ต้องการ\n\n#### Decision Points\n\n| กรณี | ผลลัพธ์ |\n|---|---|\n| เปลี่ยนปีการผลิต | อัปเดต state และแสดงรายการตามปีที่เลือก |\n| เปลี่ยน tab | อัปเดต currentTab ใน state |\n| เปิดรายละเอียดรายการ | พาไปหน้ารายละเอียด |\n\n#### Result\n\n- ได้รายการขอใช้น้ำมันตามปีการผลิตและประเภทผู้ใช้งาน\n- สามารถเปิดดูรายละเอียดรายการแต่ละใบได้\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ListPage as credit-withdraw-oil/index.vue\n    participant TabConfig as mockMenuCreditWithdrawOils\n    participant State as appStateCredtiRequestRefillFuel\n    participant DetailPage as credit-withdraw-oil/[id]/index.vue\n\n    Staff->>ListPage: เปิดหน้า\n    ListPage->>TabConfig: โหลด tabs\n    TabConfig-->>ListPage: sugarcane / contractor\n    Staff->>ListPage: เลือกปีการผลิต\n    ListPage->>State: set productYear\n    Staff->>ListPage: เปลี่ยน tab\n    ListPage->>State: set currentTab\n    ListPage-->>Staff: แสดงตารางตามเงื่อนไข\n\n    Staff->>ListPage: เปิดรายละเอียด\n    ListPage->>DetailPage: navigate ไปหน้ารายละเอียด\n```\n\n### 10-B: รายละเอียดรายการขอใช้น้ำมัน\n\n#### Purpose\n\nใช้ดูข้อมูลรายการขอใช้น้ำมัน สร้างรายการเติมน้ำมัน ดู QR code อัปโหลดบิล และปิดรายการเมื่อดำเนินการครบ\n\n#### Main Steps\n\n1. เปิดหน้ารายละเอียดรายการขอใช้น้ำมัน\n2. โหลดข้อมูลรายการเบิกใช้เครดิต\n3. โหลดรายการเติมน้ำมันที่อ้างอิง credit withdraw code เดียวกัน\n4. โหลดราคาน้ำมันเริ่มต้นของวันปัจจุบัน\n5. แสดง summary ของจำนวนอนุมัติ เบิกใช้แล้ว และคงเหลือ\n6. สร้างรายการเติมน้ำมันใหม่เมื่อยังสร้างได้\n7. ใช้ QR code, พิมพ์, อัปโหลดบิล หรือลบรายการตามสถานะของแต่ละแถว\n8. ถ้าทุกรายการ completed ระบบอัปเดตสถานะ credit withdraw เป็น `completeSplitOil`\n\n#### Decision Points\n\n| กรณี | ผลลัพธ์ |\n|---|---|\n| สร้างรายการเติมน้ำมันใหม่ | ตรวจ `isOverLimit(...)` และ verify identity ก่อนสร้าง |\n| row อยู่ในสถานะที่สร้าง QR ได้ | แสดงปุ่ม QR code |\n| row อยู่ในสถานะที่อัปโหลดบิลได้ และผู้ใช้มีสิทธิ์ | แสดงปุ่มอัปโหลดบิล |\n| row อยู่ในสถานะที่ลบได้ | แสดงปุ่มลบ |\n| ทุกรายการย่อย completed | อัปเดตสถานะหลักเป็น `completeSplitOil` |\n\n#### Result\n\n- ได้ข้อมูล summary และรายการเติมน้ำมันของรายการนั้น\n- ผู้ใช้สามารถดำเนินการแต่ละ row ตามสถานะได้\n- รายการหลักอาจถูกปิดสถานะเมื่อรายการย่อยครบทั้งหมด\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant DetailPage as credit-withdraw-oil/[id]/index.vue\n    participant BffWithdrawAPI as GET /bff-service/data-credit-withdraws/:id\n    participant BffRefillAPI as GET /bff-service/data-request-refill-fuels\n    participant OilPriceAPI as GET default oil price\n    participant StatusAPI as PUT /bff-service/data-withdraw-credits/:id/status\n\n    Staff->>DetailPage: เปิดหน้า\n    DetailPage->>BffWithdrawAPI: โหลดข้อมูล credit withdraw\n    BffWithdrawAPI-->>DetailPage: dataCreditWithdraw\n    DetailPage->>BffRefillAPI: โหลดรายการเติมน้ำมัน\n    BffRefillAPI-->>DetailPage: dataBillOil\n    DetailPage->>OilPriceAPI: โหลด default oil price\n    OilPriceAPI-->>DetailPage: defaultOilPrice\n    DetailPage-->>Staff: แสดง summary และรายการเติมน้ำมัน\n\n    alt สร้างรายการเติมน้ำมัน\n        Staff->>DetailPage: กดเพิ่มรายการ\n        DetailPage->>DetailPage: isOverLimit check\n        DetailPage->>DetailPage: verify identity\n        DetailPage->>BffRefillAPI: สร้าง bill oil\n    else ดำเนินการกับ row เดิม\n        Staff->>DetailPage: พิมพ์ / แสดง QR / อัปโหลดบิล / ลบ\n        DetailPage->>DetailPage: ทำ action ตามสถานะ\n    end\n\n    alt ทุกรายการ completed\n        DetailPage->>StatusAPI: update status = completeSplitOil\n    end\n```\n\n### 10-C: รายการใช้บริการจักรกลแบบเงินสด\n\n#### Purpose\n\nใช้ดูรายการ order ของผู้รับเหมาที่เป็นบริการจักรกลแบบเงินสด ค้นหา กรองสถานะ และเปิดไปสร้างหรือแก้ไขรายการ\n\n#### Main Steps\n\n1. เปิดหน้ารายการ cash contractors\n2. โหลดรายการ order ของผู้รับเหมาที่ตรงกับสถานะที่เลือก\n3. ค้นหาด้วยคำค้นหา\n4. กรองตามสถานะ\n5. เปิดไปหน้าสร้างคำขอใช้บริการ\n6. เปิดไปหน้าแก้ไขรายการเดิม\n\n#### Decision Points\n\n| กรณี | ผลลัพธ์ |\n|---|---|\n| เปลี่ยนสถานะ filter | โหลดรายการใหม่ |\n| ค้นหา | ทำเมื่อกด Enter |\n| คลิกสร้างคำขอใช้บริการ | พาไปหน้า create |\n| คลิกแก้ไข | พาไปหน้าแก้ไข |\n\n#### Result\n\n- ได้รายการ order ของผู้รับเหมาตามสถานะและคำค้นหา\n- สามารถเปิดไปสร้างหรือแก้ไขรายการได้\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant CashPage as cash-contractors/index.vue\n    participant OrderAPI as GET /bff-service/data-orders\n    participant DetailPage as cash-contractors/[id].vue\n\n    Staff->>CashPage: เปิดหน้า\n    CashPage->>OrderAPI: โหลดรายการ order\n    OrderAPI-->>CashPage: order list\n    CashPage-->>Staff: แสดงตาราง\n\n    Staff->>CashPage: เปลี่ยนสถานะหรือค้นหา\n    CashPage->>OrderAPI: โหลดรายการใหม่\n    OrderAPI-->>CashPage: ผลลัพธ์ใหม่\n\n    alt สร้างคำขอใหม่\n        Staff->>CashPage: คลิกสร้างคำขอใช้บริการ\n        CashPage->>DetailPage: navigate ไปหน้า create\n    else แก้ไขรายการ\n        Staff->>CashPage: คลิกแก้ไข\n        CashPage->>DetailPage: navigate ไปหน้าแก้ไข\n    end\n```\n\n---\n\n## Exceptions / Edge Cases\n\n### รายการขอใช้น้ำมัน\n\n- ใช้ `mockMenuCreditWithdrawOils` สำหรับ tab ชาวไร่/ผู้รับเหมา\n- เก็บ `productYear` และ `currentTab` ไว้ใน state กลาง\n- เปลี่ยน tab แล้ว update state แบบมี delay `300ms`\n\n### รายละเอียดรายการขอใช้น้ำมัน\n\n- summary คำนวณจากจำนวนอนุมัติ เบิกใช้แล้ว และคงเหลือ\n- QR code ใช้ได้ภายในวันที่ระบุเท่านั้นตามข้อความใน modal\n- การสร้างรายการใหม่ต้องผ่าน `UIBaseModalVerifyIdentity`\n\n### Cash Contractors\n\n- filter หลักของ list คือ `roleOwner = contractor`\n- search ทำงานเมื่อกด Enter ไม่ใช่ debounce\n\n---\n\n## Technical Reference\n\n### API Endpoints\n\n| Action | Method | Path |\n|---|---|---|\n| Get credit withdraw detail | GET | `/bff-service/data-credit-withdraws/{id}` |\n| List request refill fuels | GET | `/bff-service/data-request-refill-fuels` |\n| Update withdraw credit status | PUT | `/bff-service/data-withdraw-credits/{id}/status` |\n| List contractor cash orders | GET | `/bff-service/data-orders` |\n\n### Oil Detail Summary Fields\n\n| Field | ความหมาย |\n|---|---|\n| `amount` | จำนวนอนุมัติเบิก (ลิตร) |\n| `sumRequestRefillFuel` | เบิกใช้แล้ว (ลิตร) |\n| `summaryRefillFuel` | จำนวนคงเหลือ (ลิตร) |\n\n### Refill Fuel Row Actions\n\n| เงื่อนไข | Action |\n|---|---|\n| ทุก row | พิมพ์ |\n| `waitingGenQrCode`, `waitingRefueling` | แสดง QR code |\n| `completed`, `waitingRefueling`, `editing` + สิทธิ์ admin/supplies | อัปโหลดบิล |\n| `waitingGenQrCode`, `waitingRefueling` | ลบรายการ |\n\n### Cash Contractors List Fields\n\n| Field | ความหมาย |\n|---|---|\n| `code` | เลขที่ใบบริการ |\n| `paymentDate` | วันที่เปิดใบ |\n| `fullname` | ชื่อ-นามสกุล |\n| `status` | สถานะรายการ |\n\n---\n\n## Known Gaps\n\n- เอกสารเดิมยืนยัน path `cms/cash-contractors/[id].vue` แต่ยังไม่อธิบายพฤติกรรมของหน้ารายละเอียด cash contractors จึงสรุปได้เฉพาะการเปิดปลายทางจากหน้า list\n- การสร้าง bill oil และการอัปโหลดบิลถูกอ้างถึงในเอกสารเดิม แต่ไม่ได้ให้ endpoint สร้าง/อัปโหลดโดยตรง จึงคงไว้ในระดับพฤติกรรม ไม่ลงรายละเอียด request เพิ่ม\n\n### หน้าใหม่ที่พบจาก develop branch\n\n| หน้า | ขนาด (bytes) | สถานะ | หมายเหตุ |\n|---|---|---|---|\n| `pages/cms/approve-cash-contractor/index.vue` — **NEW** | 9,272 | ทำงานจริง | อนุมัติการชำระค่าบริการจักรกลเงินสด; ใช้ `apiBffDataOrder` + `CashContractorModalUploadSlip`; แสดง orders สถานะ `waitingVerify` พร้อม search + payment method filters |\n| `pages/cms/inspection-credit-withdraw-oil/index.vue` — **NEW** | 6,919 | ทำงานจริง | ตรวจรับรายการขอเบิกน้ำมัน; tabbed interface: ชาวไร่ / ผู้รับเหมา; ใช้ `UIMasterProductYear` สำหรับ filter ปีการผลิต; child components: `InspectionCreditWithdrawOilListInspectionCreditWithdrawOil` + `InspectionCreditWithdrawOilListContractorInspectionnCreditWithdrawOil` |\n| `pages/cms/cash-contractor-invoice/index.vue` — **NEW** | 14,379 | ทำงานจริง | ออกใบกำกับภาษีสำหรับ inspection receipts แบบ `cashPayment`; multi-select table + batch POST ออก invoice; ใช้ `apiBffexportDataInspectionReceipts` + `apiDataInspectionReceiptsInvoid` + `apiDataInspectionReceipts`; payment method / status filters; modal แสดง receipt พร้อม print (หมายเหตุ: หน้านี้ overlap กับ Flow 20 — 20-D) |\n',

            '# Flow 11 — Outstanding Debt Management (การจัดการหนี้คงค้าง / รายการสรุปหนี้คงค้าง)\n\n> **แหล่งที่มาของข้อมูล (Source files)**\n> - `cms_frontend-develop/pages/cms/summary-outstanding-debts/index.vue`\n> - `cms_frontend-develop/components/summary-outstanding-debts/modal-import-file-summary-debt.vue`\n> - `cms_frontend-develop/pages/cms/outstanding-debt-management/index.vue`\n> - `cms_frontend-develop/pages/cms/outstanding-debt-management/[id].vue`\n\n---\n\n## Overview\n\nFlow นี้ครอบคลุม 2 กลุ่มหน้าที่เกี่ยวกับหนี้คงค้าง แต่มีความพร้อมใช้งานต่างกันชัดเจน:\n\n1. `Summary Outstanding Debts` เป็นหน้าที่ใช้งานจริง และเชื่อมกับ Accounting Service โดยตรง\n2. `Outstanding Debt Management` เป็นหน้าที่อยู่ระหว่างพัฒนา โดยเอกสารเดิมยืนยันว่าหน้ายังต่อ API ไม่ตรงกับงานจริง และมี handler หลายจุดที่ยังว่างอยู่\n\nดังนั้น flow นี้ควรถูกอ่านแยกเป็น:\n- ส่วน `ใช้งานจริง`: รายการสรุปหนี้คงค้าง + import/export\n- ส่วน `WIP`: หน้าจัดการหนี้คงค้างแบบ list/detail ที่ยังไม่พร้อมใช้งานจริง\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| รายการสรุปหนี้คงค้าง | `cms/summary-outstanding-debts/index.vue` |\n| modal import ไฟล์หนี้คงค้าง | `modal-import-file-summary-debt.vue` |\n| หน้าจัดการหนี้คงค้าง (WIP) | `cms/outstanding-debt-management/index.vue` |\n| หน้ารายละเอียดจัดการหนี้คงค้าง (WIP) | `cms/outstanding-debt-management/[id].vue` |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| Admin | ดูรายการสรุปหนี้คงค้าง ค้นหา กรอง นำเข้า และ export ข้อมูล |\n| หน้ารายการสรุปหนี้คงค้าง | แสดงข้อมูลหนี้จาก Accounting Service และเปิด import/export |\n| modal import ไฟล์ | อัปโหลดไฟล์หนี้คงค้างเข้าสู่ระบบ |\n| หน้าจัดการหนี้คงค้าง (WIP) | แสดงโครง UI ของงานจัดการหนี้ แต่ยังไม่เชื่อมข้อมูลถูกต้อง |\n| Accounting Service | ส่งข้อมูล summary debt, dropdown, export และรับ import file |\n| BFF API (ผิดโดเมน) | ถูกเรียกในหน้าจัดการหนี้คงค้าง WIP ตามเอกสารเดิม |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| รายการสรุปหนี้คงค้าง | ข้อมูลหนี้จาก Accounting Service |\n| ยอดหนี้คงเหลือรวม | ค่าสรุปหนี้คงเหลือทั้งสิ้น |\n| ผล import ไฟล์ | ผลสำเร็จทั้งหมดหรือสำเร็จบางส่วนพร้อมรายการผิดพลาด |\n| หน้าจัดการหนี้คงค้าง WIP | โครง UI ที่ยังไม่อ้างอิงข้อมูลหนี้จริง |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["เปิดรายการสรุปหนี้คงค้าง"] --> B["ค้นหาและกรองข้อมูลหนี้"]\n    B --> C["ดูรายการและยอดหนี้คงเหลือรวม"]\n    C --> D["Import Excel"]\n    C --> E["Export Excel"]\n    A --> F["เปิดหน้าจัดการหนี้คงค้าง (WIP)"]\n    F --> G["ดูโครงหน้ารายการและรายละเอียดที่ยังไม่พร้อมใช้งานจริง"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `summary-outstanding-debts/index.vue` | ดูรายการสรุปหนี้คงค้าง ค้นหา กรอง import/export | ใช้งานจริงกับ Accounting Service |\n| `modal-import-file-summary-debt.vue` | อัปโหลดไฟล์หนี้คงค้าง | รองรับ `.xlsx` และ `.csv` |\n| `outstanding-debt-management/index.vue` | แสดงหน้ารายการจัดการหนี้คงค้าง | WIP และใช้ API ไม่ตรงโดเมน |\n| `outstanding-debt-management/[id].vue` | แสดงหน้ารายละเอียดจัดการหนี้คงค้าง | WIP และมีข้อมูล hardcoded หลายจุด |\n\n---\n\n## Per-Page Details\n\n### 11-A: รายการสรุปหนี้คงค้าง\n\n#### Purpose\n\nใช้ดูรายการหนี้คงค้างจาก Accounting Service ค้นหา กรอง และดูยอดหนี้คงเหลือรวม\n\n#### Main Steps\n\n1. เปิดหน้ารายการสรุปหนี้คงค้าง\n2. โหลดรายการหนี้คงค้าง\n3. โหลดตัวเลือกปีครบกำหนดและประเภทหนี้\n4. ค้นหาหรือกรองตามปีครบกำหนด ประเภทหนี้ และวันที่ครบกำหนดชำระ\n5. แสดงตารางข้อมูลหนี้และยอดหนี้คงเหลือรวม\n6. เปิด import modal หรือ export Excel ตามที่ผู้ใช้เลือก\n\n#### Decision Points\n\n| กรณี | ผลลัพธ์ |\n|---|---|\n| ค้นหา | ส่งค่า `query` ไปที่ API |\n| เลือกปีครบกำหนด | ส่ง `maturity_year` ไปที่ API |\n| เลือกประเภทหนี้ | ส่ง `type_debt` ไปที่ API |\n| เลือกวันที่ครบกำหนด | ส่ง `start_due_date` และ `end_due_date` เป็นวันเดียวกัน |\n\n#### Result\n\n- ได้รายการสรุปหนี้คงค้างตามเงื่อนไขที่เลือก\n- ได้ยอดหนี้คงเหลือรวมสำหรับแสดงใน summary bar\n- สามารถ import หรือ export ข้อมูลได้จากหน้าเดียว\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Admin\n    participant Page as summary-outstanding-debts/index.vue\n    participant AccAPI as Accounting Service\n    participant ImportModal as modal-import-file-summary-debt.vue\n\n    Admin->>Page: เปิดหน้า\n    Page->>AccAPI: โหลดรายการหนี้คงค้าง\n    Page->>AccAPI: โหลด dropdown ปีครบกำหนด\n    Page->>AccAPI: โหลด dropdown ประเภทหนี้\n    AccAPI-->>Page: debt list + summary + dropdown data\n    Page-->>Admin: แสดงตารางและยอดหนี้คงเหลือรวม\n\n    Admin->>Page: ค้นหาหรือเปลี่ยน filter\n    Page->>AccAPI: โหลดข้อมูลใหม่\n    AccAPI-->>Page: ผลลัพธ์ใหม่\n\n    alt Import Excel\n        Admin->>Page: คลิก Import Excel\n        Page->>ImportModal: showModal()\n    else Export Excel\n        Admin->>Page: คลิก Export Excel\n        Page->>AccAPI: ขอไฟล์ export\n        AccAPI-->>Page: blob file\n        Page-->>Admin: download file.xlsx\n    end\n```\n\n### 11-B: Import Excel Modal\n\n#### Purpose\n\nใช้อัปโหลดไฟล์หนี้คงค้างเข้าสู่ระบบ และแจ้งผลว่าทำสำเร็จทั้งหมดหรือบางส่วน\n\n#### Main Steps\n\n1. เปิด modal import\n2. เลือกไฟล์\n3. ตรวจประเภทไฟล์\n4. สร้าง FormData และส่งไฟล์ไปยัง Accounting Service\n5. ถ้าสำเร็จทั้งหมด ให้ปิด modal และ reload ข้อมูล\n6. ถ้าสำเร็จบางส่วน ให้แสดงรายการ error\n7. ถ้าล้มเหลว ให้แสดงข้อความ error\n\n#### Decision Points\n\n| กรณี | ผลลัพธ์ |\n|---|---|\n| ไฟล์เป็น `xlsx` หรือ `csv` | อนุญาตให้อัปโหลด |\n| `status == success` และมี `list_error` | แจ้งว่าสำเร็จบางส่วน |\n| `status == success` และไม่มี `list_error` | แจ้งว่าสำเร็จและปิด modal |\n| อัปโหลดไม่สำเร็จ | แจ้ง error |\n\n#### Result\n\n- ไฟล์หนี้คงค้างถูกส่งเข้า service\n- หน้า parent สามารถ reload ข้อมูลใหม่ได้หลัง import\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Admin\n    participant ImportModal as modal-import-file-summary-debt.vue\n    participant AccAPI as POST /no-auth-accounting-service/debt/import_new_debt\n    participant Page as summary-outstanding-debts/index.vue\n\n    Admin->>ImportModal: เลือกไฟล์\n    ImportModal->>ImportModal: เก็บไฟล์ที่เลือก\n    Admin->>ImportModal: กดอัปโหลด\n    ImportModal->>AccAPI: ส่ง FormData\n    AccAPI-->>ImportModal: status + list_error\n\n    alt สำเร็จบางส่วน\n        ImportModal-->>Admin: แสดง warning และ list_error\n    else สำเร็จทั้งหมด\n        ImportModal-->>Page: emit onReload\n        Page->>Page: reloadData()\n    else ไม่สำเร็จ\n        ImportModal-->>Admin: แสดง error\n    end\n```\n\n### 11-C: หน้าจัดการหนี้คงค้าง (WIP)\n\n#### Purpose\n\nใช้เป็นโครงหน้ารายการจัดการหนี้คงค้าง แต่ตามเอกสารเดิมหน้านี้ยังไม่เชื่อมกับข้อมูลหนี้จริง\n\n#### Main Steps\n\n1. เปิดหน้ารายการจัดการหนี้คงค้าง\n2. โหลดข้อมูลจาก API ที่ใช้กับ land collateral\n3. แสดงตารางด้วย label ของงานหนี้คงค้าง\n4. เปิดหน้ารายละเอียดเมื่อกดปุ่มดู\n\n#### Decision Points\n\n| กรณี | ผลลัพธ์ |\n|---|---|\n| ค้นหา | handler ยังว่างเปล่า |\n| คลิกดูรายละเอียด | พาไปหน้า detail |\n\n#### Result\n\n- ได้หน้า list ที่แสดงโครง UI ของงาน outstanding debt\n- แต่ข้อมูลและ handler ยังไม่พร้อมใช้งานจริง\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Admin\n    participant ListPage as outstanding-debt-management/index.vue\n    participant WrongAPI as GET apiBffContractCollaterals/lands\n    participant DetailPage as outstanding-debt-management/[id].vue\n\n    Admin->>ListPage: เปิดหน้า\n    ListPage->>WrongAPI: โหลดข้อมูล\n    WrongAPI-->>ListPage: land data\n    ListPage-->>Admin: แสดงตารางด้วย label ของหนี้คงค้าง\n\n    Admin->>ListPage: คลิกดูรายละเอียด\n    ListPage->>DetailPage: navigate ไปหน้า detail\n```\n\n### 11-D: หน้ารายละเอียดจัดการหนี้คงค้าง (WIP)\n\n#### Purpose\n\nใช้แสดงโครงหน้ารายละเอียดของงานจัดการหนี้คงค้าง แต่ยังไม่เชื่อมกับข้อมูลจริงครบถ้วน\n\n#### Main Steps\n\n1. เปิดหน้า detail\n2. โหลดข้อมูลจาก API เดียวกับหน้า list\n3. แสดง tab buttons และตาราง\n4. แสดง summary cards\n5. เปิด modal ประวัติการชำระหนี้หรือ modal รายละเอียดรายการเบิก\n\n#### Decision Points\n\n| กรณี | ผลลัพธ์ |\n|---|---|\n| กด tab buttons | handler ยังว่างเปล่า |\n| คลิกประวัติการชำระหนี้ | เปิด modal history |\n| คลิกดูรายละเอียดรายการ | เปิด modal view detail |\n\n#### Result\n\n- ได้หน้า detail ที่มีโครงสร้าง UI ครบระดับหนึ่ง\n- แต่ยังไม่พร้อมใช้งานจริง เพราะข้อมูลและ logic หลายจุดยังเป็น WIP\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Admin\n    participant DetailPage as outstanding-debt-management/[id].vue\n    participant WrongAPI as GET apiBffContractCollaterals/lands\n    participant ModalHistory as OutstandingDebtManagementDetailModalHistory\n    participant ModalView as OutstandingDebtManagementDetailModalView\n\n    Admin->>DetailPage: เปิดหน้า detail\n    DetailPage->>WrongAPI: โหลดข้อมูล\n    WrongAPI-->>DetailPage: land data\n    DetailPage-->>Admin: แสดงตาราง, tabs, summary cards\n\n    Admin->>DetailPage: คลิกประวัติการชำระหนี้\n    DetailPage->>ModalHistory: show()\n\n    Admin->>DetailPage: คลิกดูรายละเอียดรายการ\n    DetailPage->>ModalView: show()\n```\n\n---\n\n## Exceptions / Edge Cases\n\n### Summary Outstanding Debts\n\n- `start_due_date` และ `end_due_date` ถูก set เป็นวันเดียวกันจาก datepicker\n- search ใช้ debounce `800ms`\n- export เรียกผ่าน `HttpAxiosService` แบบ `responseType = blob`\n\n### Import Modal\n\n- endpoint import ใช้ path `/no-auth-accounting-service/...`\n- รองรับไฟล์ `xlsx` และ `csv`\n\n### Outstanding Debt Management (WIP)\n\n- `onSearch()` ในหน้า list ยังว่างเปล่า\n- `onClickTabMenuOtion()` ในหน้า detail ยังว่างเปล่า\n- จำนวนทั้งหมด 10 รายการในหน้า list เป็น hardcoded\n- summary cards ในหน้า detail เป็นค่า hardcoded\n- title ของหน้า detail และ title ของ modal บางตัวเป็น hardcoded\n\n---\n\n## Technical Reference\n\n### API Endpoints\n\n| API Constant / Path | Service | ใช้ใน | สถานะ |\n|---|---|---|---|\n| `apiGetAccountingDebtGetNewDebtAll` | Accounting Service | summary list | ใช้งานจริง |\n| `apiGetAccountingGetYear` | Accounting Service | year dropdown | ใช้งานจริง |\n| `apiGetAccountingDebtGetNewTypeDebt` | Accounting Service | type debt dropdown | ใช้งานจริง |\n| `apiGetAccountingDebtExportNewDebt` | Accounting Service | export xlsx | ใช้งานจริง |\n| `/no-auth-accounting-service/debt/import_new_debt` | Accounting Service | import xlsx | ใช้งานจริง |\n| `${apiBffContractCollaterals}/lands` | BFF | outstanding-debt-management list + detail | WIP / ใช้ผิดโดเมน |\n\n### Summary Outstanding Debts Filters\n\n| Filter | รายละเอียด |\n|---|---|\n| `query` | Address Number / เลขบัตรประชาชน / ชื่อ-นามสกุล |\n| `maturity_year` | ปีครบกำหนด |\n| `type_debt` | ประเภทหนี้ |\n| `start_due_date` | วันที่ครบกำหนดชำระ |\n| `end_due_date` | วันที่ครบกำหนดชำระ |\n\n### Summary Outstanding Debts Columns\n\n| Field | Label |\n|---|---|\n| `RPAN8` | Address Number |\n| `TaxID` | เลขบัตรประชาชน |\n| `Name` | ชื่อ-นามสกุล |\n| `DueDate` | DueDate |\n| `RPVR01` | ปีครบกำหนด |\n| `RPGLC` | GL Offset |\n| `DESC` | ประเภทหนี้ |\n| `RPAG` | Gross Amount |\n| `RPAAP` | Open Amount |\n\n### Outstanding Debt Management WIP Signals\n\n| จุดที่พบ | รายละเอียด |\n|---|---|\n| API ไม่ตรงโดเมน | ใช้ `apiBffContractCollaterals/lands` |\n| ตารางไม่ตรงข้อมูล | field จริงมาจาก land data แต่ label เป็นงานหนี้ |\n| handler ว่าง | `onSearch()`, `onClickTabMenuOtion()` |\n| hardcoded data | total count, summary cards, detail title, modal title |\n\n---\n\n## Known Gaps\n\n- ส่วน `Outstanding Debt Management` ยังเป็น WIP ชัดเจนและยังไม่ควรถูกตีความเป็น flow ใช้งานจริง\n- เอกสารเดิมชี้ว่าหน้า detail มี modal และปุ่มหลายตัว แต่ handler บางส่วนยังไม่ทำงาน จึงสรุปได้แค่ระดับโครง UI และ interaction ที่เปิด modal\n',
