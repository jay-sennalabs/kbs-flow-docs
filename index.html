            '# Flow 03 — System Configuration\n\n> **แหล่งที่มาของข้อมูล (Source files)**\n> - `main_frontend-develop/pages/system-config/set-interest-rate/*`\n> - `main_frontend-develop/pages/system-config/setting-interests/*` ← **NEW in develop**\n> - `main_frontend-develop/pages/system-config/approve-route/*`\n> - `main_frontend-develop/pages/system-config/years/index.vue`\n> - `main_frontend-develop/pages/system-config/extension-areas/index.vue`\n> - `main_frontend-develop/pages/system-config/oil-price/index.vue`\n> - `main_frontend-develop/pages/system-config/payment-due/*`\n> - `main_frontend-develop/pages/system-config/running-numbers/index.vue`\n> - `main_frontend-develop/pages/system-config/sugarcane-varieties/index.vue` ← **NEW in develop**\n> - `main_frontend-develop/pages/system-config/products/index.vue` ← **NEW in develop**\n> - `main_frontend-develop/pages/system-config/product-prices/index.vue` ← **NEW in develop**\n> - `main_frontend-develop/pages/system-config/debt-groups/index.vue`\n> - `main_frontend-develop/pages/system-config/credit-types/index.vue`\n> - `main_frontend-develop/pages/system-config/installment/index.vue`\n> - `main_frontend-develop/pages/system-config/credit-and-debts/index.vue`\n> - `main_frontend-develop/pages/system-config/mechanical-services/*`\n> - `main_frontend-develop/composables/api-accounting-service.ts`\n> - `main_frontend-develop/composables/api-accounting.ts` ← **NEW in develop**\n> - `main_frontend-develop/components/ReferenceRate/FormModal.vue`\n> - `accounting_service-develop/src/modules/roundInterest/*` ← **NEW in develop**\n> - `accounting_service-develop/src/modules/interest-setting/*` ← **NEW in develop**\n\n---\n\n## Overview\n\nFlow นี้ครอบคลุมหน้าตั้งค่ากลางของระบบที่ใช้กำหนด "กติกาพื้นฐาน" ก่อน flow ธุรกิจอื่นจะนำไปใช้ต่อ เช่น อัตราดอกเบี้ย, เส้นทางอนุมัติ, ปีการผลิต, เขตส่งเสริม และ master data ด้านการเงินหรือบริการ\n\nภาพรวมของ flow มี 3 กลุ่มงานหลัก:\n\n1. ตั้งค่ากติกาที่มีผลต่อการคำนวณหรือการตัดสินใจของระบบ\n2. จัดการอัตราดอกเบี้ยแบบละเอียด (อัตรากลาง / โครงการ / โควตา / กลุ่มพิเศษ / หนี้พิพากษา) ← **NEW**\n3. จัดการรายการอ้างอิงที่หลายหน้าต้องเรียกไปใช้ต่อ\n4. ดูแลข้อมูลระดับโครงสร้าง เช่น ปีการผลิตและเขตรับผิดชอบ\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| อัตราดอกเบี้ย (เดิม) | `set-interest-rate/*` |\n| **อัตราดอกเบี้ยกลาง (for-cal)** | `setting-interests/for-cal/*` ← **NEW** |\n| **อัตราดอกเบี้ยโครงการ (for-project)** | `setting-interests/for-project/*` ← **NEW** |\n| **อัตราดอกเบี้ยรายโควตา (for-quota)** | `setting-interests/for-quota/*` ← **NEW** |\n| **อัตราดอกเบี้ยกลุ่มพิเศษ (for-special)** | `setting-interests/for-special/*` ← **NEW** |\n| **อัตราหนี้พิพากษา (judgment-debt-rate)** | `setting-interests/judgment-debt-rate/*` ← **NEW** |\n| ประเภทและลำดับอนุมัติ | `approve-route/index.vue` |\n| ปีการผลิต | `years/index.vue` |\n| เขตส่งเสริม / เขตรับผิดชอบ | `extension-areas/index.vue` |\n| ราคาน้ำมัน | `oil-price/index.vue` |\n| วันครบกำหนดชำระ | `payment-due/*` |\n| เลขรันนิ่ง | `running-numbers/index.vue` |\n| **พันธุ์อ้อย** | `sugarcane-varieties/index.vue` ← **NEW** |\n| **สินค้า** | `products/index.vue` ← **NEW** |\n| **ราคาสินค้า/บริการส่งเสริม** | `product-prices/index.vue` ← **NEW** |\n| master data อื่นในหมวด System Config | debt groups, credit types, installment, credit and debts, mechanical services |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| Admin / Backoffice | เพิ่ม, แก้ไข, ลบข้อมูลตั้งค่าของระบบ |\n| หน้า System Config | แสดงรายการ, เปิด form, และเรียก backend เพื่อบันทึกการตั้งค่า |\n| Main Service | เก็บ master/config ส่วนใหญ่ของระบบ |\n| Accounting Service | เก็บข้อมูลอัตราดอกเบี้ยที่แยก service ออกไป |\n| โมดูลที่ใช้งานต่อ | ดึงค่าตั้งต้นเหล่านี้ไปใช้ใน flow ธุรกิจอื่น |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| Interest configuration | ชุดอัตราดอกเบี้ยที่พร้อมใช้งาน |\n| Approval route | ประเภทงานอนุมัติและลำดับผู้เกี่ยวข้อง |\n| Production year | ชุดปีการผลิตที่ใช้กับงานสัญญาและข้อมูลฤดูกาล |\n| Responsible area mapping | ความสัมพันธ์ระหว่างเขตกับผู้รับผิดชอบ |\n| System master data | รายการอ้างอิงที่ flow อื่นเรียกใช้ต่อ |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["ผู้ดูแลเปิดหมวด System Config"] --> B["เลือกรายการตั้งค่าที่ต้องดูแล"]\n    B --> C["ระบบโหลดค่าปัจจุบัน"]\n    C --> D["ผู้ดูแลเพิ่ม แก้ไข หรือลบข้อมูล"]\n    D --> E{"ข้อมูลผ่านเงื่อนไขของหน้านั้น?"}\n    E -->|ไม่ผ่าน| F["แจ้งปัญหาและให้แก้ไขข้อมูล"]\n    E -->|ผ่าน| G["บันทึกไปยัง service ที่เกี่ยวข้อง"]\n    G --> H["รีเฟรชรายการและพร้อมให้ flow อื่นใช้งานต่อ"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `set-interest-rate/index.vue` | ดูรายการอัตราดอกเบี้ย | ข้อมูลชุดนี้อยู่ใน accounting service |\n| `set-interest-rate/add.vue` | สร้างอัตราดอกเบี้ยใหม่ | มีตรรกะคำนวณค่าผลลัพธ์ระหว่างกรอก |\n| `set-interest-rate/[type]/[date].vue` | ดู, แก้ไข, หรือคัดลอกอัตราดอกเบี้ย | mode เปลี่ยนตาม route param |\n| `approve-route/index.vue` | จัดการประเภทการอนุมัติและลำดับอนุมัติ | ลำดับอนุมัติแก้แบบลบแล้วสร้างใหม่ |\n| `years/index.vue` | จัดการปีการผลิต | มี guard ก่อนลบถ้ายังถูกใช้งาน |\n| `extension-areas/index.vue` | จัดการผู้รับผิดชอบตามเขต | เพิ่มผู้ใช้เข้าเขตทีละรายการ |\n| `oil-price/index.vue` | จัดการราคาน้ำมัน | เอกสารเดิมยืนยันได้ระดับรายการและ endpoint |\n| `payment-due/*` | จัดการวันครบกำหนดชำระ | แยกหน้า list กับหน้า form |\n| `running-numbers/index.vue` | รวม tab สำหรับเลขรันนิ่ง | บาง tab ยังเป็น shell |\n| `setting-interests/for-cal/*` | จัดการอัตราดอกเบี้ยกลาง (MRR + ดอกเบี้ยปกติ/ค้างชำระ) | **NEW** — ข้อมูลอยู่ใน Accounting Service |\n| `setting-interests/for-cal/history-for-cal.vue` | ประวัติการเปลี่ยนแปลงอัตราดอกเบี้ยกลาง | **NEW** — audit trail |\n| `setting-interests/for-project/*` | จัดการอัตราดอกเบี้ยระดับโครงการ | **NEW** — แยก rate ตามโครงการ/ปีผลิต |\n| `setting-interests/for-project/history-for-project.vue` | ประวัติการเปลี่ยนแปลงอัตราดอกเบี้ยโครงการ | **NEW** |\n| `setting-interests/for-quota/*` | จัดการอัตราดอกเบี้ยรายโควตา | **NEW** — rate เฉพาะชาวไร่/ผู้รับเหมา |\n| `setting-interests/for-quota/[id]/*` | รายละเอียด/แก้ไขอัตราดอกเบี้ยรายโควตา | **NEW** |\n| `setting-interests/for-special/*` | จัดการอัตราดอกเบี้ยกลุ่มพิเศษ | **NEW** |\n| `setting-interests/judgment-debt-rate/*` | จัดการอัตราหนี้พิพากษา | **NEW** — debtor + debt items + เอกสาร |\n| `sugarcane-varieties/index.vue` | จัดการราคาพันธุ์อ้อยตามปีผลิต | **NEW** |\n| `products/index.vue` | รายการสินค้า (read-only) | **NEW** |\n| `product-prices/index.vue` | กำหนดราคาสินค้า/บริการตามเขตและคลัง | **NEW** |\n\n---\n\n## Per-Page Details\n\n### 03-A: Set Interest Rate\n\n#### Purpose\n\nใช้กำหนดชุดอัตราดอกเบี้ยที่ระบบจะอ้างอิงต่อ ทั้งค่าหลักและรายละเอียดแยกตามกลุ่ม\n\n#### Main Steps\n\n1. เปิดรายการอัตราดอกเบี้ยเดิม\n2. เลือกเพิ่มใหม่, ดูรายละเอียด, แก้ไข, หรือคัดลอกชุดเดิม\n3. กรอกวันที่มีผลและค่าดอกเบี้ยหลัก\n4. ระบบคำนวณค่าผลลัพธ์ระหว่างกรอก\n5. เพิ่มรายละเอียดระดับกลุ่มที่ต้องใช้ร่วมกับชุดนั้น\n6. บันทึกแล้วกลับไปหน้ารายการ\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| เปิดแบบ `view` | ดูข้อมูลอย่างเดียว ไม่เปิดให้แก้ไข |\n| เปิดแบบ `edit` | โหลดข้อมูลเดิมแล้วบันทึกทับ |\n| เปิดแบบ `copy` | โหลดข้อมูลเดิมแล้วบันทึกเป็นรายการใหม่ |\n| บันทึกไม่สำเร็จ | แจ้ง error และคงอยู่ที่หน้าเดิม |\n\n#### Result\n\n- ได้ชุดอัตราดอกเบี้ยใหม่หรือชุดที่อัปเดตแล้ว\n- หน้ารายการพร้อมให้เลือกใช้งานต่อ\n\n#### Technical Diagrams\n\nอัตราดอกเบี้ย: สร้างหรือคัดลอกชุดใหม่\n\n```mermaid\nsequenceDiagram\n    actor Admin\n    participant FormPage as Interest Rate Form\n    participant Calc as Frontend Calculator\n    participant InterestAPI as Interest Service\n\n    Admin->>FormPage: กรอก effective date และอัตราหลัก\n    FormPage->>Calc: คำนวณค่าผลลัพธ์ระหว่างกรอก\n    Admin->>FormPage: เพิ่มรายละเอียดระดับกลุ่ม\n    Admin->>FormPage: กดบันทึก\n    FormPage->>InterestAPI: ส่งข้อมูลชุดอัตราดอกเบี้ย\n    alt บันทึกสำเร็จ\n        InterestAPI-->>FormPage: success\n        FormPage-->>Admin: แจ้งสำเร็จและกลับหน้ารายการ\n    else บันทึกไม่สำเร็จ\n        InterestAPI-->>FormPage: error\n        FormPage-->>Admin: แจ้งปัญหา\n    end\n```\n\nอัตราดอกเบี้ย: โหลดรายการเดิมเพื่อดูหรือแก้ไข\n\n```mermaid\nsequenceDiagram\n    actor Admin\n    participant DetailPage as [type]/[date].vue\n    participant InterestAPI as Interest Service\n\n    Admin->>DetailPage: เปิดรายการเดิม\n    DetailPage->>InterestAPI: ขอข้อมูลตาม effective date\n    InterestAPI-->>DetailPage: รายละเอียดชุดอัตราดอกเบี้ย\n    alt view mode\n        DetailPage-->>Admin: แสดงผลแบบอ่านอย่างเดียว\n    else edit mode\n        Admin->>DetailPage: ปรับข้อมูลและกดบันทึก\n        DetailPage->>InterestAPI: อัปเดตรายการเดิม\n        InterestAPI-->>DetailPage: success/error\n    else copy mode\n        Admin->>DetailPage: ตรวจข้อมูลและกดบันทึกเป็นรายการใหม่\n        DetailPage->>InterestAPI: สร้างรายการใหม่จากข้อมูลเดิม\n        InterestAPI-->>DetailPage: success/error\n    end\n```\n\n### 03-B: Approve Route\n\n#### Purpose\n\nใช้กำหนดประเภทการอนุมัติและลำดับผู้เกี่ยวข้องในแต่ละประเภท\n\n#### Main Steps\n\n1. เปิดรายการประเภทการอนุมัติ\n2. เพิ่มหรือแก้ไขข้อมูลหัวรายการ\n3. เปิด modal เพื่อตั้งลำดับอนุมัติ\n4. กำหนดคำอธิบาย ช่วงมูลค่า บทบาท และรายชื่อผู้อนุมัติ\n5. บันทึกการเปลี่ยนแปลงแล้วรีโหลดรายการ\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| description ว่าง | ไม่ให้บันทึกลำดับ |\n| ยังไม่เลือก approver | ไม่ให้บันทึกลำดับ |\n| แก้ไขลำดับเดิม | ระบบลบลำดับเดิมแล้วสร้างใหม่ทั้งชุด |\n| กดคัดลอกประเภทการอนุมัติ | สร้างรายการใหม่จากรายการเดิม |\n\n#### Result\n\n- ได้ประเภทการอนุมัติที่พร้อมใช้งาน\n- ได้ลำดับอนุมัติชุดใหม่ของรายการนั้น\n\n#### Technical Diagrams\n\nประเภทการอนุมัติ: จัดการหัวรายการ\n\n```mermaid\nsequenceDiagram\n    actor Admin\n    participant ApprovePage as approve-route/index.vue\n    participant ApproveAPI as Approve Extension API\n\n    ApprovePage->>ApproveAPI: โหลดรายการ\n    ApproveAPI-->>ApprovePage: approve extensions\n    Admin->>ApprovePage: เพิ่ม แก้ไข คัดลอก หรือลบรายการ\n    alt เพิ่ม\n        ApprovePage->>ApproveAPI: create approve extension\n    else แก้ไข\n        ApprovePage->>ApproveAPI: update approve extension\n    else คัดลอก\n        ApprovePage->>ApproveAPI: duplicate approve extension\n    else ลบ\n        ApprovePage->>ApproveAPI: delete approve extension\n    end\n    ApproveAPI-->>ApprovePage: success/error\n```\n\nประเภทการอนุมัติ: บันทึกลำดับอนุมัติ\n\n```mermaid\nsequenceDiagram\n    actor Admin\n    participant SequenceModal as Approval Sequence Modal\n    participant SequenceAPI as Approve Sequence API\n\n    Admin->>SequenceModal: เปิด modal ลำดับอนุมัติ\n    Admin->>SequenceModal: จัดชุดลำดับและรายชื่อ approver\n    SequenceModal->>SequenceModal: ตรวจข้อมูลที่จำเป็น\n    alt ข้อมูลไม่ครบ\n        SequenceModal-->>Admin: แจ้ง error\n    else ข้อมูลครบ\n        opt มีลำดับเดิม\n            SequenceModal->>SequenceAPI: ลบ identities ของลำดับเดิม\n        end\n        SequenceModal->>SequenceAPI: สร้างลำดับใหม่ทั้งชุดแบบ bulk\n        alt สำเร็จ\n            SequenceAPI-->>SequenceModal: success\n            SequenceModal-->>Admin: แจ้งสำเร็จและปิด modal\n        else ไม่สำเร็จ\n            SequenceAPI-->>SequenceModal: error\n            SequenceModal-->>Admin: แจ้งปัญหา\n        end\n    end\n```\n\n### 03-C: Production Years\n\n#### Purpose\n\nใช้สร้างและดูแลปีการผลิตที่หลาย flow ต้องอ้างอิงต่อ โดยเฉพาะงานสัญญาและข้อมูลตามฤดูกาล\n\n#### Main Steps\n\n1. เปิดรายการปีการผลิต\n2. เลือกปีและช่วงวันที่สำคัญ\n3. ระบบสร้างชื่อปีการผลิตจากปีที่เลือก\n4. บันทึกข้อมูลใหม่หรือแก้ไขรายการเดิม\n5. ถ้าจะลบ ระบบตรวจว่ามีการใช้งานอยู่หรือไม่ก่อน\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| production year หรือวันที่สำคัญไม่ครบ | ไม่ให้บันทึก |\n| พบ contract ที่อ้างปีนี้อยู่ | ไม่ให้ลบ |\n| ไม่พบการใช้งาน | เปิดให้ยืนยันการลบ |\n\n#### Result\n\n- ได้ปีการผลิตใหม่หรือรายการที่อัปเดตแล้ว\n- ลดความเสี่ยงลบข้อมูลที่ยังถูกใช้งานอยู่\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Admin\n    participant YearsPage as years/index.vue\n    participant ContractAPI as Contract Check API\n    participant YearsAPI as Production Year API\n\n    Admin->>YearsPage: กดลบปีการผลิต\n    YearsPage->>ContractAPI: ตรวจว่ามี contract ใช้งานปีนี้หรือไม่\n    alt พบการใช้งาน\n        ContractAPI-->>YearsPage: found\n        YearsPage-->>Admin: แจ้งว่าไม่สามารถลบได้\n    else ไม่พบการใช้งาน\n        ContractAPI-->>YearsPage: not found\n        Admin->>YearsPage: ยืนยันการลบ\n        YearsPage->>YearsAPI: ลบปีการผลิต\n        YearsAPI-->>YearsPage: success/error\n    end\n```\n\n### 03-D: Extension Areas / Responsible Areas\n\n#### Purpose\n\nใช้ผูกผู้ใช้งานกับเขตที่ต้องรับผิดชอบ เพื่อให้ระบบรู้ว่าใครดูแลพื้นที่ใด\n\n#### Main Steps\n\n1. เลือกเขตที่ต้องการจัดการ\n2. โหลดรายชื่อผู้ใช้ที่อยู่ในเขตนั้น\n3. เพิ่มผู้ใช้ใหม่เข้าเขต หรือเลือกหลายคนเพื่อลบออก\n4. บันทึกแล้วรีโหลดข้อมูลในตาราง\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| ผู้ใช้เป็นส่วนกลาง | ไม่แสดงในรายการเลือกเพิ่ม |\n| ผู้ใช้อยู่ในเขตนี้แล้ว | ไม่แสดงซ้ำในรายการเลือกเพิ่ม |\n| เพิ่มหลายคน | frontend เรียกสร้างทีละคน |\n\n#### Result\n\n- ได้ mapping ระหว่างเขตกับผู้รับผิดชอบที่อัปเดตแล้ว\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Admin\n    participant AreaPage as extension-areas/index.vue\n    participant AreaAPI as Responsible Areas API\n    participant UserAPI as User Selector API\n\n    Admin->>AreaPage: เลือกเขตส่งเสริม\n    AreaPage->>AreaAPI: โหลดรายชื่อผู้ใช้ในเขต\n    AreaAPI-->>AreaPage: current mappings\n\n    alt เพิ่มผู้ใช้เข้าเขต\n        AreaPage->>UserAPI: โหลดผู้ใช้ที่ยังเพิ่มได้\n        UserAPI-->>AreaPage: selectable users\n        Admin->>AreaPage: เลือกหลายคนและกดบันทึก\n        loop ทีละผู้ใช้\n            AreaPage->>AreaAPI: สร้าง responsible area mapping\n        end\n        AreaAPI-->>AreaPage: success\n    else ลบผู้ใช้ออกจากเขต\n        Admin->>AreaPage: เลือกรายการและกดลบ\n        AreaPage->>AreaAPI: ลบ mappings ตาม identities\n        AreaAPI-->>AreaPage: success\n    end\n```\n\n### 03-F: Interest Rate Settings — Extended Module (NEW)\n\n#### Purpose\n\nระบบการตั้งค่าอัตราดอกเบี้ยแบบละเอียด แยกตาม 5 บริบทการใช้งาน ทั้งหมดเก็บข้อมูลใน Accounting Service ผ่าน `api-accounting.ts`\n\n#### Sub-pages\n\n##### 03-F-1: Central Interest Rate (อัตรากลาง — for-cal)\n\n**Purpose:** กำหนด base interest rate (MRR + อัตราเพิ่ม) ที่ใช้อ้างอิงสำหรับคำนวณหนี้ทุกประเภท\n\n**Main Steps:**\n\n1. เปิดรายการอัตราดอกเบี้ยกลาง เรียงตาม effectiveDate (ล่าสุดก่อน)\n2. เลือกเพิ่ม, ดู, แก้ไข, หรือลบ\n3. กรอก effectiveDate, MRR%, อัตราปกติ, อัตราค้างชำระ, หมายเหตุ\n4. ระบบคำนวณ resultInterestRateNormal/Overdue ระหว่างกรอก\n5. บันทึกไปที่ Accounting Service\n\n**Decision Points:**\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| เป็นรายการล่าสุด (by effectiveDate) | เปิดให้แก้ไข/ลบ |\n| ไม่ใช่รายการล่าสุด | ซ่อนปุ่มแก้ไข/ลบ แสดงเฉพาะดู |\n| อัตราเปลี่ยนจากรายการก่อนหน้า | แสดงค่าเปลี่ยนแปลงในวงเล็บ (เขียว = เพิ่ม, แดง = ลด) |\n\n**Key API:**\n\n| Method | Endpoint | ใช้เมื่อ |\n|---|---|---|\n| GET | `/accounting-service/config/cog-interest-rate-for-cal` | โหลดรายการ (pagination) |\n| POST | `/accounting-service/config/cog-interest-rate-for-cal` | เพิ่มใหม่ |\n| PUT | `/accounting-service/config/cog-interest-rate-for-cal/:id` | แก้ไข |\n| DELETE | `/accounting-service/config/cog-interest-rate-for-cal/:id` | ลบ |\n| GET | `/accounting-service/config/cog-interest-rate-for-cal/activity` | ประวัติการเปลี่ยนแปลง |\n\n##### 03-F-2: Central Interest Rate History (history-for-cal)\n\n**Purpose:** แสดง audit trail ของอัตราดอกเบี้ยกลาง (สร้าง/แก้ไข/ลบ) พร้อม modal ดูรายละเอียดรายการย้อนหลัง\n\n**Features:** filter ตาม activity type (create/edit/delete), modal แสดงข้อมูลรายการ (read-only ผ่าน ReferenceRateFormModal)\n\n##### 03-F-3: Project Interest Rate (อัตราหนี้โครงการ — for-project)\n\n**Purpose:** กำหนดอัตราดอกเบี้ยเฉพาะโครงการ รองรับ normal/overdue/missedPayment rates, GL offset mapping, และ installment payment settings\n\n**Main Steps:**\n\n1. เปิดรายการอัตราดอกเบี้ยโครงการ กรองตามปีการผลิต\n2. ค้นหาตาม project code/name\n3. เลือกเพิ่ม, ดู, แก้ไข, หรือลบ\n4. กรอกข้อมูล: ชื่อโครงการ, ปีผลิต, ประเภทหนี้, วิธีคำนวณ (standard/mrr/custom), GL offset, installment\n5. บันทึกไปที่ Accounting Service\n\n**Key Fields:**\n\n- `settingInterestRateNormal`: standard | mrr | custom\n- `settingInterestRateLate`: standard | mrr | custom\n- `effectInstallmentPayment`: ตั้งค่าผลกระทบต่อการผ่อนชำระ\n- `glOffsetDebtTypeCode`: mapping GL สำหรับ offset\n\n**Key API:**\n\n| Method | Endpoint | ใช้เมื่อ |\n|---|---|---|\n| GET | `/accounting-service/config/cog-interest-rate-for-project` | โหลดรายการ |\n| POST | `/accounting-service/config/cog-interest-rate-for-project` | เพิ่มใหม่ |\n| PUT | `/accounting-service/config/cog-interest-rate-for-project/:id` | แก้ไข |\n| DELETE | `/accounting-service/config/cog-interest-rate-for-project/:id` | ลบ |\n\n##### 03-F-4: Quota Interest Rate (อัตราดอกเบี้ยรายโควตา — for-quota)\n\n**Purpose:** จัดการอัตราดอกเบี้ยเฉพาะสมาชิก (ชาวไร่/ผู้รับเหมา) ปรับได้ตามลักษณะสมาชิก (เกรด, ประเภทลูกหนี้, บทบาท)\n\n**Main Steps:**\n\n1. เปิดรายการอัตราดอกเบี้ยรายโควตา\n2. กรอง: เงื่อนไขดอกเบี้ย (specific/not-specified), ประเภทหนี้, limit/unlimit, บทบาท (ชาวไร่/ผู้รับเหมา), ประเภทลูกหนี้, เกรด\n3. ค้นหาตามรหัสสมาชิก, เลขโควตา, หรือชื่อ\n4. กดแก้ไข → ไปหน้า `/for-quota/[id]`\n5. ดาวน์โหลดรายงาน (Excel)\n\n**Decision Points:**\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| filter = specific | แสดงเฉพาะสมาชิกที่มีเงื่อนไขพิเศษ |\n| filter = not-specified | แสดงเฉพาะสมาชิกที่ใช้อัตราตั้งต้น |\n| กดแก้ไข | navigate ไป detail page |\n| กดดาวน์โหลด | export Excel |\n\n**Key API:**\n\n| Method | Endpoint | ใช้เมื่อ |\n|---|---|---|\n| GET | `/accounting-service/config/cog-interest-rate-for-quota` | โหลดรายการ |\n| GET | `/accounting-service/config/cog-interest-rate-for-quota/grouped` | grouped view |\n| GET/PUT | `/accounting-service/config/cog-interest-rate-for-quota-special-condition` | เงื่อนไขพิเศษ |\n\n**Quota Detail Page (`/for-quota/[id]/index.vue` + `setting.vue`):**\n\nแสดงข้อมูลสมาชิก (customerCode, quotaNumber, fullName) และแก้ไข interest rate settings + special conditions\n\n##### 03-F-5: Special Group Interest Rate (อัตราหนี้กลุ่มพิเศษ — for-special)\n\n**Purpose:** จัดการอัตราดอกเบี้ยระดับกลุ่มพิเศษ ตั้งเงื่อนไขตามประเภทลูกหนี้, เกรด, และกลุ่มหนี้\n\n**Main Steps:**\n\n1. เปิดรายการกลุ่มพิเศษ\n2. กรอง/ค้นหาตามชื่อกลุ่ม, ประเภทลูกหนี้, เกรด, กลุ่มหนี้\n3. เพิ่ม/แก้ไข/ลบ ผ่าน modal (AddInterestRateModal)\n4. แต่ละกลุ่มมี conditions และ interestRates แบบ nested\n\n**Key API:**\n\n| Method | Endpoint | ใช้เมื่อ |\n|---|---|---|\n| GET | `/accounting-service/config/cog-interest-rate-for-special` | โหลดรายการ |\n| POST | `/accounting-service/config/cog-interest-rate-for-special` | เพิ่มใหม่ |\n| PUT | `/accounting-service/config/cog-interest-rate-for-special/:id` | แก้ไข |\n| DELETE | `/accounting-service/config/cog-interest-rate-for-special/:id` | ลบ |\n\n##### 03-F-6: Judgment Debt Rate (อัตราหนี้พิพากษา — judgment-debt-rate)\n\n**Purpose:** จัดการอัตราดอกเบี้ยสำหรับหนี้ที่อยู่ระหว่างพิพากษา/ฟ้องร้อง พร้อมข้อมูลลูกหนี้และรายการหนี้\n\n**Main Steps:**\n\n1. เปิดรายการหนี้พิพากษา\n2. ค้นหาตามชื่อ/เลขโควตา, กรองตามช่วงวันที่ออกคำสั่ง\n3. เพิ่มใหม่ → ไปหน้า form (create-judgment-debt-rate.vue)\n4. กรอก: ข้อมูลลูกหนี้, รายการหนี้ (ชื่อ/จำนวน/ยอด), วันที่ออกคำสั่ง, วันสิ้นสุดคำนวณดอกเบี้ย\n5. แนบเอกสาร (รองรับ: pdf, docx, doc, xlsx, xls, txt, zip, rar, png, jpeg, jpg)\n6. บันทึก\n\n**Key API:**\n\n| Method | Endpoint | ใช้เมื่อ |\n|---|---|---|\n| GET | `/accounting-service/config/cog-interest-rate-for-judge-debt-list` | โหลดรายการ |\n| GET/POST/PUT/DELETE | `/accounting-service/config/cog-interest-rate-for-judge-debtor` | จัดการข้อมูลลูกหนี้ |\n\n---\n\n### 03-G: Sugarcane Varieties Pricing (NEW)\n\n#### Purpose\n\nจัดการราคาพันธุ์อ้อยตามปีการผลิต พร้อมช่วงวันที่มีผลบังคับใช้\n\n#### Main Steps\n\n1. เปิดรายการราคาพันธุ์อ้อย\n2. กรอง: ค้นหาตามชื่อ/ปีผลิต, ปีผลิต dropdown, สถานะ active\n3. เพิ่ม/แก้ไข/ลบ ผ่าน modal (UISystemConfigSugarcaneVarietiesFormCreate)\n4. กำหนด: ปีผลิต, วันเริ่ม-สิ้นสุด, รายการพันธุ์อ้อย, สถานะ\n\n#### Key API\n\n| Method | Endpoint | ใช้เมื่อ |\n|---|---|---|\n| GET | `apiConfigCogVarietyPricesBff` | โหลดรายการ (BFF) |\n| POST/PUT/DELETE | `apiConfigCogVarietyPrices` | CRUD |\n\n---\n\n### 03-H: Products & Product Prices (NEW)\n\n#### Purpose\n\nจัดการ master data สินค้าและราคาสินค้า/บริการส่งเสริมตามเขตและคลัง\n\n#### Products List (products/index.vue)\n\n- **Read-only** — แสดงรายการสินค้าทั้งหมด: code, name, type, isActive\n- API: `apiMasterProducts`\n\n#### Product Prices (product-prices/index.vue)\n\n**Main Steps:**\n\n1. เปิดรายการราคาสินค้า\n2. ค้นหาตาม product code/name\n3. เพิ่ม/แก้ไข/ลบ ผ่าน modal (UISystemConfigProductPricesFormCreate)\n4. กำหนด: วันเริ่ม-สิ้นสุด, สินค้า, เขตส่งเสริม, คลัง, สถานะ\n\n**Key API:**\n\n| Method | Endpoint | ใช้เมื่อ |\n|---|---|---|\n| GET/POST/PUT/DELETE | `apiConfigCogProductPrices` | CRUD |\n\n---\n\n### 03-E: Other System Config Modules\n\n#### Purpose\n\nกลุ่มนี้เป็นรายการตั้งค่าประกอบที่ flow อื่นเรียกใช้ต่อ แต่ในเอกสารเดิมยืนยันพฤติกรรมได้ระดับภาพรวมมากกว่ารายละเอียดเชิงหน้าจอ\n\n#### Included Modules\n\n| หมวด | ภาพรวม |\n|---|---|\n| Oil Price | จัดการราคาน้ำมันและค่า default |\n| Payment Due | จัดการรายการวันครบกำหนดชำระผ่านหน้า list และหน้า form |\n| Running Numbers | รวม tab เลขโควตา, เลขลาน, และสัญญา |\n| Debt Groups | master data กลุ่มหนี้ |\n| Credit Types | master data ประเภทสินเชื่อ |\n| Installment | master data งวดการชำระ |\n| Sugarcane Varieties Price | ราคาพันธุ์อ้อยและค่า default |\n| Product Prices | master data ราคาผลผลิต |\n| Credit and Debts | master data สินเชื่อและหนี้ |\n| Mechanical Services | ประเภทบริการ, รายการบริการ, และรายการรายปี |\n\n---\n\n## Technical Reference\n\n### Interest Rate\n\nไฟล์ที่เกี่ยวข้อง:\n\n- `pages/system-config/set-interest-rate/index.vue`\n- `pages/system-config/set-interest-rate/add.vue`\n- `pages/system-config/set-interest-rate/[type]/[date].vue`\n- `composables/api-accounting-service.ts`\n\nAPI:\n\n| Method | Endpoint | ใช้เมื่อ |\n|---|---|---|\n| GET | `/no-auth-accounting-service/interest/get-all-interests` | โหลดรายการ |\n| DELETE | `/no-auth-accounting-service/interest/delete-interest` | ลบ |\n| GET | `/no-auth-accounting-service/interest/get-interest-by-effective-date` | โหลดตาม effective date |\n| POST | `/no-auth-accounting-service/interest/save-interest-config` | เพิ่มใหม่ |\n| PUT | `/no-auth-accounting-service/interest/update-interest` | แก้ไข |\n\nCalculation notes:\n\n- `getNormalInterestRateResult` = MRR + normal interest rate\n- `getOverdueInterestRateResult` = MRR + overdue interest rate\n- ถ้าค่าที่กรอกขึ้นต้นด้วย `-` ระบบจะตีความเป็นการลบออกจาก MRR\n- regex validation สำหรับช่องตัวเลข: `/^[-]?([0-9]+([.][0-9]*)?|[.][0-9]+)?$/`\n\nPayload fields:\n\n- `effectiveDate`\n- `expiredDate`\n- `mrr`\n- `normalInterestRate`\n- `overdueInterestRate`\n- `gradeItems`\n- `debtTypeItems`\n- `typeDepts`\n\nRate item notes:\n\n- `normalRateType`: `standard` | `mrr` | `custom`\n- `overDueRateType`: `standard` | `mrr` | `custom`\n- ค่า input ของแต่ละแบบถูกคำนวณตาม type ที่เลือก\n\nMode ของหน้า `[type]/[date].vue`:\n\n| Mode | พฤติกรรม |\n|---|---|\n| `view` | `isViewOnly = true` และซ่อนปุ่มแก้ไข/ลบ |\n| `edit` | โหลดข้อมูลเดิมแล้วส่ง `PUT` |\n| `copy` | โหลดข้อมูลเดิมแล้วส่ง `POST` ใหม่ |\n\n### Approve Route\n\nไฟล์ที่เกี่ยวข้อง:\n\n- `pages/system-config/approve-route/index.vue`\n\nAPI:\n\n| Method | Endpoint | ใช้เมื่อ |\n|---|---|---|\n| GET | `/main-service/bff/cog_approve_extensions/less` | โหลดรายการ |\n| GET | `/main-service/bff/cog_approve_extensions` | โหลด 1 รายการ |\n| POST | `/main-service/config/cog_approve_extensions` | เพิ่มใหม่ |\n| PUT | `/main-service/config/cog_approve_extensions/:id` | แก้ไข |\n| PUT | `/main-service/config/cog_approve_extensions/:id/duplicate` | คัดลอก |\n| DELETE | `/main-service/config/cog_approve_extensions/:id` | ลบ |\n| DELETE | `/main-service/config/cog_approve_sequences` | ลบลำดับแบบ bulk |\n| POST | `/main-service/config/cog_approve_sequences/bulk` | สร้างลำดับแบบ bulk |\n\nApprove extension fields:\n\n- `approveTypeId`\n- `extensionAreas[]`\n- `status`: `draft` | `active` | `terminate`\n\nApprove sequence fields:\n\n- `description`\n- `valueMin`\n- `valueMax`\n- `accessApprove`: `Signing` | `Approval` | `Informed` | `Verify`\n- `approvers[]`\n- `order`\n\nFilter ผู้อนุมัติ:\n\n```text\nisActive = 1\nexclude userCode ที่ถูกเลือกไปแล้วในลำดับนั้น\n```\n\nAction buttons:\n\n| ปุ่ม | การทำงาน |\n|---|---|\n| duplicate | คัดลอกรายการ |\n| users | เปิด modal ลำดับอนุมัติ |\n| edit | แก้ไขข้อมูลหัวรายการ |\n| delete | ลบรายการ |\n\nFilters บนหน้ารายการ:\n\n- `approveTypeId_isInt`\n- `extensionAreas.extensionAreasCode`\n\n### Production Years\n\nไฟล์ที่เกี่ยวข้อง:\n\n- `pages/system-config/years/index.vue`\n\nAPI:\n\n| Method | Endpoint | ใช้เมื่อ |\n|---|---|---|\n| GET | `/masters/cog_production_years` | โหลดรายการ / ค้นหา |\n| POST | `/main-service/config/cog_production_years` | เพิ่มใหม่ |\n| PUT | `/main-service/config/cog_production_years/:id` | แก้ไข |\n| DELETE | `/main-service/config/cog_production_years/:id` | ลบ |\n| GET | `apiContract` | ตรวจสอบ contract ก่อนลบ |\n\nการสร้างชื่อปีการผลิต:\n\n```text\nname = "YY/YY"\ncode = "YY-YY"\nkatProductionYear = "YY-YY"\n```\n\nDropdown ปีการผลิต:\n\n- โหลดปีล่าสุด\n- ใช้ค่า `katProductionYear` ด้านหน้าเป็นฐาน\n- สร้างตัวเลือกต่ออีก 10 ปี\n\nValidation:\n\n- `productionYear` required และต้องไม่เป็น `0`\n- `effectiveDate` required\n- `harvestStartDate` required\n- `harvestEndDate` required\n\n### Extension Areas / Responsible Areas\n\nไฟล์ที่เกี่ยวข้อง:\n\n- `pages/system-config/extension-areas/index.vue`\n\nAPI:\n\n| Method | Endpoint | ใช้เมื่อ |\n|---|---|---|\n| GET | `apiBffCogResponibleAreas` | โหลดรายชื่อผู้ใช้ในเขต |\n| GET | `apiBffUsers` | โหลดผู้ใช้สำหรับเลือก |\n| POST | `/main-service/config/cog_responsible_areas` | เพิ่มผู้ใช้เข้าเขต |\n| DELETE | `/main-service/config/cog_responsible_areas` | ลบผู้ใช้ออกจากเขต |\n\nFilter ผู้ใช้ที่เลือกเพิ่ม:\n\n```text\nexclude isCentrallyAffiliated = 1\nexclude _id ที่อยู่ในเขตแล้ว\n```\n\n### Other Modules Summary\n\n| หมวด | API หลัก |\n|---|---|\n| Oil Prices | `/main-service/config/cog_oil_prices`, `/main-service/config/cog_oil_prices/getDefaultOilPrice` |\n| Payment Due | `/main-service/config/cog_payment_due` |\n| Debt Groups | `/main-service/config/cog_debt_groups` |\n| Credit Types | `/main-service/config/cog_credit_types` |\n| Installment | `/main-service/config/cog_installment` |\n| Variety Prices | `/main-service/config/cog_variety_prices`, `/main-service/config/cog_sugarcane_varieties_price/getDefaultSugarcaneVarietiesPrice` |\n| Product Prices | `/main-service/config/cog_product_prices` |\n| Credit and Debts | `/masters/cog_credit_and_debts`, `/main-service/config/cog_credit_and_debts` |\n| Mechanical Service Types | `/main-service/config/cog_mechanical_service_types` |\n| Mechanical Services | `/main-service/config/cog_mechanical_services` |\n| Mechanical Service Years | `/main-service/config/cog_mechanical_service_years`, `/main-service/config/cog_mechanical_service_years/bulk` |\n\nRunning numbers tabs:\n\n| Tab | Label | Component |\n|---|---|---|\n| `quotaNo` | เลขโควตา | `UIRunningNoQuotaNo` |\n| `storeFront` | เลขลาน | ยังไม่พบ component ในเอกสารเดิม |\n| `contract` | สัญญา | `UIRunningNoContract` |\n\n### Interest Rate Settings — Extended (NEW)\n\nไฟล์ที่เกี่ยวข้อง:\n\n- `pages/system-config/setting-interests/for-cal/*`\n- `pages/system-config/setting-interests/for-project/*`\n- `pages/system-config/setting-interests/for-quota/*`\n- `pages/system-config/setting-interests/for-special/*`\n- `pages/system-config/setting-interests/judgment-debt-rate/*`\n- `composables/api-accounting.ts`\n- `components/ReferenceRate/FormModal.vue`\n- `components/CogInterestRateForSpecial/AddInterestRateModal.vue`\n- `components/CogInterestRateForProject/FormModal.vue`\n\nAPI (Accounting Service):\n\n| Module | Base Endpoint | Operations |\n|---|---|---|\n| Central Rate (for-cal) | `/accounting-service/config/cog-interest-rate-for-cal` | GET (list+pagination), POST, PUT/:id, DELETE/:id |\n| Central Rate Activity | `/accounting-service/config/cog-interest-rate-for-cal/activity` | GET (filter by type: create/edit/delete) |\n| Project Rate | `/accounting-service/config/cog-interest-rate-for-project` | GET, POST, PUT/:id, DELETE/:id |\n| Project Rate Activity | `/accounting-service/config/cog-interest-rate-for-project/activity` | GET |\n| Quota Rate | `/accounting-service/config/cog-interest-rate-for-quota` | GET (with complex filters) |\n| Quota Grouped | `/accounting-service/config/cog-interest-rate-for-quota/grouped` | GET |\n| Quota Special Condition | `/accounting-service/config/cog-interest-rate-for-quota-special-condition` | GET, UPSERT |\n| Special Group Rate | `/accounting-service/config/cog-interest-rate-for-special` | GET, POST, PUT/:id, DELETE/:id |\n| Judgment Debt List | `/accounting-service/config/cog-interest-rate-for-judge-debt-list` | GET |\n| Judgment Debtor | `/accounting-service/config/cog-interest-rate-for-judge-debtor` | GET, POST, PUT, DELETE |\n\nRate Setting Types (ใช้ร่วมกันทุก module):\n\n| Type | ความหมาย |\n|---|---|\n| `standard` | ใช้อัตราตั้งต้นของระบบ |\n| `mrr` | ใช้ MRR +/- ค่าที่กำหนด |\n| `custom` | กำหนดอัตราเอง |\n\nActivity Tracking:\n\nทุก module มี `/activity` endpoint ที่บันทึก type (create/edit/delete), timestamps, user info, และ full record snapshot\n\nFilter Options สำหรับ Quota Rate:\n\n```text\nfieldFilterInterestType: specific | not-specified\nfieldFilterDebtType: specific | not-specified\nfieldFilterLimitSearch: limit | unlimit\nfieldFilterRole: ชาวไร่ | ผู้รับเหมา\ndebtorTypeCode: (from master)\ngradeCode: (from master)\n```\n\n### Sugarcane Varieties & Product Prices (NEW)\n\nไฟล์ที่เกี่ยวข้อง:\n\n- `pages/system-config/sugarcane-varieties/index.vue`\n- `pages/system-config/products/index.vue`\n- `pages/system-config/product-prices/index.vue`\n\nAPI:\n\n| Method | Endpoint | ใช้เมื่อ |\n|---|---|---|\n| GET | `apiConfigCogVarietyPricesBff` | โหลดรายการราคาพันธุ์อ้อย |\n| POST/PUT/DELETE | `apiConfigCogVarietyPrices` | CRUD ราคาพันธุ์อ้อย |\n| GET | `apiMasterProducts` | โหลดรายการสินค้า (read-only) |\n| GET/POST/PUT/DELETE | `apiConfigCogProductPrices` | CRUD ราคาสินค้า/บริการ |\n\n### Backend Pattern: ManageController\n\nไฟล์ที่เกี่ยวข้อง:\n\n- `main_service-develop/src/modules/master/config/controllers/_manage.controller.ts`\n\nพฤติกรรมร่วม:\n\n- create ตรวจ code ซ้ำก่อน insert\n- update ตรวจว่ามีรายการเดิม และกัน code ซ้ำกับรายการอื่น\n- delete one ตรวจว่าพบรายการก่อนลบ\n- delete many ลบตาม identities\n\nCascade delete ที่เอกสารเดิมยืนยันได้:\n\n| รายการ | ผลกระทบ |\n|---|---|\n| Menu | ดึง menu ออกจาก roles |\n| Role | ดึง role ออกจาก users |\n\n---\n\n## Known Gaps\n\n- หมวด Oil Price, Payment Due, Running Numbers และ master data กลุ่มท้าย ๆ ยังยืนยันจากเอกสารเดิมได้ระดับ endpoint และภาพรวมเป็นหลัก ยังไม่มีพฤติกรรมเชิงหน้าจอมากพอให้แตก sequence เพิ่มอย่างมั่นใจ\n- `Running Numbers` tab `storeFront` ถูกระบุว่าเป็น shell ในเอกสารเดิม จึงยังไม่ควรสรุปเป็น flow ใช้งานเต็มรูปแบบ\n- **setting-interests/for-quota/[id]/setting.vue** — ยืนยันได้ว่าหน้านี้มีอยู่จริง แต่รายละเอียดภายในยังอ่านได้ระดับ route structure เท่านั้น ยังไม่ได้ยืนยันครบทุก field/validation\n- **Accounting Service backend modules** (roundInterest, interest-setting) — มีอยู่ใน `accounting_service-develop` แต่ยังไม่ได้อ่าน internal logic ละเอียด\n- **approve-route-list.vue** — พบหน้า variant ใหม่ใน `approve-route/` แต่ยังไม่ยืนยันว่าทำหน้าที่ต่างจาก `index.vue` อย่างไร\n',

          content:
            '# Flow 04 — Customer Management\n\n> **แหล่งที่มาของข้อมูล (Source files)**\n> - `cms_frontend-develop/pages/cms/customers/index.vue`\n> - `cms_frontend-develop/pages/cms/customers/[id]/index.vue`\n> - `cms_frontend-develop/pages/cms/customers/[id]/mate.vue`\n> - `cms_frontend-develop/pages/cms/customers/[id]/address.vue`\n> - `cms_frontend-develop/pages/cms/customers/[id]/book-bank/*`\n> - `cms_frontend-develop/pages/cms/customers/[id]/customer-change.vue`\n> - `cms_frontend-develop/pages/cms/customers/[id]/consent-history.vue`\n> - `cms_frontend-develop/pages/cms/customers/[id]/attachment-list.vue` ← **NEW in develop**\n> - `cms_frontend-develop/components/customer/info.vue`\n> - `cms_frontend-develop/components/customer/agent-farmer.vue` ← **NEW**\n> - `cms_frontend-develop/components/customer/book-bank-agriculture.vue` ← **NEW**\n> - `cms_frontend-develop/components/customer/book-bank-requests.vue` ← **NEW**\n> - `cms_frontend-develop/components/customer/cane-variety.vue` ← **NEW**\n> - `cms_frontend-develop/components/customer/card-elbd.vue` ← **NEW**\n> - `cms_frontend-develop/components/customer/central-quota.vue` ← **NEW**\n> - `cms_frontend-develop/components/customer/cluster.vue` ← **NEW**\n> - `cms_frontend-develop/components/customer/collaterals.vue` ← **NEW**\n> - `cms_frontend-develop/components/customer/contractors.vue` ← **NEW**\n> - `cms_frontend-develop/components/customer/data-variety-and-land-owners.vue` ← **NEW**\n> - `cms_frontend-develop/components/customer/equipments.vue` ← **NEW**\n> - `cms_frontend-develop/components/customer/guarantors.vue` ← **NEW**\n> - `cms_frontend-develop/components/customer/harvest.vue` ← **NEW**\n> - `cms_frontend-develop/components/customer/modal-change-profile.vue` ← **NEW**\n> - `cms_frontend-develop/components/customer/modal-confirm-type-info.vue` ← **NEW**\n> - `cms_frontend-develop/components/customer/modal-info-customer.vue` ← **NEW**\n> - `cms_frontend-develop/components/customer/modal-ocsb.vue` ← **NEW**\n> - `cms_frontend-develop/components/customer/modal-phone.vue` ← **NEW**\n> - `cms_frontend-develop/components/customer/modal-primary-phone.vue` ← **NEW**\n> - `cms_frontend-develop/components/customer/modal-upload-id-card.vue` ← **NEW**\n\n---\n\n## Overview\n\nFlow นี้ใช้ดูแลข้อมูลสมาชิกในฝั่ง CMS ตั้งแต่หน้ารายการสมาชิกไปจนถึงหน้ารายละเอียดของแต่ละคน รวมทั้งข้อมูลประกอบอย่างคู่สมรส, ที่อยู่, บัญชีธนาคาร, และประวัติการเปลี่ยนแปลงบางประเภท\n\nภาพรวมของ flow มี 4 ช่วงหลัก:\n\n1. ค้นหาและเปิดดูสมาชิกจากหน้ารายการ\n2. โหลด customer profile กลางเพื่อให้ tab ต่าง ๆ ใช้งานร่วมกัน\n3. เข้าไปแก้ไขข้อมูลย่อยตามหน้าที่เกี่ยวข้อง\n4. ตรวจประวัติหรือคำร้องที่เกี่ยวกับสมาชิกคนนั้น\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| รายการสมาชิก | `pages/cms/customers/index.vue` |\n| หน้ารายละเอียดสมาชิก | `pages/cms/customers/[id]/index.vue` |\n| tab ข้อมูลสมาชิก | `components/customer/info.vue` |\n| คู่สมรส | `pages/cms/customers/[id]/mate.vue` |\n| ที่อยู่ | `pages/cms/customers/[id]/address.vue` |\n| บัญชีธนาคาร | `pages/cms/customers/[id]/book-bank/*` |\n| ประวัติการเปลี่ยนแปลงข้อมูล | `pages/cms/customers/[id]/customer-change.vue` |\n| ประวัติการพิมพ์เอกสารยินยอม | `pages/cms/customers/[id]/consent-history.vue` |\n| **เอกสารแนบ / ข้อมูลส่งอ้อย** | `pages/cms/customers/[id]/attachment-list.vue` ← **NEW** |\n| **ตัวแทนชาวไร่ / agent farmer** | `components/customer/agent-farmer.vue` ← **NEW** |\n| **บัญชีธนาคาร ธ.ก.ส.** | `components/customer/book-bank-agriculture.vue` ← **NEW** |\n| **คำร้องแก้ไขบัญชีธนาคาร** | `components/customer/book-bank-requests.vue` ← **NEW** |\n| **ข้อมูลซื้อขายพันธุ์อ้อย** | `components/customer/cane-variety.vue` ← **NEW** |\n| **สัญญา eLBD** | `components/customer/card-elbd.vue` ← **NEW** |\n| **โควตากลาง** | `components/customer/central-quota.vue` ← **NEW** |\n| **สายส่ง / Cluster** | `components/customer/cluster.vue` ← **NEW** |\n| **หลักทรัพย์ค้ำประกัน** | `components/customer/collaterals.vue` ← **NEW** |\n| **ข้อมูลผู้รับเหมาที่เกี่ยวข้อง** | `components/customer/contractors.vue` ← **NEW** |\n| **เจ้าของพันธุ์อ้อย / ที่ดิน** | `components/customer/data-variety-and-land-owners.vue` ← **NEW** |\n| **อุปกรณ์การเกษตร** | `components/customer/equipments.vue` ← **NEW** |\n| **บุคคลค้ำประกัน** | `components/customer/guarantors.vue` ← **NEW** |\n| **ข้อมูลส่งอ้อยเข้าหีบ** | `components/customer/harvest.vue` ← **NEW** |\n| **Modal แก้ไขรูปโปรไฟล์** | `components/customer/modal-change-profile.vue` ← **NEW** |\n| **Modal เลือกวิธียืนยันตัวตน** | `components/customer/modal-confirm-type-info.vue` ← **NEW** |\n| **Modal แก้ไขข้อมูลสมาชิก (OCR/Card Reader)** | `components/customer/modal-info-customer.vue` ← **NEW** |\n| **Modal เลขที่สอน./สมาคม** | `components/customer/modal-ocsb.vue` ← **NEW** |\n| **Modal แก้ไขเบอร์โทรรอง** | `components/customer/modal-phone.vue` ← **NEW** |\n| **Modal เปลี่ยนเบอร์โทรหลัก (OTP)** | `components/customer/modal-primary-phone.vue` ← **NEW** |\n| **Modal อัปโหลดรูปบัตรประชาชน** | `components/customer/modal-upload-id-card.vue` ← **NEW** |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| เจ้าหน้าที่ CMS | ค้นหา, เปิดดู, แก้ไข และตรวจประวัติข้อมูลสมาชิก |\n| หน้ารายการสมาชิก | แสดงรายการและพาไปหน้ารายละเอียด |\n| หน้ารายละเอียดสมาชิก | โหลด customer profile กลางและกระจายข้อมูลให้แต่ละ tab |\n| หน้าแก้ไขข้อมูลย่อย | ดูแลข้อมูลเฉพาะด้าน เช่น คู่สมรส, ที่อยู่, บัญชีธนาคาร |\n| BFF Service | รวมข้อมูลสำหรับหน้าจออ่านข้อมูล |\n| CMS Service | รับคำสั่งเพิ่ม แก้ไข และเปลี่ยนสถานะข้อมูล |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| Customer profile | ข้อมูลสมาชิกชุดหลักที่ tab ต่าง ๆ ใช้ร่วมกัน |\n| Customer sub-records | ข้อมูลประกอบ เช่น คู่สมรส, ที่อยู่, บัญชีธนาคาร |\n| Change history | ประวัติการเปลี่ยนแปลงข้อมูลที่ตรวจย้อนหลังได้ |\n| Consent history | ประวัติการพิมพ์เอกสารยินยอมและสถานะของรายการนั้น |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["เจ้าหน้าที่เปิดหน้ารายการสมาชิก"] --> B["ค้นหาหรือเลือกสมาชิก"]\n    B --> C["เปิดหน้าโปรไฟล์สมาชิก"]\n    C --> D["ระบบโหลดข้อมูลกลางของสมาชิก"]\n    D --> E["เลือก tab หรือหน้าย่อยที่ต้องการทำงานต่อ"]\n    E --> F["ดูหรือแก้ไขข้อมูลเฉพาะด้าน"]\n    F --> G["บันทึกหรือส่งคำร้องตามประเภทข้อมูล"]\n    G --> H["รีโหลดข้อมูลสมาชิกและใช้งานต่อ"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `customers/index.vue` | ค้นหาและเปิดรายการสมาชิก | มี action ไป preprint และหน้า detail |\n| `customers/[id]/index.vue` | เป็นจุดรวมข้อมูลสมาชิก | โหลด state กลางให้ทุก tab |\n| `components/customer/info.vue` | แสดงข้อมูลสมาชิกหลัก | มีทางลัดไปหน้าแก้ไขข้อมูลย่อยหลายหน้า |\n| `customers/[id]/mate.vue` | เพิ่มหรือแก้ไขข้อมูลคู่สมรส | รองรับ card reader และ OCR |\n| `customers/[id]/address.vue` | เพิ่มหรือแก้ไขข้อมูลที่อยู่ | delete ถูกปิดไว้ใน template |\n| `customers/[id]/book-bank/index.vue` | ดูและเพิ่มบัญชีธนาคาร | มีปุ่มไปหน้าคำร้องแก้ไขบัญชี |\n| `customers/[id]/book-bank/request.vue` | ดูคำร้องแก้ไขบัญชี | ใช้เปรียบเทียบข้อมูลเดิมกับข้อมูลใหม่ |\n| `customers/[id]/customer-change.vue` | ดูประวัติการเปลี่ยนแปลงข้อมูล | เอกสารเดิมยืนยันชัดในส่วนเบอร์โทร |\n| `customers/[id]/consent-history.vue` | ดูประวัติการพิมพ์เอกสารยินยอม | ยกเลิกได้เฉพาะบางสถานะ |\n\n---\n\n## Per-Page Details\n\n### 04-A: Customer List\n\n#### Purpose\n\nใช้ค้นหาและเปิดดูสมาชิกจากรหัสหรือชื่อ ก่อนพาไปทำงานต่อที่หน้า profile\n\n#### Main Steps\n\n1. เปิดหน้ารายการสมาชิก\n2. ระบบโหลดรายการจาก BFF\n3. เจ้าหน้าที่ค้นหาตามรหัสสมาชิกหรือชื่อ\n4. เลือก action ที่ต้องการจากแต่ละแถว\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| ต้องการพิมพ์เอกสารที่รองรับ | เปิด preprint ในแท็บใหม่ |\n| ต้องการดูหรือแก้ไขข้อมูลสมาชิก | ไปหน้ารายละเอียดของสมาชิกคนนั้น |\n\n#### Result\n\n- ได้รายการสมาชิกที่กรองแล้ว\n- เปิดไปยังหน้าปลายทางตามงานที่เลือก\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ListPage as customers/index.vue\n    participant CustomerBFF as GET /bff-service/customers\n    participant Preprint as eForm Preprint URL\n\n    ListPage->>CustomerBFF: โหลดรายการสมาชิก\n    CustomerBFF-->>ListPage: customer list\n    Staff->>ListPage: ค้นหาด้วยรหัสหรือชื่อ\n    ListPage->>CustomerBFF: โหลดข้อมูลตาม filter\n    CustomerBFF-->>ListPage: filtered list\n\n    alt เปิดเอกสาร preprint\n        Staff->>ListPage: กดปุ่มพิมพ์เอกสาร\n        ListPage->>Preprint: เปิด URL ในแท็บใหม่\n    else เปิดหน้า detail\n        Staff->>ListPage: กดปุ่มแก้ไข/ดูข้อมูล\n        ListPage-->>Staff: ไปหน้า /cms/customers/{customerCode}\n    end\n```\n\n### 04-B: Customer Detail Bootstrap\n\n#### Purpose\n\nใช้โหลดข้อมูลหลักของสมาชิกเข้าสู่ state กลาง เพื่อให้ tab หลายตัวใช้ข้อมูลชุดเดียวกัน\n\n#### Main Steps\n\n1. เปิดหน้ารายละเอียดด้วย customer code\n2. ระบบดึงข้อมูลสมาชิกจาก BFF\n3. สร้าง customer profile object ใน state กลาง\n4. tab ต่าง ๆ อ่านข้อมูลจาก state เดียวกัน\n5. ถ้ามี `tab_code` ใน query ระบบพาไปยัง tab ที่เกี่ยวข้อง\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| ข้อมูลบาง sub-domain ไม่มี | tab บางตัวถูกปิดใช้งาน |\n| มี query `tab_code` | auto scroll / focus ไปที่ tab นั้น |\n\n#### Result\n\n- ได้ state กลางของสมาชิกที่ child components ใช้งานต่อได้\n\n#### Technical Diagrams\n\nโหลดหน้า detail และสร้าง state กลาง\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant DetailPage as customers/[id]/index.vue\n    participant CustomerBFF as GET /bff-service/customers/:customerCode\n    participant CustomerState as useState(globalCostomerProfile)\n\n    Staff->>DetailPage: เปิดหน้ารายละเอียดสมาชิก\n    DetailPage->>DetailPage: อ่าน customerCode จาก route\n    DetailPage->>CustomerBFF: โหลดข้อมูลสมาชิก\n    CustomerBFF-->>DetailPage: dataCustomer\n    DetailPage->>CustomerState: สร้าง CustomerProfile และผูก reloadData()\n    CustomerState-->>DetailPage: state พร้อมใช้งาน\n```\n\nเปิดหรือปิดแต่ละ tab ตามข้อมูลของลูกค้า\n\n```mermaid\nsequenceDiagram\n    participant DetailPage as customers/[id]/index.vue\n    participant CustomerState as globalCostomerProfile\n    participant Tabs as Customer Tabs\n\n    DetailPage->>CustomerState: อ่าน include fields และ quota ที่เกี่ยวข้อง\n    CustomerState-->>DetailPage: customer profile\n    DetailPage->>Tabs: คำนวณ tab ที่เปิดได้\n    alt เงื่อนไขของ tab ครบ\n        Tabs-->>DetailPage: เปิดให้ใช้งาน\n    else เงื่อนไขไม่ครบ\n        Tabs-->>DetailPage: disabled\n    end\n```\n\n### 04-C: Customer Info Tab\n\n#### Purpose\n\nใช้ดูข้อมูลสมาชิกหลัก และเป็นจุดทางลัดไปยังงานแก้ไขข้อมูลส่วนอื่น\n\n#### Main Steps\n\n1. เปิด tab ข้อมูลสมาชิก\n2. ดูข้อมูลหลักของสมาชิก, คู่สมรส, ที่อยู่ และการติดต่อ\n3. เลือกแก้ไขข้อมูลผ่าน modal หรือ navigation ไปหน้าย่อย\n4. ตรวจสิทธิ์ก่อนเปิด action ที่แก้ไขได้\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| มีสิทธิ์ `edit_customer_info` | เปิด action สำหรับแก้ไขข้อมูล |\n| สถานะการยืนยันเบอร์ยังไม่จบ | ปุ่มยืนยันเบอร์เปลี่ยนข้อความตามสถานะ |\n| ต้องการดูประวัติ | ไปหน้าประวัติที่เกี่ยวข้อง |\n\n#### Result\n\n- เห็นภาพรวมข้อมูลสมาชิกในจุดเดียว\n- เข้าสู่หน้าจัดการข้อมูลย่อยได้เร็ว\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant InfoTab as components/customer/info.vue\n    participant Permission as Permission Extension\n    participant CustomerState as globalCostomerProfile\n\n    InfoTab->>CustomerState: อ่านข้อมูลสมาชิกปัจจุบัน\n    CustomerState-->>InfoTab: profile summary\n    InfoTab->>Permission: ตรวจสิทธิ์แก้ไขข้อมูล\n    Permission-->>InfoTab: allowed / denied\n\n    alt มีสิทธิ์\n        Staff->>InfoTab: กดแก้ไขหรือเปิดหน้าย่อย\n        InfoTab-->>Staff: เปิด modal หรือ navigate ต่อ\n    else ไม่มีสิทธิ์\n        InfoTab-->>Staff: เห็นข้อมูลแบบอ่านอย่างเดียว\n    end\n```\n\n### 04-D: Mate and Address Management\n\n#### Purpose\n\nใช้ดูแลข้อมูลประกอบพื้นฐานของสมาชิก เช่น คู่สมรสและที่อยู่\n\n#### Main Steps\n\n1. เปิดหน้าคู่สมรสหรือหน้าที่อยู่จาก customer profile\n2. โหลดข้อมูลเดิมของสมาชิกและรายการที่เกี่ยวข้อง\n3. กรอกข้อมูลใหม่หรือแก้ไขรายการเดิม\n4. บันทึกกลับไปยัง CMS service\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| ข้อมูลคู่สมรสไม่ครบตาม validation | ไม่ให้บันทึก |\n| ใช้ card reader หรือ OCR | ระบบเติมข้อมูลให้บางส่วนก่อนผู้ใช้ตรวจซ้ำ |\n| หน้าที่อยู่ | ไม่มี flow ลบจากปุ่มหลัก เพราะ template ปิดปุ่ม delete ไว้ |\n\n#### Result\n\n- ได้ข้อมูลคู่สมรสหรือที่อยู่ที่อัปเดตแล้ว\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant SubPage as mate.vue / address.vue\n    participant CustomerBFF as BFF APIs\n    participant CmsAPI as CMS Data APIs\n\n    Staff->>SubPage: เปิดหน้าจัดการข้อมูลย่อย\n    SubPage->>CustomerBFF: โหลดข้อมูลสมาชิกหรือรายการเดิม\n    CustomerBFF-->>SubPage: current data\n    Staff->>SubPage: กรอกหรือแก้ไขข้อมูล\n    SubPage->>CmsAPI: บันทึกข้อมูล\n    alt สำเร็จ\n        CmsAPI-->>SubPage: success\n        SubPage-->>Staff: แจ้งสำเร็จ\n    else ไม่สำเร็จ\n        CmsAPI-->>SubPage: error\n        SubPage-->>Staff: แจ้งปัญหา\n    end\n```\n\n### 04-E: Book Bank and Change Request\n\n#### Purpose\n\nใช้ดูแลบัญชีธนาคารของสมาชิก และยื่นคำร้องแก้ไขบัญชีเมื่อข้อมูลที่ใช้งานอยู่ต้องเปลี่ยนแปลง\n\n#### Main Steps\n\n1. เปิดหน้าบัญชีธนาคารของสมาชิก\n2. ระบบโหลดรายการบัญชีที่มีอยู่\n3. เลือกเพิ่มบัญชีทั่วไป, เพิ่มบัญชีเฉพาะประเภทที่รองรับ, หรือเปิดหน้าคำร้อง\n4. ถ้าเป็นคำร้อง ระบบแสดงข้อมูลเดิมเทียบกับข้อมูลใหม่\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| ยังไม่มีบัญชีเลย | ปุ่มคำร้องแก้ไขบัญชีถูกปิด |\n| มีบัญชีประเภท subvension แล้ว | ปุ่มเพิ่มบัญชี ธกส. ถูกปิด |\n| รายการคำร้องอยู่สถานะ rejected | แสดงผลให้สังเกตได้ชัดและกดดูรายละเอียดได้ |\n\n#### Result\n\n- ได้บัญชีธนาคารใหม่ หรือคำร้องแก้ไขบัญชีที่ส่งเข้าสู่ระบบแล้ว\n\n#### Technical Diagrams\n\nบัญชีธนาคาร: เพิ่มรายการใหม่\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant BookBankPage as book-bank/index.vue\n    participant BookBankBFF as GET /bff-service/data-book-banks\n    participant BookBankAPI as POST /cms-service/data-book-banks\n\n    BookBankPage->>BookBankBFF: โหลดรายการบัญชี\n    BookBankBFF-->>BookBankPage: current book banks\n    Staff->>BookBankPage: เลือกเพิ่มบัญชี\n    BookBankPage->>BookBankAPI: บันทึกบัญชีใหม่\n    BookBankAPI-->>BookBankPage: success/error\n```\n\nบัญชีธนาคาร: ยื่นคำร้องแก้ไข\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant BookBankPage as book-bank/index.vue\n    participant RequestPage as book-bank/request.vue\n    participant RequestBFF as GET /bff-service/data-customer-requests\n    participant RequestAPI as POST /cms-service/data-customer-requests\n\n    Staff->>BookBankPage: กดคำร้องแก้ไขบัญชี\n    BookBankPage-->>RequestPage: เปิดหน้าคำร้อง\n    RequestPage->>RequestBFF: โหลดรายการคำร้องเดิม\n    RequestBFF-->>RequestPage: requests with old/new book bank\n    Staff->>RequestPage: กรอกคำร้องใหม่\n    RequestPage->>RequestAPI: ส่งคำร้อง\n    RequestAPI-->>RequestPage: success/error\n```\n\n### 04-F: History Pages\n\n#### Purpose\n\nใช้ตรวจย้อนหลังการเปลี่ยนแปลงข้อมูลสมาชิกบางประเภท และประวัติการพิมพ์เอกสารยินยอม\n\n#### Main Steps\n\n1. เปิดหน้าประวัติจาก customer profile หรือหน้าที่เกี่ยวข้อง\n2. ระบบโหลดข้อมูลสมาชิกและรายการประวัติ\n3. เจ้าหน้าที่กรองหรือดูรายละเอียดแต่ละแถว\n4. ถ้าเป็นประวัติเอกสารยินยอม บางรายการสามารถยกเลิกได้\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| ต้องการกรองประวัติเบอร์โทร | ใช้ประเภทการเปลี่ยนแปลงช่วยกรอง |\n| รายการ consent อยู่สถานะ `draft` | แสดงปุ่มยกเลิก |\n| consent ไม่ใช่ `draft` | ไม่เปิดให้ยกเลิก |\n\n#### Result\n\n- ตรวจสอบย้อนกลับได้ว่ามีการเปลี่ยนข้อมูลหรือพิมพ์เอกสารเมื่อใด\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant HistoryPage as customer-change.vue / consent-history.vue\n    participant HistoryBFF as BFF History APIs\n    participant CmsAPI as CMS Status API\n\n    Staff->>HistoryPage: เปิดหน้าประวัติ\n    HistoryPage->>HistoryBFF: โหลดข้อมูลสมาชิกและรายการประวัติ\n    HistoryBFF-->>HistoryPage: history list\n\n    alt ยกเลิกรายการ consent ที่ยังเป็น draft\n        Staff->>HistoryPage: กดเปลี่ยนสถานะ\n        HistoryPage->>CmsAPI: อัปเดตเป็น canceled\n        CmsAPI-->>HistoryPage: success/error\n    else ดูข้อมูลอย่างเดียว\n        HistoryPage-->>Staff: แสดงประวัติและตัวกรอง\n    end\n```\n\n---\n\n## Technical Reference\n\n### Customer List\n\nไฟล์ที่เกี่ยวข้อง:\n\n- `pages/cms/customers/index.vue`\n\nAPI:\n\n| Method | Endpoint | ใช้เมื่อ |\n|---|---|---|\n| GET | `/bff-service/customers` | โหลดรายการและค้นหา |\n\nSearch notes:\n\n- ค้นหาตามรหัสสมาชิก หรือชื่อ-นามสกุล\n- debounce `800ms`\n\nTable notes:\n\n- `fullName` ถ้า `personType == 2` จะแสดง `companyName`\n- มีสถานะยืนยันเบอร์และสถานะการใช้งานในตาราง\n\nRow actions:\n\n- preprint: เปิด `/eform/preprint/contracts/sugarcane-farmer?customerCode=XXX`\n- edit/detail: ไป `/cms/customers/{customerCode}`\n\n### Customer Detail and Global State\n\nไฟล์ที่เกี่ยวข้อง:\n\n- `pages/cms/customers/[id]/index.vue`\n\nState notes:\n\n- ใช้ `useState("globalCostomerProfile")`\n- ตัวแปร state คือ `sCustomerProfileState`\n- มี `reloadData()` เพื่อให้ child tabs เรียกโหลดข้อมูลใหม่\n\nข้อมูลใน state:\n\n| Field | ค่า |\n|---|---|\n| `latestChangeTimes` | timestamp สำหรับ trigger reload |\n| `dataCustomer` | ข้อมูลลูกค้าเต็ม |\n| `selectedTabCode` | tab ปัจจุบัน |\n| `dataCaneFarmer` | ข้อมูลชาวไร่ที่ประกอบกับ customer |\n| `reloadData()` | ฟังก์ชันรีโหลดหน้า |\n\nTab codes:\n\n| Tab Code | ชื่อ | Disabled เมื่อ |\n|---|---|---|\n| `customer` | ข้อมูลสมาชิก | ไม่มี |\n| `sugarcane_farmer` | ข้อมูลชาวไร่ | ไม่มี quota ที่เกี่ยวข้อง |\n| `equipments` | อุปกรณ์ทางการเกษตร | ไม่มี quota ชาวไร่และผู้รับเหมา |\n| `contractors` | ผู้รับเหมา | ไม่มี quota ผู้รับเหมา |\n| `guarantors` | บุคคลค้ำประกัน | ไม่มี quota ที่เกี่ยวข้อง |\n| `collaterals` | หลักทรัพย์ค้ำประกัน | ไม่มี quota ชาวไร่ |\n| `variety` | ซื้อ-ขายพันธุ์อ้อย | ไม่มี |\n| `harvest` | รายการส่งอ้อยเข้าหีบ | ไม่มี quota ชาวไร่ |\n| `centralQuata` | โควตากลาง | ไม่มี quota กลาง (หมายเหตุ: สะกดตาม `mock-data.ts` จริง — `ContractRoleOwner.centralQuota` ใช้ spelling ถูกในที่อื่น) |\n| `agentFarmer` | โควตาตัวแทน | ไม่มี quota ตัวแทน |\n| `cluster` | กลุ่มคลัสเตอร์ | ไม่มี `clusterGroupCode` |\n| `dataVarietyAndLandOwners` | ผู้ขาย/ผู้ให้เช่า/ผู้ให้บริการ | ไม่มี quota และ owner type ตามเงื่อนไข |\n\nTab components:\n\n| Tab Code | Component |\n|---|---|\n| `customer` | `CustomerInfo` |\n| `sugarcane_farmer` | `SugarcaneFarmerDashboard` |\n| `equipments` | `CustomerEquipments` |\n| `contractors` | `CustomerContractors` |\n| `guarantors` | `CustomerGuarantors` |\n| `collaterals` | `CustomerCollaterals` |\n| `variety` | `CustomerCaneVariety` |\n| `harvest` | `CustomerHarvest` |\n| `centralQuata` | `CustomerCentralQuota` |\n| `agentFarmer` | `CustomerAgentFarmer` |\n| `cluster` | `CustomerCluster` |\n| `dataVarietyAndLandOwners` | `CustomerDataVarietyAndLandOwners` |\n\n### Customer Info Tab\n\nไฟล์ที่เกี่ยวข้อง:\n\n- `components/customer/info.vue`\n\nการ์ดหลัก:\n\n- ข้อมูลสมาชิก\n- คู่สมรส\n- ข้อมูลที่อยู่\n- ข้อมูลการติดต่อ\n\nAction notes:\n\n- ปุ่มประวัติการเปลี่ยนแปลง: `/cms/customers/{customerCode}/customer-change`\n- ปุ่มแก้ไขข้อมูลหลัก: ต้องมี `PermissionExtension.edit_customer_info`\n- ปุ่มคู่สมรส: ไป `/cms/customers/{customerCode}/mate`\n- ปุ่มที่อยู่: ไป `/cms/customers/{customerCode}/address`\n\nPhone verification button:\n\n- `pending` / `waitingDoc` = รอตรวจสอบ\n- `approve` = ยืนยันแล้ว\n- ค่าอื่น = ยืนยันหมายเลขโทรศัพท์\n\n### Mate Page\n\nไฟล์ที่เกี่ยวข้อง:\n\n- `pages/cms/customers/[id]/mate.vue`\n\nAPI:\n\n| Method | Endpoint | ใช้เมื่อ |\n|---|---|---|\n| GET | `/bff-service/customers/:id` | โหลดข้อมูลลูกค้า |\n| GET | `/bff-service/data-mates` | โหลดรายการคู่สมรส |\n| POST | `/cms-service/data-mates` | เพิ่มคู่สมรส |\n| PUT | `/cms-service/data-mates/:id` | แก้ไขคู่สมรส |\n\nValidation ที่เอกสารเดิมยืนยันได้:\n\n- `citizenId` required, อย่างน้อย 13 หลัก, และต้องผ่าน `appVerifyCitizenId()`\n- `birthDate`, `issueDate`, `expirationDate` required\n- `firstName`, `lastName` required\n- `houseNo` required\n- จังหวัด, อำเภอ, ตำบล, รหัสไปรษณีย์ ต้องเลือก\n\nFeatures:\n\n- `UIBaseCardReader`\n- `UIBaseCardImage`\n- `UIBaseAvatar`\n- `isActive` แสดงเฉพาะ edit mode\n\n### Address Page\n\nไฟล์ที่เกี่ยวข้อง:\n\n- `pages/cms/customers/[id]/address.vue`\n\nAPI:\n\n| Method | Endpoint | ใช้เมื่อ |\n|---|---|---|\n| GET | `/bff-service/data-addresses` | โหลดรายการที่อยู่ |\n| POST | `/cms-service/data-addresses` | เพิ่มที่อยู่ |\n| PUT | `/cms-service/data-addresses/:id` | แก้ไขที่อยู่ |\n\nNotes:\n\n- ปุ่ม delete ถูก comment ออก\n- แสดงประเภทที่อยู่จาก `AddressTypeMsg[addressTypeId]`\n- ปุ่มเพิ่ม/แก้ไขต้องมี `PermissionExtension.edit_customer_info`\n\n### Book Bank\n\nไฟล์ที่เกี่ยวข้อง:\n\n- `pages/cms/customers/[id]/book-bank/index.vue`\n- `pages/cms/customers/[id]/book-bank/request.vue`\n\nAPI:\n\n| Method | Endpoint | ใช้เมื่อ |\n|---|---|---|\n| GET | `/bff-service/data-book-banks` | โหลดรายการบัญชี |\n| POST | `/cms-service/data-book-banks` | เพิ่มบัญชีธนาคาร |\n| POST | `/cms-service/data-book-banks` | เพิ่มบัญชี ธกส. |\n| GET | `/bff-service/data-customer-requests` | โหลดคำร้องแก้ไขบัญชี |\n| POST | `/cms-service/data-customer-requests` | ยื่นคำร้องแก้ไขบัญชี |\n\nปุ่มหลัก:\n\n- เพิ่มข้อมูลบัญชีธนาคาร\n- เพิ่มข้อมูลบัญชี-ธกส.\n- คำร้องแก้ไขบัญชี\n\nDisable rules:\n\n- ถ้ามีบัญชี subvension อยู่แล้ว ปุ่มเพิ่มบัญชี ธกส. ถูกปิด\n- ถ้ายังไม่มีบัญชีเลย ปุ่มคำร้องแก้ไขบัญชีถูกปิด\n\nBook bank status:\n\n| Status | ความหมาย |\n|---|---|\n| `pending` | อยู่ระหว่างรอ |\n| `rejected` | สถานะปฏิเสธและกดดูรายละเอียดได้ |\n\n### History Pages\n\nไฟล์ที่เกี่ยวข้อง:\n\n- `pages/cms/customers/[id]/customer-change.vue`\n- `pages/cms/customers/[id]/consent-history.vue`\n\nAPI:\n\n| Method | Endpoint | ใช้เมื่อ |\n|---|---|---|\n| GET | `/bff-service/customers/:id` | โหลดข้อมูลลูกค้า |\n| GET | `/bff-service/customers-phone-verify/:customerId/history` | โหลดประวัติการเปลี่ยนแปลง |\n| GET | `/bff-service/data-consent-history` | โหลดประวัติเอกสารยินยอม |\n| PUT | `/cms-service/data-consent-history/:id/status` | ยกเลิกรายการเอกสารยินยอม |\n\nHistory notes:\n\n- customer change page มีตัวกรองตาม `ManagePhoneNumberRequestsType`\n- consent history เรียง `createdAt: -1`\n- ยกเลิกได้เฉพาะรายการที่ `status === \'draft\'`\n\n### Permission Extensions\n\nPermission ที่เอกสารเดิมยืนยันได้:\n\n| Permission | ความหมาย |\n|---|---|\n| `edit_customer_info` | แก้ไขข้อมูลสมาชิก, ที่อยู่, คู่สมรส, บัญชีธนาคาร |\n| `approve_book_bank_subvension` | อนุมัติบัญชี ธกส. |\n\nNotes:\n\n- permission extensions โหลดจาก `localStorage["globalPermissionExtensions"]`\n- helper อยู่ใน `composables/permission-extension.ts`\n\n### API Summary\n\n| หมวด | Service | Base Path |\n|---|---|---|\n| รายการ / detail | bff-service | `/bff-service/customers` |\n| ที่อยู่ | cms-service / bff-service | `/cms-service/data-addresses` / `/bff-service/data-addresses` |\n| คู่สมรส | cms-service / bff-service | `/cms-service/data-mates` / `/bff-service/data-mates` |\n| บัญชีธนาคาร | cms-service / bff-service | `/cms-service/data-book-banks` / `/bff-service/data-book-banks` |\n| คำร้องแก้ไขบัญชี | cms-service / bff-service | `/cms-service/data-customer-requests` / `/bff-service/data-customer-requests` |\n| ประวัติเบอร์โทร | cms-service / bff-service | `/cms-service/customers-phone-verify` / `/bff-service/customers-phone-verify` |\n| ประวัติยินยอม | cms-service / bff-service | `/cms-service/data-consent-history` / `/bff-service/data-consent-history` |\n\n---\n\n## Known Gaps\n\n- ในหน้า detail มีหลาย tab มาก แต่เอกสารเดิมให้หลักฐานเชิงพฤติกรรมชัดเฉพาะการ bootstrap state และเงื่อนไขเปิด/ปิด tab จึงยังไม่สรุป flow ภายในของทุก tab\n- หน้า book bank ยืนยันได้ว่ามีการยื่นคำร้องแก้ไขและดูประวัติ แต่เอกสารเดิมยังไม่ให้รายละเอียด validation หรือขั้นตอนอนุมัติปลายทางของคำร้อง\n\n### Components ใหม่ที่เพิ่มใน develop (ยืนยันจากโค้ด)\n\n**Customer Profile Tabs/Components (22 ตัว) — NEW:**\n\nระบบจัดการข้อมูลสมาชิกขยายจาก tab เดิม (info, mate, address, book-bank, customer-change, consent-history) ไปเป็นระบบที่มี components เฉพาะทางเพิ่มอีก 22 ตัว:\n\n| Component | หน้าที่ | หมายเหตุ |\n|---|---|---|\n| `agent-farmer.vue` | แสดงข้อมูลตัวแทนชาวไร่ พร้อมสัญญาและยกเลิกบทบาท | เรียก `apiDataFarmerAgent` |\n| `book-bank-agriculture.vue` | Modal เพิ่มบัญชี ธ.ก.ส. รองรับ OCR สแกนหน้าสมุดบัญชี | เรียก `apiOcrBookBankBff`, `apiMasterBanks` |\n| `book-bank-requests.vue` | Modal ยื่นคำร้องแก้ไขบัญชี พร้อม verify ตัวตน | เรียก `apiDataVerifyIdentities` |\n| `cane-variety.vue` | แสดงข้อมูลซื้อขายพันธุ์อ้อย | table component |\n| `card-elbd.vue` | แสดงสถานะสัญญา eLBD | อ่านค่า contract status |\n| `central-quota.vue` | แสดงสัญญาโควตากลาง + ปริมาณอ้อย | table component |\n| `cluster.vue` | แสดงข้อมูลสมาชิกสายส่ง | table component |\n| `collaterals.vue` | แสดงหลักทรัพย์ค้ำประกัน + ราคาประเมิน | table component |\n| `contractors.vue` | แสดงข้อมูลผู้รับเหมาที่เกี่ยวข้อง + navigate ไปดูรายละเอียด | link ไป contractor detail |\n| `data-variety-and-land-owners.vue` | แสดงเจ้าของพันธุ์อ้อย/ที่ดิน/สัญญาเช่า | table component |\n| `equipments.vue` | จัดการอุปกรณ์การเกษตร + เลือก cluster | equipment inventory |\n| `guarantors.vue` | แสดงบุคคลค้ำประกัน + ประเภทลูกหนี้ | table component |\n| `harvest.vue` | แสดงข้อมูลส่งอ้อยเข้าหีบ | table placeholder |\n| `modal-change-profile.vue` | Modal อัปโหลดรูปโปรไฟล์ | avatar upload |\n| `modal-confirm-type-info.vue` | Modal เลือกวิธียืนยันตัวตน (OTP) | identity verification |\n| `modal-info-customer.vue` | Modal แก้ไขข้อมูลสมาชิก + อ่านบัตรประชาชน + OCR | ใช้ `UIBaseCardReader`, `UIBaseCardImage` |\n| `modal-ocsb.vue` | Modal เพิ่ม/แก้ไขเลขที่สอน./สมาคม | cooperative number |\n| `modal-phone.vue` | Modal แก้ไขเบอร์โทรรอง / Line ID | phone validation |\n| `modal-primary-phone.vue` | Modal เปลี่ยนเบอร์โทรหลัก + verify OTP + พิมพ์เอกสาร | OTP verification flow |\n| `modal-upload-id-card.vue` | Modal อัปโหลดรูปบัตรประชาชน | file validation |\n\n**New Page:**\n\n| Page | หน้าที่ | หมายเหตุ |\n|---|---|---|\n| `attachment-list.vue` | แสดงข้อมูลส่           content:
            '# Flow 05 — Contractor Management (ผู้รับเหมา)\n\n> **แหล่งที่มาของข้อมูล (Source files)**\n> - `cms_frontend-develop/pages/cms/contractors/list.vue`\n> - `cms_frontend-develop/pages/cms/contractors/[id]/index.vue`\n> - `cms_frontend-develop/pages/cms/contractors/request-list.vue`\n> - `cms_frontend-develop/pages/cms/contractors/[id]/borrow-money/harvest/*` ← **NEW in develop**\n> - `cms_frontend-develop/pages/cms/contractors/[id]/borrow-money/mechanical/*` ← **NEW in develop**\n> - `cms_frontend-develop/pages/cms/contractors/[id]/collateral-contractor/*` ← **NEW in develop**\n> - `cms_frontend-develop/pages/cms/contractors/[id]/vehicles/[vehicle_code].vue` ← **NEW in develop**\n> - `cms_frontend-develop/pages/cms/contractors/consents/approval.vue` ← **NEW in develop**\n> - `cms_frontend-develop/pages/cms/contractors/consents/list.vue` ← **NEW in develop**\n> - `cms_frontend-develop/components/contractor/profile.vue`\n> - `cms_frontend-develop/components/contractor/vehicle-info.vue`\n> - `cms_frontend-develop/components/contractor/labor_management.vue`\n> - `cms_frontend-develop/components/contractor/using-credit.vue`\n> - `cms_frontend-develop/components/contractor/collateral-contractor.vue`\n> - `cms_frontend-develop/components/contractor/request-service.vue`\n> - `cms_frontend-develop/components/contractor/modal-selection.vue`\n> - `cms_frontend-develop/components/contractor/vehicle-year.vue` ← **NEW**\n> - `cms_frontend-develop/components/contractor/vehicle-registration.vue` ← **NEW**\n> - `cms_frontend-develop/components/contractor/production-year.vue` ← **NEW**\n> - `cms_frontend-develop/components/contractor/attachment.vue` ← **NEW**\n> - `cms_frontend-develop/components/contractor/leader-cluster-list-modal.vue` ← **NEW**\n> - `cms_frontend-develop/components/contractor/modal-form-create.vue` ← **NEW**\n> - `cms_frontend-develop/components/contractor/modal-form-create-labor.vue` ← **NEW**\n> - `cms_frontend-develop/components/contractor/modal-edit-vehicle.vue` ← **NEW**\n> - `cms_frontend-develop/components/contractor/modal-cancel-vehicle.vue` ← **NEW**\n> - `cms_frontend-develop/components/contractor/modal-moving-vehicle.vue` ← **NEW**\n> - `cms_frontend-develop/components/contractor/modal-note-not-approved-vehicle.vue` ← **NEW**\n> - `cms_frontend-develop/components/contractor/modal-plans-achievement.vue` ← **NEW**\n> - `cms_frontend-develop/components/contractor/modal-selection-vehicle.vue` ← **NEW**\n> - `cms_frontend-develop/components/contractor/modal-selection-labor.vue` ← **NEW**\n> - `cms_frontend-develop/components/contractor/request-borrow-collateral-detail.vue` ← **NEW**\n> - `cms_frontend-develop/components/contractor/collateral/*.vue` ← **NEW** (7 files)\n> - `cms_frontend-develop/components/contractor/ui/*.vue` ← **NEW** (6 UI components)\n> - `cms_frontend-develop/components/contractor/request-list/table.vue` ← **NEW**\n> - `main_frontend-develop/composables/api-bff.ts`\n\n---\n\n## Overview\n\nFlow นี้ใช้จัดการข้อมูลผู้รับเหมา ตั้งแต่ดูรายการผู้รับเหมา ลงทะเบียนผู้รับเหมาใหม่ เปิดดูรายละเอียดรายคน และติดตามคำร้องข้อมูลรถ\n\nในหน้ารายละเอียด ผู้ใช้สามารถดูข้อมูลได้หลายด้าน เช่น ข้อมูลการลงทะเบียน ข้อมูลรถ การจัดการแรงงาน การขอใช้บริการ เงินยืม และหลักทรัพย์ค้ำประกัน\n\nภาพรวมของ flow มี 4 ช่วงหลัก:\n\n1. ดูรายการผู้รับเหมาตามปีการผลิต\n2. ลงทะเบียนผู้รับเหมาใหม่หรือเปิดดูรายละเอียดรายคน\n3. ดูข้อมูลผู้รับเหมารายด้านผ่าน tabs\n4. ติดตามรายการคำร้องข้อมูลรถ\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| รายการผู้รับเหมา | `cms/contractors/list.vue` |\n| รายละเอียดผู้รับเหมา | `cms/contractors/[id]/index.vue` |\n| ข้อมูลผู้รับเหมาราย tab | `profile.vue`, `vehicle-info.vue`, `labor_management.vue`, `request-service.vue`, `using-credit.vue`, `collateral-contractor.vue` |\n| ลงทะเบียนผู้รับเหมาใหม่ | `modal-selection.vue`, `modal-form-create.vue` ← **NEW** |\n| รายการคำร้องข้อมูลรถ | `cms/contractors/request-list.vue` |\n| **ขอยืมเงิน — ฤดูเก็บเกี่ยว** | `cms/contractors/[id]/borrow-money/harvest/*` ← **NEW** |\n| **ขอยืมเงิน — จักรกล** | `cms/contractors/[id]/borrow-money/mechanical/*` ← **NEW** |\n| **หลักทรัพย์ค้ำประกันผู้รับเหมา** | `cms/contractors/[id]/collateral-contractor/*` ← **NEW** |\n| **รถร่วมบริการ** | `cms/contractors/[id]/vehicles/[vehicle_code].vue` ← **NEW** |\n| **คำร้องความยินยอมข้อมูลส่วนบุคคล** | `cms/contractors/consents/list.vue` ← **NEW** |\n| **อนุมัติคำร้องความยินยอม** | `cms/contractors/consents/approval.vue` ← **NEW** |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| Staff | ดูรายการผู้รับเหมา, ลงทะเบียน, เปิดดูรายละเอียด, ติดตามคำร้องข้อมูลรถ |\n| หน้ารายการผู้รับเหมา | แสดงรายการ ค้นหา กรอง และพาไปหน้ารายละเอียด |\n| modal ลงทะเบียนผู้รับเหมา | ใช้เริ่มต้นการสร้างผู้รับเหมาใหม่ |\n| หน้ารายละเอียดผู้รับเหมา | โหลดข้อมูลผู้รับเหมารายคนและควบคุม tabs |\n| tab components | แสดงข้อมูลผู้รับเหมาตามหมวด |\n| หน้ารายการคำร้องข้อมูลรถ | แสดงรายการคำร้องและรองรับการกรองหลายเงื่อนไข |\n| BFF APIs | ส่งข้อมูลรายการผู้รับเหมา รายละเอียดผู้รับเหมา และคำร้องข้อมูลรถ |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| รายการผู้รับเหมา | ข้อมูลผู้รับเหมาตามปีการผลิตและคำค้นหา |\n| รายละเอียดผู้รับเหมา | ข้อมูลผู้รับเหมารายคนที่ใช้ร่วมกันหลาย tab |\n| tabs ของผู้รับเหมา | มุมมองข้อมูลแยกตามประเภทงาน |\n| รายการคำร้องข้อมูลรถ | ข้อมูลคำร้องเพิ่มรถ ยกเลิกรถ หรือโอนย้ายรถ |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["เปิดรายการผู้รับเหมา"] --> B["ค้นหาหรือกรองตามปีการผลิต"]\n    B --> C["ดูรายการผู้รับเหมา"]\n    C --> D["ลงทะเบียนผู้รับเหมาใหม่"]\n    C --> E["เปิดรายละเอียดผู้รับเหมา"]\n    E --> F["ดูข้อมูลราย tab"]\n    A --> G["เปิดรายการคำร้องข้อมูลรถ"]\n    G --> H["กรองตามปี ยี่ห้อ จังหวัด ประเภทคำร้อง และสถานะ"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `list.vue` | ดูรายการผู้รับเหมา ค้นหา กรอง และเริ่มลงทะเบียน | ใช้ปีการผลิตเป็น filter หลัก |\n| `modal-selection.vue` | ใช้เริ่มขั้นตอนลงทะเบียนผู้รับเหมา | เปิดจากหน้ารายการ |\n| `[id]/index.vue` | แสดงรายละเอียดผู้รับเหมาและควบคุม tabs | รองรับ query `tab_code` |\n| `profile.vue` | แสดงข้อมูลการลงทะเบียนและเอกสาร | มีลิงก์ไปดูรายละเอียดเพิ่มเติม |\n| `vehicle-info.vue` | แสดงข้อมูลรถ | แสดงผ่าน tab |\n| `labor_management.vue` | แสดงข้อมูลแรงงาน | แสดงผ่าน tab |\n| `request-service.vue` | แสดงข้อมูลการขอใช้บริการ | แสดงผ่าน tab |\n| `using-credit.vue` | แสดงข้อมูลเงินยืม | แสดงผ่าน tab |\n| `collateral-contractor.vue` | แสดงข้อมูลหลักทรัพย์ค้ำประกัน | แสดงผ่าน tab |\n| `request-list.vue` | ดูรายการคำร้องข้อมูลรถ | มีหลาย filter และแบ่งประเภทคำร้อง |\n\n---\n\n## Per-Page Details\n\n### 05-A: รายการผู้รับเหมา\n\n#### Purpose\n\nใช้ดูรายการผู้รับเหมาตามปีการผลิต ค้นหา และเริ่มต้นการลงทะเบียนหรือแก้ไขข้อมูล\n\n#### Main Steps\n\n1. เปิดหน้ารายการผู้รับเหมา\n2. โหลดรายการผู้รับเหมาตามปีการผลิต\n3. ค้นหาหรือเลือกปีการผลิตเพื่อกรองข้อมูล\n4. เปิด modal เมื่อต้องการลงทะเบียนผู้รับเหมาใหม่\n5. เปิดหน้ารายละเอียดเมื่อต้องการแก้ไขข้อมูลผู้รับเหมาที่มีอยู่แล้ว\n\n#### Decision Points\n\n| กรณี | ผลลัพธ์ |\n|---|---|\n| มีการค้นหาหรือเปลี่ยนปีการผลิต | โหลดรายการใหม่ |\n| คลิกลงทะเบียนผู้รับเหมา | เปิด modal ลงทะเบียน |\n| คลิกแก้ไข | พาไปหน้ารายละเอียดผู้รับเหมา |\n\n#### Result\n\n- ได้รายการผู้รับเหมาตามเงื่อนไขที่เลือก\n- สามารถเริ่มต้นสร้างผู้รับเหมาใหม่หรือเปิดรายละเอียดรายคนได้\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ListPage as contractors/list.vue\n    participant BffYearsAPI as GET /bff-service/data-contractor-years\n    participant ModalSelection as modal-selection.vue\n    participant DetailPage as contractors/[id]/index.vue\n\n    Staff->>ListPage: เปิดหน้า\n    ListPage->>BffYearsAPI: โหลดรายการผู้รับเหมา\n    BffYearsAPI-->>ListPage: list ตามปีการผลิต\n    ListPage-->>Staff: แสดงตาราง\n\n    alt ค้นหาหรือเปลี่ยนปีการผลิต\n        Staff->>ListPage: เปลี่ยน filter หรือ search\n        ListPage->>BffYearsAPI: โหลดรายการใหม่\n        BffYearsAPI-->>ListPage: ผลลัพธ์ใหม่\n    end\n\n    alt ลงทะเบียนผู้รับเหมาใหม่\n        Staff->>ListPage: คลิกลงทะเบียนผู้รับเหมา\n        ListPage->>ModalSelection: showModal()\n        ModalSelection-->>Staff: modal ลงทะเบียน\n    else แก้ไขผู้รับเหมาเดิม\n        Staff->>ListPage: คลิกแก้ไข\n        ListPage->>DetailPage: navigate ไปหน้ารายละเอียด\n    end\n```\n\n### 05-B: หน้ารายละเอียดผู้รับเหมา\n\n#### Purpose\n\nใช้โหลดข้อมูลผู้รับเหมารายคน และแสดงข้อมูลรายด้านผ่าน tabs\n\n#### Main Steps\n\n1. เปิดหน้ารายละเอียดของผู้รับเหมา\n2. โหลดข้อมูลผู้รับเหมาตาม id\n3. เก็บข้อมูลไว้ใน state กลางของหน้านี้\n4. แสดง tab เริ่มต้นเป็นการลงทะเบียน\n5. เมื่อเปลี่ยน tab ระบบจะ sync กับ query `tab_code`\n6. tab component แต่ละตัวอ่านข้อมูลจาก state กลางเดียวกัน\n\n#### Decision Points\n\n| กรณี | ผลลัพธ์ |\n|---|---|\n| เปิดหน้าครั้งแรก | โหลดข้อมูลผู้รับเหมาจาก API |\n| เปลี่ยน tab | อัปเดต query `tab_code` |\n| browser back/forward | หน้าจะ sync tab ตาม query |\n\n#### Result\n\n- ได้ข้อมูลผู้รับเหมารายคนไว้ใช้ร่วมกันในหลาย tab\n- ผู้ใช้สามารถดูข้อมูลตามหมวดงานได้จากหน้าเดียว\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant DetailPage as contractors/[id]/index.vue\n    participant BffAPI as GET /bff-service/data-contractors/:id\n    participant State as globalContractorProfile\n    participant Tabs as Tab Components\n\n    Staff->>DetailPage: เปิดหน้ารายละเอียด\n    DetailPage->>BffAPI: โหลดข้อมูลผู้รับเหมา\n    BffAPI-->>DetailPage: data contractor\n    DetailPage->>State: เก็บ dataContractor\n    DetailPage->>State: inject reloadData()\n    DetailPage-->>Staff: แสดง tab เริ่มต้น\n\n    Staff->>DetailPage: เลือก tab\n    DetailPage->>DetailPage: update currentTabCode\n    DetailPage->>DetailPage: replace query tab_code\n    DetailPage->>Tabs: render tab component\n    Tabs->>State: อ่านข้อมูลจาก state กลาง\n```\n\n### 05-C: Tab การลงทะเบียน\n\n#### Purpose\n\nใช้แสดงข้อมูลหลักของผู้รับเหมาและเอกสารประกอบการลงทะเบียน\n\n#### Main Steps\n\n1. แสดงข้อมูลหัวเรื่องของผู้รับเหมา\n2. แสดงข้อมูลผู้รับเหมา เช่น ชื่อและเขต\n3. แสดงเอกสารประกอบการลงทะเบียน\n4. ให้ผู้ใช้กดดูรายละเอียดเพิ่มเติมได้\n\n#### Result\n\n- ผู้ใช้เห็นข้อมูลการลงทะเบียนหลักของผู้รับเหมา\n- สามารถไปดูรายละเอียดเพิ่มเติมได้จากลิงก์ในหน้า\n\n### 05-D: รายการคำร้องข้อมูลรถ\n\n#### Purpose\n\nใช้ติดตามรายการคำร้องเกี่ยวกับข้อมูลรถของผู้รับเหมา และกรองรายการตามหลายเงื่อนไข\n\n#### Main Steps\n\n1. เปิดหน้ารายการคำร้องข้อมูลรถ\n2. โหลดรายการคำร้องตามเงื่อนไขเริ่มต้น\n3. ค้นหาหรือกรองตามปีการผลิต ยี่ห้อรถ จังหวัด ประเภทคำร้อง และสถานะ\n4. เลือกดูข้อมูลตามประเภทคำร้องที่หน้าแสดงไว้\n5. แสดงรายการผ่าน component ตาราง\n\n#### Decision Points\n\n| กรณี | ผลลัพธ์ |\n|---|---|\n| เปลี่ยนคำค้นหาหรือ filter | โหลดรายการใหม่ |\n| เปลี่ยนประเภทคำร้อง | แสดงรายการตามประเภทที่เลือก |\n\n#### Result\n\n- ได้รายการคำร้องข้อมูลรถตามเงื่อนไขที่เลือก\n- ผู้ใช้สามารถติดตามสถานะคำร้องได้จากหน้าเดียว\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant RequestListPage as contractors/request-list.vue\n    participant RequestAPI as GET /bff-service/data-contractor-registers/operator\n    participant MasterVehicleAPI as GET /master-vehicle\n    participant Table as ContractorRequestListTable\n\n    Staff->>RequestListPage: เปิดหน้า\n    RequestListPage->>MasterVehicleAPI: โหลดข้อมูลยี่ห้อรถ\n    MasterVehicleAPI-->>RequestListPage: vehicle brands\n    RequestListPage->>RequestAPI: โหลดรายการคำร้องข้อมูลรถ\n    RequestAPI-->>RequestListPage: request list\n    RequestListPage->>Table: ส่งข้อมูลให้ตาราง\n    Table-->>Staff: แสดงรายการคำร้อง\n\n    Staff->>RequestListPage: ค้นหาหรือเปลี่ยน filter\n    RequestListPage->>RequestAPI: โหลดรายการใหม่\n    RequestAPI-->>RequestListPage: ผลลัพธ์ใหม่\n```\n\n---\n\n## Exceptions / Edge Cases\n\n### การจัดการ tabs\n\n- รองรับ query `tab_code` เพื่อเปิด tab ตาม URL\n- tab เริ่มต้นคือ `profile`\n- มีการ watch `$route.query.tab_code` เพื่อ sync tab เมื่อ browser back/forward\n\n### ชุด tabs ของผู้รับเหมา\n\n- tab ถูกกำหนดจาก `mockContractorTabs`\n- `contractor_attachments` และ `income_expenses` ถูก comment ออกในโค้ด\n- บาง icon ใช้ base SVG icon เฉพาะบาง tab code\n\n### รายการคำร้องข้อมูลรถ\n\n- มีทั้ง filter แบบ dropdown และ search พร้อม debounce `800ms`\n- หน้าแยกประเภทคำร้องเป็น `createOrCancel` และ `transfer`\n\n---\n\n## Technical Reference\n\n### API Endpoints\n\n| Action | Method | Path |\n|---|---|---|\n| List contractors by year | GET | `/bff-service/data-contractor-years` |\n| Get contractor detail | GET | `/bff-service/data-contractors/{id}` |\n| List vehicle registration requests | GET | `/bff-service/data-contractor-registers/operator` |\n| Get vehicle brands | GET | `/master-vehicle` |\n\n### Contractor List Filters\n\n| Filter | รายละเอียด |\n|---|---|\n| search | ค้นหาโควตา |\n| prefixYear | ปีการผลิต |\n\n### Contractor Detail Tabs\n\n| Code | Name | Component |\n|---|---|---|\n| `profile` | การลงทะเบียน | `ContractorProfile` |\n| `vehicle_info` | ข้อมูลรถ | `ContractorVehicleInfo` |\n| `labor_management` | การจัดการแรงงาน | `ContractorLaborManagement` |\n| `request_service` | การขอใช้บริการ | `ContractorRequestService` |\n| `borrow_money` | เงินยืม | `ContractorUsingCredit` |\n| `contractor_collateral` | หลักทรัพย์ค้ำประกัน | `ContractorCollateralContractor` |\n\n### Vehicle Request Filters\n\n| Filter | รายละเอียด |\n|---|---|\n| productionYear | ปีการผลิต |\n| includeVehicle.vehicleBrand | ยี่ห้อรถ |\n| includeVehicle.provinceCode | จังหวัด |\n| vehicleApprovalRequest | `createOrCancel`, `create`, `cancel` |\n| status | `waitingVerify`, `rejected`, `accepted`, `terminate` |\n| search | ค้นหาผู้รับเหมา/ทะเบียนรถ |\n\n### State ที่ใช้ในหน้ารายละเอียด\n\n| State | ความหมาย |\n|---|---|\n| `globalContractorProfile` | state กลางของข้อมูลผู้รับเหมา |\n| `dataContractor` | ข้อมูลผู้รับเหมาที่โหลดจาก API |\n| `reloadData` | ฟังก์ชันสำหรับโหลดข้อมูลผู้รับเหมาใหม่ |\n\n### Sub-pages ที่ถูกอ้างถึงในเอกสารเดิม\n\n| Path | ความหมาย |\n|---|---|\n| `contractors/[id]/borrow-money/harvest/index.vue` | รายการเงินยืมฤดูหีบ |\n| `contractors/[id]/borrow-money/harvest/byReqCode/[requestCode].vue` | รายละเอียดเงินยืมฤดูหีบตาม requestCode |\n| `contractors/[id]/borrow-money/mechanical/index.vue` | รายการเงินยืมจักรกล |\n| `contractors/[id]/borrow-money/mechanical/byReqCode/[requestCode].vue` | รายละเอียดเงินยืมจักรกลตาม requestCode |\n| `contractors/[id]/collateral-contractor/request-collateral/index.vue` | คำขอหลักทรัพย์ |\n| `contractors/[id]/collateral-contractor/[contractor_years_id]/index.vue` | รายละเอียดหลักทรัพย์ตาม contractor year |\n\n---\n\n## Known Gaps\n\n- `mockContractorTabs` มาจากไฟล์ mock data จึงควรระวังว่าบาง tab อาจเป็น shell หรือถูกปิดใช้งานบางส่วน\n- ~~เอกสารเดิมอ้างถึง sub-pages ของ `borrow-money` และ `collateral` แต่ paths เหล่านี้ไม่ได้อยู่ในรายการ source files ด้านบนของ flow นี้~~ → **แก้ไขแล้ว:** ตอนนี้ยืนยันว่า `borrow-money/harvest/*`, `borrow-money/mechanical/*`, และ `collateral-contractor/*` มีอยู่จริงใน `-develop` และถูกเพิ่มใน Source files + Scope แล้ว\n\n### Pages และ Components ใหม่ที่เพิ่มใน develop (ยืนยันจากโค้ด)\n\n**New Pages (6 หน้า):**\n\n| Page | หน้าที่ | หมายเหตุ |\n|---|---|---|\n| `borrow-money/harvest/index.vue` | ขอยืมเงินฤดูเก็บเกี่ยว — แสดงสรุปและ submit | ใช้ `sBorrowMoneyHarvestState` |\n| `borrow-money/harvest/byReqCode/[requestCode].vue` | รายละเอียดคำขอยืมเงิน (harvest) ตาม request code | |\n| `borrow-money/mechanical/index.vue` | ขอยืมเงินจักรกล — แสดงสรุปและ submit | ใช้ `sBorrowMoneyMechanicalState` |\n| `borrow-money/mechanical/byReqCode/[requestCode].vue` | รายละเอียดคำขอยืมเงิน (mechanical) ตาม request code | |\n| `collateral-contractor/[contractor_years_id]/index.vue` | form เพิ่ม/แก้ไขหลักทรัพย์ค้ำประกัน (ที่ดิน/รถ) | เลือก type ได้ |\n| `collateral-contractor/request-collateral/index.vue` | ยื่นคำร้องหลักทรัพย์ค้ำประกัน | |\n| `vehicles/[vehicle_code].vue` | form เพิ่มรถร่วมบริการ + เลือก factory service | production year dropdown |\n| `consents/list.vue` | จัดการคำร้องความยินยอมข้อมูลส่วนบุคคล | ใช้ `ConsentList` component |\n| `consents/approval.vue` | อนุมัติคำร้องความยินยอม | ใช้ `ConsentList` component (approver mode) |\n\n**New Components (36 ตัว):**\n\n**Core Management:**\n\n| Component | หน้าที่ |\n|---|---|\n| `vehicle-year.vue` | จัดการรถตามปี + ปุ่มเพิ่ม/โอนรถ |\n| `vehicle-registration.vue` | ตารางเลือกรถหลายคันสำหรับยืนยันลงทะเบียน |\n| `production-year.vue` | horizontal slide selector เลือกปีผลิต |\n| `attachment.vue` | จัดการเอกสารแนบ + ดาวน์โหลด |\n| `leader-cluster-list-modal.vue` | Modal เลือกหัวหน้าสายส่ง (search จาก `apiCustomersBff`) |\n| `modal-form-create.vue` | Modal สร้างผู้รับเหมาใหม่ + อ่านบัตรประชาชน |\n| `modal-form-create-labor.vue` | Modal สร้างบันทึกแรงงาน + อ่านบัตรประชาชน + ที่อยู่ |\n| `modal-edit-vehicle.vue` | Modal แก้ไขข้อมูลรถ (ยี่ห้อ/ทะเบียน/ประเภท/จังหวัด) |\n| `modal-cancel-vehicle.vue` | Modal ยกเลิกใช้งานรถ + ระบุเหตุผล |\n| `modal-moving-vehicle.vue` | Modal ข้อมูลการโอนรถระหว่างผู้รับเหมา |\n| `modal-note-not-approved-vehicle.vue` | Modal แสดงเหตุผลที่ไม่อนุมัติรถ |\n| `modal-plans-achievement.vue` | Modal แสดงข้อมูลบริการที่ผู้รับเหมาทำได้ |\n| `modal-selection-vehicle.vue` | Modal เลือกรถจากรายการที่มี |\n| `modal-selection-labor.vue` | Modal เลือกแรงงาน + สร้างใหม่ |\n| `request-borrow-collateral-detail.vue` | แสดงรายละเอียดหลักทรัพย์ค้ำประกันแบบ expandable |\n\n**Collateral Sub-Components (7 ตัว):**\n\n| Component | หน้าที่ |\n|---|---|\n| `collateral/form-land-detail.vue` | form รายละเอียดหลักทรัพย์ที่ดิน |\n| `collateral/form-vehicle-detail.vue` | form รายละเอียดหลักทรัพย์รถ |\n| `collateral/tab-land.vue` | tab interface ดูรายละเอียดหลักทรัพย์ที่ดิน + เอกสาร |\n| `collateral/tab-vehicle.vue` | tab interface ดูรายละเอียดหลักทรัพย์รถ + เอกสาร |\n| `collateral/land-document.vue` | template พิมพ์เอกสารหลักทรัพย์ที่ดิน |\n| `collateral/vehicle-document.vue` | template พิมพ์เอกสารหลักทรัพย์รถ |\n| `collateral/modal-request-collateral.vue` | Modal เลือกและยื่นคำร้องหลักทรัพย์ |\n\n**UI Abstraction Components (6 ตัว):**\n\n`contractor/ui/` — checkbox.vue, dropdown.vue, input-field.vue, province.vue, radio.vue, text-area.vue\n\n**สิ่งที่ยังไม่ยืนยันละเอียด:**\n- `borrow-money` — ยืนยัน structure ได้ แต่ validation rules และ approval flow ภายในยังไม่ได้ trace ครบ\n- `collateral/` sub-components — ยืนยัน purpose จาก structure แต่ยังไม่เห็น API endpoint ละเอียดทั้งหมด\n',
