            '# Flow 24 — Store & Stock\n\n## Overview\n\nFlow นี้ครอบคลุมงานฝั่งร้านค้าและสต็อคในบริบท "ระบบลาน" ซึ่งรวมหลายงานที่ต่อเนื่องกัน:\n\n1. นำเข้าไฟล์ข้อมูลบิลอ้อยและน้ำมัน\n2. ดูรายละเอียดข้อมูลที่นำเข้า และบันทึกค่าใช้จ่ายจากชุดข้อมูลนั้น\n3. ใช้งาน POS ซื้อ-ขายสินค้าแบบหน้าเดียว\n4. ดูสรุปสต็อคจาก inspection receipts\n\nแม้ชื่อ flow จะกว้าง แต่โครงหลักแบ่งได้เป็น 4 sub-flow ชัดเจนตามลักษณะงาน\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| นำเข้าบิลอ้อย | `store-front/list`, `store-front/import` |\n| นำเข้าไฟล์น้ำมัน | `store-front/field-cane-oils`, `store-front/importGas` |\n| ระบบลาน detail / บันทึกค่าใช้จ่าย | `store-front/[key]`, `store-front/record-expenses*` |\n| POS และสรุปสต็อค | `store-payment`, `stock-products` |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| เจ้าหน้าที่ CMS / ระบบลาน | นำเข้าไฟล์, ตรวจข้อมูล, เปิดดู detail, และบันทึกค่าใช้จ่าย |\n| หน้านำเข้า | รับไฟล์และสั่งประมวลผลก่อน confirm บันทึก |\n| หน้า detail ระบบลาน | แสดงข้อมูลของ import batch ผ่าน global state |\n| หน้า POS | เพิ่มสินค้าแบบ in-memory และสร้าง QR ชำระเงิน |\n| หน้า stock | สรุปข้อมูลสต็อคจากรายการตรวจรับ |\n| BFF / APIs | โหลดรายการ import batch, สรุปยอด, field cane data, และ inspection receipts |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| Import batch | ชุดข้อมูลนำเข้าที่ถูกประมวลผลและยืนยันบันทึกแล้ว |\n| Field cane profile | ข้อมูล detail ของ batch หนึ่งที่ child components ใช้ร่วมกัน |\n| POS cart | รายการสินค้าที่ผู้ใช้เพิ่มไว้ในหน้านั้น |\n| Stock summary | มุมมองสรุปสินค้าคงเหลือจาก inspection receipts |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["เจ้าหน้าที่เปิดหมวด Store & Stock"] --> B["เลือกนำเข้าไฟล์, ดู detail, ใช้ POS, หรือดู stock"]\n    B --> C["ระบบโหลดรายการหรือข้อมูลตั้งต้น"]\n    C --> D["เจ้าหน้าที่ประมวลผลหรือแก้ไขข้อมูลในหน้าที่เกี่ยวข้อง"]\n    D --> E{"ผ่านเงื่อนไขของหน้านั้นหรือไม่?"}\n    E -->|ไม่ผ่าน| F["แจ้งปัญหาและหยุดบันทึก"]\n    E -->|ผ่าน| G["บันทึกผลหรืออัปเดต state"]\n    G --> H["กลับหน้ารายการหรือใช้งานต่อ"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `store-front/list` | ดูรายการ import บิลอ้อย | ค้นหาและเปิด detail ได้ |\n| `store-front/import` | นำเข้าไฟล์บิลอ้อย | ประมวลผลก่อนแล้วค่อย confirm บันทึก |\n| `store-front/[key]` | ดู detail ของ import batch | มี 4 tabs ผ่าน global state |\n| `store-front/field-cane-oils` | ดูรายการ import น้ำมัน | โครงคล้าย list ของบิลอ้อย |\n| `store-front/importGas` | นำเข้าไฟล์น้ำมัน | ใช้ PMT + TRN |\n| `store-front/record-expenses` | ดูรายการบันทึกค่าใช้จ่าย | action บางปุ่มยังไม่ผูก handler |\n| `store-front/record-expenses/[key]` | ดู detail ค่าใช้จ่าย | มี 1 tab เดียว |\n| `store-payment` | POS ซื้อ-ขายสินค้า | ทำงาน in-memory |\n| `stock-products` | สรุปรายการสต็อค | อ่านข้อมูลผ่าน global state |\n\n---\n\n## Per-Page Details\n\n### 24-A: Store Front Import Lists\n\n#### Purpose\n\nใช้ดูรายการ import batch ของบิลอ้อยและน้ำมัน และเป็นทางเข้าไปยังหน้าประมวลผลหรือหน้ารายละเอียด\n\n#### Main Steps\n\n1. เปิดหน้ารายการ\n2. ระบบโหลดรายการ import batch\n3. เจ้าหน้าที่ค้นหาหรือกรองตามช่วงวันที่\n4. เลือกไปหน้านำเข้าใหม่ หรือเปิด detail ของ batch เดิม\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| อยู่หน้า list บิลอ้อย | ปุ่มนำเข้าไปที่ `import` |\n| อยู่หน้า list น้ำมัน | ปุ่มนำเข้าไปที่ `importGas` |\n| กด edit | ไปหน้า detail ของ batch ตาม `key` |\n\n#### Result\n\n- ได้รายการ import batch ที่ค้นหาได้และเปิดดูต่อได้\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ListPage as store-front list pages\n    participant BFF as BFF Service\n\n    Staff->>ListPage: เปิดหน้ารายการ\n    ListPage->>BFF: โหลด field cane documents\n    BFF-->>ListPage: import batch list\n\n    alt ค้นหาหรือกรองวันที่\n        Staff->>ListPage: เปลี่ยน search หรือ date range\n        ListPage->>BFF: โหลดข้อมูลตาม filter\n        BFF-->>ListPage: filtered list\n    else นำเข้าใหม่\n        Staff->>ListPage: กดปุ่มนำเข้า\n        ListPage-->>Staff: ไปหน้าประมวลผลไฟล์\n    else เปิด detail\n        Staff->>ListPage: กด edit\n        ListPage-->>Staff: ไปหน้า detail ของ batch\n    end\n```\n\n### 24-B: Import Cane Bills\n\n#### Purpose\n\nใช้ประมวลผลไฟล์บิลอ้อย 2 ไฟล์, ตรวจผลที่ระบบอ่านได้, แล้ว confirm บันทึก import batch\n\n#### Main Steps\n\n1. เลือกโรงงานและแนบ 2 ไฟล์\n2. ระบบสร้าง `importKey` และเตรียม `FormData`\n3. กดประมวลผล\n4. ระบบส่งไฟล์ไป API และรับข้อมูลแยกตาม tab\n5. ระบบโหลด summary ของค่าอ้อยจ่ายและสต็อค\n6. เจ้าหน้าที่ตรวจผล\n7. กดบันทึกเพื่อ confirm batch\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| ยังเลือกข้อมูลไม่ครบ | ปุ่มประมวลผลยังไม่พร้อม |\n| ประมวลผลสำเร็จ | แสดงข้อมูลใน 5 tabs |\n| ยังไม่มี `keygen` หรือบันทึกล้มเหลว | แจ้ง error |\n\n#### Result\n\n- ได้ import batch ของบิลอ้อยที่ถูก confirm แล้ว\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ImportPage as store-front/import\n    participant API as Field Cane Import API\n    participant SumAPI as Summary APIs\n\n    Staff->>ImportPage: เลือกโรงงานและแนบ 2 ไฟล์\n    ImportPage->>ImportPage: สร้าง importKey และ FormData\n    Staff->>ImportPage: กดประมวลผล\n    ImportPage->>API: ส่งไฟล์เข้า import API\n    API-->>ImportPage: contructors, pays, stocks, vehicles, transferTrucks\n    ImportPage->>SumAPI: โหลด sum pays และ sum stocks\n    SumAPI-->>ImportPage: summary data\n    ImportPage-->>Staff: แสดงผลใน 5 tabs\n    Staff->>ImportPage: กดบันทึก\n    ImportPage->>API: confirm import batch status\n    API-->>ImportPage: success/error\n```\n\n### 24-C: Import Oil Files\n\n#### Purpose\n\nใช้ประมวลผลไฟล์น้ำมันแบบ PMT + TRN, แยกผลเป็นรายการ match / not match, แล้ว confirm บันทึก batch\n\n#### Main Steps\n\n1. แนบไฟล์ PMT และ TRN\n2. ระบบสร้าง `importKey` และ `FormData`\n3. กดประมวลผล\n4. ระบบเรียก API เฉพาะสำหรับน้ำมัน\n5. หลังสำเร็จ ระบบ reload ข้อมูลฝั่ง match / not match\n6. เจ้าหน้าที่กดบันทึกเพื่อ confirm batch\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| import น้ำมัน | ใช้ endpoint คนละตัวกับบิลอ้อย |\n| ประมวลผลสำเร็จ | แสดง 2 tabs คือ `match` และ `notMatch` |\n| บันทึกสำเร็จ | batch ถูก confirm |\n\n#### Result\n\n- ได้ import batch ของน้ำมันที่พร้อมใช้งานต่อ\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ImportPage as store-front/importGas\n    participant API as Oil Import API\n    participant DataAPI as Field Cane Oils API\n\n    Staff->>ImportPage: แนบ PMT และ TRN\n    ImportPage->>ImportPage: สร้าง FormData และ importKey\n    Staff->>ImportPage: กดประมวลผล\n    ImportPage->>API: ส่งไฟล์เข้า import endpoint ของน้ำมัน\n    API-->>ImportPage: success\n    ImportPage->>DataAPI: โหลดรายการ status = match และ not_match\n    DataAPI-->>ImportPage: match list และ notMatch list\n    ImportPage-->>Staff: แสดง 2 tabs\n    Staff->>ImportPage: กดบันทึก\n    ImportPage->>API: confirm import batch status\n    API-->>ImportPage: success/error\n```\n\n### 24-D: Store Front Detail And Record Expenses\n\n#### Purpose\n\nใช้ดูข้อมูลของ import batch รายตัวผ่าน global state และเปิด child components ตาม tab ที่เกี่ยวข้อง รวมทั้งหน้า record expenses ที่ reuse pattern เดียวกันแต่เหลือเพียง tab เดียว\n\n#### Main Steps\n\n1. เปิดหน้า detail ด้วย `key`\n2. ระบบโหลด field cane document ตาม key\n3. set global state พร้อม `reloadData`\n4. child components อ่านข้อมูลจาก state กลาง\n5. เจ้าหน้าที่สลับ tab เพื่อดูข้อมูลแต่ละด้าน\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| อยู่หน้า `store-front/[key]` | แสดง 4 tabs |\n| อยู่หน้า `record-expenses/[key]` | แสดงเฉพาะ tab `อ้อยจ่าย` |\n| record-expenses list | มีปุ่ม download/delete แต่เอกสารเดิมยังไม่พบ handler |\n\n#### Result\n\n- ได้มุมมอง detail ของ import batch ที่ child components ใช้งานร่วมกันได้\n\n#### Technical Diagrams\n\ndetail ของระบบลาน\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant DetailPage as store-front/[key]\n    participant API as Field Cane Document API\n    participant SharedState as globalFieldCaneProfile\n\n    Staff->>DetailPage: เปิดหน้า detail\n    DetailPage->>API: โหลด field cane document ตาม key\n    API-->>DetailPage: dataFieldCane\n    DetailPage->>SharedState: set dataFieldCane และ reloadData\n    SharedState-->>DetailPage: state พร้อมใช้\n    DetailPage-->>Staff: แสดง 4 tabs\n\n    Staff->>DetailPage: สลับ tab\n    DetailPage-->>Staff: child component อ่านข้อมูลจาก shared state\n```\n\ndetail ของ record expenses\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant DetailPage as record-expenses/[key]\n    participant API as Field Cane Document API\n    participant SharedState as globalFieldCaneProfile\n\n    Staff->>DetailPage: เปิดหน้า detail ค่าใช้จ่าย\n    DetailPage->>API: โหลด field cane document ตาม key\n    API-->>DetailPage: dataFieldCane\n    DetailPage->>SharedState: set dataFieldCane และ reloadData\n    DetailPage-->>Staff: แสดง tab เดียวคือ อ้อยจ่าย\n```\n\n### 24-E: Store Payment POS\n\n#### Purpose\n\nใช้เพิ่มสินค้าแบบ in-memory และสร้าง QR payment เพื่อชำระเงินในหน้าเดียว\n\n#### Main Steps\n\n1. เปิดหน้า POS\n2. เจ้าหน้าที่เพิ่มสินค้าใน modal\n3. ระบบคำนวณราคารวมของแต่ละรายการและยอดรวมทั้งบิล\n4. เจ้าหน้าที่กดชำระเงิน\n5. ระบบขอ QR code\n6. แสดง modal QR ให้ผู้ใช้ชำระ\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| เพิ่มสินค้า | push เข้า list ในหน้านั้นเท่านั้น |\n| สร้าง QR สำเร็จ | เปิด modal QR |\n| สร้าง QR ไม่สำเร็จ | แจ้ง error |\n\n#### Result\n\n- ได้ cart ชั่วคราวในหน้า และ QR code สำหรับชำระเงิน\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant POSPage as store-payment\n    participant Modal as Add Product Modal\n    participant PayAPI as QR Payment API\n\n    Staff->>POSPage: เปิดหน้า POS\n    Staff->>POSPage: กดเพิ่มสินค้า\n    POSPage->>Modal: เปิด modal\n    Staff->>Modal: เลือกสินค้าและจำนวน\n    Modal-->>POSPage: push รายการเข้า listProduct\n    POSPage-->>Staff: แสดงยอดรวม\n    Staff->>POSPage: กดชำระเงิน\n    POSPage->>PayAPI: ขอ QR payment\n    alt สำเร็จ\n        PayAPI-->>POSPage: qrcodeContent\n        POSPage-->>Staff: เปิด modal QR\n    else ไม่สำเร็จ\n        PayAPI-->>POSPage: error\n        POSPage-->>Staff: แจ้งปัญหา\n    end\n```\n\n### 24-F: Stock Summary\n\n#### Purpose\n\nใช้ดูสรุปรายการสต็อคจาก inspection receipts ของกลุ่มสินค้า `GS21`\n\n#### Main Steps\n\n1. เปิดหน้า stock summary\n2. ระบบโหลด inspection receipts\n3. set global state ของ stock\n4. แสดง tab ปัจจุบันและ count\n5. child table อ่านข้อมูลจาก global state\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| ปัจจุบันมีเพียง tab เดียว | การสลับ tab ยังไม่ซับซ้อน |\n\n#### Result\n\n- ได้ summary stock ที่ child table ใช้งานได้ผ่าน shared state\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant StockPage as stock-products\n    participant BFF as BFF Service\n    participant SharedState as globalStateStockProduct\n\n    Staff->>StockPage: เปิดหน้าสต็อค\n    StockPage->>BFF: โหลด inspection receipts ของ GS21\n    BFF-->>StockPage: stock product data\n    StockPage->>SharedState: set dataStockProductKbs และ reloadData\n    SharedState-->>StockPage: state พร้อมใช้\n    StockPage-->>Staff: แสดง tab kbs และ count\n```\n\n---\n\n## Technical Reference\n\n### Global State\n\n| State Key | ใช้เพื่อ |\n|---|---|\n| `globalFieldCaneProfile` | แชร์ `dataFieldCane` และ `reloadData` ให้ detail pages |\n| `globalStateStockProduct` | แชร์ `dataStockProductKbs` และ `reloadData` ให้ stock page |\n\n### API Summary\n\n| Constant | Method | ใช้เมื่อ |\n|---|---|---|\n| `apiFieleCaneDocument` | GET | โหลด list หรือ detail ของ CaneDocuments |\n| `apiFieldCaneImport` | POST | import ไฟล์บิลอ้อย/น้ำมัน |\n| `apiFieldCaneImport/{key}/status` | PUT | confirm import batch |\n| `apiStoreFrontSumPays` | GET | โหลด summary ค่าอ้อยจ่าย |\n| `apiStoreFrontSumStocks` | GET | โหลด summary สต็อค |\n| `apiDataFieldCaneCaneGases` | GET | โหลดข้อมูลน้ำมันแบบ match / not match |\n| `apiDataTransferTrucks` | GET | โหลด transfer trucks |\n| `apiBffexportDataInspectionReceipts` | GET | โหลดข้อมูล stock products (`GS21`) |\n| `apiQRPayment` | POST | สร้าง QR payment |\n\n### Import Notes\n\nshared pattern ของ `import` และ `importGas`:\n\n- ใช้ `importKey` จาก datetime string\n- ทำงาน 2 ขั้นตอน: ประมวลผล -> บันทึก\n\nความต่าง:\n\n| หน้า | จุดต่าง |\n|---|---|\n| `store-front/import` | ให้ผู้ใช้เลือกโรงงานและใช้ endpoint `xlsx/files/v2` |\n| `store-front/importGas` | hardcode `extensionFactoriesId = "1"` และใช้ endpoint `pmtTrn` |\n\nTabs ของหน้าประมวลผลบิลอ้อย:\n\n| Tab code | Component |\n|---|---|\n| `cane` | `StoreFrontPays` |\n| `contractor` | `StoreFrontContractor` |\n| `stock` | `StoreFrontStock` |\n| `cutting_machine` | `StoreFrontCuttingMachine` |\n| `transfer-turcks` | `StoreFrontTransferTrucks` |\n\nTabs ของหน้าประมวลผลน้ำมัน:\n\n| Tab code | ความหมาย |\n|---|---|\n| `match` | รายการจับคู่ได้ |\n| `notMatch` | รายการจับคู่ไม่ได้ |\n\n### Detail Notes\n\nTabs ของ `store-front/[key]`:\n\n| Tab code | Component |\n|---|---|\n| `cane` | `FieldCanePays` |\n| `transfer-turcks` | `FieldCaneTransferTrucks` |\n| `contractor` | `FieldCaneContructor` |\n| `stock` | `FieldCaneStock` |\n\n`record-expenses/[key]`:\n\n- มี 1 tab คือ `FieldCaneRecordExpensesPays`\n- ไม่มี `initDataTransferTrucks`\n\n### POS Notes\n\n- เป็น cart แบบ in-memory\n- ไม่มี persistence หรือ save order ลงฐานข้อมูลตามเอกสารเดิม\n- `totalProduct` คำนวณจาก `listProduct[].sum`\n\n### Stock Notes\n\n- ใช้ inspection receipts เป็น source แทน stock entity โดยตรง\n- filter หลักคือ `debtGroupId: GS21`\n- ปัจจุบันเอกสารเดิมแสดงเพียง tab `kbs`\n\n---\n\n## Known Gaps\n\n- `store-front/record-expenses` มีปุ่ม download และ delete ใน list แต่เอกสารเดิมยังไม่พบ handler จริง จึงยังไม่ควรสรุปเป็น flow ใช้งานได้\n- `store-payment` เป็น POS แบบ in-memory เท่านั้น ไม่มีหลักฐานในเอกสารเดิมว่ามี persistence หรือ transaction save จริง\n- `field-cane-oils` ใช้ API document ตัวเดียวกับ list ปกติ และเอกสารเดิมตั้งข้อสังเกตว่าการแยกประเภทน่าจะเกิดที่ server/filter แต่ยังไม่ยืนยัน logic นั้นจาก source\n\n### หน้าใหม่ที่พบจาก develop branch\n\n| หน้า | ขนาด (bytes) | สถานะ | หมายเหตุ |\n|---|---|---|---|\n| `pages/cms/store-front/correction-of-stamp-location/index.vue` — **NEW** | 23,697 | ทำงานจริง | แก้ไขจุดประทับตรา / ข้อมูลอ้อยปนเปื้อน; factory selector (ครบุรี/สีคิ้ว); search by quota/bill; modal สำหรับ edit stamp point + contamination %; ใช้ `apiFieldCanePays`; แสดง 20+ fields (weights, grades, CCS values); export report |\n| `pages/cms/store-front/edit-sugarcane-bills/index.vue` — **NEW** | 34,919 | ทำงานจริง | แก้ไขข้อมูลบิลอ้อย; factory selector + production year filter (`UIMasterProductYearOther`); search + export report; modal-based inline editing; structure คล้าย correction-of-stamp-location แต่เจาะ bill-specific fields |\n| `pages/cms/store-front/gases/[key]/index.vue` — **NEW** | 9,264 | ทำงานจริง | นำเข้าไฟล์บิลน้ำมัน (gas); file upload สำหรับ PMT + TRN bill files; tabbed: "Match" / "Not Match" สำหรับ reconciliation; ใช้ `apiFieleCaneDocument` + `apiDataFieldCaneCaneGases` + `apiDataFieldCaneGasesSum`; child components: `StoreFrontMatch` + `StoreFrontNotMatch` |\n| `pages/cms/store-front/weight-tranfers/index.vue` — **NEW** | 33,071 | ทำงานจริง | จัดการโอนน้ำหนักอ้อยระหว่างบุคคล; factory selector + production year filter; search + 2 actions: "รายงาน" (Report) + "เพิ่มรายการโอน" (Add Transfer); modal editing: owner quota, name, truck type, weight fields |\n| `pages/cms/store-front/weight-tranfers/[id]/index.vue` — **NEW** | — | ทำงานจริง | หน้า detail/edit ของรายการโอนน้ำหนัก |\n| `pages/cms/store-front/weight-tranfers/[id]/summary.vue` — **NEW** | — | ทำงานจริง | หน้าสรุปรายการโอนน้ำหนัก |\n',

            '# Flow 25 — Promotion\n\n## Overview\n\nFlow นี้รวมงาน 3 กลุ่มที่เกี่ยวกับ "การเตรียมจ่าย / ค่าใช้จ่ายส่งเสริม / โปรโมชั่นค่าขนส่ง" แต่ไม่ได้เป็นเส้นธุรกิจเดียวกันทั้งหมด:\n\n1. `preparations-promotion` สำหรับจัดการรายการเตรียมจ่ายและสรุป batch ก่อนสร้างใบสรุปสำคัญจ่าย\n2. `promotional-expense-list` สำหรับหน้า list รายการส่งเสริมหลายประเภทและฟอร์มสร้างรายการจ่ายเงิน\n3. `shipping-fee-promotion` สำหรับตั้งค่าโปรโมชั่นค่าขนส่งรายปีและราย snapshot\n\nจาก source ปัจจุบัน กลุ่มที่มี page logic ชัดที่สุดคือ `preparations-promotion` และ `shipping-fee-promotion` ส่วน `promotional-expense-list` หลายหน้าเป็น container ที่เปลี่ยน tab หรือ render child component มากกว่าจะทำธุรกรรมหลักใน page เอง\n\nดังนั้นเอกสารนี้จะอธิบายแยกตาม sub-domain และระบุให้ชัดว่า page ไหนมี API logic จริง, page ไหนเป็น shell, และ page ไหนยังเป็น stub/placeholder\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| จัดการรายการเตรียมจ่าย | `cms/preparations-promotion/manage-payment-preparation-items/*` |\n| ใบสรุปสำคัญจ่าย | `cms/preparations-promotion/payment-summary-list/*` |\n| รายการค่าใช้จ่ายส่งเสริม | `cms/promotional-expense-list/*` |\n| โปรโมชั่นค่าขนส่ง | `cms/shipping-fee-promotion/*` |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| เจ้าหน้าที่บัญชี/การเงิน | กรองรายการเตรียมจ่าย, ระบุข้อมูลการจ่าย, สรุปรายการ, สร้าง batch, และดู/ยกเลิกบางรายการ |\n| เจ้าหน้าที่ส่งเสริม | สร้างรายการจ่ายเงินรายรายการ และใช้งาน list ส่งเสริมแต่ละประเภท |\n| ผู้ตั้งค่าโปรโมชั่นขนส่ง | สร้างปีโปรโมชั่น, สร้าง snapshot, แก้วันที่เริ่ม, และจัดการสถานะ verify |\n| ผู้อนุมัติ | ยืนยันหรือยกเลิกการตรวจสอบ snapshot โปรโมชั่นขนส่ง |\n| Payment preparation APIs | ส่งรายการเตรียมจ่าย, summary groups, detail groups, และงาน sync |\n| Shipping promotion APIs | ส่งข้อมูลปีโปรโมชั่น, snapshots, stamping points, และ approve/cancel |\n| Child components | รับบท table/edit form จริงในหลายหน้า shell ของ `promotional-expense-list` และ `payment-summary-list` |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| Payment preparation worklist | รายการเตรียมจ่ายที่กรองตาม site, payment method, type, account, status, และวันที่จ่าย |\n| Bulk payment update | ผลการระบุข้อมูลการจ่ายแบบหลายรายการ |\n| Summarized payment batch | ชุดรายการที่ถูกสรุปไปยังหน้า summarize |\n| Payment summary batch | batch summary ที่พร้อมสร้างรายการจริง |\n| Manual payment record | รายการจ่ายเงินที่ถูกสร้างจาก `create-payment-list` |\n| Shipping promotion year | ปีโปรโมชั่นค่าขนส่งต่อ site |\n| Shipping snapshot | snapshot การตั้งค่าขนส่งรายช่วงเวลา |\n| Shipping verification result | ผล approve/cancel ของ snapshot โปรโมชั่นขนส่ง |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["เจ้าหน้าที่เปิดหมวด Promotion"] --> B["เลือกกลุ่มงาน"]\n\n    B --> C["preparations-promotion"]\n    B --> D["promotional-expense-list"]\n    B --> E["shipping-fee-promotion"]\n\n    C --> C1["กรองรายการเตรียมจ่าย"]\n    C1 --> C2["ระบุข้อมูลการจ่ายแบบ bulk"]\n    C2 --> C3["สรุปรายการจ่าย"]\n    C3 --> C4["สร้าง batch summary"]\n\n    D --> D1["เปิด list ตามประเภทรายการส่งเสริม"]\n    D1 --> D2["child component จัดการตาราง/แก้ไข"]\n    D --> D3["หรือสร้างรายการจ่ายเงินแบบ manual"]\n\n    E --> E1["สร้างปีโปรโมชั่น"]\n    E1 --> E2["สร้าง snapshot การตั้งค่า"]\n    E2 --> E3["เปิดหน้าตั้งค่าขนส่ง"]\n    E3 --> E4["approve/cancel verification หรือแก้วันที่เริ่ม"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `manage-payment-preparation-items/index.vue` | รายการเตรียมจ่าย | page หลักที่มี filter, bulk update, summarize, sync |\n| `manage-payment-preparation-items/summarize/index.vue` | ใบสรุปรายการเตรียมจ่าย | page หลักที่มี cancel/create batch และ modal detail |\n| `payment-summary-list/index.vue` | รายการใบสรุปสำคัญจ่าย | shell page ที่ render component table |\n| `payment-summary-list/[id].vue` | batch detail | stub page |\n| `payment-summary-list/print.vue` | พิมพ์เอกสาร | print method มีแต่ไม่ถูกเรียก |\n| `promotional-expense-list/*/index.vue` | list หน้าแยกตามประเภทค่าใช้จ่ายส่งเสริม | ส่วนใหญ่เป็น shell/container |\n| `promotional-expense-list/*/[id].vue` | edit page ของแต่ละประเภท | ส่วนใหญ่ delegate ไป component edit โดยตรง |\n| `promotional-expense-list/create-payment-list/index.vue` | สร้างรายการจ่ายเงิน | page ที่ POST เองจริง |\n| `shipping-fee-promotion/index.vue` | รายการปีโปรโมชั่นค่าขนส่ง | CRUD ปีโปรโมชั่น |\n| `shipping-fee-promotion/[shipping_id]/index.vue` | รายการ snapshots | CRUD snapshot ภายใต้ปีโปรโมชั่น |\n| `shipping-fee-promotion/[shipping_id]/[type]/[id].vue` | ตั้งค่าขนส่ง | approve/cancel, เปลี่ยนวันที่เริ่ม, และเปลี่ยน tab group/menu |\n\n---\n\n## Per-Page Details\n\n### 25-A: Payment Preparation Worklist\n\nครอบคลุม:\n\n- `preparations-promotion/manage-payment-preparation-items/index.vue`\n\n#### Purpose\n\nใช้เป็นหน้าหลักของงานเตรียมจ่าย: โหลดรายการ, กรองข้อมูล, เลือกหลายรายการ, ระบุข้อมูลการจ่ายแบบ bulk, sync รายการใหม่, และสรุปรายการเพื่อไปหน้าสร้าง batch\n\n#### Main Steps\n\n1. หน้าโหลด dropdown ของ site, payment method, payment type, account KBS, และ payment status\n2. ระบบตั้งค่า status เริ่มต้นเป็น `wait`\n3. หน้าโหลดรายการจาก `apiGetAllPaymentList`\n4. ผู้ใช้ค้นหาและกรองตามเงื่อนไขต่าง ๆ\n5. ผู้ใช้เลือกหลายรายการหรือเลือกทั้งหมด\n6. ถ้าต้องการแก้ข้อมูลการจ่าย bulk ให้เปิด modal `ระบุข้อมูลการจ่าย`\n7. หน้า validate ว่ามี `notes` ก่อนส่ง\n8. ระบบ PUT ไป `apiUpdatePaymentUpdateList`\n9. ถ้าต้องการสรุปรายการจ่าย ระบบ POST ไป `apiPostSummaryPayment`\n10. สำเร็จแล้ว push ไปหน้า summarize\n11. ผู้ใช้สามารถกด `ดึงข้อมูลรายการ` เพื่อเรียก sync endpoint ได้\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| status tab = `wait` | ปุ่ม `สรุปรายการจ่าย` ใช้งานได้ |\n| status tab != `wait` | ปุ่ม `สรุปรายการจ่าย` ถูก disable |\n| status tab = `hold` | modal จะเปิด checkbox สถานะแบบ hold ได้ |\n| `selectAll = true` | request bulk update/summarize จะส่ง `check_all: true` |\n| ไม่มี `notes` ใน modal | block การบันทึก |\n\n#### Result\n\n- ได้ worklist ที่จัดการเป็นกลุ่มได้\n- ใช้เป็นจุดเริ่มต้นของ flow ก่อนสร้าง batch summary จริง\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Accounting\n    participant Page as manage-payment-preparation-items/index.vue\n    participant MetaAPI as dropdown APIs\n    participant ListAPI as apiGetAllPaymentList\n    participant UpdateAPI as apiUpdatePaymentUpdateList\n    participant SumAPI as apiPostSummaryPayment\n\n    Accounting->>Page: เปิดหน้า\n    Page->>MetaAPI: โหลด dropdowns\n    Page->>ListAPI: GET payment list\n    ListAPI-->>Page: worklist\n\n    alt ระบุข้อมูลการจ่าย\n        Accounting->>Page: เปิด modal bulk update\n        Page->>UpdateAPI: PUT update list\n        UpdateAPI-->>Page: Update Success\n        Page->>ListAPI: reloadData()\n    else สรุปรายการ\n        Accounting->>Page: กดสรุปรายการจ่าย\n        Page->>SumAPI: POST summarize\n        SumAPI-->>Page: Update Success\n        Page->>Page: push summarize\n    end\n```\n\n### 25-B: Payment Preparation Summary\n\nครอบคลุม:\n\n- `preparations-promotion/manage-payment-preparation-items/summarize/index.vue`\n\n#### Purpose\n\nใช้ดู summary groups ที่ถูกเตรียมไว้แล้ว, เปิดดู before-detail/detail, นำรายการออกจากกลุ่ม, และสร้าง batch summary จริง\n\n#### Main Steps\n\n1. เปิดหน้า summarize\n2. ระบบโหลด grouped summaries จาก `apiGetGroupSummaryManagePayment`\n3. ผู้ใช้เลือกหลาย summary rows เพื่อเอาออก\n4. ผู้ใช้เปิด modal before-detail เพื่อตรวจรายชื่อผู้รับเงิน\n5. จาก before-detail สามารถเปิด detail line items ต่อได้\n6. ผู้ใช้สามารถนำรายการออกทั้งระดับ main, before-detail, หรือ detail\n7. ถ้าข้อมูลพร้อม ผู้ใช้กด `สร้างรายการ`\n8. ระบบ POST ไป `apiPostCreateBatchGroupSummaryManagePayment`\n9. สำเร็จแล้วไปหน้า `payment-summary-list`\n\n#### Result\n\n- ได้ batch summary ก่อนส่งต่อไปยังหน้ารายการใบสรุปสำคัญจ่าย\n- หน้าเดียวรองรับทั้ง review และ maintenance หลายระดับ\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Accounting\n    participant Page as summarize/index.vue\n    participant SumAPI as summary APIs\n\n    Accounting->>Page: เปิดหน้า\n    Page->>SumAPI: GET grouped summary\n    SumAPI-->>Page: grouped batches\n\n    alt เปิด before-detail/detail\n        Accounting->>Page: เปิด modal detail\n        Page->>SumAPI: GET before-detail หรือ detail\n        SumAPI-->>Page: line items\n    else นำรายการออก\n        Accounting->>Page: ยืนยัน cancel\n        Page->>SumAPI: POST cancel endpoint ตามระดับ\n        Page->>SumAPI: reloadData()\n    else สร้างรายการ\n        Accounting->>Page: กดสร้างรายการ\n        Page->>SumAPI: POST create batch\n        Page->>Page: push payment-summary-list\n    end\n```\n\n### 25-C: Payment Summary Pages\n\nครอบคลุม:\n\n- `preparations-promotion/payment-summary-list/index.vue`\n- `preparations-promotion/payment-summary-list/[id].vue`\n- `preparations-promotion/payment-summary-list/print.vue`\n\n#### Purpose\n\nเป็นชุดหน้าปลายทางของงานใบสรุปสำคัญจ่าย แต่ใน source ปัจจุบันมีเพียงหน้า index ที่ทำหน้าที่เป็น shell และอีก 2 หน้าเป็น partial/stub\n\n#### Main Steps\n\n1. หน้า `index.vue` แสดงหัวข้อแล้ว render `PreparationsPromotionPaymentSummaryListTable`\n2. หน้า `[id].vue` แสดง layout placeholder ของ batch detail เท่านั้น\n3. หน้า `print.vue` render print component และมี `onPrint()` แต่ `mounted()` ยัง comment การเรียกใช้งาน\n\n#### Result\n\n- `index.vue` ยังนับเป็น shell page\n- `[id].vue` และ `print.vue` ยังไม่ควรตีความเป็น flow production สมบูรณ์\n\n### 25-D: Promotional Expense List Pages\n\nครอบคลุม:\n\n- `promotional-expense-list/agricultural-machinery-services/index.vue`\n- `promotional-expense-list/agricultural-machinery-services/[id].vue`\n- `promotional-expense-list/cash-purchase-element/index.vue`\n- `promotional-expense-list/cash-purchase-element/[id].vue`\n- `promotional-expense-list/fertilizers-Irrigation-equipment/index.vue`\n- `promotional-expense-list/fertilizers-Irrigation-equipment/[id].vue`\n- `promotional-expense-list/sugarcane-varieties/index.vue`\n- `promotional-expense-list/sugarcane-varieties/[id].vue`\n\n#### Purpose\n\nใช้แยกหน้ารายการค่าใช้จ่ายส่งเสริมตามประเภท แต่ตัว page ส่วนใหญ่ทำหน้าที่เป็น container สำหรับ tab/menu และ render child table หรือ child edit component\n\n#### Main Steps\n\n1. ผู้ใช้เปิด page ตามประเภทค่าใช้จ่าย\n2. หน้าเปลี่ยน tab site/type/menu หรือ district/type/menu\n3. หน้า render child table component ที่รับงานจริงต่อ\n4. ใน route `[id]` หน้า render child edit component โดยตรง\n\n#### Result\n\n- route เหล่านี้มีโครง UI จริง แต่ logic ธุรกรรมหลักอยู่ใน child components มากกว่าตัว page\n- เอกสาร flow รอบนี้จึงสรุปเพียงระดับ container/page role\n\n#### Notes แยกตามหน้า\n\n| หน้า | หมายเหตุ |\n|---|---|\n| `agricultural-machinery-services/index.vue` | มีปุ่มเมนู `หักหนี้`, `วันที่ตัดวันจ่าย`, `ใบสรุป`, `พิมพ์รายงาน` แต่ handler ว่าง |\n| `cash-purchase-element/index.vue` | เปลี่ยน district/type/menu ได้ แต่ยังเป็น shell |\n| `fertilizers-Irrigation-equipment/index.vue` | สลับ 2 tab แล้ว render table component เดียว |\n| `sugarcane-varieties/index.vue` | โครงเดียวกับ `cash-purchase-element` |\n| `*/[id].vue` | delegate ไป edit component โดยตรง |\n\n### 25-E: Create Payment List\n\nครอบคลุม:\n\n- `promotional-expense-list/create-payment-list/index.vue`\n\n#### Purpose\n\nใช้สร้างรายการจ่ายเงินแบบ manual จากฟอร์มหน้าเดียว โดยไม่ได้ผ่าน flow select/summarize เหมือน `preparations-promotion`\n\n#### Main Steps\n\n1. หน้า mount แล้วตรวจ `window.location.origin`\n2. ถ้า origin ไม่ใช่ `https://kbs-dev.cnes.co.th` หรือ `http://localhost:3000` จะ redirect ไป `/error`\n3. ระบบโหลด dropdown สาขา, ประเภทการเบิก, account KBS, และวิธีการจ่ายเงิน\n4. ผู้ใช้กรอกข้อมูลชาวไร่, ผู้รับเงิน, รายการ, และวันที่ต่าง ๆ\n5. หน้า validate ว่าฟิลด์บังคับครบและจำนวนเงินเป็นตัวเลข\n6. ระบบ POST ไป `apiPostCreateManagePayment`\n7. แสดง alert success หรือ error ตามผลลัพธ์\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| origin ไม่ตรง whitelist | redirect ไป `/error` |\n| ฟิลด์บังคับไม่ครบ | แจ้ง `กรุณากรอกข้อมูลให้ครบถ้วน` |\n| จำนวนเงิน parse ไม่ได้ | block submit |\n\n#### Result\n\n- ได้รายการจ่ายเงินที่สร้างจากฟอร์ม manual\n- flow นี้เป็น page logic จริง ไม่ใช่ shell\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as create-payment-list/index.vue\n    participant MetaAPI as dropdown APIs\n    participant CreateAPI as apiPostCreateManagePayment\n\n    Staff->>Page: เปิดหน้า\n    Page->>MetaAPI: โหลด dropdowns\n    MetaAPI-->>Page: options\n    Staff->>Page: กรอกข้อมูล\n    Staff->>Page: กดเพิ่มรายการ\n    Page->>Page: validate fields\n    Page->>CreateAPI: POST create manage payment\n    CreateAPI-->>Page: success/fail\n    Page-->>Staff: แสดงผลลัพธ์\n```\n\n### 25-F: Shipping Promotion Year List\n\nครอบคลุม:\n\n- `shipping-fee-promotion/index.vue`\n\n#### Purpose\n\nใช้ดูรายการปีโปรโมชั่นค่าขนส่งแยกตาม site, เพิ่มปีโปรโมชั่นใหม่, ลบปี, และเข้าไปดู snapshot list ของปีนั้น\n\n#### Main Steps\n\n1. หน้าโหลด dropdown ปีการผลิต\n2. หน้าโหลดรายการ promotion years ตาม site tab ที่เลือก\n3. ผู้ใช้สลับ site ระหว่างครบุรี/สีคิ้ว\n4. ผู้ใช้กดเพิ่มปีการผลิตผ่าน modal\n5. ระบบ POST ไป endpoint เดียวกับชื่อ constant `apiGetPromotionShipping`\n6. ผู้ใช้กด edit เพื่อเข้า page snapshots\n7. ผู้ใช้กด delete เพื่อลบปีโปรโมชั่น\n\n#### Result\n\n- ได้ master promotion year ต่อ site\n- ใช้เป็นจุดเข้าไปยัง snapshot configuration\n\n### 25-G: Shipping Promotion Snapshot List\n\nครอบคลุม:\n\n- `shipping-fee-promotion/[shipping_id]/index.vue`\n\n#### Purpose\n\nใช้ดูรายการ snapshot ภายใต้ promotion year เดียว, เพิ่ม snapshot ใหม่, ลบ snapshot ล่าสุด, และเปิดดูหรือแก้ไข snapshot configuration\n\n#### Main Steps\n\n1. หน้าโหลดข้อมูล promotion year เพื่อนำมาแสดง site/year label\n2. หน้าโหลด snapshots ตาม `shipping_promotion_id`\n3. ผู้ใช้กดเพิ่มรายการตั้งค่าขนส่งผ่าน modal\n4. ระบบ POST ไป `apiGetPromotionShippingSnapshot`\n5. ผู้ใช้กด view หรือ edit ของ snapshot\n6. ผู้ใช้กด delete snapshot ได้\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| snapshot `is_latest = true` | จึงแสดงปุ่ม edit/delete |\n| snapshot ไม่ใช่ latest | ปุ่ม edit/delete ซ่อนไว้ |\n| กด `Export Excel` หรือ `ประวัติการทำรายการ` | handler ยังว่าง |\n\n#### Result\n\n- ได้รายการ snapshots ของปีโปรโมชั่น\n- หน้า support CRUD จริง ยกเว้น export/history ที่ยังเป็น placeholder\n\n### 25-H: Shipping Promotion Configuration\n\nครอบคลุม:\n\n- `shipping-fee-promotion/[shipping_id]/[type]/[id].vue`\n\n#### Purpose\n\nใช้ดูรายละเอียด snapshot, เปลี่ยน group/menu tabs, approve หรือยกเลิก approve snapshot, และแก้วันที่เริ่มต้นเมื่ออยู่ใน edit mode ของ snapshot ล่าสุด\n\n#### Main Steps\n\n1. หน้าโหลด snapshot detail, stamping point list, และ promotion years\n2. หน้า determine ว่า route เป็น `edit` หรือ `view`\n3. หน้าแสดง site/year/status/ผู้จัดทำ/ผู้ตรวจสอบ\n4. ถ้า user มี approve permission และ snapshot อยู่ `pending` หรือ `approved` จะแสดงปุ่มยืนยัน/ยกเลิกยืนยัน\n5. ถ้า route เป็น `edit` และ snapshot เป็น latest ผู้ใช้ toggle แก้วันที่เริ่มและบันทึกได้\n6. ผู้ใช้สลับ group tab และ menu tab เพื่อดู child components ต่าง ๆ\n7. ระบบ POST approve/cancel หรือ PUT start date ตาม action ที่เลือก\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| `type = edit` และ `is_latest = true` | เปิดสิทธิ์แก้วันที่เริ่มต้น |\n| snapshot status = `pending` | ปุ่ม `ยืนยันการตรวจสอบ` |\n| snapshot status = `approved` | ปุ่ม `ยกเลิกยืนยันการตรวจสอบ` |\n| user ไม่มี approve permission | ไม่เห็นปุ่ม approve/cancel |\n| `menuSelected` ต่างกัน | render child component ตามเมนูที่เลือก |\n\n#### Result\n\n- ได้ flow ตรวจสอบ snapshot โปรโมชั่นขนส่ง\n- หน้าเดียวรองรับ approve/cancel และแก้ start date จริง\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Approver\n    participant Page as shipping-fee-promotion/[shipping_id]/[type]/[id].vue\n    participant SnapAPI as shipping snapshot APIs\n\n    Approver->>Page: เปิดหน้า\n    Page->>SnapAPI: GET snapshot detail + stamping points + years\n    SnapAPI-->>Page: snapshot context\n\n    alt ยืนยันการตรวจสอบ\n        Approver->>Page: กดยืนยัน\n        Page->>SnapAPI: POST approve\n        Page->>SnapAPI: reloadData()\n    else ยกเลิกยืนยัน\n        Approver->>Page: กดยกเลิกยืนยัน\n        Page->>SnapAPI: POST cancel approve\n        Page->>SnapAPI: reloadData()\n    else แก้วันที่เริ่ม\n        Approver->>Page: toggle edit date และกดบันทึก\n        Page->>SnapAPI: PUT start_date_time\n        Page->>SnapAPI: reloadData()\n    end\n```\n\n---\n\n## Technical Reference\n\n### payment status ที่ page `manage-payment-preparation-items` ใช้\n\n| ค่าใน UI | mapping ที่ส่งไป API |\n|---|---|\n| `wait` | `1` |\n| `hold` | `2` |\n| `summary` | `3` |\n| `cancel` | `4` |\n\nหมายเหตุ:\n- source ดึง dropdown payment status จาก API แล้ว append `summary` เพิ่มเองในหน้า\n- label ของ `wait` ถูก override เป็น `รอการสรุป`\n\n### shipping snapshot status ที่ใช้ในหน้าโปรโมชั่นขนส่ง\n\n| ค่า | ความหมาย |\n|---|---|\n| `pending` | รอดำเนินการ |\n| `approved` | อนุมัติแล้ว |\n\n### บทบาทของ page shell ใน `promotional-expense-list`\n\n| กลุ่มหน้า | สภาพปัจจุบัน |\n|---|---|\n| list pages | container/tab shell เป็นหลัก |\n| `[id]` pages | render edit component ตรง ๆ |\n| `create-payment-list` | page logic จริง |\n\n---\n\n## Known Gaps\n\n1. `preparations-promotion/payment-summary-list/index.vue` เป็น shell ที่โยนงานจริงไป `PreparationsPromotionPaymentSummaryListTable`; ถ้าจะอธิบาย flow ลึกกว่านี้ต้องเปิด component ต่อ\n2. `preparations-promotion/payment-summary-list/[id].vue` ยังเป็น stub แสดงค่าคงที่ เช่น `Batch no. 24040001` และไม่มี API call จริง\n3. `preparations-promotion/payment-summary-list/print.vue` มี `onPrint()` แต่ `mounted()` ยัง comment การเรียกไว้ จึงยังไม่ใช่ print flow ที่ทำงานอัตโนมัติจริง\n4. หลายหน้าใน `promotional-expense-list` เช่น `agricultural-machinery-services/index.vue` มีปุ่มเมนูหลายตัว แต่ handler ว่างหรือทำได้แค่เปลี่ยน state ในหน้า\n5. `promotional-expense-list/create-payment-list/index.vue` hardcode `bank_code: "BAY"` ตอน submit แม้หน้า UI มี dropdown ธนาคาร และ `onSelectedBank()` แค่เก็บกลับลง `fieldFilterBank` ไม่ได้ bind ค่าไป request จริง\n6. `promotional-expense-list/create-payment-list/index.vue` จำกัด origin ไว้ที่ `https://kbs-dev.cnes.co.th` กับ `http://localhost:3000`; ถ้า deploy ที่ origin อื่นจะ redirect ไป `/error`\n7. `shipping-fee-promotion/[shipping_id]/index.vue` และ `shipping-fee-promotion/[shipping_id]/[type]/[id].vue` ยังมีปุ่ม `Export Excel` และ `ประวัติการทำรายการ` ที่ handler ว่าง\n8. ชื่อ constant บางตัวใน shipping promotion เช่น `apiGetPromotionShipping` และ `apiGetPromotionShippingSnapshot` ถูกใช้ทั้ง GET และ POST จึงควรระวังเวลาอธิบายชื่อ endpoint เชิง business\n',

            '# Flow 26 — Mechanical Factory\n\n## Overview\n\nFlow นี้ครอบคลุมงานจักรกลฝั่งโรงงานใน 4 ด้านหลัก:\n\n1. วางแผนให้บริการจักรกลสำหรับงานของโรงงาน\n2. จัดการข้อมูลรถโรงงาน\n3. จัดการพนักงานขับรถและรถร่วมบริการของผู้รับเหมา\n4. อนุมัติคำขอลงทะเบียนรถ\n\nภาพรวมคือ เริ่มจากเตรียมทรัพยากรและข้อมูลรถ, นำรถกับคนขับไปผูกกับงานบริการ, แล้วค่อยอนุมัติคำขอรถที่เข้ามาในระบบ\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| วางแผนงานจักรกลโรงงาน | `mechanical-factory/request*` |\n| รถโรงงาน | `mechanical-factory/vehicles*` |\n| พนักงานขับรถ | `mechanical-factory/drivers` |\n| รถร่วมบริการของผู้รับเหมา | `mechanical-factory/form-collateral-vehicle` |\n| อนุมัติลงทะเบียนรถ | `vehicle-registration-approval` |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| เจ้าหน้าที่โรงงาน | วางแผนงาน, ผูกรถและคนขับ, จัดการรถ/คนขับ, และอนุมัติรถ |\n| หน้ารายการวางแผน | แสดงงานที่ต้องจัดรถให้บริการ |\n| หน้ารายละเอียดวางแผน | ใช้ assign รถ คนขับ และยืนยันส่งงานไปตรวจรับ |\n| หน้าจัดการรถ | ใช้เพิ่มและดูแลข้อมูลรถโรงงาน |\n| หน้าจัดการคนขับ | ใช้เพิ่มหรือยกเลิกพนักงานขับรถ |\n| หน้าอนุมัติลงทะเบียนรถ | ใช้ตรวจและอนุมัติคำขอรถหลายรายการ |\n| BFF Service | โหลดรายการงาน, รถ, คนขับ, และคำขอลงทะเบียน |\n| CMS Service | บันทึกการวางแผน, สร้างรถ, mapping คนขับ, และเปลี่ยนสถานะคำขอ |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| Factory service plan | แผนการใช้รถและคนขับกับงานจักรกลหนึ่งรายการ |\n| Factory vehicle | ข้อมูลรถโรงงานที่พร้อมใช้งาน |\n| Factory driver mapping | ความสัมพันธ์ระหว่างรถกับคนขับ |\n| Vehicle registration approval | คำขอลงทะเบียนรถที่ถูกอนุมัติหรือยกเลิกแล้ว |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["เจ้าหน้าที่เปิดหมวด Mechanical Factory"] --> B["เลือกวางแผนงาน, จัดการรถ/คนขับ, หรืออนุมัติลงทะเบียนรถ"]\n    B --> C["ระบบโหลดรายการหรือข้อมูลตั้งต้น"]\n    C --> D["เจ้าหน้าที่เพิ่ม แก้ไข จับคู่ หรืออนุมัติข้อมูล"]\n    D --> E{"ข้อมูลผ่านเงื่อนไขของหน้านั้นหรือไม่?"}\n    E -->|ไม่ผ่าน| F["แจ้งปัญหาและคงข้อมูลเดิมไว้"]\n    E -->|ผ่าน| G["บันทึกข้อมูลและรีโหลดรายการ"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `mechanical-factory/request` | ดูรายการงานจักรกลของโรงงาน | filter เฉพาะ payee โรงงาน |\n| `mechanical-factory/request/[id]` | วางแผนรถและคนขับให้กับงาน | มี actual list, save time, และยืนยันส่งตรวจรับ |\n| `mechanical-factory/vehicles` | ดูรายการรถโรงงาน | เพิ่มหรือลบรายการได้ |\n| `mechanical-factory/vehicles/[vehicle_code]` | ฟอร์มเพิ่มรถโรงงาน | เอกสารเดิมยืนยัน flow สร้างชัดที่สุด |\n| `mechanical-factory/drivers` | ดูและจัดการพนักงานขับรถ | เพิ่มผ่าน modal selection |\n| `mechanical-factory/form-collateral-vehicle` | เพิ่มรถร่วมบริการของผู้รับเหมา | ใช้ bulk API และอาศัย contractor profile |\n| `vehicle-registration-approval` | อนุมัติคำขอลงทะเบียนรถ | รองรับ multi-select และหลาย action |\n\n---\n\n## Per-Page Details\n\n### 26-A: Factory Service Request List\n\n#### Purpose\n\nใช้ดูรายการงานจักรกลที่เป็นงานของโรงงาน เพื่อเปิดเข้าไปจัดรถและคนขับให้บริการ\n\n#### Main Steps\n\n1. เลือกปีการผลิต\n2. ระบบโหลดงานที่เข้าเงื่อนไขของโรงงาน\n3. เจ้าหน้าที่ค้นหาและกรองตาม service type หรือสถานะ\n4. เปิดหน้า detail ของงานที่ต้องวางแผน\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| status ว่าง | ใช้เงื่อนไข all ตาม helper ของหน้า |\n| status มีค่าเฉพาะ | filter ตามค่านั้น |\n| payee ไม่ใช่โรงงาน | ไม่อยู่ในรายการของหน้านี้ |\n\n#### Result\n\n- ได้รายการงานจักรกลของโรงงานที่พร้อมวางแผน\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ListPage as mechanical-factory/request\n    participant BFF as BFF Service\n\n    Staff->>ListPage: เลือกปีการผลิต\n    ListPage->>BFF: โหลด credit withdraws ของ GS17 ที่ payee เป็นโรงงาน\n    BFF-->>ListPage: request list\n\n    alt ค้นหา / กรอง\n        Staff->>ListPage: เปลี่ยน search, service type, status\n        ListPage->>BFF: โหลดข้อมูลตาม filter\n        BFF-->>ListPage: filtered list\n    end\n\n    Staff->>ListPage: กดเปิดรายการ\n    ListPage-->>Staff: ไปหน้า detail ของงาน\n```\n\n### 26-B: Factory Service Planning Detail\n\n#### Purpose\n\nใช้ assign รถและคนขับให้กับงานจักรกลจริง, บันทึกแผนการทำงาน, และยืนยันส่งงานไปยังขั้นตรวจรับ\n\n#### Main Steps\n\n1. เปิดหน้า detail ของงาน\n2. ระบบโหลด credit withdraw detail และ factory actual operations ที่มีอยู่\n3. set state กลางของงานจากข้อมูล credit withdraw\n4. เจ้าหน้าที่เลือกวัน, รถ, และคนขับเพื่อสร้างแผน\n5. ใช้งาน modal สำหรับบันทึกเวลาทำงานหรือดูประวัติ\n6. เมื่อพร้อมแล้ว ยืนยันให้ตรวจรับงาน\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| form อยู่ในสถานะ disabled ตามเงื่อนไข inspected + accepted | ไม่เปิดให้แก้ต่อ |\n| ลบแผนที่มี working hours แล้ว | ไม่เปิดให้ลบตาม rule ที่เอกสารเดิมยืนยัน |\n| ยืนยันตรวจรับแต่มี entry ที่ `workingHours = 0` | ไม่ให้ยืนยัน |\n| เลือก `accepted` หรือ `refuse` | อัปเดต withdraw item ตามค่าที่เลือก |\n\n#### Result\n\n- ได้ factory actual plan และสถานะล่าสุดของงานบริการนั้น\n\n#### Technical Diagrams\n\nบันทึกแผนรถและคนขับ\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant DetailPage as mechanical-factory/request/[id]\n    participant BFF as BFF Service\n    participant CMS as CMS Service\n\n    Staff->>DetailPage: เปิดหน้า detail\n    DetailPage->>BFF: โหลด credit withdraw detail\n    BFF-->>DetailPage: dataCreditWithdraw\n    DetailPage->>BFF: โหลด factory actual operations\n    BFF-->>DetailPage: actual list\n    DetailPage-->>Staff: แสดงฟอร์มเลือกวัน รถ และคนขับ\n    Staff->>DetailPage: กรอกข้อมูลและกดเลือก\n    DetailPage->>CMS: สร้าง factory actual operation\n    CMS-->>DetailPage: success/error\n    DetailPage-->>Staff: รีโหลดข้อมูลเมื่อสำเร็จ\n```\n\nยืนยันให้ตรวจรับงาน\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant DetailPage as mechanical-factory/request/[id]\n    participant CMS as CMS Service\n\n    Staff->>DetailPage: เลือก accepted หรือ refuse\n    Staff->>DetailPage: กดยืนยันให้ตรวจรับงาน\n    DetailPage->>DetailPage: ตรวจว่า workingHours ของทุก entry มากกว่า 0\n    alt พบ entry ที่ยังไม่มีชั่วโมงทำงาน\n        DetailPage-->>Staff: แจ้ง error\n    else ผ่านเงื่อนไข\n        DetailPage->>CMS: อัปเดต withdrawItems ใน credit withdraw\n        CMS-->>DetailPage: success/error\n        DetailPage-->>Staff: แจ้งผลและกลับหน้ารายการ\n    end\n```\n\n### 26-C: Factory Vehicles\n\n#### Purpose\n\nใช้ดูแลข้อมูลรถโรงงาน ตั้งแต่ดูรายการ, กรองสถานะ, เพิ่มรถใหม่, และลบรถ\n\n#### Main Steps\n\n1. เปิดหน้ารายการรถ\n2. ระบบโหลดรถที่ใช้งานอยู่\n3. เจ้าหน้าที่กรองตามสถานะ\n4. เพิ่มรถใหม่ผ่านหน้าฟอร์ม หรือเลือก delete รถเดิม\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| filter active | แสดงรถที่ใช้งานอยู่ |\n| filter inactive | ใช้ filter แบบ not active |\n| ลบรายการ | ต้องยืนยันก่อนลบ |\n\n#### Result\n\n- ได้รายการรถโรงงานที่อัปเดตแล้ว\n\n#### Technical Diagrams\n\nหน้ารายการรถ\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ListPage as mechanical-factory/vehicles\n    participant BFF as BFF Service\n    participant CMS as CMS Service\n\n    Staff->>ListPage: เปิดหน้ารายการรถ\n    ListPage->>BFF: โหลด vehicle factories\n    BFF-->>ListPage: vehicle list\n\n    alt กรองสถานะ\n        Staff->>ListPage: เปลี่ยน filter\n        ListPage->>BFF: โหลดข้อมูลตามสถานะ\n        BFF-->>ListPage: filtered list\n    else ลบรถ\n        Staff->>ListPage: กดยืนยันลบ\n        ListPage->>CMS: ลบ vehicle factory\n        CMS-->>ListPage: success/error\n    else เพิ่มรถ\n        Staff->>ListPage: กดเพิ่มรถ\n        ListPage-->>Staff: ไปหน้าฟอร์มเพิ่มรถ\n    end\n```\n\nฟอร์มเพิ่มรถโรงงาน\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant FormPage as mechanical-factory/vehicles/[vehicle_code]\n    participant API as Vehicle APIs\n\n    Staff->>FormPage: เปิดฟอร์มเพิ่มรถ\n    FormPage->>API: โหลด master data ที่ต้องใช้ในฟอร์ม\n    API-->>FormPage: vehicle types, truck types, usage types, provinces\n    Staff->>FormPage: กรอกข้อมูลและ submit\n    FormPage->>API: สร้าง vehicle factory\n    alt สร้างสำเร็จ\n        API-->>FormPage: vehicle id\n        FormPage->>API: สร้าง mapping driver-vehicle เริ่มต้น\n        API-->>FormPage: success/partial fail\n    else สร้างไม่สำเร็จ\n        API-->>FormPage: error\n    end\n    FormPage-->>Staff: แจ้งผลและกลับหน้ารายการเมื่อสำเร็จ\n```\n\n### 26-D: Factory Drivers And Contractor Vehicles\n\n#### Purpose\n\nใช้ดูแลรายชื่อพนักงานขับรถของโรงงาน และเพิ่มรถร่วมบริการในบริบทของผู้รับเหมา\n\n#### Main Steps\n\n1. เปิดหน้าพนักงานขับรถเพื่อดูรายการ\n2. เพิ่มพนักงานผ่าน modal เลือกพนักงาน หรือยกเลิกรายชื่อเดิม\n3. สำหรับรถร่วมบริการ เปิดฟอร์ม bulk ของผู้รับเหมา\n4. สร้าง vehicle records และ mapping คนขับตาม contractor profile และปีการผลิต\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| เพิ่มพนักงานขับรถ | ใช้ modal พร้อม ignore list กันซ้ำ |\n| ยกเลิกพนักงานขับรถ | ลบตาม employee code |\n| ฟอร์มรถร่วมบริการ | ใช้ bulk API และต้องมี `globalContractorProfile` |\n\n#### Result\n\n- ได้รายชื่อคนขับและรถร่วมบริการที่พร้อมใช้งาน\n\n#### Technical Diagrams\n\nพนักงานขับรถ\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant DriverPage as mechanical-factory/drivers\n    participant BFF as BFF Service\n    participant CMS as CMS Service\n\n    Staff->>DriverPage: เปิดหน้าพนักงานขับรถ\n    DriverPage->>BFF: โหลดรายการคนขับ\n    BFF-->>DriverPage: driver list\n\n    alt เพิ่มคนขับ\n        Staff->>DriverPage: เปิด modal เลือกพนักงาน\n        DriverPage-->>Staff: ส่ง ignore list ให้ modal\n        Staff->>DriverPage: เลือกพนักงาน\n        DriverPage-->>Staff: รีโหลดรายการ\n    else ยกเลิกคนขับ\n        Staff->>DriverPage: กดยืนยันลบ\n        DriverPage->>CMS: delete factory driver\n        CMS-->>DriverPage: success/error\n    end\n```\n\nรถร่วมบริการของผู้รับเหมา\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant FormPage as form-collateral-vehicle\n    participant API as Contractor Vehicle APIs\n    participant ContractorState as globalContractorProfile\n\n    Staff->>FormPage: เปิดฟอร์มรถร่วมบริการ\n    FormPage->>ContractorState: อ่าน contractor profile\n    ContractorState-->>FormPage: contractor quota/profile\n    Staff->>FormPage: กรอกข้อมูลหลายรายการและ submit\n    FormPage->>API: สร้าง vehicle แบบ bulk\n    FormPage->>API: สร้าง mapping driver-vehicle แบบ bulk\n    API-->>FormPage: success/error\n```\n\n### 26-E: Vehicle Registration Approval\n\n#### Purpose\n\nใช้อนุมัติหรือยกเลิกคำขอลงทะเบียนรถหลายรายการ พร้อมบันทึกวันที่ใช้งาน และอัปเดตข้อมูลรถจริงเมื่ออนุมัติ\n\n#### Main Steps\n\n1. เปิดหน้ารายการคำขอลงทะเบียนรถ\n2. ระบบโหลดรายการคำขอและ master brand\n3. เจ้าหน้าที่กรองข้อมูลหรือสลับ tab\n4. เลือกหลายรายการ\n5. เลือกว่าจะบันทึกวันที่, อนุมัติข้อมูลรถ, หรืออนุมัติยกเลิกใช้งานรถ\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| ยังไม่ได้เลือกแถว | ปุ่ม action ถูก disable |\n| row อยู่สถานะ accepted หรือ terminate | row นั้นถูก disable |\n| selected tab เป็น `transfer` | ใช้ endpoint update status คนละตัว |\n| action download | เอกสารเดิมยืนยันว่า handler ยังว่าง |\n\n#### Result\n\n- ได้คำขอลงทะเบียนรถที่ถูกอัปเดตสถานะตาม action ที่เลือก\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ApprovalPage as vehicle-registration-approval\n    participant BFF as BFF Service\n    participant CMS as CMS Service\n\n    Staff->>ApprovalPage: เปิดหน้าอนุมัติลงทะเบียนรถ\n    ApprovalPage->>BFF: โหลดคำขอลงทะเบียนรถ\n    ApprovalPage->>BFF: โหลด master vehicle brands\n    BFF-->>ApprovalPage: request list and brand options\n\n    alt บันทึกวันที่เริ่มต้น-สิ้นสุด\n        Staff->>ApprovalPage: เลือกรายการและกรอกวันที่\n        loop ทีละรายการ\n            ApprovalPage->>CMS: update request date fields\n        end\n    else อนุมัติข้อมูลรถ\n        Staff->>ApprovalPage: เลือกรายการและกดอนุมัติ\n        loop ทีละรายการ\n            ApprovalPage->>CMS: update vehicle record\n            ApprovalPage->>CMS: update request status ตาม tab ปัจจุบัน\n        end\n    else อนุมัติยกเลิกใช้งานรถ\n        Staff->>ApprovalPage: เลือกรายการและกดยกเลิก\n        loop ทีละรายการที่ยังเข้าเงื่อนไข\n            ApprovalPage->>CMS: update request status เป็น terminate\n        end\n    end\n\n    ApprovalPage-->>Staff: รีโหลดรายการ\n```\n\n---\n\n## Technical Reference\n\n### Shared APIs\n\n| Constant | Method | ใช้เมื่อ |\n|---|---|---|\n| `apiBffDataCreditWithdrawsByWithdrawItems` | GET | โหลดรายการงานจักรกล |\n| `apiBffDataCreditWithdraws/{id}` | GET | โหลด detail งานจักรกล |\n| `apiDataCreditWithDraws/{id}` | PUT | อัปเดต credit withdraw |\n| `apiBffDataFactoryActualOperations` | GET | โหลด factory actual list |\n| `apiDataFactoryActualOperation` | POST | สร้างแผนรถ+คนขับ |\n| `apiDataFactoryActualOperation/{id}` | DELETE | ลบแผนรถ+คนขับ |\n\n### Global State\n\n| State Key | ใช้เพื่อ |\n|---|---|\n| `appStateCreditYearly` | เก็บข้อมูล credit withdraw ของหน้า request detail |\n| `globalContractorProfile` | เก็บ profile ผู้รับเหมาในฟอร์มรถร่วมบริการ |\n\n### Factory Request Notes\n\nFilter logic ที่เอกสารเดิมยืนยันได้:\n\n- `debtGroupId = GS17`\n- `payeeList.payeeQuotaNumber = "40"`\n\nstatus helper:\n\n- ถ้า status ว่าง ใช้ all mode ตาม helper ของหน้า\n- ถ้ามี status ให้ filter ตรงตามค่านั้น\n\nDisable rule ของหน้า detail:\n\n- disabled เมื่อ `dataCreditWithdraw.status == inspected` และ `withdrawItem.status == accepted`\n\nDelete rule:\n\n- ลบ Factory Actual ได้เฉพาะกรณี `workingHours sum = 0`\n\n### Factory Vehicles\n\nVehicle APIs:\n\n| Constant | Method | ใช้เมื่อ |\n|---|---|---|\n| `apiBffDataVehicleFactories` | GET | โหลดรายการรถโรงงาน |\n| `apiDataVehicleFactories` | POST / DELETE | สร้างหรือลบรถโรงงาน |\n| `apiMappingDriverVehicles/bulk` | POST | สร้าง mapping เริ่มต้นของรถโรงงาน |\n| `apiMasterVehicleTypes` | GET | master ประเภทรถ |\n| `apiMasterTruckTypes` | GET | master ประเภทรถบรรทุก |\n| `apiMasterVehicleUsageTypes` | GET | master ประเภทงาน |\n| `apiMasterProvinces` | GET | master จังหวัด |\n\nValidation notes:\n\n- ต้องมีอย่างน้อยหนึ่ง identifier ของรถตาม rule ในเอกสารเดิม\n- ถ้า `isHaveNotRegisNumber = true` ข้าม validation ทะเบียน\n- ถ้า `vehicleTypeId == "4"` ต้องกรอก field ของรถบรรทุกเพิ่ม\n\nSubmit notes:\n\n- หลังสร้างรถสำเร็จ จะสร้าง mapping driver-vehicle ต่อ\n- `productionYearId = "00-00"` ถูก hardcode ใน flow นี้\n\n### Drivers And Contractor Vehicles\n\nDriver APIs:\n\n| Constant | Method | ใช้เมื่อ |\n|---|---|---|\n| `apiBffFactoryDrivers` | GET | โหลดรายการพนักงานขับรถ |\n| `apiDataFactoryDrivers/{code}` | DELETE | ยกเลิกพนักงานขับรถ |\n\nContractor vehicle APIs:\n\n| Constant | Method | ใช้เมื่อ |\n|---|---|---|\n| `apiDataVehicleBulk` | POST | สร้างรถผู้รับเหมาแบบ bulk |\n| `apiMappingDriverVehicleBulk` | POST | สร้าง mapping driver-vehicle แบบ bulk |\n\nความต่างระหว่างรถโรงงานกับรถผู้รับเหมา:\n\n| ด้าน | รถโรงงาน | รถผู้รับเหมา |\n|---|---|---|\n| Vehicle API | single POST | bulk POST |\n| Mapping API | `apiMappingDriverVehicles/bulk` | `apiMappingDriverVehicleBulk` |\n| productionYear | `"00-00"` | ใช้ปีจาก selected product year |\n| contractorId | ไม่มี | มาจาก `globalContractorProfile` |\n\n### Vehicle Registration Approval\n\nApproval APIs:\n\n| Constant | Method | ใช้เมื่อ |\n|---|---|---|\n| `apiContractortRegsiterOperatorBff` | GET | โหลดคำขอลงทะเบียนรถ |\n| `apiUpdateContractortRegsiterOperator` | PUT | อัปเดตคำขอรถทั่วไป |\n| `apiUpdateContractortRegsiterOperatorTransfer` | PUT | อัปเดตคำขอใน transfer tab |\n| `apiDataVehicles` | PUT | อัปเดตข้อมูล vehicle record |\n| `apiMasterVehicle` | GET | โหลด master ยี่ห้อรถ |\n\nStatus ที่เอกสารเดิมยืนยันได้:\n\n| Value | ความหมาย |\n|---|---|\n| `waitingVerify` | รอตรวจสอบ |\n| `accepted` | อนุมัติ |\n| `terminate` | ยกเลิกการใช้งาน |\n\nDisable rules:\n\n- ปุ่ม action หลัก disabled เมื่อ `selectedData.length === 0`\n- row disabled เมื่อ `status === accepted || status === terminate`\n\n---\n\n## Known Gaps\n\n- `mechanical-factory/vehicles/[vehicle_code]` ในเอกสารเดิมอธิบาย flow สร้างรถชัดที่สุด แต่ยังไม่ยืนยันรายละเอียดของ edit mode เท่ากัน จึงยังเล่าเชิงสร้างเป็นหลัก\n- `vehicle-registration-approval` มีปุ่ม `ดาวน์โหลดข้อมูล` แต่ handler ยังว่าง จึงยังไม่ควรสรุปเป็น flow ใช้งานได้\n- `mechanical-factory/request/[id]` ใช้ modal หลายตัว (`FactorySaveTimeLine`, `FactoryHistoryWorking`) แต่เอกสารเดิมยังไม่ให้ logic ภายใน modal มากพอจะสรุปลึกกว่านี้\n',

          content:
            '# Flow 27 — KAT, Export, Customer Requests\n\n## Overview\n\nFlow นี้รวม 3 domain ที่อยู่ใกล้กันในเมนู CMS แต่ไม่ได้เป็นเส้นธุรกิจเดียวกัน:\n\n1. `kat-request-change` สำหรับดูและค้นข้อมูลแปลง KAT รวมทั้งรายการคำร้องแก้ไขแปลง\n2. `exports` สำหรับ export ไฟล์ txt/xlsx หลายรูปแบบ\n3. `customer-requests` สำหรับหน้า container ของคำร้องชาวไร่หลายประเภท\n\nจาก source ปัจจุบัน:\n\n- กลุ่ม `kat-request-change` มีทั้งหน้าที่มี API จริงและหน้าที่ยังเป็น partial/mock\n- กลุ่ม `exports` มีพฤติกรรมค่อนข้างชัดเจนและเสถียร\n- กลุ่ม `customer-requests` เกือบทั้งหมดเป็น shell page ที่ delegate logic ไป component ภายใน\n\nดังนั้นเอกสารนี้จะแยกตาม 3 sub-domain และระบุให้ชัดว่า page ไหนเป็น flow ใช้งานจริง, page ไหนเป็น shell, และ page ไหนยังไม่ปิดงานครบ\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| KAT request change | `cms/kat-request-change/*` |\n| Export files | `cms/exports/*` |\n| Customer requests | `cms/customer-requests/*` |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| เจ้าหน้าที่ KAT / GIS | ดูรายการคำร้องแปลง, เปิดข้อมูลแปลง, และตรวจข้อมูลตาม period |\n| เจ้าหน้าที่ไร่ | ค้นหา KAT ด้วย quota/year/factory และดูข้อมูลแปลง |\n| ผู้ใช้งาน export | เลือกช่วงวันที่และดาวน์โหลดไฟล์ txt/xlsx |\n| เจ้าหน้าที่คำร้องชาวไร่ | เปิด workspace คำร้องแต่ละประเภทผ่าน shell pages |\n| KAT APIs | ส่งข้อมูล period, land list, และรายการคำร้อง KAT |\n| Export services | ส่งไฟล์ผ่าน `window.open` หรือ `HttpAxiosService` แบบ blob |\n| Child components | รับ logic จริงในหลายหน้า customer requests และบางหน้า KAT |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| KAT request worklist | รายการคำร้องจัดการแปลงปลูก |\n| KAT period view | ข้อมูลการปลูก/ข้อมูล period ต่อ land number |\n| KAT GIS queue | รายการคำร้องที่ฝั่ง GIS ต้องตรวจ/จัดการ |\n| KAT search result | รายการแปลงจาก KAT ตาม quota, year, และโรงงาน |\n| TXT export file | ไฟล์ export จาก eform preprint |\n| XLSX export bundle | ชุดไฟล์ export ข้อมูลบัญชี/ชาวไร่/ผู้รับเหมา/หลักทรัพย์ |\n| Customer request workspace | component flow ภายในสำหรับคำร้องชาวไร่แต่ละประเภท |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["เจ้าหน้าที่เปิดหมวด KAT / Export / Customer Requests"] --> B["เลือกกลุ่มงาน"]\n\n    B --> C["KAT request change"]\n    B --> D["Exports"]\n    B --> E["Customer requests"]\n\n    C --> C1["เปิดรายการคำร้องหรือค้นหาแปลง KAT"]\n    C1 --> C2["ดูข้อมูล period / land details"]\n    C1 --> C3["เปิดรายการ GIS หรือ manage KAT"]\n\n    D --> D1["เลือกช่วงวันที่หรือประเภทไฟล์"]\n    D1 --> D2["เปิด URL preprint หรือดาวน์โหลด blob"]\n\n    E --> E1["เลือก tab คำร้องชาวไร่"]\n    E1 --> E2["delegate ไป child component ของคำร้องนั้น"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `kat-request-change/index.vue` | รายการคำร้องจัดการแปลงปลูก | render `KatRequirePlan` และมี modal approve แบบ mock |\n| `kat-request-change/[id].vue` | ดูข้อมูลแปลงตาม period | GET period จริง |\n| `kat-request-change/kat-gis.vue` | รายการจัดการข้อมูลแปลง GIS | list page จริงพร้อม modal detail |\n| `kat-request-change/land-no/[landNo].vue` | ข้อมูลการปลูกตาม period | detail page จริง |\n| `kat-request-change/manage-kat.vue` | จัดการคำขอแก้ไขแปลง KAT | list page partial, edit/delete ยังว่าง |\n| `kat-request-change/search.vue` | ค้นหา KAT | form + zod validation + API จริง |\n| `exports/*.vue` | export files หลายแบบ | ส่วนใหญ่เป็นหน้าเรียบง่ายแต่ทำงานจริง |\n| `customer-requests/_index.vue` | multi-tab container ของคำร้องชาวไร่ | shell page |\n| `customer-requests/*.vue` | shell page ของคำร้องเฉพาะประเภท | delegate ไป component ภายใน |\n\n---\n\n## Per-Page Details\n\n### 27-A: KAT Request Workspace\n\nครอบคลุม:\n\n- `kat-request-change/index.vue`\n- `kat-request-change/manage-kat.vue`\n- `kat-request-change/kat-gis.vue`\n\n#### Purpose\n\nรวม workspace ของการจัดการคำร้องแปลงปลูก KAT แต่แต่ละหน้ามีระดับความสมบูรณ์ไม่เท่ากัน:\n\n- `index.vue` เป็นหน้ารวมที่ render `KatRequirePlan` และยังมี approve modal แบบ mock\n- `manage-kat.vue` โหลด list จริงจาก API แต่ปุ่ม edit/delete ยังไม่ทำงาน\n- `kat-gis.vue` เป็น list page ที่ใช้จริงมากที่สุดในชุดนี้ เพราะมี filter status และเปิด modal รายละเอียดได้\n\n#### Main Steps\n\n1. ผู้ใช้เปิดหน้า KAT request ที่ต้องการ\n2. ถ้าเป็น `kat-gis.vue` ระบบโหลด dropdown สถานะและรายการคำร้อง KAT\n3. ผู้ใช้กรอง status แล้ว reload list\n4. ผู้ใช้กดเปิด modal ดูข้อมูล KAT request\n5. ถ้าเป็น `manage-kat.vue` ระบบโหลดเฉพาะคำขอ `adjust` ที่ status อยู่ใน `approve/pending`\n6. ถ้าเป็น `index.vue` ผู้ใช้เห็น workspace ของ `KatRequirePlan` และ modal approve ที่ page นี้ยังไม่ได้ผูก API จริง\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| `kat-gis` เปลี่ยน status filter | request `apiBffKatRequestChang` ใหม่พร้อม `filter.status` |\n| `kat-gis` status = `approve` | แปลงข้อความเป็น `รอ GIS ดำเนินการ` |\n| `manage-kat` | แสดงเฉพาะ `katRequestTypeId=adjust` และ `status=[approve,pending]` |\n| `index.vue` กด submit approve | ใช้ `mockStatus = "success"` ไม่เรียก API จริง |\n\n#### Result\n\n- ได้ worklist คำร้อง KAT หลายมุมมอง\n- แต่ยังต้องแยกให้ชัดว่า `kat-gis.vue` ใช้งานจริงกว่า `index.vue` และ `manage-kat.vue`\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as kat-gis.vue / manage-kat.vue\n    participant BFF as apiBffKatRequestChang\n\n    Staff->>Page: เปิดหน้า\n    Page->>BFF: GET kat request list ตาม filter\n    BFF-->>Page: request list\n\n    alt kat-gis\n        Staff->>Page: เปลี่ยน status\n        Page->>BFF: reloadData()\n        Staff->>Page: กดดูรายละเอียด\n        Page->>Page: show modal\n    else manage-kat\n        Page-->>Staff: ตารางคำขอแก้ไขแปลง\n        Note over Page: edit/delete ยังเป็น stub\n    end\n```\n\n### 27-B: KAT Period And Land Detail\n\nครอบคลุม:\n\n- `kat-request-change/[id].vue`\n- `kat-request-change/land-no/[landNo].vue`\n\n#### Purpose\n\nใช้ดูข้อมูล period และรายละเอียดการปลูกของแปลง KAT ตาม land number และปีที่ส่งมาใน query\n\n#### Main Steps\n\n1. เปิดหน้าด้วย `landNo` และ `year`\n2. ระบบ GET ข้อมูล period จาก `apiKatGetPeriod`\n3. หน้าแปลง object ของ period เป็น list/tabs\n4. ผู้ใช้สลับ tab period เพื่อดูข้อมูลช่วงเวลาที่ active\n5. ในหน้า `[id].vue` ผู้ใช้กดดูรูปภาพของ period ได้\n6. ในหน้า `land-no/[landNo].vue` ผู้ใช้เห็นรายละเอียดเชิงเกษตรจำนวนมากของ period ที่ active\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| route มี `id` และ `year` ใน `[id].vue` | setup จะ preload period data |\n| record มี `Image` | เปิด modal รูปภาพได้ |\n| record ไม่มี `Image` | แจ้ง `ไม่มีรูปภาพสำหรับแปลงนี้` |\n| ใน `land-no/[landNo].vue` | period แรกถูกตั้ง `active = 1` อัตโนมัติ |\n\n#### Result\n\n- ได้มุมมองข้อมูล KAT ตาม period\n- ใช้สำหรับอ่านข้อมูลเป็นหลัก ไม่ได้แก้ไขข้อมูลในหน้าพวกนี้\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as [id].vue / land-no/[landNo].vue\n    participant API as apiKatGetPeriod\n\n    Staff->>Page: เปิดหน้า landNo + year\n    Page->>API: GET period data\n    API-->>Page: object by period\n    Page->>Page: map เป็น list/tabs\n    Staff->>Page: เลือก period\n    Page->>Page: set active period\n    Page-->>Staff: แสดงข้อมูลแปลง\n```\n\n### 27-C: KAT Search\n\nครอบคลุม:\n\n- `kat-request-change/search.vue`\n\n#### Purpose\n\nใช้ค้นหาแปลง KAT ตาม quota, year, และโรงงานส่งเสริม พร้อม validation ด้วย `vee-validate` + `zod`\n\n#### Main Steps\n\n1. ผู้ใช้กรอก `quota`\n2. ผู้ใช้กรอก `year`\n3. ผู้ใช้เลือกโรงงาน `ครบุรี` หรือ `สีคิ้ว`\n4. หน้า validate ว่าฟิลด์ quota/year ไม่ว่าง\n5. ระบบ GET `apiBffFindlands`\n6. ถ้าสำเร็จ หน้าเก็บผลไว้ใน `dataListCurrent` และแสดงชื่อจาก `bnm_profile`\n\n#### Result\n\n- ได้ result set ของแปลงจาก KAT\n- เป็น page logic จริงและมี validation ชัดเจน\n\n### 27-D: Export Files\n\nครอบคลุม:\n\n- `exports/F5901FL.vue`\n- `exports/F5901KBS.vue`\n- `exports/ab.vue`\n- `exports/credit-and-withdraw.vue`\n- `exports/keaw.vue`\n- `exports/wa.vue`\n- `exports/bank-account-information.vue`\n\n#### Purpose\n\nใช้ export ไฟล์หลายรูปแบบ โดยแบ่งได้ 2 pattern หลัก:\n\n1. pattern `window.open` ไปที่ preprint export txt\n2. pattern blob download ผ่าน `HttpAxiosService`\n\n#### Main Steps\n\n1. ผู้ใช้เปิดหน้า export ที่ต้องการ\n2. ถ้าเป็น txt export:\n   - เลือก `startDate`\n   - เลือก `endDate` ถ้าต้องการ\n   - กดดาวน์โหลด\n   - หน้า build query string ผ่าน `QueryPreprint.*`\n   - เปิด URL ใหม่ด้วย `window.open`\n3. ถ้าเป็น `bank-account-information.vue`:\n   - ผู้ใช้กด download รายไฟล์ หรือ `All Download`\n   - หน้า set token ให้ `HttpAxiosService`\n   - GET endpoint แบบ `responseType = blob`\n   - สร้างลิงก์ดาวน์โหลดและ auto-click\n   - ถ้ากดทั้งหมด จะโหลดแบบ sequential พร้อม delay 500ms\n\n#### Result\n\n- ได้ไฟล์ txt หรือ xlsx ตามหน้า export ที่เลือก\n- flow export กลุ่มนี้ทำงานจริงและค่อนข้างตรงไปตรงมา\n\n#### Technical Diagrams\n\nTXT export\n\n```mermaid\nsequenceDiagram\n    actor User\n    participant Page as exports/*.vue\n    participant Browser as window.open\n\n    User->>Page: เลือกช่วงวันที่\n    User->>Page: กดดาวน์โหลด\n    Page->>Page: build query ผ่าน QueryPreprint\n    Page->>Browser: open preprint export URL\n```\n\nBlob export\n\n```mermaid\nsequenceDiagram\n    actor User\n    participant Page as bank-account-information.vue\n    participant HTTP as HttpAxiosService\n    participant Browser as createObjectURL\n\n    User->>Page: กด download\n    Page->>HTTP: setToken + GET blob\n    HTTP-->>Page: blob data\n    Page->>Browser: create download link + auto click\n```\n\n### 27-E: Customer Requests Shell Pages\n\nครอบคลุม:\n\n- `customer-requests/_index.vue`\n- `customer-requests/change-payment-agent.vue`\n- `customer-requests/credit-scoring/index.vue`\n- `customer-requests/credit-scoring/[start]/[end]/index.vue`\n- `customer-requests/extensionarea-agriculturalist.vue`\n- `customer-requests/farmer-grade/index.vue`\n- `customer-requests/farmer-grade/[start]/[end]/index.vue`\n\n#### Purpose\n\nใช้เป็น shell pages สำหรับคำร้องชาวไร่หลายประเภท โดยตัว page มีหน้าที่หลักคือแสดงหัวข้อ, tab, และ render child component ที่ทำงานจริง\n\n#### Main Steps\n\n1. เปิดหน้า `_index.vue`\n2. หน้า load `mockCustomerRequestTab`\n3. ผู้ใช้เลือก tab เช่น `contract`, `changeSugarCane`, `ChangeTypeDebtorManual`, `ChangeTypeDebtorAuto`, `changePaymentAgent`\n4. หน้าเปลี่ยน `currentTabCode` และ render component ตาม tab\n5. ถ้าเปิด route ย่อยโดยตรง เช่น `credit-scoring` หรือ `farmer-grade`\n6. หน้าเหล่านั้นจะแค่ render table/detail component ตรง ๆ\n\n#### Result\n\n- ได้ workspace หลายแบบสำหรับคำร้องชาวไร่\n- page level เองไม่มี API logic เกือบทั้งหมด\n\n#### Notes\n\n| หน้า | บทบาท |\n|---|---|\n| `_index.vue` | multi-tab container |\n| `change-payment-agent.vue` | shell -> `AgentsChangePaymentAgent` |\n| `credit-scoring/index.vue` | shell -> `CustomerRequestCreditScoringTable` |\n| `credit-scoring/[start]/[end]/index.vue` | shell -> detail component |\n| `extensionarea-agriculturalist.vue` | shell -> transfer agriculturalist component |\n| `farmer-grade/index.vue` | shell -> `CustomerRequestFarmerGradeTable` |\n| `farmer-grade/[start]/[end]/index.vue` | shell -> detail component |\n\n---\n\n## Technical Reference\n\n### KAT request status mapping ที่พบจาก source\n\n| บริบท | ค่า/พฤติกรรม |\n|---|---|\n| `kat-gis.vue` | ถ้า status = `approve` จะแสดงเป็น `รอ GIS ดำเนินการ` |\n| `manage-kat.vue` | filter คงที่ที่ `katRequestTypeId=adjust` และ `status=[approve,pending]` |\n| `index.vue` approve modal | radio มีค่า `2=อนุมัติ`, `3=ไม่อนุมัติ` |\n\n### Export patterns\n\n| กลุ่ม | วิธีทำงาน |\n|---|---|\n| `F5901FL`, `F5901KBS`, `ab`, `credit-and-withdraw`, `wa` | build query + `window.open` |\n| `keaw` | build query + `window.open`; มี computed role admin เพิ่ม |\n| `bank-account-information` | `HttpAxiosService` + blob download |\n\n### Customer request tabs ที่หน้า `_index.vue` render\n\n| code | component ที่ render |\n|---|---|\n| `contract` | `CustomerRequestTranferAgriculturalist` |\n| `changeSugarCane` | `CustomerRequestTranferAgriculturalist` |\n| `ChangeTypeDebtorManual` | `CustomerRequestChangeDebtManual` |\n| `ChangeTypeDebtorAuto` | `CustomerRequestChangeDebtAuto` |\n| `changePaymentAgent` | `AgentsChangePaymentAgent` |\n\n---\n\n## Known Gaps\n\n1. `kat-request-change/index.vue` ยังมี approve flow แบบ mock; `onSubmit()` ใช้ `mockStatus = "success"` และไม่ได้เรียก API จริง\n2. `kat-request-change/index.vue` โค้ด tab ส่วนใหญ่ถูก comment ทิ้ง และหน้าใช้งานจริงตอนนี้เหลือการ render `KatRequirePlan` เป็นหลัก\n3. `kat-request-change/manage-kat.vue` โหลด list จริงได้ แต่ `onClickEdit()` และ `onClickDelete()` ยังเป็น stub\n4. `kat-request-change/kat-gis.vue` โหลด dropdown site มาไว้ใน `fieldSite` แต่ UI dropdown site ถูก comment ออก จึงยังไม่สามารถกรองตาม site จากหน้าได้\n5. `kat-request-change/[id].vue` มี search input ในหน้า แต่ไม่ผูก logic ใด ๆ\n6. `kat-request-change/land-no/[landNo].vue` มี `apiGetLands()` อยู่ในไฟล์แต่ไม่ได้ถูกเรียกใช้งานจริงใน mounted flow\n7. หน้า export `keaw.vue` มี computed `cIsRoleAdmin` แต่ template ไม่ได้ใช้ซ่อน/แสดงปุ่มดาวน์โหลด จึงยังไม่ควรอธิบายว่า role admin ถูก enforce ใน UI จริง\n8. กลุ่ม `customer-requests` ใน page level เป็น shell เกือบทั้งหมด; ถ้าจะอธิบาย flow เชิงธุรกิจลึกกว่านี้ต้องเปิด component ภายในต่อ\n',

            '# Flow 28 — Requests & Others (คำขอ / อื่นๆ)\n\n> **แหล่งที่มาของข้อมูล (Source files)**\n> - `cms_frontend-develop/pages/cms/request-book-banks/index.vue`\n> - `cms_frontend-develop/pages/cms/manage-phone-number-requests/index.vue`\n> - `cms_frontend-develop/pages/cms/manage-provider/index.vue`\n\n---\n\n## Overview\n\nFlow นี้รวม 3 หน้าที่ไม่ได้อยู่ในกลุ่มหลักอื่นของระบบ:\n\n1. `request-book-banks` สำหรับจัดการบัญชีธนาคาร\n2. `manage-phone-number-requests` สำหรับจัดการคำร้องเบอร์โทรศัพท์\n3. `manage-provider` สำหรับจัดการผู้ขาย ผู้ให้เช่า และผู้ให้บริการ\n\nทั้ง 3 หน้านี้ไม่ได้เชื่อมกันเป็นลำดับเดียวแบบ flow ธุรกิจเดียว แต่ถูกรวมไว้ในหมวดเดียวกันเพื่อเก็บเอกสารของหน้าที่มีขนาดเล็กหรือเฉพาะทาง\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| จัดการบัญชีธนาคาร | `request-book-banks/index.vue` |\n| จัดการคำร้องเบอร์โทรศัพท์ | `manage-phone-number-requests/index.vue` |\n| จัดการผู้ขาย/ผู้ให้เช่า/ผู้ให้บริการ | `manage-provider/index.vue` |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| User | เปิดดูรายการ สลับ tab ค้นหา กรอง และเปิด modal |\n| หน้าจัดการบัญชีธนาคาร | สลับแสดงข้อมูล 2 กลุ่มผ่าน tabs |\n| หน้าจัดการคำร้องเบอร์โทรศัพท์ | ดูรายการคำร้อง กรอง และเปิด modal approve/edit |\n| หน้าจัดการผู้ให้บริการ | ดูรายการ ค้นหา เพิ่มจากชาวไร่ เพิ่มทั่วไป และพาไปแก้ไขข้อมูลลูกค้า |\n| BFF/CMS APIs | ส่งข้อมูล list และรับคำสั่งสร้างรายการในหน้าที่เกี่ยวข้อง |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| รายการบัญชีธนาคาร | ข้อมูลในหน้า request-book-banks |\n| รายการคำร้องเบอร์โทรศัพท์ | คำร้องอนุมัติเบอร์ เปลี่ยนเบอร์ หรือยกเลิกเบอร์ |\n| รายการผู้ให้บริการ | ข้อมูลผู้ขาย ผู้ให้เช่า และผู้ให้บริการ |\n| modal actions | การ approve, edit, add from farmer, หรือ add ทั่วไป |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["เปิดหน้าจัดการบัญชีธนาคาร"] --> B["สลับดูข้อมูลตาม tab"]\n    C["เปิดหน้าจัดการคำร้องเบอร์โทรศัพท์"] --> D["กรองคำร้องและเปิด modal ดำเนินการ"]\n    E["เปิดหน้าจัดการผู้ให้บริการ"] --> F["ค้นหา เพิ่มรายการ หรือเปิดไปแก้ไขข้อมูลลูกค้า"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `request-book-banks/index.vue` | สลับแสดงรายการบัญชีธนาคารกับคำร้องเปิดบัญชี | เป็น shell page ที่ delegate ไป child components |\n| `manage-phone-number-requests/index.vue` | ดูรายการคำร้องเบอร์โทรศัพท์ กรอง และเปิด modal ดำเนินการ | มี 2 tabs หลัก และ role-based edit action |\n| `manage-provider/index.vue` | ดูรายการผู้ขาย/ผู้ให้เช่า/ผู้ให้บริการ และเพิ่มรายการ | มีทั้งเพิ่มจากชาวไร่และเพิ่มทั่วไป |\n\n---\n\n## Per-Page Details\n\n### 28-A: จัดการบัญชีธนาคาร\n\n#### Purpose\n\nใช้สลับดูข้อมูลระหว่างรายการบัญชีธนาคารและคำร้องเปิดบัญชีผ่าน tabs\n\n#### Main Steps\n\n1. เปิดหน้าจัดการบัญชีธนาคาร\n2. แสดง tab เริ่มต้น\n3. ผู้ใช้สลับ tab เพื่อดูข้อมูลอีกชุดหนึ่ง\n4. หน้า parent render component ตาม tab ที่เลือก\n\n#### Result\n\n- ผู้ใช้สามารถสลับดูข้อมูล 2 กลุ่มในหน้าเดียวได้\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor User\n    participant Page as request-book-banks/index.vue\n\n    User->>Page: เปิดหน้า\n    Page-->>User: แสดง 2 tabs\n    User->>Page: คลิกเปลี่ยน tab\n    Page->>Page: update selectedTab\n    Page-->>User: render component ตาม tab\n```\n\n### 28-B: จัดการคำร้องเบอร์โทรศัพท์\n\n#### Purpose\n\nใช้ดูรายการคำร้องเบอร์โทรศัพท์ กรองข้อมูล และเปิด modal เพื่อ approve หรือ edit ข้อมูลคำร้อง\n\n#### Main Steps\n\n1. เปิดหน้าจัดการคำร้องเบอร์โทรศัพท์\n2. โหลดรายการคำร้องตาม tab เริ่มต้น\n3. สลับ tab ระหว่างคำร้องอนุมัติเบอร์และคำร้องเปลี่ยน/ยกเลิกเบอร์\n4. กรองตามสถานะ extension area หรือค้นหา\n5. เปิด modal approve เมื่อกด approve icon\n6. เปิด modal edit เมื่อผู้ใช้มีสิทธิ์ admin/developer\n\n#### Decision Points\n\n| กรณี | ผลลัพธ์ |\n|---|---|\n| เปลี่ยน tab | โหลดข้อมูลใหม่และปรับ columns |\n| เปลี่ยน filter หรือค้นหา | โหลดรายการใหม่ |\n| คลิก approve | โหลด detail แบบย่อแล้วเปิด approve modal |\n| คลิก edit และมีสิทธิ์ | โหลด detail แบบย่อแล้วเปิด upload modal |\n\n#### Result\n\n- ได้รายการคำร้องตามเงื่อนไขที่เลือก\n- ผู้ใช้สามารถเปิด modal เพื่อดำเนินการกับคำร้องได้\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor User\n    participant Page as manage-phone-number-requests/index.vue\n    participant BFF as apiBffDataVerifyPhoneNumber\n\n    User->>Page: เปิดหน้า\n    Page->>BFF: โหลดรายการคำร้องตาม tab เริ่มต้น\n    BFF-->>Page: request list\n    Page-->>User: แสดง tabs + ตาราง + filters\n\n    alt เปลี่ยน tab หรือ filter\n        User->>Page: เปลี่ยน tab / filter / search\n        Page->>BFF: reloadData()\n        BFF-->>Page: ผลลัพธ์ใหม่\n    end\n\n    alt Approve\n        User->>Page: คลิก approve\n        Page->>BFF: โหลด detail แบบย่อ\n        BFF-->>Page: detail data\n        Page-->>User: เปิด approve modal\n    else Edit\n        User->>Page: คลิก edit\n        Page->>BFF: โหลด detail แบบย่อ\n        BFF-->>Page: detail data\n        Page-->>User: เปิด edit modal\n    end\n```\n\n### 28-C: จัดการผู้ขาย/ผู้ให้เช่า/ผู้ให้บริการ\n\n#### Purpose\n\nใช้ดูรายการผู้ให้บริการ ค้นหา เพิ่มรายการจากชาวไร่ เพิ่มทั่วไป และพาไปแก้ไขข้อมูลลูกค้า\n\n#### Main Steps\n\n1. เปิดหน้าจัดการผู้ให้บริการ\n2. โหลดรายการที่ `ownerType = "2"`\n3. ค้นหารายการที่ต้องการ\n4. เพิ่มรายการจากชาวไร่ผ่าน modal เลือกชาวไร่\n5. เพิ่มรายการทั่วไปผ่าน form modal\n6. เปิดไปแก้ไขข้อมูลลูกค้าเมื่อกด pencil icon\n\n#### Decision Points\n\n| กรณี | ผลลัพธ์ |\n|---|---|\n| ค้นหา | reload list |\n| เพิ่มจากชาวไร่ | เปิด modal เลือกชาวไร่ และสร้างรายการใหม่ |\n| เพิ่มทั่วไป | เปิด form modal |\n| คลิกแก้ไข | พาไปหน้า Customer Management |\n\n#### Result\n\n- ได้รายการผู้ให้บริการตามคำค้นหา\n- ผู้ใช้สามารถเพิ่มรายการจาก 2 วิธี และเชื่อมไปหน้าแก้ไขข้อมูลลูกค้าได้\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor User\n    participant Page as manage-provider/index.vue\n    participant BFF as GET /bff-service/variety-and-land-owners\n    participant CMS as POST /cms-service/variety-and-land-owners\n    participant CustomerPage as /cms/customers/{customerCode}\n\n    User->>Page: เปิดหน้า\n    Page->>BFF: โหลดรายการ ownerType=2\n    BFF-->>Page: provider list\n    Page-->>User: แสดงตาราง\n\n    alt ค้นหา\n        User->>Page: พิมพ์ค้นหา\n        Page->>BFF: reloadData()\n        BFF-->>Page: ผลลัพธ์ใหม่\n    else เพิ่มจากชาวไร่\n        User->>Page: คลิกเพิ่มจากชาวไร่\n        Page-->>User: เปิด modal เลือกชาวไร่\n        User->>Page: ยืนยันรายการ\n        Page->>CMS: สร้าง provider จากข้อมูลชาวไร่\n        CMS-->>Page: success\n        Page->>BFF: reloadData()\n    else เพิ่มทั่วไป\n        User->>Page: คลิกเพิ่ม\n        Page-->>User: เปิด form modal\n    else แก้ไข\n        User->>Page: คลิก pencil icon\n        Page->>CustomerPage: navigate ไปหน้า Customer Management\n    end\n```\n\n---\n\n## Exceptions / Edge Cases\n\n### request-book-banks\n\n- หน้า parent ไม่มี API call ตามเอกสารเดิม\n- เป็น shell page ที่ delegate งานจริงไป child components\n\n### manage-phone-number-requests\n\n- tab `cancelPhoneNumber` ไม่แสดงเป็น tab แยก แต่รวมอยู่ใน filter ของ `changePhoneNumber`\n- ปุ่ม edit แสดงเฉพาะ admin หรือ developer\n- บาง extension area filter จะแสดงเฉพาะบางเงื่อนไขของผู้ใช้\n\n### manage-provider\n\n- `ownerType = "2"` เป็นค่าคงที่ของหน้านี้\n- การแก้ไขไม่ได้เปิด form ใน flow นี้ แต่พาไปหน้า Customer Management (Flow 04)\n- การแสดงชื่อรองรับทั้งบุคคลธรรมดาและนิติบุคคล\n\n---\n\n## Technical Reference\n\n### API Endpoints\n\n| Action | Method | Path |\n|---|---|---|\n| List phone number requests | GET | `apiBffDataVerifyPhoneNumber` |\n| Get phone request brief detail | GET | `apiBffDataVerifyPhoneNumber/{id}/less` |\n| List providers | GET | `/bff-service/variety-and-land-owners` |\n| Create provider from farmer | POST | `/cms-service/variety-and-land-owners` |\n\n### request-book-banks Tabs\n\n| Tab | Component |\n|---|---|\n| `bookBank` | `RequestBookBanksTableBookBank` |\n| `requestBookBank` | `RequestBookBanksTableRequestBookBank` |\n\n### manage-phone-number-requests Tabs\n\n| Tab | filter createType | ชื่อ |\n|---|---|---|\n| `approvePhoneNumber` | `[approvePhoneNumber]` | อนุมัติเบอร์โทร |\n| `changePhoneNumber` | `[changePhoneNumber, cancelPhoneNumber]` | เปลี่ยน/ยกเลิกเบอร์โทร |\n\n### manage-phone-number-requests Columns\n\n| Field | ความหมาย |\n|---|---|\n| `documentNumber` | รหัสอ้างอิง |\n| `customerCode` | รหัสสมาชิก |\n| `fullName` | ชื่อ-นามสกุล |\n| `createType` | ประเภทคำร้อง |\n| `phoneNumberOld` | เบอร์เดิม |\n| `phoneNumber` | เบอร์ที่ยืนยันหรือเบอร์ใหม่ |\n| `operator` | ผู้ทำรายการและวันที่ |\n| `statusVerify` | สถานะคำร้อง |\n\n### manage-provider Fields\n\n| Field | ความหมาย |\n|---|---|\n| `quotaNumber` | เลขโควตา |\n| `fullName/companyName` | ชื่อที่ใช้แสดงตาม personType |\n| `phone` | เบอร์โทรศัพท์ |\n| `isActive` | สถานะ |\n\n---\n\n## Known Gaps\n\n- Flow นี้รวมหลายหน้าที่ไม่ได้เชื่อมกันโดยตรง จึงควรระวังไม่ตีความเป็น flow ธุรกิจเดียว\n- `request-book-banks` ในเอกสารเดิมอธิบายได้เพียงระดับ shell page เพราะงานจริงถูก delegate ไป child components\n- `manage-provider` และ `manage-phone-number-requests` มี modal/component ภายในที่เอกสารเดิมอ้างถึง แต่ source files ที่แนบมาใน flow นี้ยังไม่ลงลึกถึง implementation ภายใน modal เหล่านั้น\n',

      const CAT_LABELS = {
