<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KBS Cane Solution — Flow Docs</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7/dist/fuse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Sarabun:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f3f4f6;
        --bg2: #e5e7eb;
        --surface: #ffffff;
        --surface2: #f9fafb;
        --surface3: #e5e7eb;
        --border: rgba(15, 23, 42, 0.1);
        --accent: #0f766e;
        --accent2: #1d4ed8;
        --text: #111827;
        --text2: #374151;
        --text3: #6b7280;
        --code-bg: #19263a;
        --code-text: #d9e7f6;
        --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.05);
        --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.06);
        --radius: 12px;
        --sidebar: 300px;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: "IBM Plex Sans Thai", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ─── HEADER ─── */
      .header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        height: 56px;
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 20px;
        gap: 16px;
        box-shadow: var(--shadow-sm);
      }
      .logo {
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
        font-family: "Sarabun", sans-serif;
        letter-spacing: -0.3px;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .logo-badge {
        background: linear-gradient(135deg, #0f766e, #2563eb);
        color: #fff;
        font-size: 10px;
        font-weight: 700;
        padding: 2px 7px;
        border-radius: 20px;
        letter-spacing: 1px;
      }
      .search-wrap {
        flex: 1;
        max-width: 480px;
        position: relative;
      }
      .search-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text3);
        pointer-events: none;
      }
      #search {
        width: 100%;
        padding: 8px 12px 8px 38px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        font-size: 14px;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      #search:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
      }
      #search::placeholder {
        color: var(--text3);
      }
      .header-right {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-left: auto;
      }
      .count-badge {
        font-size: 12px;
        color: var(--text3);
        white-space: nowrap;
      }
      .kbd {
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text2);
        font-size: 11px;
        padding: 2px 6px;
        border-radius: 4px;
        font-family: monospace;
      }

      /* ─── LAYOUT ─── */
      .app {
        display: flex;
        margin-top: 56px;
        height: calc(100vh - 56px);
      }

      /* ─── SIDEBAR ─── */
      .sidebar {
        width: var(--sidebar);
        min-width: var(--sidebar);
        background: var(--surface);
        border-right: 1px solid var(--border);
        overflow-y: auto;
        overflow-x: hidden;
        padding: 12px 0;
        scroll-behavior: smooth;
      }
      .sidebar::-webkit-scrollbar {
        width: 4px;
      }
      .sidebar::-webkit-scrollbar-track {
        background: transparent;
      }
      .sidebar::-webkit-scrollbar-thumb {
        background: var(--surface3);
        border-radius: 4px;
      }

      .cat-group {
        margin-bottom: 4px;
      }
      .cat-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1.2px;
        color: var(--text3);
        text-transform: uppercase;
        padding: 10px 16px 4px;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 7px 16px;
        cursor: pointer;
        transition:
          background 0.15s,
          color 0.15s,
          transform 0.15s;
        border-left: 3px solid transparent;
        font-size: 13px;
        color: var(--text2);
        text-decoration: none;
      }
      .nav-item:hover {
        background: rgba(15, 118, 110, 0.06);
        color: var(--text);
      }
      .nav-item.active {
        background: rgba(15, 118, 110, 0.1);
        border-left-color: var(--accent);
        color: var(--text);
      }
      .nav-num {
        font-size: 10px;
        font-weight: 700;
        width: 22px;
        height: 22px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        opacity: 0.85;
      }
      .nav-title {
        flex: 1;
        line-height: 1.3;
      }
      .nav-item.hidden {
        display: none;
      }

      /* ─── CONTENT ─── */
      .content {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 32px 40px;
        background: transparent;
      }
      .content::-webkit-scrollbar {
        width: 6px;
      }
      .content::-webkit-scrollbar-thumb {
        background: var(--surface3);
        border-radius: 4px;
      }

      /* Welcome screen */
      .welcome {
        max-width: 640px;
        margin: 60px auto;
        text-align: center;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 42px 36px;
        box-shadow: var(--shadow-md);
      }
      .welcome-icon {
        font-size: 64px;
        margin-bottom: 20px;
      }
      .welcome h1 {
        font-size: 28px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 12px;
      }
      .welcome p {
        color: var(--text2);
        line-height: 1.7;
        font-size: 15px;
      }
      .stats-row {
        display: flex;
        justify-content: center;
        gap: 24px;
        margin-top: 32px;
        flex-wrap: wrap;
      }
      .stat {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px 24px;
        text-align: center;
        min-width: 110px;
        box-shadow: var(--shadow-sm);
      }
      .stat-num {
        font-size: 28px;
        font-weight: 700;
        color: var(--accent);
      }
      .stat-label {
        font-size: 12px;
        color: var(--text3);
        margin-top: 4px;
      }

      /* Search results overlay */
      .search-results {
        display: none;
        max-width: 760px;
        margin: 0 auto;
      }
      .search-results.active {
        display: block;
      }
      .search-result-item {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px 20px;
        margin-bottom: 10px;
        cursor: pointer;
        transition:
          border-color 0.15s,
          background 0.15s;
        box-shadow: var(--shadow-sm);
      }
      .search-result-item:hover {
        border-color: var(--accent);
        background: var(--surface2);
      }
      .sr-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 6px;
      }
      .sr-num {
        font-size: 10px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 20px;
        color: #fff;
      }
      .sr-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
      }
      .sr-snippet {
        font-size: 13px;
        color: var(--text2);
        line-height: 1.6;
        overflow: hidden;
        text-overflow: ellipsis;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }
      .sr-snippet mark {
        background: rgba(56, 189, 248, 0.25);
        color: var(--accent);
        border-radius: 2px;
        padding: 0 2px;
      }
      .search-header {
        font-size: 12px;
        color: var(--text3);
        margin-bottom: 14px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--border);
      }
      .no-results {
        text-align: center;
        padding: 60px 0;
        color: var(--text3);
        font-size: 15px;
      }

      /* ─── DOC VIEW ─── */
      .doc-view {
        display: none;
        width: 100%;
        max-width: none;
      }
      .doc-view.active {
        display: block;
      }

      .doc-header {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        margin-bottom: 28px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border);
      }
      .doc-num-badge {
        font-size: 11px;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 20px;
        color: #fff;
        white-space: nowrap;
        margin-top: 4px;
      }
      .doc-info h1 {
        font-size: 22px;
        font-weight: 700;
        line-height: 1.3;
      }
      .doc-meta {
        font-size: 12px;
        color: var(--text3);
        margin-top: 6px;
      }

      /* Back btn */
      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: var(--text2);
        cursor: pointer;
        padding: 6px 12px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--surface);
        margin-bottom: 20px;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .back-btn:hover {
        background: var(--surface2);
        color: var(--text);
      }

      /* ─── MARKDOWN STYLES ─── */
      .md-body {
        line-height: 1.9;
        font-size: 15.5px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 32px 34px;
        box-shadow: var(--shadow-md);
      }
      .md-body h1 {
        font-size: 22px;
        font-weight: 700;
        margin: 32px 0 12px;
        color: var(--text);
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
        font-family: "Sarabun", sans-serif;
      }
      .md-body h2 {
        font-size: 18px;
        font-weight: 700;
        margin: 28px 0 10px;
        color: var(--accent2);
        font-family: "Sarabun", sans-serif;
      }
      .md-body h3 {
        font-size: 16px;
        font-weight: 600;
        margin: 22px 0 8px;
        color: var(--accent);
      }
      .md-body h4 {
        font-size: 14px;
        font-weight: 600;
        margin: 18px 0 6px;
        color: var(--text2);
      }
      .md-body p {
        margin: 10px 0;
        color: var(--text);
      }
      .md-body a {
        color: var(--accent2);
        text-decoration: none;
      }
      .md-body a:hover {
        text-decoration: underline;
      }
      .md-body strong {
        color: var(--text);
        font-weight: 600;
      }
      .md-body em {
        color: var(--text2);
        font-style: italic;
      }
      .md-body ul,
      .md-body ol {
        margin: 10px 0;
        padding-left: 24px;
        color: var(--text);
      }
      .md-body li {
        margin: 4px 0;
      }
      .md-body hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 24px 0;
      }
      .md-body blockquote {
        border-left: 4px solid var(--accent);
        margin: 14px 0;
        padding: 10px 16px;
        background: rgba(15, 118, 110, 0.06);
        border-radius: 0 6px 6px 0;
      }
      .md-body blockquote p {
        color: var(--text);
        margin: 0;
      }
      .md-body code {
        background: rgba(15, 118, 110, 0.08);
        color: #115e59;
        font-family: "IBM Plex Mono", monospace;
        font-size: 13px;
        padding: 2px 6px;
        border-radius: 4px;
        border: 1px solid var(--border);
      }
      .md-body pre {
        background: var(--code-bg);
        border: 1px solid rgba(25, 38, 58, 0.35);
        border-radius: var(--radius);
        padding: 16px 20px;
        overflow-x: auto;
        margin: 14px 0;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }
      .md-body pre code {
        background: none;
        border: none;
        padding: 0;
        color: var(--code-text);
        font-size: 13px;
        line-height: 1.7;
      }

      /* TABLES */
      .md-body table {
        width: 100%;
        border-collapse: collapse;
        margin: 16px 0;
        font-size: 13px;
      }
      .md-body th {
        background: #f3f4f6;
        color: var(--text);
        font-weight: 600;
        text-align: left;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        border-top: 1px solid var(--border);
        white-space: nowrap;
      }
      .md-body th:first-child {
        border-left: 1px solid var(--border);
        border-radius: 6px 0 0 0;
      }
      .md-body th:last-child {
        border-right: 1px solid var(--border);
        border-radius: 0 6px 0 0;
      }
      .md-body td {
        padding: 9px 14px;
        color: var(--text);
        border-bottom: 1px solid rgba(74, 57, 39, 0.08);
        vertical-align: top;
        line-height: 1.5;
      }
      .md-body tr:hover td {
        background: rgba(15, 118, 110, 0.04);
      }

      /* MERMAID */
      .mermaid-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0;
        margin: 20px 0;
        overflow: hidden;
        position: relative;
        box-shadow: var(--shadow-sm);
      }
      .mermaid-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 14px;
        border-bottom: 1px solid var(--border);
        background: var(--surface2);
        border-radius: var(--radius) var(--radius) 0 0;
      }
      .mermaid-toolbar-label {
        font-size: 11px;
        color: var(--text3);
        letter-spacing: 0.5px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .mermaid-toolbar-label svg {
        opacity: 0.5;
      }
      .mermaid-controls {
        display: flex;
        gap: 4px;
      }
      .mermaid-btn {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text2);
        font-size: 13px;
        font-weight: 600;
        width: 28px;
        height: 28px;
        border-radius: 6px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.15s,
          color 0.15s,
          border-color 0.15s;
        user-select: none;
      }
      .mermaid-btn:hover {
        background: var(--surface2);
        color: var(--accent);
        border-color: var(--accent);
      }
      .mermaid-btn.expand-btn {
        width: auto;
        padding: 0 10px;
        font-size: 11px;
        letter-spacing: 0.3px;
      }
      .mermaid-canvas {
        width: 100%;
        min-height: 220px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px;
        cursor: grab;
        overflow: hidden;
        position: relative;
        background: var(--surface);
      }
      .mermaid-canvas:active {
        cursor: grabbing;
      }
      .mermaid-canvas .mermaid {
        width: 100%;
        max-width: 100%;
      }
      .mermaid-canvas svg {
        width: 100% !important;
        height: auto !important;
        max-width: 100%;
        display: block;
      }
      /* Fullscreen modal */
      .mermaid-modal {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(17, 24, 39, 0.35);
        backdrop-filter: blur(8px);
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .mermaid-modal.open {
        display: flex;
      }
      .mermaid-modal-inner {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        width: 100%;
        max-width: 1200px;
        max-height: 90vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 30px 70px rgba(17, 24, 39, 0.18);
      }
      .mermaid-modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--surface2);
        flex-shrink: 0;
      }
      .mermaid-modal-title {
        font-size: 13px;
        color: var(--text2);
        font-weight: 600;
      }
      .mermaid-modal-body {
        flex: 1;
        overflow: auto;
        padding: 20px;
        display: flex;
        align-items: flex-start;
        justify-content: center;
      }
      .mermaid-modal-body svg {
        width: auto !important;
        height: auto !important;
        max-width: 100%;
        max-height: 100%;
      }
      .mermaid-close {
        background: none;
        border: none;
        color: var(--text2);
        font-size: 20px;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 6px;
        transition: background 0.15s;
      }
      .mermaid-close:hover {
        background: var(--surface2);
        color: var(--text);
      }

      /* CATEGORY pills */
      .cat-pill {
        display: inline-block;
        font-size: 11px;
        font-weight: 600;
        padding: 3px 9px;
        border-radius: 20px;
        letter-spacing: 0.4px;
      }

      /* LOADING */
      .loading-spinner {
        display: none;
        text-align: center;
        padding: 40px;
        color: var(--text3);
      }
      .spinner {
        width: 28px;
        height: 28px;
        border: 2px solid var(--surface3);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 10px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* SCROLLBAR for content */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .sidebar {
          display: none;
        }
        .content {
          padding: 20px 16px;
        }
        .welcome,
        .md-body {
          padding: 24px 20px;
        }
      }
    </style>
  </head>
  <body>
    <!-- HEADER -->
    <header class="header">
      <div class="logo">
        <span class="logo-badge">KBS</span>
        Flow Docs
      </div>
      <div class="search-wrap">
        <svg
          class="search-icon"
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg>
        <input
          type="search"
          id="search"
          placeholder="ค้นหา flow, API, component..."
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <div class="header-right">
        <span class="count-badge" id="doc-count"></span>
        <kbd class="kbd">⌘K</kbd>
      </div>
    </header>

    <!-- LAYOUT -->
    <div class="app">
      <!-- SIDEBAR -->
      <nav class="sidebar" id="sidebar"></nav>

      <!-- MAIN CONTENT -->
      <main class="content" id="content">
        <div id="welcome-screen" class="welcome">
          <div class="welcome-icon">📚</div>
          <h1>KBS Cane Solution</h1>
          <p>
            Flow Documentation — ค้นหาและเรียกดู flow ทั้ง 28 flows ของระบบ
            พร้อม Mermaid diagrams
          </p>
          <div class="stats-row" id="stats-row"></div>
        </div>

        <div id="search-results" class="search-results"></div>
        <div id="loading" class="loading-spinner">
          <div class="spinner"></div>
          <div>กำลังโหลด...</div>
        </div>
        <div id="doc-view" class="doc-view"></div>
      </main>
    </div>

    <script>
      // ─── DATA ───────────────────────────────────────────────
      const DOCS = [
        {
          id: "flow-01-login-auth",
          num: 1,
          title: "Flow 01 — Login / Authentication",
          cat: "auth",
          color: "#0ea5e9",
          content:
            '# Flow 01 — Login / Authentication\n\n> **แหล่งที่มาของข้อมูล (Source files)**\n> - `main_frontend-develop/pages/login.vue`\n> - `main_frontend-develop/pages/verify-otp.vue`\n> - `main_frontend-develop/pages/index.vue`\n> - `main_frontend-develop/components/layout/Navbar.vue`\n> - `main_frontend-develop/middleware/switching-service.global.ts`\n> - `cms_frontend-develop/middleware/switching-service.global.ts`\n> - `main_service-develop/src/modules/auth/controllers/login.controller.ts`\n> - `main_service-develop/src/modules/auth/service/login.service.ts`\n> - `main_service-develop/src/modules/auth/errors/login.error.ts`\n> - `main_service-develop/src/modules/me/controllers/get.controller.ts`\n> - `main_frontend-develop/composables/https/use-app-fetch.ts`\n> - `main_frontend-develop/composables/api-main.ts`\n> - `main_frontend-develop/composables/api-bff.ts`\n> - `main_frontend-develop/composables/api-master.ts`\n> - `main_frontend-develop/composables/constants/storage.ts`\n\n---\n\n## Overview\n\nFlow นี้เป็นการ login ด้วย OTP ผ่านเบอร์โทรศัพท์เท่านั้น ไม่มี password\n\nภาพรวมของ flow มี 3 ช่วง:\n\n1. ผู้ใช้กรอกเบอร์โทรศัพท์เพื่อขอ OTP\n2. ผู้ใช้กรอก OTP เพื่อยืนยันตัวตนและรับ token\n3. ระบบโหลดข้อมูลผู้ใช้และสิทธิ์ ก่อนพาไป CMS\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| หน้า login | `login.vue` |\n| หน้ายืนยัน OTP | `verify-otp.vue` |\n| การเตรียมข้อมูลหลัง login | `index.vue`, `Navbar.vue` |\n| การป้องกันการเข้าถึงหน้า | `switching-service.global.ts` |\n| Backend ที่เกี่ยวข้อง | `/login/otp`, `/login/otp/verify`, `/bff-service/me`, `/masters/cog_permission_extensions` |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| User | กรอกเบอร์โทร, กรอก OTP, ออกจากระบบ |\n| หน้า login | รับเบอร์โทรและส่งคำขอ OTP |\n| หน้ายืนยัน OTP | รับ OTP, ตรวจสอบเวลาที่เหลือ, และยืนยันตัวตน |\n| Auth API | สร้าง OTP และตรวจสอบ OTP |\n| ตัวโหลดข้อมูลหลัง login | โหลดข้อมูลผู้ใช้และสิทธิ์หลัง login |\n| หน้าเริ่มต้นของระบบ | รอข้อมูลผู้ใช้พร้อมแล้วค่อยพาไป CMS |\n| Middleware | ตรวจ token และสิทธิ์การเข้าถึงหน้า |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| OTP request | ข้อมูลอ้างอิงสำหรับตรวจสอบ OTP |\n| token | token สำหรับ session หลัง verify สำเร็จ |\n| ข้อมูลผู้ใช้ปัจจุบัน | profile ผู้ใช้ที่ระบบโหลดหลัง login |\n| ข้อมูลสิทธิ์การใช้งาน | permission extensions ที่ใช้ตรวจสิทธิ์ |\n| พาไป CMS | ปลายทางหลัง login สำเร็จ |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["ผู้ใช้กรอกเบอร์โทร"] --> B["ระบบขอ OTP"]\n    B --> C{"พบผู้ใช้และใช้งานได้?"}\n    C -->|ไม่ใช่| D["แจ้งปัญหาและหยุด flow"]\n    C -->|ใช่| E["สร้าง OTP และข้อมูลอ้างอิง"]\n    E --> F["พาไปหน้ายืนยัน OTP"]\n    F --> G["ผู้ใช้กรอก OTP"]\n    G --> H{"OTP ถูกต้องและยังไม่หมดเวลา?"}\n    H -->|ไม่ใช่| I["แจ้งปัญหาหรือให้ขอ OTP ใหม่"]\n    H -->|ใช่| J["ออก token"]\n    J --> K["โหลดข้อมูลผู้ใช้และสิทธิ์"]\n    K --> L["พาไป CMS dashboard"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `login.vue` | รับเบอร์โทรเพื่อขอ OTP | ตรวจรูปแบบเบอร์ก่อนส่งคำขอ |\n| `verify-otp.vue` | รับ OTP และยืนยันตัวตน | มีเวลาจำกัดในการกรอก OTP |\n| `index.vue` | รอข้อมูลผู้ใช้หลัง login | พาไป CMS เมื่อข้อมูลพร้อม |\n| `Navbar.vue` | โหลดข้อมูลผู้ใช้และสิทธิ์ | เก็บข้อมูลไว้ใช้ต่อในฝั่ง frontend |\n| `switching-service.global.ts` | route guard | ตรวจว่าเข้าหน้าได้หรือไม่ |\n\n---\n\n## Per-Page Details\n\n### 01-A: `login.vue`\n\n#### Purpose\n\nรับเบอร์โทรศัพท์จากผู้ใช้ แล้วส่งคำขอ OTP ไป backend\n\n#### Main Steps\n\n1. ผู้ใช้กรอกเบอร์โทร 10 หลักที่ขึ้นต้นด้วย `0`\n2. หน้า login ตรวจรูปแบบข้อมูลก่อนส่งคำขอ\n3. ระบบส่งคำขอ OTP ไป backend\n4. ถ้าสำเร็จ ระบบเก็บข้อมูลอ้างอิง OTP ชั่วคราว\n5. ระบบพาไปหน้ายืนยัน OTP\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| ไม่พบเบอร์ | แจ้งว่าไม่พบผู้ใช้จากเบอร์นี้ |\n| ผู้ใช้ inactive | แจ้งว่าไม่สามารถใช้งานบัญชีนี้ได้ |\n| พบผู้ใช้และ active | สร้าง OTP และข้อมูลอ้างอิงสำหรับการยืนยัน |\n| environment อนุญาตให้ส่ง OTP จริง | ส่ง SMS OTP |\n\n#### Result\n\n- ได้ข้อมูลอ้างอิง OTP สำหรับใช้ในขั้นยืนยัน\n- มีข้อมูล OTP ชั่วคราวในฝั่ง frontend\n- ไปหน้ายืนยัน OTP\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor User\n    participant LoginPage as login.vue\n    participant AuthAPI as POST /login/otp\n    participant SmsService as SMS Service\n\n    User->>LoginPage: กรอกเบอร์โทร\n    LoginPage->>LoginPage: ตรวจรูปแบบข้อมูล\n    LoginPage->>AuthAPI: ขอ OTP\n\n    alt ไม่พบผู้ใช้\n        AuthAPI-->>LoginPage: แจ้งว่าไม่พบผู้ใช้\n        LoginPage-->>User: แสดงข้อความแจ้งเตือน\n    else ผู้ใช้ inactive\n        AuthAPI-->>LoginPage: แจ้งว่าไม่สามารถใช้งานบัญชีนี้ได้\n        LoginPage-->>User: แสดงข้อความแจ้งเตือน\n    else ขอ OTP สำเร็จ\n        AuthAPI->>AuthAPI: สร้าง OTP และข้อมูลอ้างอิง\n        opt ส่ง OTP จริง\n            AuthAPI->>SmsService: ส่ง OTP ทาง SMS\n        end\n        AuthAPI-->>LoginPage: ส่งข้อมูลอ้างอิง OTP กลับมา\n        LoginPage->>LoginPage: เก็บ otpData ชั่วคราว\n        LoginPage-->>User: พาไปหน้ายืนยัน OTP\n    end\n```\n\n### 01-B: `verify-otp.vue`\n\n#### Purpose\n\nให้ผู้ใช้กรอก OTP, จัดการเวลาหมดอายุ, และรับ token เมื่อ verify สำเร็จ\n\n#### Main Steps\n\n1. หน้ายืนยันแสดงรหัสอ้างอิง\n2. เริ่มนับเวลาสำหรับการกรอก OTP และเก็บเวลาเริ่มไว้\n3. ผู้ใช้กรอก OTP 6 หลักแล้วกด ยืนยัน\n4. ระบบส่งคำขอยืนยัน OTP ไป backend\n5. ถ้า verify สำเร็จ ระบบเก็บ token สำหรับ session\n6. ลบข้อมูล OTP ชั่วคราว\n7. พากลับไปหน้าเริ่มต้นของระบบ\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| countdown หมดเวลา | แจ้งเตือนและให้ส่ง OTP ใหม่ |\n| ไม่พบคำขอ OTP | แจ้งว่าไม่พบรายการอ้างอิงสำหรับยืนยัน |\n| verify สำเร็จไปแล้ว | แจ้งว่า OTP นี้ถูกใช้ไปแล้ว |\n| โดน suspend | ระงับการ verify ชั่วคราว |\n| ref ไม่ตรง | แจ้งว่าข้อมูลอ้างอิงไม่ถูกต้อง |\n| otp ไม่ตรง | แจ้งว่า OTP ไม่ถูกต้อง |\n| otp ถูกต้อง หรือเข้าเงื่อนไข bypass ที่ระบบรองรับ | ออก token สำหรับ session |\n\n#### Result\n\n- ได้ token สำหรับการใช้งานต่อ\n- ลบข้อมูล OTP ที่ใช้ชั่วคราว\n- กลับไปหน้า index เพื่อ bootstrap session\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor User\n    participant VerifyPage as verify-otp.vue\n    participant AuthAPI as POST /login/otp/verify\n    participant OtpAPI as POST /login/otp\n\n    VerifyPage->>VerifyPage: แสดง ref และเริ่ม countdown\n    alt OTP หมดเวลาก่อนยืนยัน\n        VerifyPage-->>User: แจ้งให้ขอ OTP ใหม่\n        User->>VerifyPage: กดขอ OTP อีกครั้ง\n        VerifyPage->>OtpAPI: ขอ OTP ใหม่ด้วยเบอร์เดิม\n        OtpAPI-->>VerifyPage: ส่งข้อมูลอ้างอิงชุดใหม่\n        VerifyPage->>VerifyPage: reset countdown\n    else ผู้ใช้กรอก OTP เพื่อยืนยัน\n        User->>VerifyPage: กรอก OTP และกดยืนยัน\n        VerifyPage->>AuthAPI: ส่ง OTP เพื่อตรวจสอบ\n        alt OTP ไม่ถูกต้อง หรือใช้ไม่ได้\n        AuthAPI-->>VerifyPage: แจ้งปัญหาการ verify\n        VerifyPage-->>User: แสดงข้อความแจ้งเตือน\n        else Verify สำเร็จ\n        AuthAPI-->>VerifyPage: ส่ง token กลับมา\n        VerifyPage->>VerifyPage: เก็บ token และลบข้อมูล OTP ชั่วคราว\n        VerifyPage-->>User: พากลับไปหน้าเริ่มต้นของระบบ\n        end\n    end\n```\n\n### 01-C: `index.vue` + `Navbar.vue`\n\n#### Purpose\n\nโหลดข้อมูลผู้ใช้หลัง login แล้วพาไป CMS\n\n#### Main Steps\n\n1. หน้าเริ่มต้นรอข้อมูลผู้ใช้หลัง login\n2. `Navbar.vue` โหลดข้อมูลผู้ใช้ด้วย token ที่ได้มา\n3. `Navbar.vue` โหลดข้อมูลสิทธิ์เพิ่มเติม\n4. ฝั่ง frontend เก็บข้อมูลผู้ใช้และสิทธิ์ไว้ใช้งานต่อ\n5. เมื่อข้อมูลพร้อม ระบบพาไป `{urlCms}/dashboard`\n\n#### Result\n\n- ได้ข้อมูลผู้ใช้ปัจจุบัน\n- ได้ข้อมูลสิทธิ์การใช้งาน\n- เข้าสู่ CMS frontend\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    participant IndexPage as index.vue\n    participant Navbar as Navbar.vue\n    participant MeAPI as GET /bff-service/me\n    participant PermissionAPI as GET /masters/cog_permission_extensions\n    participant CMS as CMS dashboard\n\n    IndexPage->>IndexPage: รอข้อมูลผู้ใช้หลัง login\n    Navbar->>MeAPI: ขอข้อมูลผู้ใช้ด้วย token\n    MeAPI-->>Navbar: ส่ง profile กลับมา\n    Navbar->>PermissionAPI: ขอข้อมูลสิทธิ์เพิ่มเติม\n    PermissionAPI-->>Navbar: ส่ง permission กลับมา\n    Navbar->>Navbar: เก็บข้อมูลผู้ใช้และสิทธิ์\n    IndexPage->>CMS: พาไป CMS dashboard เมื่อข้อมูลพร้อม\n```\n\n### 01-D: Middleware / Session Handling\n\n#### Route Guard\n\n1. ถ้ายังไม่มี token ให้เข้าได้เฉพาะหน้าที่เกี่ยวกับการ login\n2. ถ้าไม่มี token และพยายามเข้าหน้าอื่น ให้พาไป `/login`\n3. ถ้ามี token แล้วและอยู่ในหน้า login ให้พาไป CMS\n4. ถ้าเป็นหน้าภายในระบบ ให้ตรวจสิทธิ์ก่อนเข้าใช้งาน\n\n#### Token Expiry / Logout\n\n| กรณี | สิ่งที่ระบบทำ |\n|---|---|\n| token expired | ลบข้อมูล session ที่เกี่ยวข้อง แล้วพาไป `/login` |\n| logout | ลบข้อมูล session ที่เกี่ยวข้อง แล้วพากลับไป `/login` |\n\n---\n\n## Exceptions / Edge Cases\n\n### การจำกัดจำนวนครั้งที่กรอก OTP ผิด\n\n- นับจำนวนครั้งที่กรอก OTP หรือ ref ไม่ตรงทุกครั้ง\n- เมื่อกรอกผิดถึงเกณฑ์ ระบบจะ suspend การ verify และคืน `LIMIT_VERIFY`\n- ถ้า `body.otp === \'999888\'` จะ bypass การตรวจสอบปกติ\n\n### เวลาหมดอายุของ OTP\n\n- Timeout hardcoded `60` วินาที\n- update ทุก `1000ms`\n- เวลาเริ่มเก็บใน `otpCountdownData.start`\n- reload หน้าแล้วยังอ่านเวลาเดิมต่อได้จาก cookie\n\n### การส่ง OTP จริง\n\n- ถ้า `IS_NOT_SEND_OTP` ไม่ถูก set ระบบจะส่ง SMS OTP\n\n### การตรวจสิทธิ์เข้าเมนู\n\n`canAccessMenu` มีเงื่อนไขสำคัญ:\n\n1. role `developer` ผ่านทันที\n2. route ใน `generalRoutes` ผ่านได้\n3. route อื่นต้อง match กับ `roles.permissions` ตาม `menu.path`\n\n---\n\n## Technical Reference\n\n### Validation (login.vue)\n\n| Field | Rule |\n|---|---|\n| เบอร์โทร | ต้องมีค่า, ขั้นต่ำ 10 ตัว, ขึ้นต้นด้วย `0`, ตรง regex `/^\\d{0,10}$/i` |\n\n### API Endpoints\n\n| Action | Method | Path | Service |\n|---|---|---|---|\n| ขอ OTP | POST | `/login/otp` | main_service |\n| ขอ OTP (ไม่ส่ง SMS) | POST | `/login/no-otp` | main_service |\n| Verify OTP | POST | `/login/otp/verify` | main_service |\n| Get Profile | GET | `/bff-service/me` | main_service |\n| Get Permissions | GET | `/masters/cog_permission_extensions` | main_service |\n\n### API Base URL\n\n- Auth APIs (`/login/otp`, `/login/no-otp`, `/login/otp/verify`) ใช้ `config.public.apiAuth`\n- API อื่นใช้ `config.public.apiBase` พร้อม `Authorization: Bearer {token}`\n\n### Storage Mapping\n\n| ข้อมูลที่ใช้ใน flow | Storage key |\n|---|---|\n| token สำหรับ session | `token` |\n| ข้อมูลอ้างอิง OTP ชั่วคราว | `otpData` |\n| เวลาที่ใช้สำหรับ countdown OTP | `otpCountdownData` |\n| ข้อมูลผู้ใช้ปัจจุบัน | `globalProfile` |\n| ข้อมูลสิทธิ์การใช้งาน | `globalPermissionExtensions` |\n\n### JWT Payload (signJWT)\n\n```json\n{\n  "iss": "iss",\n  "id": "<user._id>",\n  "code": "<user.userCode หรือ user._id>",\n  "random": "<6 chars random>",\n  "name": "<firstName lastName>",\n  "isCentrallyAffiliated": "<boolean>",\n  "roles": "<comma-separated role codes>",\n  "responsibleAreas": "<comma-separated extensionAreasId>"\n}\n```\n\n### Error Codes\n\n| Error Class | HTTP Status | message code |\n|---|---|---|\n| NotFoundUserPhone | 401 | `NOT_FOUND_USER_PHONE` |\n| NotFoundOtpRequest | 401 | `NOT_FOUND_OTP_REQUEST` |\n| OtpNotMatch | 401 | `OTP_NOT_MATCH` |\n| RefNotMatch | 401 | `REF_NOT_MATCH` |\n| AlreadyVerifyOtp | 403 | `ALREADY_VERIFY` |\n| LimitVerifyOtp | 403 | `LIMIT_VERIFY` |\n| InactiveUser | 409 | `INACTIVE_USER` |\n\n### Cookie & Storage ที่ใช้\n\n| Key | ประเภท | ข้อมูล | ลบเมื่อ |\n|---|---|---|---|\n| `token` | Cookie | JWT token | logout / token expired |\n| `otpData` | Cookie | `{ _id, ref, phone }` | verify สำเร็จ |\n| `otpCountdownData` | Cookie | `{ start, isTimeout }` | verify สำเร็จ / เริ่มนับใหม่ |\n| `globalContractProfile` | Cookie | contract profile | logout / token expired |\n| `globalProfile` | localStorage | user profile JSON | logout / token expired |\n| `globalEnableMockLogin` | localStorage | `"false"` | logout / token expired |\n| `globalPermissionExtensions` | localStorage | permissions list JSON | ไม่ได้ลบใน logout (ลบแค่ใน token expired) |\n\n---\n\n## Known Gaps\n\n- Timeout `60` วินาทีเป็นค่า hardcoded และมี comment `[TODO] System config`\n',

            '# Flow 02 — User Management\n\n> **แหล่งที่มาของข้อมูล (Source files)**\n> - `main_frontend-develop/pages/user-management/users/index.vue`\n> - `main_frontend-develop/pages/user-management/roles/index.vue`\n> - `main_frontend-develop/pages/user-management/menus/index.vue`\n> - `main_frontend-develop/pages/user-management/imports/employees.vue`\n> - `main_frontend-develop/components/user-management/role-relate-menus.vue`\n> - `main_frontend-develop/components/user-management/role-relate-users.vue`\n> - `main_frontend-develop/composables/datas/user-management.ts`\n> - `main_frontend-develop/composables/api-main.ts`\n> - `main_frontend-develop/composables/api-bff.ts`\n> - `main_service-develop/src/modules/users/controllers/crud.controller.ts`\n> - `main_service-develop/src/modules/users/controllers/role.controller.ts`\n> - `main_service-develop/src/modules/role/controllers/crud.controller.ts`\n> - `main_service-develop/src/modules/role/controllers/menu.controller.ts`\n> - `main_service-develop/src/modules/menu/controllers/crud.controller.ts`\n> - `main_service-develop/src/modules/employee/controllers/migrate.controller.ts`\n> - `main_service-develop/src/const/errors/user.ts`\n> - `main_service-develop/src/const/errors/role.ts`\n> - `main_service-develop/src/const/errors/menu.ts`\n\n---\n\n## Overview\n\nFlow นี้ใช้จัดการข้อมูลผู้ใช้และสิทธิ์การใช้งานของระบบ โดยมี 3 ส่วนหลักที่เชื่อมกัน:\n\n- **Menu** = โครงสร้างเมนูของระบบ\n- **Role** = กลุ่มสิทธิ์ที่อ้างอิงเมนู\n- **User** = บัญชีผู้ใช้ที่ถูกผูกกับ role\n\nใน flow เดียวกันนี้ยังครอบคลุมการเลือกพนักงานมาสร้าง user และการ import พนักงานจากไฟล์ด้วย\n\nความสัมพันธ์หลักของข้อมูลคือ:\n\n```text\nMenu -> Role -> User\n```\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| จัดการผู้ใช้ | `users/index.vue` |\n| เพิ่มผู้ใช้จากพนักงาน | modal ใน `users/index.vue` |\n| นำเข้าพนักงานจากไฟล์ | `imports/employees.vue` |\n| จัดการ role | `roles/index.vue` |\n| กำหนดสิทธิ์เมนูให้ role | `role-relate-menus.vue` |\n| จัดการเมนู | `menus/index.vue` |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| Admin | จัดการผู้ใช้, role, menu และ import พนักงาน |\n| หน้าจัดการผู้ใช้ | ดูรายการผู้ใช้, ค้นหา, filter, เพิ่ม, แก้ไข |\n| หน้าจัดการ role | ดูรายการ role, เพิ่ม, แก้ไข, ลบ |\n| หน้าตั้งค่าเมนูให้ role | กำหนดสิทธิ์การเข้าถึงเมนู |\n| หน้าจัดการเมนู | ดูรายการเมนู, เพิ่ม, แก้ไข, ลบ |\n| หน้านำเข้าพนักงาน | นำเข้าพนักงานจากไฟล์ |\n| Backend APIs | เก็บข้อมูล users, roles, menus, employees |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| User | บัญชีผู้ใช้ที่พร้อมใช้งาน |\n| Role | กลุ่มสิทธิ์ของผู้ใช้ |\n| Menu | โครงสร้างเมนูในระบบ |\n| Permissions | สิทธิ์ของ role ต่อแต่ละเมนู |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["สร้างหรือแก้ไขเมนู"] --> B["สร้างหรือแก้ไข role"]\n    B --> C["กำหนดสิทธิ์เมนูให้ role"]\n    C --> D["สร้างหรือแก้ไข user"]\n    E["เลือกพนักงานมาสร้าง user"] --> D\n    F["นำเข้าพนักงานจากไฟล์"] --> G["ได้ข้อมูลพนักงานในระบบ"]\n    D --> H["ผู้ใช้พร้อมสิทธิ์ตาม role"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `users/index.vue` | ดูรายการผู้ใช้, ค้นหา, filter, เพิ่ม, แก้ไข | มีทั้งเพิ่มเองและเพิ่มจากพนักงาน |\n| `users/index.vue` modalSelectEmployee | เพิ่มผู้ใช้จากรายชื่อพนักงาน | สร้าง user หลายรายการได้ |\n| `imports/employees.vue` | นำเข้าพนักงานจาก CSV/XLSX | preview ก่อนบันทึก |\n| `roles/index.vue` | ดู, เพิ่ม, แก้ไข, ลบ role | ตั้งค่าเมนูต่อจากหน้านี้ |\n| `role-relate-menus.vue` | ตั้งสิทธิ์เมนูให้ role | ก่อนบันทึกจะกรองเมนูที่ไม่มีสิทธิ์อ่านออก |\n| `menus/index.vue` | ดู, เพิ่ม, แก้ไข, ลบเมนู | ใช้เป็นฐานสำหรับกำหนดสิทธิ์ของ role |\n\n---\n\n## Per-Page Details\n\n### 02-A: Users List / Add / Edit\n\n#### Purpose\n\nใช้จัดการบัญชีผู้ใช้โดยตรง ทั้งการดูรายการ, ค้นหา, filter, เพิ่ม และแก้ไข\n\n#### Main Steps\n\n1. โหลดรายการผู้ใช้เพื่อแสดงในตาราง\n2. โหลดรายการ role เพื่อใช้กรองหรือเลือกตอนสร้าง user\n3. ค้นหาชื่อ-นามสกุลหรือ position\n4. filter ตาม role ได้\n5. เพิ่มผู้ใช้ใหม่ผ่าน modal\n6. แก้ไขผู้ใช้เดิมผ่าน modal\n\n#### Key API\n\n| Action | Method | Path |\n|---|---|---|\n| List users | GET | `/bff-service/users` |\n| Get user by id | GET | `/bff-service/users/{id}` |\n| Create user | POST | `/main-service/users` |\n| Update user | PUT | `/main-service/users/{id}` |\n| Update user roles | PUT | `/main-service/users/{id}/roles` |\n| List roles | GET | `/main-service/roles` |\n| Upload avatar | POST | `/main-service/attachments` |\n\n#### Decision Points\n\n| กรณี | ผลลัพธ์ |\n|---|---|\n| เพิ่ม user แล้วอีเมลซ้ำ | แจ้งว่าอีเมลซ้ำ |\n| เพิ่ม user แล้วเบอร์ซ้ำ | แจ้งว่าเบอร์โทรซ้ำ |\n| เพิ่ม user สำเร็จและมี avatar | อัปโหลด avatar ก่อนค่อยผูก role |\n| เพิ่มหรือแก้ไขสำเร็จ | แสดงข้อความสำเร็จและโหลดข้อมูลใหม่ |\n\n#### Result\n\n- ได้ user ใหม่หรือ user ที่อัปเดตแล้ว\n- role ของ user ถูกตั้งผ่านขั้นตอนแยก\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Admin\n    participant UsersPage as users/index.vue\n    participant UsersBFF as GET /bff-service/users\n    participant UsersAPI as /main-service/users\n    participant RolesAPI as GET /main-service/roles\n    participant AttachmentAPI as POST /main-service/attachments\n\n    UsersPage->>UsersBFF: โหลดรายการผู้ใช้\n    UsersBFF-->>UsersPage: user list\n    UsersPage->>RolesAPI: โหลดรายการ role\n    RolesAPI-->>UsersPage: role list\n\n    alt เพิ่มหรือแก้ไข user\n        Admin->>UsersPage: เปิด modal และกรอกข้อมูล\n        alt เพิ่ม user\n            UsersPage->>UsersAPI: สร้าง user\n        else แก้ไข user\n            UsersPage->>UsersAPI: อัปเดต user\n        end\n        opt มี avatar\n            UsersPage->>AttachmentAPI: อัปโหลด avatar\n        end\n        UsersPage->>UsersAPI: อัปเดต roles ของ user\n        UsersAPI-->>UsersPage: บันทึกสำเร็จ\n        UsersPage-->>Admin: แสดงข้อความสำเร็จและ reload data\n    end\n```\n\n### 02-B: เพิ่มผู้ใช้จากรายชื่อพนักงาน\n\n#### Purpose\n\nช่วยสร้าง user หลายรายการจาก employee list โดยไม่ต้องกรอกเองทีละคน\n\n#### Main Steps\n\n1. เปิด modal เลือกพนักงาน\n2. โหลด employee list\n3. เลือกพนักงานทีละคนหรือเลือกทั้งหมด\n4. เลือก role และกำหนดสังกัดส่วนกลาง\n5. บันทึกแบบสร้าง user ทีละ employee\n6. หลังสร้าง user แต่ละคนแล้วค่อยผูก role ต่อ\n\n#### Key API\n\n| Action | Method | Path |\n|---|---|---|\n| List employees | GET | `/main-service/employees` |\n| Create user | POST | `/main-service/users` |\n| Update user roles | PUT | `/main-service/users/{id}/roles` |\n\n#### Result\n\n| กรณี | ผลลัพธ์ |\n|---|---|\n| มีรายการ duplicate | แสดงรายชื่อที่ล้มเหลว |\n| ทุกรายการสำเร็จ | แสดงข้อความสำเร็จและ reload data |\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Admin\n    participant SelectEmployeeModal as modalSelectEmployee\n    participant EmployeeAPI as GET /main-service/employees\n    participant UsersAPI as /main-service/users\n\n    Admin->>SelectEmployeeModal: เปิด modal เลือกพนักงาน\n    SelectEmployeeModal->>EmployeeAPI: โหลด employee list\n    EmployeeAPI-->>SelectEmployeeModal: employee list\n    Admin->>SelectEmployeeModal: เลือกพนักงาน, role, และสังกัด\n\n    loop ทีละ employee ที่ถูกเลือก\n        SelectEmployeeModal->>UsersAPI: สร้าง user\n        SelectEmployeeModal->>UsersAPI: อัปเดต roles ของ user\n    end\n\n    alt มีบางรายการซ้ำหรือสร้างไม่สำเร็จ\n        SelectEmployeeModal-->>Admin: แสดงรายการที่ล้มเหลว\n    else สำเร็จทั้งหมด\n        SelectEmployeeModal-->>Admin: แสดงข้อความสำเร็จและ reload data\n    end\n```\n\n### 02-C: นำเข้าพนักงานจากไฟล์ CSV/XLSX\n\n#### Purpose\n\nใช้ import ข้อมูลพนักงานเข้าสู่ระบบจากไฟล์\n\n#### Main Steps\n\n1. เปิดหน้า import\n2. เลือกไฟล์ `.csv` หรือ `.xlsx`\n3. หน้า import แสดง preview ในตาราง\n4. กดบันทึกเพื่อส่งไฟล์ไป backend\n\n#### Key API\n\n| Action | Method | Path |\n|---|---|---|\n| Import employees CSV | POST | `/main-service/employees/migrate/by/csv` |\n\n#### Result\n\n| กรณี | ผลลัพธ์ |\n|---|---|\n| สำเร็จ | ล้างไฟล์ที่เลือกไว้ |\n| ล้มเหลว | แสดงข้อความ error |\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Admin\n    participant ImportPage as imports/employees.vue\n    participant ImportAPI as POST /main-service/employees/migrate/by/csv\n\n    Admin->>ImportPage: เลือกไฟล์ CSV/XLSX\n    ImportPage->>ImportPage: แสดง preview ในตาราง\n    Admin->>ImportPage: กดยืนยันการ import\n    ImportPage->>ImportAPI: ส่งไฟล์ไป backend\n\n    alt import สำเร็จ\n        ImportAPI-->>ImportPage: success\n        ImportPage->>ImportPage: ล้างไฟล์ที่เลือกไว้\n        ImportPage-->>Admin: แสดงข้อความสำเร็จ\n    else import ไม่สำเร็จ\n        ImportAPI-->>ImportPage: error\n        ImportPage-->>Admin: แสดงข้อความ error\n    end\n```\n\n### 02-D: Roles List / Add / Edit / Delete\n\n#### Purpose\n\nใช้จัดการกลุ่มผู้ใช้งาน และเป็นจุดตั้งต้นก่อนกำหนดสิทธิ์เมนู\n\n#### Main Steps\n\n1. โหลดรายการ roles พร้อม pagination\n2. โหลด users เพื่อใช้ดูจำนวน user ต่อ role\n3. เพิ่ม role ใหม่ด้วยชื่อและรายละเอียด\n4. แก้ไข role เดิมได้ แต่ code แก้ไม่ได้\n5. ลบ role ได้ผ่าน confirm dialog\n\n#### Key API\n\n| Action | Method | Path |\n|---|---|---|\n| List roles | GET | `/main-service/roles` |\n| Create role | POST | `/main-service/roles` |\n| Update role | PUT | `/main-service/roles/{id}` |\n| Delete role | DELETE | `/main-service/roles/{id}` |\n| List users | GET | `/main-service/users` |\n\n#### Decision Points\n\n| กรณี | ผลลัพธ์ |\n|---|---|\n| code ซ้ำตอน add | แจ้งว่า code ซ้ำ |\n| update role จากหน้า edit | permissions เดิมถูก reset |\n| delete role สำเร็จ | ระบบลบ role นี้ออกจาก users ที่ผูกอยู่ |\n\n#### Result\n\n- ได้ role ที่เพิ่มหรือแก้ไขแล้ว\n- การตั้งสิทธิ์เมนูต้องทำผ่านหน้าแยกต่างหาก\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Admin\n    participant RolesPage as roles/index.vue\n    participant RoleAPI as /main-service/roles\n    participant UsersAPI as GET /main-service/users\n\n    RolesPage->>RoleAPI: โหลดรายการ roles\n    RoleAPI-->>RolesPage: role list\n    RolesPage->>UsersAPI: โหลด users\n    UsersAPI-->>RolesPage: user list\n\n    alt เพิ่ม role\n        Admin->>RolesPage: กรอกข้อมูล role ใหม่\n        RolesPage->>RoleAPI: สร้าง role\n    else แก้ไข role\n        Admin->>RolesPage: แก้ไขข้อมูล role\n        RolesPage->>RoleAPI: อัปเดต role\n    else ลบ role\n        Admin->>RolesPage: ยืนยันการลบ\n        RolesPage->>RoleAPI: ลบ role\n    end\n\n    RoleAPI-->>RolesPage: success\n    RolesPage-->>Admin: แสดงข้อความสำเร็จและ reload data\n```\n\n### 02-E: กำหนดสิทธิ์เมนูให้ Role\n\n#### Purpose\n\nใช้กำหนดว่า role หนึ่งเข้าถึงเมนูใดได้ และเข้าถึงได้ระดับไหน\n\n#### Main Steps\n\n1. เปิด modal ตั้งค่าเมนูจากหน้า roles\n2. โหลดรายการเมนูที่ active\n3. เตรียมเมนูหลักและเมนูย่อยให้อยู่ในรูปที่เลือกสิทธิ์ได้\n4. โหลด role พร้อมสิทธิ์ปัจจุบัน\n5. แปลงสิทธิ์เดิมให้แสดงในหน้าตั้งค่า\n6. Admin เลือกเมนูหรือสิทธิ์ย่อย\n7. ก่อน save ระบบกรองเมนูที่ไม่มีสิทธิ์อ่านออก\n8. ส่ง permissions กลับไป update role\n\n#### Key API\n\n| Action | Method | Path |\n|---|---|---|\n| List menus | GET | `/main-service/menus` |\n| Get role by id | GET | `/main-service/roles/{id}` |\n| Update role menus/permissions | PUT | `/main-service/roles/{id}` |\n\n#### Permission Rules\n\n| Rule | ความหมาย |\n|---|---|\n| เลือก row | ให้สิทธิ์ทุกประเภทของเมนูนั้น |\n| ยกเลิก row | ลบสิทธิ์ทุกประเภทของเมนูนั้น |\n| เมนูไม่มี `read` | ถูกตัดออกก่อน save |\n\n#### Result\n\n- permissions ของ role ถูกอัปเดต\n- success แล้วปิด modal และ refresh ข้อมูล\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Admin\n    participant RelateMenus as role-relate-menus.vue\n    participant MenuAPI as GET /main-service/menus\n    participant RoleAPI as /main-service/roles/{id}\n\n    Admin->>RelateMenus: เปิด modal ตั้งค่าเมนู\n    RelateMenus->>MenuAPI: โหลดเมนูที่ active\n    MenuAPI-->>RelateMenus: menu list\n    RelateMenus->>RoleAPI: โหลด role และ permissions ปัจจุบัน\n    RoleAPI-->>RelateMenus: role detail\n    RelateMenus->>RelateMenus: map permissions เป็นรายการที่แก้ไขได้\n    Admin->>RelateMenus: เลือกเมนูหรือสิทธิ์ย่อย\n    RelateMenus->>RelateMenus: กรองเมนูที่ไม่มี read ออกก่อน save\n    RelateMenus->>RoleAPI: อัปเดต permissions ของ role\n    RoleAPI-->>RelateMenus: success\n    RelateMenus-->>Admin: ปิด modal และ refresh ข้อมูล\n```\n\n### 02-F: Menus List / Add / Edit / Delete\n\n#### Purpose\n\nใช้จัดการโครงสร้างเมนูหลักของระบบ\n\n#### Main Steps\n\n1. โหลดเมนูทั้งหมดจาก backend\n2. backend คืนเฉพาะเมนูหลัก\n3. หน้าเมนูแปลงข้อมูลให้แสดงแบบ tree\n4. เพิ่มเมนูใหม่ได้ โดยกำหนด `parentId` ได้\n5. แก้ไขชื่อ, icon, sort, isActive, parentId ได้\n6. ลบเมนูได้ผ่าน confirm\n\n#### Key API\n\n| Action | Method | Path |\n|---|---|---|\n| List menus | GET | `/main-service/menus` |\n| Create menu | POST | `/main-service/menus` |\n| Update menu | PUT | `/main-service/menus/{id}` |\n| Delete menu | DELETE | `/main-service/menus/{id}` |\n\n#### Decision Points\n\n| กรณี | ผลลัพธ์ |\n|---|---|\n| code ซ้ำตอน add | แจ้งว่า code ซ้ำ |\n| edit menu | path และ code แก้ไม่ได้ |\n| delete menu สำเร็จ | ระบบลบ menu นี้ออกจาก roles ทุกอัน |\n\n#### Result\n\n- ได้โครงสร้างเมนู 2 ระดับ: root menu -> children\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Admin\n    participant MenusPage as menus/index.vue\n    participant MenuAPI as /main-service/menus\n\n    MenusPage->>MenuAPI: โหลดรายการเมนู\n    MenuAPI-->>MenusPage: root menus\n    MenusPage->>MenusPage: แปลง childrens เป็น children\n\n    alt เพิ่มเมนู\n        Admin->>MenusPage: กรอกข้อมูลเมนูใหม่\n        MenusPage->>MenuAPI: สร้าง menu\n    else แก้ไขเมนู\n        Admin->>MenusPage: แก้ไขข้อมูลเมนู\n        MenusPage->>MenuAPI: อัปเดต menu\n    else ลบเมนู\n        Admin->>MenusPage: ยืนยันการลบ\n        MenusPage->>MenuAPI: ลบ menu\n    end\n\n    MenuAPI-->>MenusPage: success\n    MenusPage-->>Admin: แสดงข้อความสำเร็จและ reload data\n```\n\n---\n\n## Exceptions / Edge Cases\n\n### พฤติกรรมฝั่ง User\n\n| รายการ | พฤติกรรม |\n|---|---|\n| `roles` | เป็น array แต่ใช้ 1 ตัว (`[roleId]`) |\n| `userCode` | auto-generate prefix `UKBS` + 8 หลัก |\n| `isActive` | ตอน add ตั้ง `1` เสมอ, ตอน edit ตั้งได้ |\n| `isCentrallyAffiliated` | ส่งเป็น `1` หรือ `0` จาก boolean |\n| `createdBy` | เพิ่มเองใช้ `created`, เพิ่มจากพนักงานใช้ `bplus` |\n\n### พฤติกรรมฝั่ง Role\n\n- `code` สร้างจาก `Date.getTime().toString()`\n- update role จากหน้า edit จะ reset `permissions` เป็น `[]`\n- การตั้งสิทธิ์เมนูต้องทำผ่านหน้า “ตั้งค่าเมนู” เท่านั้น\n\n### พฤติกรรมฝั่ง Menu\n\n- backend list menus แบบ root only (`parentId = null`)\n- edit menu แล้ว `path` และ `code` ห้ามแก้\n- delete menu แล้ว backend จะลบออกจาก roles ด้วย\n\n---\n\n## Technical Reference\n\n### API Endpoints\n\n| Action | Method | Path |\n|---|---|---|\n| List users | GET | `/bff-service/users` |\n| Get user by id | GET | `/bff-service/users/{id}` |\n| Create user | POST | `/main-service/users` |\n| Update user | PUT | `/main-service/users/{id}` |\n| Update user roles | PUT | `/main-service/users/{id}/roles` |\n| Update user status | PUT | `/main-service/users/{id}/status` |\n| List employees | GET | `/main-service/employees` |\n| Import employees CSV | POST | `/main-service/employees/migrate/by/csv` |\n| List roles | GET | `/main-service/roles` |\n| Create role | POST | `/main-service/roles` |\n| Update role | PUT | `/main-service/roles/{id}` |\n| Delete role | DELETE | `/main-service/roles/{id}` |\n| Update role menus/permissions | PUT | `/main-service/roles/{id}` |\n| List menus | GET | `/main-service/menus` |\n| Create menu | POST | `/main-service/menus` |\n| Update menu | PUT | `/main-service/menus/{id}` |\n| Delete menu | DELETE | `/main-service/menus/{id}` |\n\n### User Fields ที่บันทึก\n\n| Field | หมายเหตุ |\n|---|---|\n| citizenId | เลขบัตรประชาชน |\n| email | เช็ค duplicate ถ้ามีค่า |\n| phoneNumber | เช็ค duplicate เสมอ |\n| roles | array แต่ใช้ 1 ตัว |\n| userCode | auto-generate |\n| isActive | add = `1`, edit เปลี่ยนได้ |\n| isCentrallyAffiliated | `1` หรือ `0` |\n| createdBy | `created` หรือ `bplus` |\n| agriculturalistCode | รหัสนักส่งเสริม |\n\n### Menu Permissions\n\n| Code | ชื่อ |\n|---|---|\n| `read` | อ่าน |\n| `add` | เพิ่ม |\n| `edit` | แก้ไข |\n| `delete` | ลบ |\n| `approve` | อนุมัติ |\n| `print` | พิมพ์ |\n| `export` | นำออก |\n\n### Logic การกรองสิทธิ์ก่อน Save\n\n1. กรองเฉพาะ permission ที่มี `permission = read` เป็น `filterHasRead`\n2. กรองสิทธิ์ทั้งหมดให้เหลือเฉพาะเมนูที่อยู่ใน `filterHasRead`\n\n### Error Codes\n\n| Error | HTTP | Message |\n|---|---|---|\n| User: อีเมลซ้ำ | 409 | `DUPLICATE_EMAIL` |\n| User: เบอร์ซ้ำ | 409 | `DUPLICATE_PHONE` |\n| Role: code ซ้ำ | 409 | `DUPLICATE_CODE` |\n| Menu: code ซ้ำ | 409 | `DUPLICATE_CODE` |\n\n### Card Reader Support (`users/index.vue`)\n\n- รองรับอ่านบัตรประชาชนผ่าน `handleDataFormCardReader`\n- ดึงข้อมูล: `prefixId`, `postcode`, `citizenId`, `firstName`, `lastName`, `birthDate`, `issueDate`, `expirationDate`\n- แปลงวันที่จากรูปแบบ TH `YYYYMMDD` เป็น EN `YYYY-MM-DD`\n\n---\n\n## Known Gaps\n\n- ไม่มี known gap ใหม่ที่ยืนยันได้จากเอกสารเดิมใน flow นี้\n',
