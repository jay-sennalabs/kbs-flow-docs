            '# Flow 20 — Cash & Payment\n\n## Source files\n\n### cms_frontend-develop\n\n- `pages/cms/order-cash-ferilizer/index.vue`\n- `pages/cms/order-cash-ferilizer/[id].vue`\n- `pages/cms/cash-fertilizer/index.vue`\n- `pages/cms/cash-contractor-invoice/index.vue`\n- `pages/cms/payment-contractor/index.vue`\n- `pages/cms/payment-management/expense-list/index.vue`\n- `pages/cms/payment-management/expense-list/detail/index.vue`\n- `components/cash-products/modal-approve-upload-slip.vue`\n- `components/cash-contractor/list-pay.vue`\n- `components/cash-products/upload-file-slip.vue`\n- `components/payment-management/header-expense-list.vue` — **NEW**: header component พร้อม filters (branch, payment method, date range)\n- `components/payment-management/dropdawn-table.vue` — **NEW**: collapsible table with child rows\n- `components/payment-management/modal-confirm.vue` — **NEW**\n- `components/payment-management/modal-history.vue` — **NEW**\n- `components/payment-management/modal-combine-items.vue` — **NEW**: merge vouchers\n- `components/payment-management/modal-edit-data.vue` — **NEW**: edit status/dates\n- `components/payment-management/modal-split-items.vue` — **NEW**: split into new ref\n- `components/payment-management/modal-approve.vue` — **NEW**\n\n### main_frontend-develop\n\n- `composables/api-bff.ts` — constants: `apiBffDataOrder`, `apiBffexportDataInspectionReceipts`\n- `composables/api-accounting-service.ts` — **NEW**: constants สำหรับ payment_preparation endpoints (get_all, get_detail, get_sub_detail, update_detail, split_detail, merge_detail, drop_down_*)\n\n### accounting_service-develop — **NEW**: ยืนยันจาก source code จริง\n\n- `src/payment_preparation/payment_preparation.controller.ts` — controller: get_all, get_detail, get_sub_detail, update_detail, split_detail, merge_detail, drop_down_*, create_batch_file\n- `src/payment_preparation/payment_preparation.service.ts` — service: PostgreSQL queries on payment_preparation + doc_payment_preparation tables\n- `src/payment_preparation/dto/` — DTOs: PaymentPreparationListDTO, GetDetailDTO, GetSubDetailDTO, EditDetailDTO, MergeDTO, GetDropDownMergeDTO, ReqBatchDTO\n- `src/cms-sync-data/cms-sync-data.controller.ts` — `syncDataManagePayment`: sync inspection receipts → payment_preparation table\n\n---\n\n## Overview\n\nFlow นี้รวมงาน 3 ก้อนที่อยู่ในโดเมน "เงินสด / การรับชำระ / การจ่ายเงิน" แต่ไม่ได้ต่อกันเป็นเส้นธุรกิจเดียวทั้งหมด:\n\n1. งานขายสินค้าเกษตรเงินสดและติดตามการชำระเงิน (`order-cash-ferilizer`, `cash-fertilizer`)\n2. งานออกใบกำกับภาษีให้ inspection receipt ที่เป็น `cashPayment` (`cash-contractor-invoice`)\n3. งานจัดการ batch payment ฝั่งบัญชี (`payment-management/expense-list/*`)\n\nนอกจากนี้ยังมี `payment-contractor` ซึ่งอยู่ในโดเมนรับชำระค่าบริการจักรกล แต่จาก source ปัจจุบันยังเป็นหน้าเลือก inspection receipt + เปิด modal ชำระเงิน มากกว่าจะเป็น flow ปิดงานสมบูรณ์แบบ end-to-end\n\nดังนั้นเอกสารนี้จะอธิบายเป็นชุดของ flow ที่เกี่ยวข้องกับ "รับเงินสด / เลือกวิธีชำระ / ส่งต่อเอกสาร / จัดการ batch payment" โดยแยกให้ชัดว่าอะไรคือ flow production หลัก และอะไรคือ partial implementation\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| ขายสินค้าเกษตรเงินสด | `cms/order-cash-ferilizer/*`, `cms/cash-fertilizer/index.vue` |\n| อนุมัติออกใบกำกับภาษี | `cms/cash-contractor-invoice/index.vue` |\n| รับชำระค่าบริการจักรกล | `cms/payment-contractor/index.vue` |\n| Batch payment management | `cms/payment-management/expense-list/index.vue`, `cms/payment-management/expense-list/detail/index.vue` |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| เจ้าหน้าที่ขาย/การเงิน | เปิดใบสั่งขายเงินสด, เลือกวิธีชำระ, ตรวจสลิป, และติดตามสถานะ |\n| เจ้าหน้าที่บัญชี | ออกใบกำกับภาษี, ดู batch payment, รวม/แยก/แก้ไขรายการจ่าย |\n| ชาวไร่ | เป็นผู้ซื้อสินค้าเงินสดและเป็นเจ้าของข้อมูลยืนยันตัวตน |\n| ระบบ Order / Credit Withdraw | สร้าง `credit withdraw`, `inspection receipt`, และ `order` สำหรับการขายเงินสด |\n| ระบบ QR Payment / Verify Identity | สร้าง QR code และบันทึก OTP verification ก่อนเลือกวิธีชำระ |\n| ระบบ Payment Preparation | ส่งรายการ batch payment และรายละเอียดรายการจ่ายให้หน้าบัญชี |\n| Modals | ใช้กับการเลือกชาวไร่, เลือกสินค้า, อนุมัติสลิป, เลือกรายการชำระ, รวม/แยก/แก้ไขรายการจ่าย |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| Cash order | ใบสั่งขายสินค้าเกษตรเงินสดที่ผูกกับ `credit withdraw` |\n| Payment selection | ผลการเลือกว่าจะจ่ายผ่าน `scan` หรือ `transfer` |\n| QR payment payload | ข้อมูล QR และ `ref1/ref2` สำหรับการชำระผ่าน QR |\n| Slip / product attachments | ไฟล์สลิปธนาคารและใบสำคัญรับปุ๋ยยาและอื่น ๆ |\n| Cash-payment invoice issuance | ชุด inspection receipts ที่ถูกออก invoice และเปลี่ยนเป็น `invoiceIssued` |\n| Payment batch worklist | รายการ batch payment และ sub-batch สำหรับติดตามสถานะการจ่าย |\n| Batch maintenance actions | ผลของการรวมรายการ, แยกรายการ, และแก้ไขข้อมูลใน payment batch |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["เจ้าหน้าที่เปิดหมวด Cash / Payment"] --> B["เลือกงานที่ต้องทำ"]\n\n    B --> C["เปิดรายการขายสินค้าเกษตรเงินสด"]\n    B --> D["เปิดหน้ายืนยันการชำระเงินสด"]\n    B --> E["เปิดหน้าอนุมัติออกใบกำกับภาษี"]\n    B --> F["เปิดหน้ารับชำระค่าบริการจักรกล"]\n    B --> G["เปิดรายการ Batch Payment"]\n\n    C --> C1["สร้าง order ใหม่ หรือเปิด order เดิม"]\n    C1 --> C2["เลือก scan / transfer"]\n    C2 --> C3["ยืนยันตัวตน + สร้าง QR หรือกำหนดธนาคาร"]\n    C3 --> C4["แนบสลิป / เอกสาร และรอการเงินตรวจสอบ"]\n\n    D --> D1["โหลด order สถานะ waitingVerify และไม่ใช่ scan"]\n    D1 --> D2["เปิด modal ตรวจสลิปและอนุมัติ"]\n\n    E --> E1["เลือก inspection receipt แบบ cashPayment"]\n    E1 --> E2["POST ออก invoice แบบ batch"]\n    E2 --> E3["PUT เปลี่ยนสถานะเป็น invoiceIssued ทีละรายการ"]\n\n    F --> F1["เลือก inspection receipt"]\n    F1 --> F2["เปิด modal เลือกรายการชำระเงิน"]\n\n    G --> G1["กรอง batch ตาม site / payment method / date / tab status"]\n    G1 --> G2["เปิด detail ของ batch หรือ sub-batch"]\n    G2 --> G3["รวมรายการ แยกรายการ หรือแก้ไขข้อมูลบางชุด"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `order-cash-ferilizer/index.vue` | รายการใบสั่งขายสินค้าเกษตรเงินสด | flow หลักของการค้นหา/สร้าง/เข้า detail |\n| `order-cash-ferilizer/[id].vue` | สร้างและติดตามใบสั่งขายเงินสด | flow หลักของการสร้าง order, เลือกวิธีชำระ, อัปโหลดเอกสาร |\n| `cash-fertilizer/index.vue` | ยืนยันการชำระเงินสด | ใช้กับ order ที่ `waitingVerify` และไม่ใช่ QR |\n| `cash-contractor-invoice/index.vue` | อนุมัติออกใบกำกับภาษี | ทำงานกับ inspection receipt แบบ `cashPayment` |\n| `payment-contractor/index.vue` | รับชำระค่าบริการจักรกลโรงงาน | partial page ที่พึ่ง modal ชำระเงิน |\n| `payment-management/expense-list/index.vue` | รายการ batch payment | หน้าหลักของการติดตามสถานะ batch |\n| `payment-management/expense-list/detail/index.vue` | รายละเอียด batch payment | มี logic รวม/แยก/แก้ไขข้อมูลจริงบางส่วน |\n\n---\n\n## Per-Page Details\n\n### 20-A: Cash Order List\n\nครอบคลุม:\n\n- `order-cash-ferilizer/index.vue`\n\n#### Purpose\n\nใช้เป็นหน้ารายการใบสั่งขายสินค้าเกษตรเงินสด, ใช้สร้าง order ใหม่, และใช้เปิด order เดิมเพื่อทำงานต่อ\n\n#### Main Steps\n\n1. เปิดหน้ารายการขายสินค้าเกษตรเงินสด\n2. ระบบโหลด order list จาก `apiBffDataOrder`\n3. ผู้ใช้ค้นหา, กรองสถานะ, กรองวันที่ซื้อ, และกรองช่องทางชำระ\n4. ผู้ใช้กด "สร้างใบสั่งขาย" เพื่อไปหน้า `add`\n5. ผู้ใช้กด pencil หรือ eye เพื่อเข้า detail ของ order\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| `status != sentToAccounting` | แสดง pencil เพื่อเข้าแก้ไข/ทำงานต่อ |\n| `status == sentToAccounting` | แสดง eye เพื่อเปิดดูอย่างเดียว |\n| เลือกสถานะ `pending` | ใช้ `not: { status: [ทุกสถานะที่ไม่ใช่ pending] }` แทนการส่ง `status: pending` ตรง ๆ |\n| เลือกสถานะจาก dropdown ค่า `ทั้งหมด` | ใน source ส่ง `status: \'\'` จึงควรยืนยันกับ backend ว่าหมายถึง all จริงหรือไม่ |\n\n#### Result\n\n- ได้ worklist ของ cash order\n- ใช้เป็นจุดเริ่มต้นไปยัง flow สร้าง order หรือจัดการ payment/document ต่อ\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as order-cash-ferilizer/index.vue\n    participant BFF as apiBffDataOrder\n\n    Staff->>Page: เปิดหน้า\n    Page->>BFF: GET orders + filters\n    BFF-->>Page: pagination list\n    Page-->>Staff: แสดงตาราง cash order\n\n    alt สร้างใหม่\n        Staff->>Page: กด "สร้างใบสั่งขาย"\n        Page->>Page: push /cms/order-cash-ferilizer/add\n    else เปิดรายการเดิม\n        Staff->>Page: กด pencil หรือ eye\n        Page->>Page: push /cms/order-cash-ferilizer/{id}\n    end\n```\n\n### 20-B: Cash Order Detail And Payment\n\nครอบคลุม:\n\n- `order-cash-ferilizer/[id].vue`\n\n#### Purpose\n\nเป็น flow หลักของการขายสินค้าเกษตรเงินสด ตั้งแต่เลือกชาวไร่และสินค้า, สร้าง `credit withdraw` และ `order`, เลือกวิธีชำระ, ยืนยันตัวตน, สร้าง QR, ไปจนถึงแนบสลิปและเอกสารประกอบ\n\n#### Main Steps\n\n1. ถ้า route เป็น `/add` ผู้ใช้เลือกชาวไร่ผ่าน modal และเลือกสินค้า\n2. ผู้ใช้กรอกจำนวนสินค้าแล้วกด "สรุปรายการสั่งซื้อ"\n3. ระบบสร้าง `credit withdraw` โดยตั้ง `creditTypeCode: cashPayment`\n4. ระบบสร้าง inspection receipts แบบ bulk จาก withdraw items\n5. ระบบสร้าง order แล้ว redirect ไปหน้า detail ของ order ที่เพิ่งสร้าง\n6. ในหน้า detail ผู้ใช้เลือกวิธีชำระ `scan` หรือ `transfer`\n7. ก่อน commit วิธีชำระ ระบบบังคับ verify identity ผ่าน OTP\n8. ถ้าเลือก `scan` ระบบสร้าง QR, update order ให้มี `paymentMethod = scan`, `qrPaymentCode`, `ref1`, `ref2`, แล้วเปลี่ยน status เป็น `pending`\n9. ถ้าเลือก `transfer` ระบบบันทึกธนาคารที่เลือก, update order ให้ `paymentMethod = transfer`, แล้วเปลี่ยน status เป็น `waitingPayslip`\n10. เมื่ออยู่ในสถานะที่ต้องแนบไฟล์ ผู้ใช้ upload สลิปและ/หรือใบสำคัญรับปุ๋ยยาและอื่น ๆ แล้วกดบันทึก\n11. ระบบ upload attachments ก่อน แล้วจึง PUT order ใหม่พร้อม status ถัดไป\n12. ถ้า order เริ่มต้นอยู่ใน `pending` หน้า detail จะ poll ทุก 5 วินาทีจน status เปลี่ยนเป็น `waitingDocument` หรือ `sentToAccounting`\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| route param = `add` | แสดงฟอร์มเลือกชาวไร่และสินค้า |\n| route param != `add` | โหลด order detail และ attachment เดิม |\n| เลือก `scan` | เรียก `apiQRPayment`, บันทึก QR ลง order, แล้วเปลี่ยน status เป็น `pending` |\n| เลือก `transfer` | บันทึก `paymentBankName`, เปลี่ยน status เป็น `waitingPayslip` |\n| `status = waitingPayslip` หรือ `waitingVerify` | บังคับมี `slip_bank` ก่อนบันทึก |\n| `status = waitingDocument` และ verify type = `signDocs` | บังคับมี `file_products` |\n| `status = pending` | disable input และเริ่ม polling ตรวจสถานะ |\n| `status = sentToAccounting` | disable input ทั้งหมดและเป็นโหมดดูข้อมูลเป็นหลัก |\n\n#### Result\n\n- ได้ cash order ที่เชื่อมกับการขายจริง\n- ได้หลักฐานวิธีชำระและไฟล์ประกอบ\n- หน้าเดียวครอบคลุมทั้ง create, payment selection, file upload, และ status follow-up\n\n#### Technical Diagrams\n\nสร้าง order เงินสด\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as order-cash-ferilizer/[id].vue\n    participant CreditAPI as apiDataCreditWithDraws\n    participant ReceiptAPI as apiDataInspectionReceipts/bulk\n    participant OrderAPI as apiDataOrders\n\n    Staff->>Page: เลือกชาวไร่ + เลือกสินค้า + กรอกจำนวน\n    Staff->>Page: กดสรุปรายการ\n    Page->>CreditAPI: POST credit withdraw (creditTypeCode=cashPayment)\n    CreditAPI-->>Page: creditWithdraw\n    Page->>ReceiptAPI: POST inspection receipts bulk\n    ReceiptAPI-->>Page: receipt results\n    Page->>OrderAPI: POST order\n    OrderAPI-->>Page: order data\n    Page->>Page: push ไป detail ของ order ที่สร้างแล้ว\n```\n\nเลือกวิธีชำระเงิน\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as order-cash-ferilizer/[id].vue\n    participant Verify as apiDataVerifyIdentities\n    participant QR as apiQRPayment\n    participant OrderAPI as apiDataOrders\n\n    Staff->>Page: เลือก scan หรือ transfer\n    Staff->>Page: กด "ชำระเงิน"\n    Page->>Page: เปิด modal verify identity\n    Staff->>Page: ยืนยัน OTP\n    Page->>Verify: POST verify identity\n\n    alt scan\n        Page->>QR: POST generate QR\n        QR-->>Page: qrcodeContent\n        Page->>OrderAPI: PUT order พร้อม paymentMethod=scan, qrPaymentCode, ref1/ref2\n        Page->>OrderAPI: PUT /status = pending\n    else transfer\n        Page->>OrderAPI: PUT order พร้อม paymentMethod=transfer, paymentBankName\n        Page->>OrderAPI: PUT /status = waitingPayslip\n    end\n```\n\nบันทึกสลิปและเอกสาร\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as order-cash-ferilizer/[id].vue\n    participant AttachAPI as apiDataAttachments\n    participant OrderAPI as apiDataOrders\n\n    Staff->>Page: เลือกไฟล์ slip_bank / file_products\n    Staff->>Page: กด "บันทึก"\n    Page->>Page: validate ตาม status ปัจจุบัน\n    Page->>AttachAPI: POST attachments\n    AttachAPI-->>Page: success\n    Page->>OrderAPI: PUT order พร้อม status ถัดไป\n    OrderAPI-->>Page: success\n    Page-->>Staff: แจ้งบันทึกสำเร็จและกลับ list\n```\n\n### 20-C: Cash Payment Verification\n\nครอบคลุม:\n\n- `cash-fertilizer/index.vue`\n\n#### Purpose\n\nใช้เป็นหน้าการเงินสำหรับตรวจรายการ cash order ที่รอการตรวจสอบ โดยเจาะเฉพาะ order สถานะ `waitingVerify` และตัดรายการ `scan` ออก เหลือรายการที่ต้องดูสลิป/เอกสารในสายโอนธนาคาร\n\n#### Main Steps\n\n1. เปิดหน้ายืนยันการชำระเงินสด\n2. ระบบโหลด order list ด้วย filter `status = waitingVerify`\n3. ระบบใส่เงื่อนไข `not.paymentMethod = scan`\n4. ผู้ใช้ค้นหาด้วย Enter หรือเลือก filter สถานะ\n5. ผู้ใช้กดปุ่ม eye เพื่อเปิด `CashProductsModalApproveUploadSlip`\n6. เมื่อ modal แจ้งว่ามีการเปลี่ยนแปลง หน้า reload list\n\n#### Result\n\n- ได้ worklist สำหรับทีมการเงินตรวจรายการโอนเงินสด\n- การ approve/check รายละเอียดจริงอยู่ใน modal component\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Finance\n    participant Page as cash-fertilizer/index.vue\n    participant BFF as apiBffDataOrder\n    participant Modal as CashProductsModalApproveUploadSlip\n\n    Finance->>Page: เปิดหน้า\n    Page->>BFF: GET orders status=waitingVerify and not paymentMethod=scan\n    BFF-->>Page: list\n    Finance->>Page: กด eye\n    Page->>Modal: showModal(order)\n    Modal-->>Page: on-change\n    Page->>BFF: reloadData()\n```\n\n### 20-D: Contractor Invoice Issuance\n\nครอบคลุม:\n\n- `cash-contractor-invoice/index.vue`\n\n#### Purpose\n\nใช้อนุมัติออกใบกำกับภาษีให้ inspection receipts ที่อยู่ในสถานะ `waitingInvoice` และมี `creditTypeCode = cashPayment`\n\n#### Main Steps\n\n1. เปิดหน้าอนุมัติออกใบกำกับภาษี\n2. ระบบโหลด inspection receipts ด้วย filter `waitingInvoice + cashPayment`\n3. ผู้ใช้ค้นหา, กรองวิธีชำระ, หรือกรองสถานะ\n4. ผู้ใช้เลือกหลายรายการจากตาราง\n5. ผู้ใช้กดปุ่มอนุมัติใบกำกับภาษี\n6. ระบบ POST ชุด `ids` ไปที่ endpoint ออก invoice\n7. ถ้า POST สำเร็จ ระบบ loop PUT เปลี่ยนสถานะแต่ละ receipt เป็น `invoiceIssued`\n8. ระบบล้าง selection และ reload list\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| ไม่มีรายการ selected | ปุ่มยังถูกกดได้ แต่ข้อความยืนยันจะแสดงจำนวน `0` |\n| POST batch invoice สำเร็จ | จึงจะเริ่ม loop PUT เปลี่ยน status ทีละรายการ |\n| POST batch invoice ไม่สำเร็จ | จะไม่เข้า loop PUT และจำนวนสำเร็จจะเป็น `0` |\n\n#### Result\n\n- ได้ชุด inspection receipts ที่ถูกออก invoice และขยับสถานะเป็น `invoiceIssued`\n- หน้าเดียวรองรับ batch approval จริง ไม่ใช่แค่ mock table\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Accounting\n    participant Page as cash-contractor-invoice/index.vue\n    participant BFF as apiBffexportDataInspectionReceipts\n    participant InvoiceAPI as apiDataInspectionReceiptsInvoid\n    participant ReceiptAPI as apiDataInspectionReceipts\n\n    Accounting->>Page: เลือกรายการ\n    Accounting->>Page: กดอนุมัติใบกำกับภาษี\n    Page->>InvoiceAPI: POST ids[]\n    InvoiceAPI-->>Page: success/fail\n\n    alt success\n        loop ทุก id\n            Page->>ReceiptAPI: PUT {id}/status = invoiceIssued\n        end\n        Page->>Page: reloadData()\n    else fail\n        Page-->>Accounting: success count = 0\n    end\n```\n\n### 20-E: Contractor Cash Collection\n\nครอบคลุม:\n\n- `payment-contractor/index.vue`\n\n#### Purpose\n\nใช้เป็นหน้าตั้งต้นเพื่อเลือก inspection receipts ที่จะนำไปชำระค่าบริการจักรกลโรงงาน แล้วส่งต่อให้ modal `CashContractorListPay`\n\n#### Main Steps\n\n1. เปิดหน้ารับชำระค่าบริการจักรกลโรงงาน\n2. ระบบโหลด inspection receipts จาก `apiBffexportDataInspectionReceipts`\n3. ผู้ใช้เลือกหลายรายการจากตาราง\n4. ผู้ใช้กด "เลือกรายการชำระเงิน"\n5. หน้าแปลง selected rows ให้แต่ละ item มี `children: [item]`\n6. หน้าเปิด modal `CashContractorListPay`\n7. ถ้า modal ตอบกลับสำเร็จ หน้า reload list และ clear selection\n\n#### Result\n\n- ใช้เป็น launcher สำหรับ modal ชำระเงิน\n- logic ชำระเงินจริงและการแบ่งรายการอยู่ใน modal มากกว่าที่ตัว page เอง\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as payment-contractor/index.vue\n    participant BFF as apiBffexportDataInspectionReceipts\n    participant Modal as CashContractorListPay\n\n    Staff->>Page: เปิดหน้า\n    Page->>BFF: GET inspection receipts\n    BFF-->>Page: list\n    Staff->>Page: เลือกรายการ\n    Staff->>Page: กดเลือกรายการชำระเงิน\n    Page->>Modal: showModal(selected items)\n    Modal-->>Page: on-success\n    Page->>BFF: reloadData()\n```\n\n### 20-F: Payment Batch List And Detail\n\nครอบคลุม:\n\n- `payment-management/expense-list/index.vue`\n- `payment-management/expense-list/detail/index.vue`\n\n#### Purpose\n\nใช้ติดตาม batch payment ฝั่งบัญชี, เปิดดู sub-batch หรือ detail, และทำ maintenance action บางอย่าง เช่น รวมรายการ, แยกรายการ, และแก้ไขข้อมูลของรายการจ่าย\n\n#### Main Steps\n\n1. เปิดหน้ารายการ batch payment\n2. ระบบโหลด dropdown `site` และ `payment method`\n3. ระบบโหลดรายการ batch จาก `apiGetAllPaymentPreparation`\n4. ผู้ใช้ค้นหา, กรอง site, payment method, date range, และ status tab\n5. ผู้ใช้กดเข้า detail ของ batch หรือ sub-batch\n6. หน้า detail โหลดข้อมูลจาก `apiGetPaymentPreparationDetail` หรือ `apiGetSubDetail` ตาม query ที่ได้รับ\n7. ใน detail ผู้ใช้เลือกหลายรายการเพื่อแก้ไข, แยกรายการ, หรือรวมรายการกับ batch อื่น\n8. การรวม/แก้ไข/แยก ใช้ `PUT` คนละ endpoint แล้ว reload data หลังสำเร็จ\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| detail มี `query.id` | โหลดข้อมูลจาก `apiGetPaymentPreparationDetail` |\n| detail ไม่มี `query.id` แต่มี `batch_number/ref` | โหลดข้อมูลจาก `apiGetSubDetail` |\n| `status_2` เป็น `2` หรือ `3` | แสดงปุ่มอัปเดทข้อมูลบัญชีผู้รับ |\n| `status_2` เป็น `1`, `2`, `3`, `5` | แสดงปุ่มแยกรายการ |\n| `status_2` เป็น `6` หรือ `4` | ปิด multiselect ใน detail |\n| ไม่เลือกแถวใดเลยแล้วกด edit/split | แจ้ง error ให้เลือกรายการก่อน |\n\n#### Result\n\n- ได้ worklist ของ payment batch แยกตามสถานะ\n- ฝั่งบัญชีปรับโครงรายการจ่ายบางกรณีได้จากหน้า detail\n\n#### Technical Diagrams\n\nรายการ batch payment\n\n```mermaid\nsequenceDiagram\n    actor Accounting\n    participant ListPage as expense-list/index.vue\n    participant MetaAPI as site/payment-method dropdown APIs\n    participant BatchAPI as apiGetAllPaymentPreparation\n\n    Accounting->>ListPage: เปิดหน้า\n    ListPage->>MetaAPI: โหลด dropdown\n    ListPage->>BatchAPI: GET batch list ตาม filters\n    BatchAPI-->>ListPage: entities + sub batches\n    ListPage-->>Accounting: แสดง batch table\n\n    alt เปิด detail\n        Accounting->>ListPage: กดปุ่มแก้ไข\n        ListPage->>ListPage: push ไป detail พร้อม query\n    end\n```\n\nmaintenance action ใน detail\n\n```mermaid\nsequenceDiagram\n    actor Accounting\n    participant DetailPage as expense-list/detail/index.vue\n    participant MergeAPI as apiPutMergeDetail\n    participant UpdateAPI as apiPutUpdateDetail\n    participant SplitAPI as apiPutSplitDetail\n\n    alt รวมรายการ\n        Accounting->>DetailPage: เปิด modal combine\n        DetailPage->>MergeAPI: PUT merge detail\n        MergeAPI-->>DetailPage: Update Success\n        DetailPage->>DetailPage: reloadData()\n    else แก้ไขข้อมูล\n        Accounting->>DetailPage: เปิด modal edit\n        DetailPage->>UpdateAPI: PUT update detail\n        UpdateAPI-->>DetailPage: Update Success\n        DetailPage->>DetailPage: reloadData()\n    else แยกรายการ\n        Accounting->>DetailPage: เปิด modal split\n        DetailPage->>SplitAPI: PUT split detail\n        SplitAPI-->>DetailPage: Update Success + ref ใหม่\n        DetailPage->>DetailPage: reloadData()\n    end\n```\n\n---\n\n## Technical Reference\n\n### สถานะ cash order ที่พบจาก source\n\n| สถานะ | ใช้ใน flow ไหน |\n|---|---|\n| `draft` | ก่อนเลือกวิธีชำระหรือก่อนเริ่มขั้นตอน payment จริง |\n| `pending` | หลังเลือก `scan` และรอผลชำระ/รอ polling อัปเดต |\n| `waitingPayslip` | หลังเลือก `transfer` และรอแนบสลิป |\n| `waitingVerify` | หลังบันทึกสลิปและรอทีมการเงินตรวจสอบ |\n| `waitingDocument` | หลังการตรวจหรือหลังงาน QR สำเร็จและรอเอกสาร/การส่งต่อ |\n| `sentToAccounting` | งานจบในสาย cash order และเป็นโหมดดูข้อมูลมากขึ้น |\n\n### ช่องทางชำระเงินที่พบ\n\n| กลุ่ม | ค่า |\n|---|---|\n| cash order | `scan`, `transfer` |\n| payment batch | `1 = ELBD`, `2 = Direct`, `3 = Smart`, `4 = ไม่ระบุ` |\n\n### payment batch `status_2` ที่หน้า list ใช้แสดงผล\n\n| ค่า | ข้อความ |\n|---|---|\n| `1` | รอ Proof |\n| `2` | Hold |\n| `3` | Wait to update |\n| `4` | Final |\n| `5` | Progress |\n| `6` | Paid partial |\n| `7` | Complete |\n\n### payment detail row status\n\n| ค่า | ความหมาย |\n|---|---|\n| `N` | ไม่สำเร็จ |\n| `H` | Hold |\n| `Y` | สำเร็จ |\n\n### Payment Preparation API — ยืนยันจาก `payment_preparation.controller.ts`\n\n| Frontend Constant | Method | Backend Route | Params/Body | ใช้เมื่อ |\n|---|---|---|---|---|\n| `apiGetAllPaymentPreparation` | GET | `/payment_preparation/get_all` | `page`, `size`, `order`, `order_by`, `query`, `site`, `payment_method`, `payment_date_from`, `payment_date_to`, `status` | โหลดรายการ batch payment ตาม filters + tab status |\n| `apiGetAllCountPaymentPreparation` | GET | `/payment_preparation/get_all_count` | — | นับจำนวน batch ทั้งหมด |\n| `apiGetPaymentPreparationDetail` | GET | `/payment_preparation/get_detail/{id}` | `id` + filter params | โหลด detail ของ batch หลัก (is_main: true) |\n| `apiGetSubDetail` | GET | `/payment_preparation/get_sub_detail` | `batch_number`, `ref` + filter params | โหลด sub-detail ของ child batch (is_main: false) |\n| `apiGetDropDownStatusDetail` | GET | `/payment_preparation/drop_down_status_detail` | — | dropdown status: N, H, Y |\n| `apiGetDropDownStatus2Detail` | GET | `/payment_preparation/drop_down_status_2_detail` | — | dropdown status_2: 1, 2, 3 |\n| `apiPutUpdateDetail` | PUT | `/payment_preparation/update_detail` | `array_id[]`, `status_2`, `payment_date?`, `date_to_destination?`, `notes` | แก้ไขข้อมูลรายการที่เลือก |\n| `apiPutSplitDetail` | PUT | `/payment_preparation/split_detail` | `array_id[]`, `status_2`, `payment_date?`, `date_to_destination?`, `notes` | แยกรายการเป็น ref ใหม่ (auto-generate 5 digits + 1 letter) |\n| `apiGetDropDownMerge` | GET | `/payment_preparation/drop_down_merge` | `batch_number`, `ref`, `status_2`, `payment_date`, `date_to_destination` | dropdown merge candidates (same status_2, same dates, different ref) |\n| `apiPutMergeDetail` | PUT | `/payment_preparation/merge_detail` | `batch_number`, `ref`, `merge_ref`, `notes` | รวมรายการจาก ref ปัจจุบันเข้า merge_ref |\n| — | POST | `/payment_preparation/create_batch_file_krungsri_by_date` | `ReqBatchDTO` | สร้าง batch file สำหรับ Krungsri (กรุงศรี) |\n\n### Manage Payment List Dropdown APIs\n\n| Frontend Constant | Method | Backend Route | Returns |\n|---|---|---|---|\n| `apiGetDropDownSite` | GET | `/manage_payment_list/drop_down_site` | `[{ value: \'1\', text: \'ครบุรี\' }, { value: \'2\', text: \'สีคิ้ว\' }]` |\n| `apiGetDropDownPaymentMethod` | GET | `/manage_payment_list/drop_down_payment_method` | `[{ value: \'1\', text: \'ELBD\' }, { value: \'2\', text: \'Direct\' }, { value: \'3\', text: \'Smart\' }, { value: \'4\', text: \'ไม่ระบุ\' }]` |\n\n### Payment Preparation Database Structure\n\n| Table | ใช้เก็บ | หมายเหตุ |\n|---|---|---|\n| `payment_preparation` | batch-level records | fields: id, batch_number, ref, site, payment_method, account_kbs, payment_date, date_to_destination, count, amount, status_2 |\n| `doc_payment_preparation` | item-level records | fields: payment_no, quota_code_1, name, quota_code_2, payee_name, bank_code, account_kbs, date_to_destination, amount, status |\n| `data_inspection_receipts` | source data | synced via `cms-sync-data` module |\n\n### Detail Page — Status-Based Visibility Logic\n\n| `status_2` | Multi-select | Update Account | Split Items | หมายเหตุ |\n|---|---|---|---|---|\n| `1` (รอ Proof) | enabled | hidden | visible | |\n| `2` (Hold) | enabled | visible | visible | |\n| `3` (Wait to update) | enabled | visible | visible | |\n| `4` (Final) | **disabled** | hidden | hidden | read-only |\n| `5` (Progress) | enabled | hidden | visible | |\n| `6` (Paid partial) | **disabled** | hidden | hidden | read-only |\n\n---\n\n## Known Gaps\n\n1. `order-cash-ferilizer/index.vue` มี option `ทั้งหมด` ใน dropdown สถานะ แต่โค้ดส่ง `status: \'\'`; ขณะเดียวกันกรณี `pending` ใช้ filter แบบ `not` พิเศษ จึงควรยืนยันกับ backend ก่อนอธิบายว่า "ทั้งหมด" ทำงานอย่างไรแน่\n2. `order-cash-ferilizer/[id].vue` ในกรณี `waitingDocument + transfer` มี state ที่ตั้ง `slip_bank` เป็นทั้ง `disabled` และ `required` พร้อมกัน ซึ่งตีความเชิง UX/validation ได้ยาก\n3. `cash-contractor-invoice/index.vue` มีปุ่มไอคอนเอกสารในแต่ละแถว แต่ไม่มี click handler จึงยังไม่ควรอธิบายว่ามี flow เปิดเอกสารรายแถว\n4. `payment-contractor/index.vue` มี `UIMasterProductYear` + `SelectionSugarcaneFarmer` เป็น filters แต่ยังไม่ผูก productionYear/farmer เข้ากับ API query จริง; โหลด inspection receipts แบบ pagination ไม่กรอง; ปุ่ม upload slip เทียบ `status` กับ `StatusOrder.waitingPayslip` แม้ตารางใช้ `InspectionReceiptStatusMsg`; table columns: code, quotaNumber, fullName, withdrawItemName, landno, amount, inspectionDate, howToPay, status, btnAction\n5. `payment-management/expense-list/index.vue` ช่องสถานะของแถวหลักใช้ `countStatus(..., selectedTabStatus)` โดยส่งชื่อ tab เช่น `waitProof` ไปเทียบกับ `status_2`; นอกจากนี้ `countStatus` ยังตั้งค่าเป็น `+1` แทนการนับสะสม จึงไม่ควรตีความตัวเลข summary ว่าเชื่อถือได้เต็มที่\n6. `payment-management/expense-list/index.vue` มีการแสดง `status_2 = 7` เป็น `Complete` ใน child rows แต่ฟังก์ชัน `checkStatus(\'complete\')` map ไปค่า `6`; ชื่อ tab กับค่าจริงควรยืนยันก่อนสรุปเชิงธุรกิจลึก ๆ\n7. `payment-management/expense-list/detail/index.vue` มี action placeholder บางส่วน: `onSubmitModalApprove`, `onClickPrint`, `onClickExport`, `onClickHistory` — แต่ `onSubmitModalCombineItems`, `onSubmitModalEditData`, `onSubmitModalSplitItems` **ทำงานจริงแล้ว** ผ่าน PUT endpoints\n8. route ชุดนี้ใช้สะกด `order-cash-ferilizer` ตาม source จริง จึงควรคงสะกดนี้ไว้ในเอกสารเพื่อไม่ให้สับสนกับ route จริง\n9. `apiDataInspectionReceiptsInvoid` สะกดตาม source จริง (ดู `main_frontend-develop/composables/api-cms.ts` — `export const apiDataInspectionReceiptsInvoid = "/cms-service/data-inspection-receipts/invoices"`) — endpoint จริงคือ `/invoices` แต่ชื่อ constant สะกด "Invoid" แทน "Invoice"\n\n### Accounting Service — Payment Preparation Module\n\n| รายการ | สถานะ | หมายเหตุ |\n|---|---|---|\n| `get_all` + `get_detail` + `get_sub_detail` | ทำงานจริง | PostgreSQL queries on payment_preparation + doc_payment_preparation tables; grouping by batch_number, ref, status_2 |\n| `update_detail` | ทำงานจริง | อัปเดต array_id ด้วย notes, optional payment_date/date_to_destination/status_2 |\n| `split_detail` | ทำงานจริง | auto-generate ref ใหม่ (5 digits + 1 letter); returns new ref |\n| `merge_detail` | ทำงานจริง | รวมรายการจาก ref → merge_ref; validate same status_2 + dates |\n| `drop_down_merge` | ทำงานจริง | returns merge candidates (same batch, different ref, same status_2/dates) |\n| `create_batch_file_krungsri_by_date` | ทำงานจริง | สร้าง batch file สำหรับ Krungsri bank |\n| `cms-sync-data/syncDataManagePayment` | ทำงานจริง | sync inspection receipts → payment_preparation table; เป็น data pipeline เบื้องหลัง |\n| Detail page: Approve modal | placeholder | `onSubmitModalApprove` ยังไม่มี logic จริง |\n| Detail page: Print/Export/History | placeholder | `onClickPrint`, `onClickExport`, `onClickHistory` ยังไม่มี implementation |\n',

          content:
            '# Flow 21 — Sugarcane & Variety\n\n## Overview\n\nFlow นี้รวมงาน 4 กลุ่มที่อยู่ในโดเมน "อ้อย / พันธุ์อ้อย" แต่ไม่ได้ต่อกันเป็นเส้นธุรกิจเดียวทั้งหมด:\n\n1. งานรายงานและ import ข้อมูลปริมาณอ้อยเข้าหีบ (`sending-sugarcanes`)\n2. งานกำหนดราคากลางพันธุ์อ้อย (`variety-base-price`)\n3. งานลงทะเบียนขายพันธุ์อ้อยและอนุมัติ (`variety-cane-owners/*`, `variety-cane-approval/*`)\n4. งานดู master เจ้าของพันธุ์อ้อย (`variety-cane-owners/index.vue`)\n\nจาก source ปัจจุบัน flow ที่เป็น production หลักคือการลงทะเบียนขายพันธุ์อ้อยแล้วส่งสถานะไป `waitingPriceApprove`, จากนั้นจึงไปหน้าอนุมัติ ส่วนรายงานอ้อยเข้าหีบและราคากลางเป็นงานสนับสนุนคนละโดเมนย่อย\n\nเอกสารเก่ามีส่วน `cane-owner` แต่ใน `pages/cms` ปัจจุบันไม่พบ route นี้แล้ว จึงไม่รวมใน flow รอบนี้\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| รายงานอ้อยเข้าหีบ | `cms/sending-sugarcanes/index.vue`, `cms/sending-sugarcanes/[id].vue` |\n| ราคากลางพันธุ์อ้อย | `cms/variety-base-price/index.vue` |\n| อนุมัติลงทะเบียนขายพันธุ์อ้อย | `cms/variety-cane-approval/index.vue`, `cms/variety-cane-approval/[id]/index.vue` |\n| เจ้าของพันธุ์อ้อย | `cms/variety-cane-owners/index.vue` |\n| รายการขายพันธุ์อ้อย | `cms/variety-cane-owners/variety-cane-sugarcane.vue` |\n| ลงทะเบียนขายพันธุ์อ้อย | `cms/variety-cane-owners/register-variety-cane-sugarcane/[id].vue` |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| เจ้าหน้าที่ไร่/จัดซื้อ | import ข้อมูลอ้อยเข้าหีบ, ดูรายงาน, และดูข้อมูลโควตากลาง |\n| เจ้าหน้าที่กำหนดราคา | เพิ่ม/แก้ไข/ลบราคากลางพันธุ์อ้อย |\n| เจ้าหน้าที่ผู้ลงทะเบียน | เลือกผู้ขายพันธุ์, เลือกแปลงหรือแหล่งพันธุ์, กรอกตันขาย, และส่งคำขอ |\n| ผู้อนุมัติ | ตรวจคำขอและกด approve/reject ผ่าน `FormApproveSequence` |\n| เจ้าของพันธุ์อ้อย | อาจเป็นชาวไร่ (`isFarmer = 1`) หรือเจ้าของแหล่งพันธุ์ทั่วไป |\n| ระบบทะเบียนพันธุ์อ้อย | เก็บคำขอ `regis-sell-cane-varieties` และสถานะอนุมัติ |\n| ระบบราคากลาง | ให้ default base price สำหรับการขายพันธุ์อ้อย |\n| Modals | ใช้กับการเลือกผู้ขายพันธุ์, เลือกแปลง KAT, ดูประวัติ, และเพิ่มเจ้าของพันธุ์อ้อย |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| Sending-cane import job | งาน import ไฟล์ข้อมูลส่งอ้อยเข้าหีบ |\n| Cane batch report | ตารางสรุปข้อมูลอ้อยสด/อ้อยไฟ/รวม ต่อไฟล์ upload |\n| Variety base price | ราคากลางพันธุ์อ้อยรายปีและราย site |\n| Variety owner master | รายชื่อเจ้าของพันธุ์อ้อยที่ใช้เลือกใน flow ลงทะเบียน |\n| Variety sale registration | คำขอขายพันธุ์อ้อยที่บรรจุข้อมูลผู้ขาย, แปลง/แหล่งพันธุ์, และราคา |\n| Approval decision | ผล approve/reject คำขอลงทะเบียนขายพันธุ์อ้อย |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["เจ้าหน้าที่เปิดหมวด Sugarcane & Variety"] --> B["เลือกงานที่ต้องทำ"]\n\n    B --> C["ดูรายงานอ้อยเข้าหีบ / import ไฟล์"]\n    B --> D["กำหนดราคากลางพันธุ์อ้อย"]\n    B --> E["จัดการเจ้าของพันธุ์อ้อย"]\n    B --> F["ลงทะเบียนขายพันธุ์อ้อย"]\n    B --> G["อนุมัติลงทะเบียนขายพันธุ์อ้อย"]\n\n    C --> C1["โหลด batch report หรือส่งไฟล์เข้า import job"]\n    D --> D1["เพิ่ม แก้ไข หรือลบราคากลาง"]\n    E --> E1["เพิ่มเจ้าของพันธุ์อ้อยทั่วไป หรือเพิ่มจากชาวไร่"]\n    F --> F1["เลือกผู้ขายพันธุ์"]\n    F1 --> F2["เลือกแปลง KAT หรือเพิ่มแหล่งพันธุ์"]\n    F2 --> F3["คำนวณ/แนบราคาขาย"]\n    F3 --> F4["บันทึกคำขอและส่ง status = waitingPriceApprove"]\n    G --> G1["เปิดคำขอที่รออนุมัติ"]\n    G1 --> G2["approve หรือ reject ผ่าน FormApproveSequence"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `sending-sugarcanes/index.vue` | รายการ batch รายงานอ้อยเข้าหีบ | มี search UI แต่ปัจจุบัน request ไม่ส่ง search |\n| `sending-sugarcanes/[id].vue` | import ไฟล์ข้อมูลอ้อยและดู tab วิเคราะห์ | ปุ่มประมวลผลยิง request แบบไม่ `await` |\n| `variety-base-price/index.vue` | จัดการราคากลางพันธุ์อ้อย | list page จริง, add/edit อยู่ใน modal |\n| `variety-cane-owners/index.vue` | master เจ้าของพันธุ์อ้อย | edit พาไป customer page ไม่ใช่ edit inline |\n| `variety-cane-owners/variety-cane-sugarcane.vue` | รายการขายพันธุ์อ้อยที่ไม่อยู่สถานะรออนุมัติ | ใช้สร้าง/แก้ไข/ยกเลิกรายการ |\n| `variety-cane-owners/register-variety-cane-sugarcane/[id].vue` | ฟอร์ม create/edit คำขอลงทะเบียนขายพันธุ์อ้อย | flow หลักฝั่ง submit คำขอ |\n| `variety-cane-approval/index.vue` | list คำขอรออนุมัติ | filter หลักคงที่ที่ `waitingPriceApprove` |\n| `variety-cane-approval/[id]/index.vue` | detail อนุมัติคำขอขายพันธุ์อ้อย | ใช้ `FormApproveSequence` ปิดงาน |\n\n---\n\n## Per-Page Details\n\n### 21-A: Sending Sugarcanes\n\nครอบคลุม:\n\n- `sending-sugarcanes/index.vue`\n- `sending-sugarcanes/[id].vue`\n\n#### Purpose\n\nใช้ดูรายการ batch ของข้อมูลอ้อยเข้าหีบ และใช้ส่งไฟล์ Excel เข้า import job พร้อมเปิดดูผลแยกตาม tab วิเคราะห์\n\n#### Main Steps\n\n1. เปิดหน้า list ของรายงานอ้อยเข้าหีบ\n2. ระบบโหลดข้อมูล grouped by `keyFile`\n3. ผู้ใช้กดเข้า detail ของแต่ละ batch\n4. ในหน้า detail ผู้ใช้เลือกปีการผลิตและเลือกไฟล์\n5. ผู้ใช้กด `ประมวลผล`\n6. ระบบส่ง `FormData` ไป import endpoint\n7. หน้าแสดง tab `central_Quota` หรือ `random` เพื่อดู component วิเคราะห์ตามปีที่เลือก\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| เปิด list page | โหลด summary table ได้ทันที |\n| กดปุ่ม `อัพโหลดไฟล์ข้อมูลการส่งอ้อย` บน list | ปุ่มยังไม่มี handler |\n| เลือก tab `central_Quota` | render `SendingSugarcanRatioCentralQuota` |\n| เลือก tab `random` | render `SendingSugarcanOverQuotaSugarcane` |\n| ไม่เลือกปีหรือไฟล์ก่อนกดประมวลผล | source ไม่มี validation guard ชัดเจน |\n\n#### Result\n\n- ได้ batch report ของข้อมูลอ้อยเข้าหีบ\n- ส่งไฟล์เข้า import job ได้จากหน้า detail\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ListPage as sending-sugarcanes/index.vue\n    participant DetailPage as sending-sugarcanes/[id].vue\n    participant BFF as sending-cane APIs\n\n    Staff->>ListPage: เปิดหน้า\n    ListPage->>BFF: GET sum-group-by-key-file\n    BFF-->>ListPage: grouped list\n    Staff->>ListPage: เปิด batch หนึ่งรายการ\n    ListPage->>DetailPage: push /cms/sending-sugarcanes/{id}\n\n    Staff->>DetailPage: เลือกปี + เลือกไฟล์\n    Staff->>DetailPage: กดประมวลผล\n    DetailPage->>BFF: POST imports-from-xlsx(FormData)\n    DetailPage-->>Staff: แจ้งว่าระบบกำลังประมวลผล\n```\n\n### 21-B: Variety Base Price\n\nครอบคลุม:\n\n- `variety-base-price/index.vue`\n\n#### Purpose\n\nใช้จัดการราคากลางพันธุ์อ้อย ซึ่งเป็นข้อมูลอ้างอิงสำคัญของ flow ลงทะเบียนขายพันธุ์อ้อย\n\n#### Main Steps\n\n1. เปิดหน้ากำหนดราคากลางพันธุ์อ้อย\n2. ระบบโหลดรายการราคากลางแบบ pagination\n3. ผู้ใช้กดเพิ่มราคาใหม่ผ่าน modal\n4. ผู้ใช้กดแก้ไขรายการเดิมผ่าน modal\n5. ผู้ใช้กดลบรายการและยืนยันการลบ\n\n#### Result\n\n- ได้ master ราคากลางรายปีและราย site\n- หน้า register สามารถอ้างข้อมูลราคานี้ต่อได้\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as variety-base-price/index.vue\n    participant BFF as apiGetCogSugarcaneVarietiesPrice\n    participant Modal as VarietyBasePriceModalAddBasePrice\n\n    Staff->>Page: เปิดหน้า\n    Page->>BFF: GET base price list\n    BFF-->>Page: pagination list\n\n    alt เพิ่ม/แก้ไข\n        Staff->>Page: เปิด modal\n        Page->>Modal: showModal(data|null)\n        Modal-->>Page: onSubmit\n        Page->>BFF: reloadData()\n    else ลบ\n        Staff->>Page: ยืนยันลบ\n        Page->>BFF: DELETE {id}\n        Page->>BFF: reloadData()\n    end\n```\n\n### 21-C: Variety Owner Master\n\nครอบคลุม:\n\n- `variety-cane-owners/index.vue`\n\n#### Purpose\n\nใช้เป็น master list ของเจ้าของพันธุ์อ้อย และใช้เพิ่มเจ้าของพันธุ์ได้ 2 แบบคือเพิ่มจากชาวไร่ และเพิ่มเจ้าของพันธุ์ทั่วไปผ่าน modal\n\n#### Main Steps\n\n1. เปิดหน้าเจ้าของพันธุ์อ้อย\n2. ระบบโหลดรายการเจ้าของพันธุ์อ้อยและสร้าง `dataFilter` จาก `customerCode` ที่มีอยู่\n3. ผู้ใช้ค้นหา list ตามชื่อ/เลขโควตา/เลขบัตรประชาชน\n4. ผู้ใช้เลือกเพิ่มชาวไร่เป็นเจ้าของพันธุ์อ้อยผ่าน modal\n5. ระบบ POST ไปที่ `apiVarietyAndLandOwners`\n6. หรือผู้ใช้เพิ่มเจ้าของพันธุ์อ้อยทั่วไปผ่าน `VarietyCaneOwnerForm`\n7. ถ้ากด edit ระบบพาไปหน้า customer management ของ customer นั้น\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| create จากชาวไร่แล้ว API ตอบ `409` | แสดงข้อความ duplicate จาก backend |\n| `isFarmer = 1` | แสดงข้อมูลเขตส่งเสริมจาก `includeSugarcaneFarmer` |\n| กด edit | route ไป `/cms/customers/{customerCode}` ไม่ได้เปิด form edit ใน flow นี้ |\n\n#### Result\n\n- ได้ master owner ที่ใช้ต่อในหน้าลงทะเบียนขายพันธุ์อ้อย\n- flow นี้ทำหน้าที่เป็นฐานข้อมูลอ้างอิงมากกว่า flow approval\n\n### 21-D: Variety Sale Registration List\n\nครอบคลุม:\n\n- `variety-cane-owners/variety-cane-sugarcane.vue`\n\n#### Purpose\n\nใช้ดูรายการขายพันธุ์อ้อยที่ไม่อยู่สถานะ `waitingPriceApprove`, เปิดฟอร์มสร้างคำขอใหม่, เปิดแก้ไขรายการเดิม, และยกเลิกรายการ\n\n#### Main Steps\n\n1. ผู้ใช้เลือกปีการผลิตก่อน\n2. ระบบโหลดรายการคำขอตาม `registerType` ของ tab ที่เลือก\n3. ระบบกรองแบบ `not.status = waitingPriceApprove`\n4. ผู้ใช้สลับ tab เขตใน/เขตนอก\n5. ผู้ใช้กดสร้างคำขอใหม่หรือเปิดแก้ไขรายการ\n6. ผู้ใช้กดยกเลิกรายการเพื่อ PUT สถานะเป็น `cancle`\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| ยังไม่เลือกปีการผลิต | หน้า mounted ยังไม่โหลด list |\n| tab = `inTheArea` | โหลดเฉพาะคำขอเขตใน |\n| tab = `outTheArea` | โหลดเฉพาะคำขอเขตนอก |\n| กดยกเลิก | PUT `{ status: "cancle" }` |\n\n#### Result\n\n- เป็น worklist ของคำขอที่ผ่านรออนุมัติไปแล้วหรือถูกยกเลิก\n- เป็นจุดเข้าไปยังหน้า create/edit registration\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as variety-cane-sugarcane.vue\n    participant BFF as apiBffRegisSellCaneVarieties\n    participant CMS as apiDataRegisCellCaneVarieties\n\n    Staff->>Page: เลือกปีการผลิต\n    Page->>BFF: GET list with not.status=waitingPriceApprove\n    BFF-->>Page: registration list\n\n    alt สร้างใหม่\n        Staff->>Page: กดลงทะเบียนขายพันธุ์อ้อย\n        Page->>Page: push /create\n    else แก้ไข\n        Staff->>Page: กด edit\n        Page->>Page: push /{id}\n    else ยกเลิก\n        Staff->>Page: กดยกเลิก\n        Page->>CMS: PUT {id} status=cancle\n        Page->>BFF: reloadData()\n    end\n```\n\n### 21-E: Register Variety Sale\n\nครอบคลุม:\n\n- `variety-cane-owners/register-variety-cane-sugarcane/[id].vue`\n\n#### Purpose\n\nเป็น flow หลักของการสร้างหรือแก้ไขคำขอลงทะเบียนขายพันธุ์อ้อย โดยรองรับทั้งกรณีขายจากแปลง KAT (`sugarCane`) และขายจากแหล่งพันธุ์ทั่วไป (`variety`)\n\n#### Main Steps\n\n1. หน้า determine mode จาก route param: `create` หรือ `{id}`\n2. โหลด master พันธุ์อ้อยและแหล่งพันธุ์\n3. ถ้า create:\n   - โหลด list เจ้าของพันธุ์อ้อย\n   - ผู้ใช้เลือกผู้ขายพันธุ์\n   - ผู้ใช้เลือกปีการผลิต\n4. ถ้า edit:\n   - โหลดคำขอเดิม\n   - preload ผู้ขายพันธุ์, แปลง/แหล่งพันธุ์, ราคา, และประวัติ\n5. ผู้ใช้เลือกประเภทผู้ขายว่าจะใช้แปลง KAT หรือแหล่งพันธุ์ทั่วไป\n6. ถ้าใช้ KAT:\n   - เปิด modal เลือกแปลง\n   - ระบบ query KAT contracts โดยตัด `ตอ2` ถึง `ตอ9` ออก\n7. ถ้าใช้แหล่งพันธุ์ทั่วไป:\n   - ผู้ใช้เพิ่ม list ของ source, variety, planting date, ton, และพิกัด\n8. ผู้ใช้กรอก base price ผ่าน component ราคา\n9. ก่อน submit ระบบตรวจว่ามีราคากลาง และอายุอ้อยอยู่ระหว่าง `180-300` วัน\n10. ระบบ POST หรือ PUT คำขอ\n11. จากนั้นระบบ PUT `/status` ให้เป็น `waitingPriceApprove`\n12. เสร็จแล้ว redirect กลับหน้ารายการขายพันธุ์อ้อย\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| ไม่มีราคากลาง | block submit และแจ้ง error |\n| อายุอ้อยน้อยกว่า 180 หรือมากกว่า 300 วัน | block submit |\n| `selectedVarietyCaneOwnerType = sugarCane` | ใช้ list แปลง KAT เป็น source หลัก |\n| `selectedVarietyCaneOwnerType = variety` | ใช้ list แหล่งพันธุ์ทั่วไป |\n| `isEdit = true` | PUT ข้อมูลเดิมแล้ว PUT status ซ้ำเป็น `waitingPriceApprove` |\n| `isEdit = false` | POST สร้างใหม่แล้ว PUT status ของ record ใหม่เป็น `waitingPriceApprove` |\n\n#### Result\n\n- ได้คำขอลงทะเบียนขายพันธุ์อ้อยที่พร้อมเข้าสู่ flow อนุมัติ\n- หน้าเดียวครอบคลุม create/edit/submission logic จริง\n\n#### Technical Diagrams\n\nสร้างหรือแก้ไขคำขอ\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as register-variety-cane-sugarcane/[id].vue\n    participant MasterAPI as variety owner / variety master / KAT APIs\n    participant RegAPI as apiDataRegisCellCaneVarieties\n\n    Staff->>Page: เปิดหน้า create หรือ edit\n    Page->>MasterAPI: โหลด master data\n    alt edit\n        Page->>RegAPI: GET detail ของคำขอเดิม\n    end\n    Staff->>Page: เลือกผู้ขาย + เลือกแปลง/แหล่งพันธุ์ + กรอกราคา\n    Staff->>Page: กดบันทึก\n    Page->>Page: validate ราคากลางและอายุอ้อย\n\n    alt create\n        Page->>RegAPI: POST registration\n        Page->>RegAPI: PUT /status = waitingPriceApprove\n    else edit\n        Page->>RegAPI: PUT registration\n        Page->>RegAPI: PUT /status = waitingPriceApprove\n    end\n```\n\n### 21-F: Variety Sale Approval\n\nครอบคลุม:\n\n- `variety-cane-approval/index.vue`\n- `variety-cane-approval/[id]/index.vue`\n\n#### Purpose\n\nใช้คัดเฉพาะคำขอลงทะเบียนขายพันธุ์อ้อยที่รออนุมัติ และให้ผู้อนุมัติเปิดดูรายละเอียดก่อนสั่ง approve/reject ผ่าน `FormApproveSequence`\n\n#### Main Steps\n\n1. ผู้ใช้เลือกปีการผลิต\n2. หน้า list โหลดคำขอด้วย filter คงที่ `status = waitingPriceApprove`\n3. ผู้ใช้สลับ tab เขตใน/เขตนอก\n4. ผู้ใช้เปิด detail ของรายการที่ต้องอนุมัติ\n5. หน้า detail โหลดคำขอแบบ `less`, preload ผู้ขายพันธุ์, รายการแปลง/แหล่งพันธุ์, และราคา\n6. ผู้อนุมัติกรอกผลใน `FormApproveSequence`\n7. ระบบ POST ไป `apiApproveRegisterSellCaneVariety`\n8. สำเร็จแล้ว redirect กลับหน้า list\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| ยังไม่เลือกปีการผลิต | list ยังไม่โหลด |\n| list page | filter จริงล็อกไว้ที่ `waitingPriceApprove` |\n| กดยกเลิกรายการจาก list | PUT status `cancle` ได้จาก list เดียวกัน |\n| approve/reject จาก detail | ใช้ endpoint `apiApproveRegisterSellCaneVariety` โดยส่ง `{ id, statusVerify, note }` |\n\n#### Result\n\n- ได้ worklist เฉพาะรายการรออนุมัติ\n- ผู้อนุมัติปิดงานได้จาก detail page จริง\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Approver\n    participant ListPage as variety-cane-approval/index.vue\n    participant DetailPage as variety-cane-approval/[id]/index.vue\n    participant BFF as variety registration APIs\n    participant ApproveAPI as apiApproveRegisterSellCaneVariety\n\n    Approver->>ListPage: เลือกปีการผลิต\n    ListPage->>BFF: GET list status=waitingPriceApprove\n    BFF-->>ListPage: pending registrations\n    Approver->>ListPage: เปิด detail\n    ListPage->>DetailPage: push /cms/variety-cane-approval/{id}\n\n    DetailPage->>BFF: GET registration/{id}/less\n    BFF-->>DetailPage: detail + approve sequence context\n    Approver->>DetailPage: ส่งผลอนุมัติ\n    DetailPage->>ApproveAPI: POST { id, statusVerify, note }\n    ApproveAPI-->>DetailPage: success\n    DetailPage->>ListPage: push back\n```\n\n---\n\n## Technical Reference\n\n### สถานะที่พบใน flow ขายพันธุ์อ้อย\n\n| ค่า | ความหมาย |\n|---|---|\n| `waitingPriceApprove` | รออนุมัติ |\n| `sell` | ขายพันธุ์ |\n| `cancle` | ยกเลิก |\n\n### ประเภท register\n\n| ค่า | ความหมาย |\n|---|---|\n| `inTheArea` | เขตใน |\n| `outTheArea` | เขตนอก |\n\n### ประเภทเจ้าของพันธุ์\n\n| ค่า | ความหมาย |\n|---|---|\n| `sugarCane` | ใช้แปลงอ้อย KAT |\n| `variety` | ใช้แหล่งพันธุ์ทั่วไป |\n\n### กฎสำคัญที่พบจาก source\n\n| กฎ | รายละเอียด |\n|---|---|\n| อายุอ้อยที่ยอมรับได้ | `180-300` วัน |\n| KAT ที่ไม่ให้เลือก | `ตอ2` ถึง `ตอ9` ถูก exclude ออกจาก query |\n| ownerType ใน variety owner | ใช้ค่า `"1"` |\n| edit/create registration | ทั้งสองกรณีจะ PUT status เป็น `waitingPriceApprove` หลังบันทึก |\n\n---\n\n## Known Gaps\n\n1. `sending-sugarcanes/index.vue` มี search field และ `reloadData(page, search)` แต่ `apiDataSendingCaneGoverments()` ไม่ส่ง `search` เข้า API จริง จึงยังไม่ควรอธิบายว่า search ใช้งานได้แล้ว\n2. `sending-sugarcanes/index.vue` ปุ่ม `อัพโหลดไฟล์ข้อมูลการส่งอ้อย` บนหน้า list ยังไม่มี handler\n3. `sending-sugarcanes/[id].vue` เรียก import ด้วย `useFetchPostClient(...)` โดยไม่ `await` และไม่มี validation ชัดเจนเรื่องปีการผลิต/ไฟล์ก่อน submit\n4. `variety-cane-approval/index.vue` และ `variety-cane-owners/variety-cane-sugarcane.vue` มี dropdown สถานะ แต่ request จริงไม่ใช้ค่า `this.status`; หน้า approval ล็อกที่ `waitingPriceApprove` เสมอ ส่วนหน้า list ใช้ `not.status = waitingPriceApprove` เสมอ\n5. `variety-cane-approval/[id]/index.vue` มี UI หลายส่วนที่ reuse โครงจากหน้า register และยังมี method ฝั่ง create/search บางส่วนค้างอยู่ในไฟล์ แต่ flow ปิดงานจริงคือ approve ผ่าน `FormApproveSequence`\n6. `variety-cane-owners/index.vue` ปุ่ม edit ไม่ได้แก้ไข owner ใน flow นี้โดยตรง แต่พาไปหน้า customer management `/cms/customers/{customerCode}`\n7. เอกสารเก่ารวม `cane-owner` ไว้ด้วย แต่ route นี้ไม่พบใน `pages/cms` ปัจจุบัน จึงไม่ควรนับเป็นส่วนของ flow ปัจจุบันจนกว่าจะพบ source ที่ใช้งานจริง\n',

            '# Flow 22 — Quota & Cluster\n\n## Overview\n\nFlow นี้รวม 3 งานที่เกี่ยวข้องกันในระดับโครงสร้างข้อมูล:\n\n1. ดูแลสัญญาโควตากลาง\n2. จับคู่โควตากลางกับข้อมูลที่เกี่ยวข้อง\n3. จัดการกลุ่มคลัสเตอร์\n\nแม้ชื่อ flow จะรวมหลายเรื่อง แต่สถานะของแต่ละส่วนไม่เท่ากัน:\n\n- `central-quota` และ `cluster` มี flow ใช้งานจริงชัดเจน\n- `match-quota-central` ยังเป็น partial implementation จากเอกสารเดิม\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| โควตากลาง | `central-quota`, `central-quota/[id]` |\n| จับคู่โควตากลาง | `match-quota-central`, `match-quota-central/matching` |\n| กลุ่มคลัสเตอร์ | `cluster`, `cluster/[id]` |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| เจ้าหน้าที่ CMS | ดูรายการ, เพิ่ม, แก้ไข, ยกเลิก, import, และจัดกลุ่มข้อมูล |\n| หน้าโควตากลาง | จัดการสัญญา central quota และข้อมูลต่อเนื่อง |\n| หน้าจับคู่โควตากลาง | ใช้เลือกคู่ข้อมูลที่เกี่ยวข้อง แต่ยังไม่สมบูรณ์ |\n| หน้ากลุ่มคลัสเตอร์ | ดูแลการสร้างและจัดการ cluster |\n| BFF Service | โหลดสัญญา cluster และข้อมูลอ่านอื่น ๆ |\n| CMS Service | สร้าง/แก้ไข/ลบข้อมูล cluster และบางรายการของโควตากลาง |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| Central quota contract | สัญญาโควตากลางที่พร้อมดูรายละเอียดต่อ |\n| Cluster group | กลุ่มคลัสเตอร์ที่ผูกหัวหน้าและสมาชิกแล้ว |\n| Cluster detail | ข้อมูลสมาชิกและอุปกรณ์ของกลุ่ม |\n| Matching setup | หน้าตั้งต้นสำหรับจับคู่โควตากลาง แต่ยังไม่ครบ flow จริง |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["เจ้าหน้าที่เปิดหมวด Quota & Cluster"] --> B["เลือกงานโควตากลาง, จับคู่โควตา, หรือจัดการคลัสเตอร์"]\n    B --> C["ระบบโหลดรายการหรือข้อมูลตั้งต้น"]\n    C --> D["เจ้าหน้าที่เพิ่ม แก้ไข ยกเลิก หรือนำเข้าข้อมูล"]\n    D --> E{"ส่วนนี้เป็น active flow หรือ partial flow?"}\n    E -->|active| F["บันทึกข้อมูลและรีโหลดรายการ"]\n    E -->|partial| G["ใช้งานได้บางส่วนและยังไม่ควรสรุปเกิน source"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `central-quota` | ดูรายการสัญญาโควตากลาง | เพิ่ม, import, และเปิด detail ได้ |\n| `central-quota/[id]` | ดูรายละเอียดโควตากลางหลาย tab | ยกเลิกสัญญาได้ตามสิทธิ์ |\n| `match-quota-central` | รายการจับคู่โควตากลาง | ใช้ mock data เป็นหลัก |\n| `match-quota-central/matching` | หน้า setup การจับคู่ | มี API setup บางส่วน แต่ logic ยังไม่ครบ |\n| `cluster` | ดูรายการกลุ่มคลัสเตอร์ | เพิ่ม, แก้ไข, ลบ, import ได้ |\n| `cluster/[id]` | ดูรายละเอียดกลุ่มคลัสเตอร์ | มี 2 tab หลัก |\n\n---\n\n## Per-Page Details\n\n### 22-A: Central Quota List\n\n#### Purpose\n\nใช้ดูรายการสัญญาโควตากลางตามปีการผลิต และเริ่มงานเพิ่มโควตากลาง, import ข้อมูล, หรือเปิดดูรายละเอียดสัญญา\n\n#### Main Steps\n\n1. เลือกปีการผลิต\n2. ระบบโหลดรายการสัญญาโควตากลาง\n3. เจ้าหน้าที่ค้นหาหรือดูตาราง\n4. เลือกเพิ่มโควตากลาง, import ไฟล์, หรือเปิดหน้า detail\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| เพิ่มโควตากลาง | เปิด modal เลือกข้อมูลก่อนสร้างสัญญา |\n| import ไฟล์ | เปิด modal upload |\n| เปิดรายการแบบ child contract | พาไปยัง main contract ตามเงื่อนไขเอกสารเดิม |\n\n#### Result\n\n- ได้รายการสัญญาโควตากลางตามปีที่เลือก\n- เริ่ม flow สร้างหรือดูรายละเอียดได้\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as central-quota\n    participant BFF as BFF Service\n    participant Modal as Selection / Import Modals\n\n    Staff->>Page: เลือกปีการผลิต\n    Page->>BFF: โหลด central quota contracts\n    BFF-->>Page: contract list\n\n    alt เพิ่มโควตากลาง\n        Staff->>Page: กดเพิ่มโควตากลาง\n        Page->>Modal: เปิด modal เลือก central quota\n        Modal-->>Page: ส่งผลการเลือก\n        Page-->>Staff: ไป flow สร้างสัญญา\n    else import ไฟล์\n        Staff->>Page: กดอัปโหลด\n        Page->>Modal: เปิด modal import\n        Modal-->>Page: reload เมื่อสำเร็จ\n    else เปิดรายละเอียด\n        Staff->>Page: กดดูรายการ\n        Page-->>Staff: ไปหน้า detail ของสัญญา\n    end\n```\n\n### 22-B: Central Quota Detail\n\n#### Purpose\n\nใช้ดูข้อมูลสัญญาโควตากลางแบบหลาย tab และยกเลิกสัญญาเมื่อมีสิทธิ์\n\n#### Main Steps\n\n1. เปิดหน้า detail ของโควตากลาง\n2. ระบบโหลด contract detail\n3. ระบบโหลดรายการสัญญาอื่นของ cane quota เดียวกันเพื่อสร้าง state กลาง\n4. เจ้าหน้าที่สลับดูแต่ละ tab\n5. ถ้าสิทธิ์ถึงและสถานะเข้าเงื่อนไข สามารถยกเลิกสัญญาได้\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| สัญญาอยู่สถานะที่ยกเลิกได้ | แสดงปุ่มยกเลิก |\n| สถานะเป็น `Checked` | ใช้ permission คนละตัวกับสถานะอื่น |\n| สลับ tab | เปลี่ยน component ที่แสดงผ่าน client-only |\n\n#### Result\n\n- ได้มุมมองรวมของโควตากลาง และยกเลิกสัญญาได้เมื่อเข้าเงื่อนไข\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant DetailPage as central-quota/[id]\n    participant BFF as BFF Service\n    participant CMS as CMS Service\n    participant SharedState as Global State\n\n    Staff->>DetailPage: เปิดหน้า detail\n    DetailPage->>BFF: โหลด contract detail\n    BFF-->>DetailPage: dataContract\n    DetailPage->>SharedState: set globalCentralQuotasContractProfile\n\n    DetailPage->>BFF: โหลดรายการสัญญาอื่นของ cane quota เดียวกัน\n    BFF-->>DetailPage: listContracts\n    DetailPage->>SharedState: set selected, selectedChildren, reloadData\n    SharedState-->>DetailPage: state พร้อมใช้\n\n    alt ยกเลิกสัญญา\n        Staff->>DetailPage: กดยกเลิกสัญญา\n        DetailPage->>CMS: เปลี่ยนสถานะเป็น Cancel และ isActive = 0\n        CMS-->>DetailPage: success/error\n        DetailPage-->>Staff: reload และแจ้งผล\n    else สลับ tab\n        Staff->>DetailPage: เลือก tab\n        DetailPage-->>Staff: แสดงข้อมูลใน tab ที่เลือก\n    end\n```\n\n### 22-C: Match Quota Central\n\n#### Purpose\n\nเป็นหน้าสำหรับจับคู่โควตากลาง แต่จากเอกสารเดิมยังอยู่ในระดับ setup และ mock มากกว่าการทำงานจริง\n\n#### Main Steps\n\n1. เปิดหน้ารายการจับคู่\n2. ระบบแสดง mock data ในหน้า list\n3. เจ้าหน้าที่เปิดหน้า matching\n4. ระบบโหลดข้อมูลตั้งต้นบางส่วนสำหรับเลือกโควตากลางและเจ้าของอ้อย\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| อยู่หน้า list | ใช้ mock data ไม่มี API หลัก |\n| อยู่หน้า matching | มี API setup บางส่วน แต่ยังไม่มี submit logic จริง |\n\n#### Result\n\n- ตอนนี้ใช้ได้แค่ดู UI และเลือกข้อมูลบางส่วน ยังไม่จบ flow จับคู่จริง\n\n#### Technical Diagrams\n\nหน้า list ของการจับคู่\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ListPage as match-quota-central\n\n    Staff->>ListPage: เปิดหน้าจับคู่โควตากลาง\n    ListPage-->>Staff: แสดง mock data ทันที\n    Staff->>ListPage: กดปุ่มเพิ่ม\n    ListPage-->>Staff: ไปหน้า matching\n```\n\nหน้า matching ของการจับคู่\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant MatchingPage as match-quota-central/matching\n    participant CMS as CMS Service\n\n    Staff->>MatchingPage: เปิดหน้า matching\n    MatchingPage->>CMS: โหลดรายการ central quotas\n    MatchingPage->>CMS: โหลดรายการ cane owners\n    CMS-->>MatchingPage: setup data\n\n    alt เลือกโควตากลาง\n        Staff->>MatchingPage: เปิด modal และเลือก central quota\n        MatchingPage-->>Staff: แสดงค่าในฟอร์ม\n    else เลือกเจ้าของอ้อย\n        Staff->>MatchingPage: เปิด modal และเลือก cane owner\n        MatchingPage-->>Staff: ปิด modal\n    end\n\n    Note over MatchingPage: เอกสารเดิมยังไม่พบ submit logic จริง\n```\n\n### 22-D: Cluster List\n\n#### Purpose\n\nใช้ดูแลกลุ่มคลัสเตอร์ ตั้งแต่สร้างกลุ่มใหม่, เปลี่ยนหัวหน้ากลุ่ม, import ข้อมูล, จนถึงเปิดดูรายละเอียดกลุ่ม\n\n#### Main Steps\n\n1. เปิดหน้ารายการ cluster\n2. ระบบโหลดรายการ cluster และรายชื่อชาวไร่ที่เลือกหัวหน้าได้\n3. เจ้าหน้าที่เพิ่ม, แก้ไข, ลบ, import หรือเปิดดูรายละเอียด\n4. ระบบบันทึก cluster และความสัมพันธ์กับ customer ตามกรณีที่เกิดขึ้น\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| add mode | สร้าง cluster record ก่อนเมื่อเลือก extension area แล้วค่อย update ตอน submit |\n| edit mode | มี logic จัดการหัวหน้ากลุ่ม 4 กรณี |\n| จำนวนสมาชิกมากกว่า 1 | ไม่แสดงปุ่มลบ |\n| import file | ส่งไฟล์เข้า API import แล้วรีโหลดรายการ |\n\n#### Result\n\n- ได้ cluster group ที่อัปเดตแล้ว พร้อมหัวหน้ากลุ่มและข้อมูลประกอบ\n\n#### Technical Diagrams\n\nเพิ่มหรือแก้ไขกลุ่มคลัสเตอร์\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ClusterPage as cluster\n    participant BFF as BFF Service\n    participant CMS as CMS Service\n\n    ClusterPage->>BFF: โหลดรายการ cluster และรายชื่อชาวไร่\n    BFF-->>ClusterPage: cluster list and selectable heads\n\n    alt เพิ่มกลุ่มใหม่\n        Staff->>ClusterPage: เลือก extension area\n        ClusterPage->>CMS: สร้าง cluster เบื้องต้น\n        CMS-->>ClusterPage: cluster code ที่สร้างแล้ว\n        Staff->>ClusterPage: เลือกหัวหน้าและ submit\n        ClusterPage->>CMS: update cluster\n        ClusterPage->>CMS: update customer ให้เป็นหัวหน้า\n    else แก้ไขกลุ่มเดิม\n        Staff->>ClusterPage: เปิด modal แก้ไขและ submit\n        ClusterPage->>CMS: update cluster\n        Note over ClusterPage: อาจต้อง update customer เก่า/ใหม่ ตาม 4 กรณีของหัวหน้า\n    end\n\n    ClusterPage-->>Staff: แจ้งผลและรีโหลดรายการ\n```\n\nลบหรือ import cluster\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ClusterPage as cluster\n    participant CMS as CMS Service\n\n    alt ลบกลุ่ม\n        Staff->>ClusterPage: กดยืนยันลบ\n        ClusterPage->>CMS: delete cluster\n        CMS-->>ClusterPage: success/error\n    else import ไฟล์\n        Staff->>ClusterPage: เลือกไฟล์และ submit\n        ClusterPage->>CMS: import cluster file\n        CMS-->>ClusterPage: success/error\n    end\n\n    ClusterPage-->>Staff: รีโหลดรายการ\n```\n\n### 22-E: Cluster Detail\n\n#### Purpose\n\nใช้ดูรายละเอียดสมาชิกกลุ่มและอุปกรณ์ของคลัสเตอร์\n\n#### Main Steps\n\n1. เปิดหน้า detail ของ cluster\n2. ระบบโหลดข้อมูล cluster\n3. แสดง tab สมาชิกกลุ่มเป็นค่าเริ่มต้น\n4. เจ้าหน้าที่สลับไปดู tab อุปกรณ์การเกษตรได้\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| อยู่ tab เริ่มต้น | แสดงสมาชิกกลุ่ม |\n| สลับ tab | แสดงอุปกรณ์การเกษตร |\n\n#### Result\n\n- เห็นรายละเอียด cluster ใน 2 มุมหลัก\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant DetailPage as cluster/[id]\n    participant BFF as BFF Service\n\n    Staff->>DetailPage: เปิดหน้า detail cluster\n    DetailPage->>BFF: โหลดข้อมูล cluster\n    BFF-->>DetailPage: dataCluster\n    DetailPage-->>Staff: แสดง tab สมาชิกกลุ่มเป็นค่าเริ่มต้น\n\n    alt ดูอุปกรณ์การเกษตร\n        Staff->>DetailPage: เลือก tab อุปกรณ์\n        DetailPage-->>Staff: แสดง ClusterEquipments\n    else กลับ\n        Staff->>DetailPage: กด Back\n        DetailPage-->>Staff: กลับหน้ารายการ cluster\n    end\n```\n\n---\n\n## Technical Reference\n\n### Central Quota\n\nGlobal state ที่เอกสารเดิมยืนยันได้:\n\n| State Key | ความหมาย |\n|---|---|\n| `globalListCentralQuotasContractsByCaneQuotaState` | รายการสัญญาของ cane quota เดียวกัน พร้อม selected values |\n| `globalCentralQuotasContractProfile` | profile ของสัญญาโควตากลาง พร้อม reload function |\n\nCentral quota list API:\n\n| Constant | Method | ใช้เมื่อ |\n|---|---|---|\n| `apiDataContractByRoleCentralQuotas` | GET | โหลดรายการ contracts |\n| `apiDataCentralQuotaContracts` | DELETE | ลบโควตากลาง |\n\nCentral quota detail API:\n\n| Constant | Method | ใช้เมื่อ |\n|---|---|---|\n| `apiDataContractBff/{id}` | GET | โหลด contract detail |\n| `apiDataContractBff/byRole/central-quotas` | GET | โหลด list สัญญาของ cane quota เดียวกัน |\n| `apiContract/{id}/status` | PUT | ยกเลิกสัญญา |\n\nTabs ในหน้า detail:\n\n| Tab Code | Component |\n|---|---|\n| `contract` | `CentralQuotasContractFormContract` |\n| `quota-central-info` | `CentralQuotasContractInfo` |\n| `kat` | `CentralQuotasContractKatInfo` |\n| `my-cane` | `CentralQuotasContractCaneOwnerInfo` |\n| `harvest` | `CentralQuotasContractHarvestInfo` |\n| `cluster` | `CentralQuotasContractClusterInfo` |\n| `attachment` | `CentralQuotasContractAttachment` |\n\nCancel permission notes:\n\n| สถานะ | Permission |\n|---|---|\n| `ContractStatus.Checked` | `PermissionExtension.contract_cancel_after_approval` |\n| สถานะอื่น | `PermissionExtension.contract_cancel` |\n\nNavigation note:\n\n- `associateType == main` ใช้ id ของรายการนั้น\n- `associateType == children` ใช้ id ของ main contract\n\n### Match Quota Central\n\nAPI ที่เอกสารเดิมยืนยันได้:\n\n| Constant | Method | ใช้เมื่อ |\n|---|---|---|\n| `apiDataCentralQuotas` | GET | โหลด list central quotas สำหรับ setup |\n| `apiDataCaneOwner` | GET | โหลด list cane owners สำหรับ setup |\n\nNotes:\n\n- หน้า list ใช้ mock data\n- หน้า matching มี `onSubmit` ว่าง\n- logic จับคู่จริงยังไม่ครบ\n\n### Cluster\n\nCluster list API:\n\n| Constant | Method | ใช้เมื่อ |\n|---|---|---|\n| `apiBffDataCluster` | GET | โหลด list clusters |\n| `apiBffSugarcaneFarmers` | GET | โหลดชาวไร่ที่เลือกเป็นหัวหน้าได้ |\n| `apiClustors` | POST | สร้าง cluster เริ่มต้น |\n| `apiClustors/{id}` | PUT | อัปเดต cluster |\n| `apiClustors/{id}` | DELETE | ลบ cluster |\n| `apiCustomers/{customerCode}` | PUT | อัปเดต customer ที่เป็นหัวหน้ากลุ่ม |\n| `apiImportDataClusterGroup` | POST | import file cluster |\n\nCreate logic summary:\n\n1. เลือก extension area\n2. สร้าง cluster record ชั่วคราวเพื่อได้ code\n3. submit เพื่อ update cluster ตัวจริง\n4. update customer ให้เป็นหัวหน้า cluster\n\nEdit header change cases ที่เอกสารเดิมยืนยันได้:\n\n- ไม่เปลี่ยนหัวหน้า\n- เปลี่ยนหัวหน้า\n- ลบหัวหน้าโดยไม่เพิ่มใหม่\n- เพิ่มหัวหน้าใหม่เมื่อเดิมไม่มี\n\nDelete rule:\n\n- ปุ่มลบแสดงเฉพาะ `includeChildCustomers.total == 0 || includeChildCustomers.total == 1`\n\nCluster detail API:\n\n| Constant | Method | ใช้เมื่อ |\n|---|---|---|\n| `apiBffDataCluster/{id}` | GET | โหลด cluster detail |\n\nCluster detail tabs:\n\n| Tab | Component |\n|---|---|\n| `GarantorsTab.one` | `ClusterMember` |\n| `GarantorsTab.two` | `ClusterEquipments` |\n\n---\n\n## Known Gaps\n\n- `match-quota-central` ทั้ง 2 หน้าเป็น partial implementation ชัดเจนจากเอกสารเดิม จึงไม่ควรสรุปเป็น flow จับคู่ที่พร้อมใช้งานจริง\n- logic ของ `cluster` ส่วนเปลี่ยนหัวหน้ากลุ่มมีหลายกรณีและอาศัย state ภายใน (`oldData` / `newData`) ถ้าจะอธิบายเชิง rule ลึกกว่านี้ควรกลับไปยืนยันจาก source จริง\n- `central-quota/[id]` ใช้ global state pattern คล้าย flow contracts แต่รอบนี้ยังอธิบายเฉพาะระดับการ bootstrap state และการใช้ tab เท่านั้น\n',

            '# Flow 23 — Inspection\n\n## Overview\n\nFlow นี้รวมงานตรวจรับหลายประเภทที่ปลายทางคล้ายกัน แต่รายละเอียดการทำงานต่างกันตามชนิดสินค้า/บริการที่ตรวจรับ\n\nจากเอกสารเดิม แยกได้เป็น 4 กลุ่มหลัก:\n\n1. ตรวจรับการขอใช้น้ำมัน\n2. ตรวจรับงานบริการจักรกล\n3. ตรวจรับปุ๋ย/ยา\n4. ตรวจรับพันธุ์อ้อย\n\nแต่ละกลุ่มมีการใช้ status, validation, และขั้นตอนหลังตรวจรับไม่เหมือนกัน จึงควรอ่านแยกเป็นคนละ sub-flow มากกว่ามองเป็น flow เดียว\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| น้ำมัน | `inspection-credit-withdraw-oil` |\n| บริการจักรกล | `inspection-mechanical-service/*` |\n| ปุ๋ย/ยา | `inspection-products/*` |\n| พันธุ์อ้อย | `inspection-varity-cane/*` |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| เจ้าหน้าที่ตรวจรับ | ตรวจรายการ, แนบหลักฐาน, เลือกผลการตรวจรับ, และบันทึกผล |\n| หน้า inspection list | แสดงรายการที่รอตรวจรับ พร้อมตัวกรอง |\n| หน้า inspection detail | รับข้อมูลการตรวจรับและส่งผลไป backend |\n| modal / child components | ใช้ใน flow ที่ page เป็น shell หรือมีขั้นตอนย่อยแยกออกไป |\n| BFF Service | โหลด credit withdraw, inspection receipts, และข้อมูลอ้างอิง |\n| CMS Service | สร้าง inspection receipt, อัปโหลดไฟล์, และอัปเดตสถานะ |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| Inspection result | ผลการตรวจรับแต่ละรายการ |\n| Inspection receipt | เอกสารหรือ record ที่เกิดจากการตรวจรับ |\n| Updated credit withdraw | สถานะและปริมาณตรวจรับที่อัปเดตกลับไปยังรายการเบิก |\n| Attachments / verification | รูปถ่าย, GPS, OTP, หรือเอกสารลงนามที่ใช้ยืนยันการตรวจรับ |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["เจ้าหน้าที่เปิดหน้าตรวจรับ"] --> B["เลือกรายการตามชนิดงาน"]\n    B --> C["ระบบโหลดรายการหรือรายละเอียดที่เกี่ยวข้อง"]\n    C --> D["เจ้าหน้าที่ตรวจข้อมูลและกรอกผลตรวจรับ"]\n    D --> E{"ผ่านเงื่อนไขของชนิดงานนั้นหรือไม่?"}\n    E -->|ไม่ผ่าน| F["แจ้งปัญหาและหยุดบันทึก"]\n    E -->|ผ่าน| G["สร้าง receipt หรืออัปเดตสถานะตาม flow นั้น"]\n    G --> H["อัปเดตรายการเบิกและกลับไปหน้ารายการ"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `inspection-credit-withdraw-oil` | container page สำหรับตรวจรับน้ำมัน | delegate งานจริงให้ child components |\n| `inspection-mechanical-service` | รายการตรวจรับงานจักรกล | ใช้ cookie เก็บ filter |\n| `inspection-mechanical-service/[id]/inspection/[refCode]` | detail ตรวจรับงานจักรกล | มี validation, receipt, upload, และ update status |\n| `inspection-mechanical-service/[id]/inspection/[refCode]/history` | ประวัติการตรวจรับงานจักรกล | read-only |\n| `inspection-products` | shell page สำหรับตรวจรับปุ๋ย/ยา | logic อยู่ใน component |\n| `inspection-products/[id]` | detail ตรวจรับปุ๋ย/ยา | มี verify identity ก่อนบันทึก |\n| `inspection-varity-cane` | รายการตรวจรับพันธุ์อ้อย | list พร้อม modal ประวัติ |\n| `inspection-varity-cane/[id]` | detail ตรวจรับพันธุ์อ้อย | เปิด modal ตรวจรับรายรายการ |\n\n---\n\n## Per-Page Details\n\n### 23-A: Oil Inspection\n\n#### Purpose\n\nใช้เป็นหน้า container สำหรับตรวจรับการขอใช้น้ำมัน โดยแยกชาวไร่และผู้รับเหมาออกคนละ tab\n\n#### Main Steps\n\n1. เปิดหน้าตรวจรับน้ำมัน\n2. ระบบตั้งค่าหน้าจอและแสดง tab เริ่มต้น\n3. เจ้าหน้าที่สลับ tab หรือเปลี่ยนปีการผลิต\n4. page เรียก child component ที่ active ให้ reload ข้อมูล\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| เลือก tab ชาวไร่ | reload child ฝั่งชาวไร่ |\n| เลือก tab ผู้รับเหมา | reload child ฝั่งผู้รับเหมา |\n| เปลี่ยนปีการผลิต | ส่งค่าไปยัง child ที่ active แล้ว reload |\n\n#### Result\n\n- ได้รายการตรวจรับน้ำมันตาม tab และปีที่เลือก\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as inspection-credit-withdraw-oil\n    participant SugarcaneChild as Oil Inspection Child\n    participant ContractorChild as Contractor Oil Inspection Child\n\n    Staff->>Page: เปิดหน้าตรวจรับน้ำมัน\n    Page-->>Staff: แสดง 2 tabs\n\n    alt เปลี่ยน tab\n        Staff->>Page: เลือก tab\n        alt tab ชาวไร่\n            Page->>SugarcaneChild: reloadData พร้อม productionYearId\n        else tab ผู้รับเหมา\n            Page->>ContractorChild: reloadData พร้อม productionYearId\n        end\n    else เปลี่ยนปีการผลิต\n        Staff->>Page: เลือกปีการผลิต\n        Page->>Page: ส่ง productionYearId ไปยัง child ที่ active\n    end\n```\n\n### 23-B: Mechanical Service Inspection List\n\n#### Purpose\n\nใช้ดูรายการตรวจรับงานบริการจักรกลก่อนเข้าไปบันทึกผลหรือดูประวัติการตรวจรับ\n\n#### Main Steps\n\n1. เปิดหน้ารายการ\n2. ระบบโหลดค่าจาก cookie สำหรับ filter\n3. เจ้าหน้าที่เลือกชาวไร่, แปลงปลูก, ผู้รับเหมา, สถานะ, หรือปีการผลิต\n4. ระบบโหลดรายการตาม filter\n5. เจ้าหน้าที่เลือกไปหน้าตรวจรับ detail หรือหน้าประวัติ\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| ยังไม่เปลี่ยน filter | เอกสารเดิมระบุว่า mounted ยังไม่ reload list |\n| กดดูประวัติ | ไปหน้า history |\n| กดตรวจรับ | ไปหน้า detail |\n\n#### Result\n\n- ได้รายการงานจักรกลที่ตรงกับ filter ปัจจุบัน\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ListPage as inspection-mechanical-service\n    participant Cookie as Filter Cookie\n    participant BFF as BFF Service\n\n    Staff->>ListPage: เปิดหน้ารายการ\n    ListPage->>Cookie: โหลด filter ที่เคยใช้\n    Cookie-->>ListPage: filter params\n\n    Staff->>ListPage: เปลี่ยน filter\n    ListPage->>Cookie: บันทึก filter ล่าสุด\n    ListPage->>BFF: โหลดรายการตาม filter\n    BFF-->>ListPage: inspection list\n\n    alt ดูประวัติ\n        Staff->>ListPage: กด history\n        ListPage-->>Staff: ไปหน้า history\n    else ตรวจรับ\n        Staff->>ListPage: กด inspection\n        ListPage-->>Staff: ไปหน้า detail\n    end\n```\n\n### 23-C: Mechanical Service Inspection Detail\n\n#### Purpose\n\nใช้บันทึกผลตรวจรับงานบริการจักรกล โดยรองรับการยอมรับงาน, ขอแก้ไข, หรือปฏิเสธ พร้อมอัปเดต receipt และ credit withdraw ตามผลลัพธ์\n\n#### Main Steps\n\n1. เปิดหน้า detail ของรายการตรวจรับ\n2. ระบบโหลด credit withdraw detail\n3. เจ้าหน้าที่อาจเปลี่ยนผู้รับเหมาหรือเปลี่ยนรถ\n4. กรอกผลตรวจรับและแนบหลักฐาน\n5. ระบบ validate ปริมาณและไฟล์\n6. ถ้ายอมรับงาน ระบบสร้าง inspection receipt, อัปโหลดไฟล์, และอัปเดตรายการเบิก\n7. ถ้าขอแก้ไขหรือปฏิเสธ ระบบอัปเดต withdraw item โดยไม่สร้าง receipt\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| เลือก `accepted` | ต้องผ่าน validation เรื่องไฟล์และปริมาณ |\n| checkbox ปิดรายการถูกเลือก | บางเงื่อนไขไฟล์อาจถูกยกเว้นตามเอกสารเดิม |\n| ทุก item complete หรือ refuse แล้ว | อัปเดต credit withdraw ทั้งรายการเป็น `inspected` |\n| เลือก `requestFix` หรือ `refuse` | ไม่สร้าง inspection receipt |\n\n#### Result\n\n- ได้ผลตรวจรับงานจักรกลและสถานะล่าสุดของ credit withdraw\n\n#### Technical Diagrams\n\nตรวจรับแบบ accepted\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant DetailPage as inspection-mechanical-service detail\n    participant BFF as BFF Service\n    participant CMS as CMS Service\n\n    Staff->>DetailPage: เปิดหน้า detail\n    DetailPage->>BFF: โหลด credit withdraw detail\n    BFF-->>DetailPage: dataCreditWithdraw\n    Staff->>DetailPage: กรอกผลตรวจรับและแนบไฟล์\n    DetailPage->>DetailPage: validate ปริมาณและไฟล์\n    DetailPage->>BFF: โหลด payment due ที่เกี่ยวข้อง\n    DetailPage->>CMS: สร้าง inspection receipt\n    CMS-->>DetailPage: receipt id\n    DetailPage->>CMS: อัปเดต receipt status\n    DetailPage->>CMS: อัปโหลดไฟล์ imageInspection และ imageGps\n    DetailPage->>CMS: อัปเดต credit withdraw\n    opt ทุก item จบแล้ว\n        DetailPage->>CMS: อัปเดต credit withdraw status เป็น inspected\n    end\n    DetailPage-->>Staff: แจ้งสำเร็จและกลับหน้ารายการ\n```\n\nตรวจรับแบบ request fix หรือ refuse\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant DetailPage as inspection-mechanical-service detail\n    participant CMS as CMS Service\n\n    Staff->>DetailPage: เลือก requestFix หรือ refuse\n    DetailPage->>CMS: อัปเดต withdrawItems ใน credit withdraw\n    CMS-->>DetailPage: success/error\n    DetailPage-->>Staff: แจ้งผลและกลับหน้ารายการ\n```\n\n### 23-D: Mechanical Service Inspection History\n\n#### Purpose\n\nใช้ดูประวัติการตรวจรับครั้งก่อน ๆ ของ withdraw item เดียวกัน\n\n#### Main Steps\n\n1. เปิดหน้าประวัติ\n2. ระบบโหลด inspection receipts ตาม `withdrawItemRefCode`\n3. แสดงลำดับครั้งที่ตรวจรับ\n4. กด back กลับไปหน้าที่เหมาะสมตาม context\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| เปิดมาจาก list | back กลับหน้ารายการ |\n| เปิดมาจาก detail | back กลับหน้าตรวจรับ detail |\n\n#### Result\n\n- เห็นประวัติการตรวจรับย้อนหลังของรายการนั้น\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant HistoryPage as mechanical-service history\n    participant BFF as BFF Service\n\n    Staff->>HistoryPage: เปิดหน้าประวัติ\n    HistoryPage->>BFF: โหลด inspection receipts ตาม withdrawItemRefCode\n    BFF-->>HistoryPage: history list\n    HistoryPage-->>Staff: แสดงครั้งที่ 1, 2, 3 ...\n\n    alt fromPage = list\n        Staff->>HistoryPage: กด Back\n        HistoryPage-->>Staff: กลับหน้ารายการ\n    else จาก detail\n        Staff->>HistoryPage: กด Back\n        HistoryPage-->>Staff: กลับหน้าตรวจรับ detail\n    end\n```\n\n### 23-E: Product Inspection\n\n#### Purpose\n\nใช้ตรวจรับปุ๋ย/ยา โดยต้องตรวจจำนวนคงเหลือ, แนบหลักฐานรับของ, และผ่าน verify identity ก่อนบันทึกผล\n\n#### Main Steps\n\n1. เปิดหน้า detail ของรายการตรวจรับปุ๋ย/ยา\n2. ระบบโหลด credit withdraw detail และ set global state ให้ฟอร์มอ่านต่อ\n3. เจ้าหน้าที่กรอกจำนวนตรวจรับและแนบรูปหลักฐาน\n4. ระบบตรวจจำนวนคงเหลือ\n5. เปิด modal verify identity\n6. ถ้าผ่าน ระบบสร้าง inspection receipts แบบ bulk, สร้าง invoice, บันทึก verify identity, อัปเดต status และอัปเดต credit withdraw\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| จำนวนตรวจรับเกิน remaining | ไม่ให้บันทึก |\n| มีมูลค่าสินค้าแต่ไม่แนบรูป pick up | ไม่ให้บันทึก |\n| verify type เป็น `signDocs` | receipt ไป `waitingConfirmDoc` |\n| verify type เป็น OTP | receipt ไป `debtAccepted` |\n| ทุก item complete แล้ว | credit withdraw ทั้งรายการถูก mark เป็น `inspected` |\n\n#### Result\n\n- ได้ inspection receipts ของปุ๋ย/ยาและรายการเบิกที่อัปเดตแล้ว\n\n#### Technical Diagrams\n\nหน้ารายการของปุ๋ย/ยา\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as inspection-products\n    participant TableComp as InspectionProductsTable\n\n    Staff->>Page: เปิดหน้าตรวจรับปุ๋ย/ยา\n    Page-->>TableComp: render shell page\n    Note over TableComp: logic หลักอยู่ใน component ไม่ได้อยู่ใน page\n```\n\ndetail ตรวจรับปุ๋ย/ยา\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant DetailPage as inspection-products/[id]\n    participant BFF as BFF Service\n    participant VerifyModal as Verify Identity Modal\n    participant CMS as CMS Service\n\n    Staff->>DetailPage: เปิดหน้า detail\n    DetailPage->>BFF: โหลด credit withdraw detail\n    BFF-->>DetailPage: dataCreditWithdraw\n    Staff->>DetailPage: กรอกจำนวนตรวจรับและแนบรูป\n    DetailPage->>DetailPage: validate remaining amount และไฟล์\n    DetailPage->>VerifyModal: เปิด verify identity\n    Staff->>VerifyModal: ยืนยันตัวตน\n    VerifyModal-->>DetailPage: verify result\n    DetailPage->>CMS: สร้าง inspection receipts แบบ bulk\n    DetailPage->>CMS: สร้าง invoice\n    DetailPage->>CMS: บันทึก verify identities\n    DetailPage->>CMS: อัปเดต receipt statuses\n    DetailPage->>CMS: อัปโหลดไฟล์แนบ\n    DetailPage->>CMS: อัปเดต credit withdraw\n    opt ทุก item complete แล้ว\n        DetailPage->>CMS: อัปเดต credit withdraw status เป็น inspected\n    end\n    DetailPage-->>Staff: แจ้งสำเร็จและกลับหน้ารายการ\n```\n\n### 23-F: Variety Cane Inspection\n\n#### Purpose\n\nใช้ดูรายการตรวจรับพันธุ์อ้อย และเปิด modal เพื่อตรวจรับรายรายการในหน้า detail\n\n#### Main Steps\n\n1. เปิดหน้ารายการ\n2. เจ้าหน้าที่เลือกปีการผลิต, สถานะ, หรือค้นหา\n3. ระบบโหลดรายการตาม filter\n4. ดูประวัติผ่าน modal หรือเปิดหน้า detail\n5. ในหน้า detail ระบบโหลดข้อมูลรายการเบิกและรายการตรวจรับเดิม\n6. เจ้าหน้าที่กดปุ่มตรวจรับเฉพาะรายการที่ยังเปิดให้ตรวจได้\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| ยังไม่เลือกปีหรือ filter | เอกสารเดิมระบุว่า mounted ยังไม่ reload list |\n| withdraw item complete / rejected / refuse แล้ว | ซ่อนปุ่มตรวจรับ |\n| รายการยังตรวจรับได้ | เปิด modal ตรวจรับ |\n\n#### Result\n\n- ได้รายการตรวจรับพันธุ์อ้อยและเปิด flow ตรวจรับใน modal ได้เฉพาะรายการที่ยังทำได้\n\n#### Technical Diagrams\n\nlist ของพันธุ์อ้อย\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ListPage as inspection-varity-cane\n    participant BFF as BFF Service\n    participant HistoryModal as History Modal\n\n    Staff->>ListPage: เปิดหน้ารายการ\n    Staff->>ListPage: เลือกปีการผลิตหรือ filter\n    ListPage->>BFF: โหลดรายการ credit withdraw ของ GM04\n    BFF-->>ListPage: inspection list\n\n    alt ดูประวัติ\n        Staff->>ListPage: กด history\n        ListPage->>HistoryModal: เปิด modal ประวัติ\n    else เปิด detail\n        Staff->>ListPage: กดแก้ไข/ตรวจรับ\n        ListPage-->>Staff: ไปหน้า detail\n    end\n```\n\ndetail ของพันธุ์อ้อย\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant DetailPage as inspection-varity-cane/[id]\n    participant BFF as BFF Service\n    participant InspectModal as Inspection Variety Cane Modal\n\n    Staff->>DetailPage: เปิดหน้า detail\n    DetailPage->>BFF: โหลด credit withdraw detail\n    DetailPage->>BFF: โหลด inspection receipts เดิม\n    BFF-->>DetailPage: detail data และ accepted list\n    DetailPage-->>Staff: แสดงฟอร์มและตารางรายการ\n\n    Staff->>DetailPage: กดตรวจรับใน row ที่ยังทำได้\n    DetailPage->>InspectModal: เปิด modal พร้อม inspectionApprove ปัจจุบัน\n    Note over InspectModal: logic ตรวจรับจริงอยู่ใน modal component ตามเอกสารเดิม\n```\n\n---\n\n## Technical Reference\n\n### Status Reference\n\nBase inspection status ที่เอกสารเดิมยืนยันได้:\n\n| Value | ความหมาย |\n|---|---|\n| `pendingInspection` | รอตรวจรับงาน |\n| `pendingPlan` | รอวางแผน |\n| `pending` | รออนุมัติ |\n| `accepted` | รับบางส่วน |\n| `complete` | ดำเนินการเสร็จสิ้น |\n| `approve` | อนุมัติ |\n| `refuse` | ปฏิเสธงาน |\n| `reject` | ไม่อนุมัติ |\n| `requestFix` | ขอแก้ไขงาน |\n\n### Oil Inspection\n\nNotes:\n\n- page เป็น container\n- API call จริงอยู่ใน child components\n- มี 2 tab คือ `sugarcane` และ `contractor`\n\n### Mechanical Service Inspection\n\nList API:\n\n| Constant | Method | ใช้เมื่อ |\n|---|---|---|\n| `apiBffDataCreditWithdrawsByWithdrawItems` | GET | โหลดรายการงานจักรกล (`GS17`) |\n\nCookie persistence:\n\n- ใช้ cookie code `cms_inspection_mechanical_service`\n- เก็บ `debtGroupId`, `productionYearId`, `quotaNumber`, `withdrawItems.status`, `katLands.landno`, `payeeList.payeeQuotaNumber`\n\nDetail APIs:\n\n| Constant | Method | ใช้เมื่อ |\n|---|---|---|\n| `apiBffDataCreditWithdraws/{id}` | GET | โหลด credit withdraw detail |\n| `apiContractortYearBff` | GET | โหลดผู้รับเหมาเพื่อเปลี่ยนผู้รับเหมา |\n| `apiDataInspectionReceipts` | POST | สร้าง inspection receipt |\n| `apiDataInspectionReceipts/{id}/status` | PUT | อัปเดต status ของ receipt |\n| `apiDataAttachments` | POST | อัปโหลดรูป inspection และ GPS |\n| `apiDataCreditWithDraws/{id}` | PUT | อัปเดต credit withdraw |\n| `apiDataCreditWithDraws/{id}/status` | PUT | อัปเดตเป็น `inspected` |\n| `apiCogPaymentDueBff` | GET | โหลด payment due |\n\nValidation notes:\n\n- ถ้า `accepted` ปกติต้องมี `imageInspection` และ `imageGps`\n- sum amount ต้องไม่เกิน `120%` ของ approve amount ตามเอกสารเดิม\n\nDecision summary:\n\n| selectApprove | ผลหลัก |\n|---|---|\n| `accepted` | สร้าง receipt และอัปเดต status |\n| `requestFix` | ไม่สร้าง receipt |\n| `refuse` | ไม่สร้าง receipt |\n\n### Product Inspection\n\nList page notes:\n\n- `inspection-products` เป็น shell page\n- logic หลักอยู่ใน `InspectionProductsTable`\n\nDetail APIs:\n\n| Constant | Method | ใช้เมื่อ |\n|---|---|---|\n| `apiBffDataCreditWithdraws/{id}` | GET | โหลด credit withdraw detail |\n| `apiDataInspectionReceipts/bulk` | POST | สร้าง receipts หลายรายการ |\n| `apiDataInspectionReceiptsInvoid` | POST | สร้าง invoice |\n| `apiDataInspectionReceipts/{id}/status` | PUT | อัปเดตสถานะ receipt |\n| `apiDataAttachments` | POST | อัปโหลดรูปและเอกสาร |\n| `apiDataVerifyIdentities` | POST | บันทึก verify identity |\n| `apiDataCreditWithDraws/{id}` | PUT | อัปเดต credit withdraw |\n| `apiDataCreditWithDraws/{id}/status` | PUT | อัปเดตเป็น `inspected` |\n\nGlobal state:\n\n- `appStateDataCreditWithdraw`\n- `sDataCreditWithdrawState.formGS21.withdrawItems[]`\n\nAmount validation:\n\n- `remaining = approveAmount - sum(includeInspectionReceipts.amount)`\n- error ถ้า `_inSpectionAmount > remaining`\n\nVAT notes:\n\n- ใช้ VAT `7%` ถ้า product นั้นเป็น VAT\n- คำนวณ `receiptPrice`, `vatPrice`, `totalPrice` ตามจำนวนที่ตรวจรับ\n\nVerify type notes:\n\n- `signDocs` -> `waitingConfirmDoc`\n- OTP -> `debtAccepted`\n\n### Variety Cane Inspection\n\nList API:\n\n| Constant | Method | ใช้เมื่อ |\n|---|---|---|\n| `apiBffDataCreditWithdraws` | GET | โหลดรายการ `GM04` |\n\nDetail APIs:\n\n| Constant | Method | ใช้เมื่อ |\n|---|---|---|\n| `apiBffDataCreditWithdraws/{id}` | GET | โหลด detail |\n| `apiBffexportDataInspectionReceipts` | GET | โหลด inspection receipts เดิม |\n\nGlobal state:\n\n- `appStateCreditSpecialApprove`\n- `sUsingCreditWithdraw.dataContract`\n\nButton visibility logic:\n\n- ถ้าไม่มีรายการที่ refCode ตรงกัน -> แสดงปุ่ม\n- ถ้ามีรายการ `complete`, `rejected`, หรือ `refuse` -> ซ่อนปุ่ม\n- ถ้ายังไม่มีรายการปิดงาน -> แสดงปุ่ม\n\n### Debt Group Notes\n\nmapping ที่เอกสารเดิมระบุ:\n\n| กลุ่ม | debtGroupId / หมายเหตุ |\n|---|---|\n| น้ำมัน | page ไม่ได้ระบุชัดในเอกสารเดิม |\n| จักรกล | `GS17` |\n| ปุ๋ย/ยา | `GS21` |\n| ลวดสลิง/สายรัด | `GS16-3` เป็น placeholder |\n| พันธุ์อ้อย | `GM04` |\n\n---\n\n## Known Gaps\n\n- `inspection-credit-withdraw-oil` และ `inspection-products` เป็น shell/container page จึงยังไม่สรุปลึกเกิน child/component behavior ที่เอกสารเดิมยืนยันได้\n- flow ตรวจรับพันธุ์อ้อยในหน้า detail จบใน modal component แต่เอกสารเดิมไม่ได้ให้ logic ภายใน modal ชัดพอ จึงสรุปได้แค่จุดเข้าและเงื่อนไขการเปิดปุ่ม\n- `inspection-products/[id]` มี history note ในเอกสารเดิมว่าพาไปอีกปลายทางหนึ่ง ไม่ได้อยู่ใน flow history แบบ mechanical service จึงยังไม่ขยายเป็น history sub-flow\n',
