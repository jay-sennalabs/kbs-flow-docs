          content:
            '# Flow 16 — Contractor Credit\n\n## Overview\n\nFlow นี้รวมงานอนุมัติและงานต่อเนื่องของ "การเบิกเงินยืมผู้รับเหมา" และ "การอนุมัติเบิกใช้วงเงิน" หลายชนิดในฝั่ง CMS โดยทุกหน้าที่ตรวจใน flow นี้เป็นหน้าใช้งานจริงที่ผูกกับ API และใช้ `FormCreditWithdraw` เป็นตัวกลางสำหรับเตรียม approve body และคุมสถานะหลังอนุมัติ\n\nจาก source จริง flow นี้แบ่งได้เป็น 3 กลุ่มใหญ่:\n\n1. อนุมัติคำร้องเงินยืมของผู้รับเหมา แยกฤดูหีบกับจักรกล\n2. ติดตามรายการที่เข้าสถานะรอทำงวดหรือรอตรวจรับในหน้าจัดการงวดเบิกเงินยืมผู้รับเหมา\n3. อนุมัติเบิกใช้วงเงินของชาวไร่ แยกเป็นวงเงินประจำปี, วงเงินพิเศษ, เบิกใช้ฤดูหีบ, และวงเงินอนุโลม\n\nภาพรวมเชิงธุรกิจคือ เจ้าหน้าที่เริ่มจาก list page, เปิด detail ตามชนิดคำขอ, ตรวจข้อมูลจาก form summary ของ debt group นั้น, แล้วเปลี่ยนสถานะคำขอให้ไหลต่อไปยังงานงวดแบ่งจ่าย, งานเบิกน้ำมัน, หรืองานตรวจรับ ตามประเภทของรายการ\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| อนุมัติเงินยืมผู้รับเหมา | `cms/contractors-request-borrow/*` |\n| จัดการงวดเบิกเงินยืมผู้รับเหมา | `cms/contractors-installment-credit-withdraws/*` |\n| อนุมัติเบิกใช้วงเงินชาวไร่ | `cms/request-credit-withdraws/*` |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| เจ้าหน้าที่อนุมัติ | กรองรายการ, เปิด detail, ตรวจคำขอ, อนุมัติ, ไม่อนุมัติ, หรือส่งกลับแก้ไข |\n| หน้า list ของคำขอเบิกใช้ | แสดงรายการตามชนิดวงเงินหรือชนิดเงินยืม พร้อม filter และ route ไปหน้า detail |\n| หน้า detail อนุมัติ | โหลดคำขอจริง, render summary/form ตาม debt group, และ submit approve sequence |\n| หน้าจัดการงวดเบิกเงินยืมผู้รับเหมา | แสดงรายการที่เข้าสถานะรอแบ่งจ่ายหรือรอตรวจรับ แล้วเปิดต่อไป flow installment |\n| BFF Service | ส่งข้อมูล list, grouped list, detail, KAT contract, และ installment config |\n| CMS Service | รับคำสั่งอัปเดต status และ body ของ credit withdraw |\n| eForm | พิมพ์ประวัติสมาชิกและเอกสารแบบฟอร์มที่เกี่ยวข้อง |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| Approved contractor borrow | คำขอเงินยืมผู้รับเหมาที่ถูกอนุมัติและพร้อมไปขั้นถัดไป |\n| Approved farmer withdraw | คำขอเบิกใช้วงเงินของชาวไร่ที่ผ่านอนุมัติ |\n| Next-step status | สถานะปลายทาง เช่น `pendingSplitAmount`, `pendingSplitOil`, `pendingInspection` |\n| Installment worklist | รายการที่พร้อมเข้าสู่งานงวดแบ่งจ่าย |\n| Printed document | เอกสาร preprint หรือ merged print ที่เปิดจากหน้า detail |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["เจ้าหน้าที่เปิดหมวด Contractor Credit"] --> B["เลือกกลุ่มงานที่ต้องทำ"]\n\n    B --> C["อนุมัติคำร้องเงินยืมผู้รับเหมา"]\n    B --> D["ติดตามรายการงวดเบิกเงินยืมผู้รับเหมา"]\n    B --> E["อนุมัติเบิกใช้วงเงินของชาวไร่"]\n\n    C --> F["เปิด detail ตาม request code"]\n    F --> G["ตรวจข้อมูล summary ของ debt group"]\n    G --> H["ส่งผลอนุมัติผ่าน approve sequence"]\n    H --> I["อัปเดต status ของ credit withdraw และ route ไป split/oil"]\n\n    D --> J["ดูรายการที่อยู่ในสถานะพร้อมทำงวดหรือรอตรวจรับ"]\n    J --> K["เปิดไปหน้า installment detail ของ flow ถัดไป"]\n\n    E --> L["เลือก tab ตามชนิดวงเงิน"]\n    L --> M["เปิด detail ของคำขอหรือ grouped request"]\n    M --> N["ตรวจข้อมูลและ submit approve sequence"]\n    N --> O["route status ไป split amount / split oil / inspection ตาม debt group"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `contractors-request-borrow/index.vue` | ดูรายการคำร้องเงินยืมผู้รับเหมาแบบ grouped by request code | แยก tab เงินยืมจักรกลและฤดูหีบ |\n| `contractors-request-borrow/harvest/[requestCode]/index.vue` | อนุมัติคำขอเงินยืมฤดูหีบผู้รับเหมา | approve หลายรายการใน request code เดียว |\n| `contractors-request-borrow/mechanical/[requestCode]/index.vue` | อนุมัติคำขอเงินยืมจักรกลผู้รับเหมา | มีปุ่ม scroll, เปิดประวัติผู้รับเหมา, และพิมพ์เอกสาร |\n| `contractors-installment-credit-withdraws/index.vue` | ดูรายการผู้รับเหมาที่พร้อมทำงวดหรือรอตรวจรับ | route ไป `/cms/installment-credit-withdraws/:id` |\n| `request-credit-withdraws/index.vue` | ดูรายการอนุมัติเบิกใช้วงเงินของชาวไร่ | แยก 4 tabs ตามชนิดวงเงิน |\n| `request-credit-withdraws/[id]/index.vue` | detail ของวงเงินส่งเสริมประจำปี | render component ตาม `debtGroupId` |\n| `request-credit-withdraws/allowed-credit-limit/[id]/index.vue` | detail ของวงเงินอนุโลมให้เบิกใช้ | approve แล้วไป `pendingInspection` เสมอ |\n| `request-credit-withdraws/credit-request-usage-before-havest/[id]/index.vue` | detail ของการเบิกใช้เงินเตรียมการฤดูหีบ | route status ตาม debt group |\n| `request-credit-withdraws/credit-special/[requestCode]/index.vue` | detail แบบ grouped ของวงเงินพิเศษ | รวมหลาย debt groups ใน request code เดียว |\n\n---\n\n## Per-Page Details\n\n### 16-A: Contractor Borrow Request List\n\n#### Purpose\n\nใช้ดูรายการคำร้องเงินยืมของผู้รับเหมาแบบ grouped by `requestCode`, กรองตามชนิดเงินยืม, debt group, เขตส่งเสริม, สถานะ, และลำดับอนุมัติของผู้ใช้ ก่อนเปิดไปหน้า detail\n\n#### Main Steps\n\n1. เปิดหน้ารายการคำร้องเงินยืมผู้รับเหมา\n2. หน้าเตรียม tabs, table columns, status options, debt group filter, และ extension area filter\n3. default tab เป็นเงินยืมจักรกล\n4. ระบบโหลด grouped list จาก BFF\n5. เจ้าหน้าที่เปลี่ยน tab หรือ filter ตามต้องการ\n6. เปิดไปหน้าอนุมัติฤดูหีบหรือจักรกลตาม tab ที่เลือก\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| tab = `usageContractorMechanical` | route ไปหน้า mechanical detail |\n| tab = `usageContractorHarvest` | route ไปหน้า harvest detail |\n| status = `pending` | ใช้ `not.status` เพื่อตัดทุกสถานะอื่นออก |\n| status = ว่าง | ตัด `grouping` และ `pendingIncrease` ออก |\n| ผู้ใช้เป็นส่วนกลาง | แสดง extension area selector |\n\n#### Result\n\n- ได้รายการ grouped request ของผู้รับเหมาตามเงื่อนไขที่เลือก\n- ผู้ใช้เปิดไปหน้าอนุมัติ detail ได้ตรงตามชนิดคำขอ\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as contractors-request-borrow/index.vue\n    participant BFF as apiBffDataCreditWithdrawsGroupByRequestCodeLess\n    participant DetailPage as harvest/mechanical detail\n\n    Staff->>Page: เปิดหน้ารายการ\n    Page->>Page: set tabs, fields, filters, table\n    Page->>BFF: โหลด grouped list ของ default tab\n    BFF-->>Page: request groups\n    Page-->>Staff: แสดงตาราง parent + children\n\n    alt เปลี่ยน tab หรือ filter\n        Staff->>Page: เปลี่ยน tab / status / debt group / extension area / isMySequence\n        Page->>BFF: reloadData()\n        BFF-->>Page: filtered grouped list\n    end\n\n    Staff->>Page: กด action ของรายการ\n    Page-->>DetailPage: navigate ตามชนิดเงินยืม\n```\n\n### 16-B: Contractor Borrow Detail Pages\n\nครอบคลุม:\n\n- `contractors-request-borrow/harvest/[requestCode]/index.vue`\n- `contractors-request-borrow/mechanical/[requestCode]/index.vue`\n\n#### Purpose\n\nใช้อนุมัติคำขอเงินยืมของผู้รับเหมาที่รวมหลาย credit withdraw ไว้ภายใต้ request code เดียว โดยหน้า detail จะโหลดข้อมูลทั้งหมดของ request นั้น, ปั้น `FormCreditWithdraw` state ตาม debt group ที่พบ, แล้ว submit approve sequence ทีเดียว\n\n#### Main Steps\n\n1. เปิดหน้า detail ตาม `requestCode`\n2. ระบบโหลด grouped credit withdraw list ของ request นั้น\n3. หน้า merge state จากแต่ละรายการเข้าสู่ `FormCreditWithdraw`\n4. แสดง collateral detail, summary component, และ approve sequence\n5. ผู้อนุมัติอาจกดดูข้อมูลเพื่อไปหน้าแก้ไขรายการของผู้รับเหมา\n6. เมื่อ submit ระบบ loop ทีละ credit withdraw เพื่ออัปเดต status และ body\n\n#### ความต่างระหว่าง 2 หน้า\n\n| หน้า | จุดต่าง |\n|---|---|\n| `harvest/[requestCode]` | flow เรียบกว่าและ route กลับหน้ารายการอย่างเดียว |\n| `mechanical/[requestCode]` | มีปุ่ม scroll ไปกล่องอนุมัติ, เปิดหน้าประวัติผู้รับเหมา, พิมพ์ประวัติสมาชิก, และพิมพ์ใบยืมเงินทดลองจ่าย |\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| approve สำเร็จในหน้า harvest | `OTH3` ไป `pendingSplitOil`, อื่นๆ ไป `pendingSplitAmount` |\n| approve สำเร็จในหน้า mechanical | `OTH2` ไป `pendingSplitOil`, อื่นๆ ไป `pendingSplitAmount` |\n| บางรายการอัปเดตไม่สำเร็จ | หน้าเก็บ error แล้วแจ้งแบบ partial success |\n| กดดูข้อมูล | route ไปหน้า borrow-money edit ของผู้รับเหมา |\n\n#### Result\n\n- ได้คำขอเงินยืมผู้รับเหมาที่ถูกอนุมัติหรือไม่อนุมัติทีละรายการภายใน request code\n- รายการที่อนุมัติแล้วถูก route ต่อไปยังงานแบ่งจ่ายหรืองานเบิกน้ำมัน\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as contractor borrow detail\n    participant BFF as apiBffDataCreditWithdrawsGroupByRequestCode/{requestCode}\n    participant StatusAPI as apiDataCreditWithDraws/{id}/status\n    participant BodyAPI as apiDataCreditWithDraws/{id}\n\n    Staff->>Page: เปิดหน้า detail\n    Page->>BFF: โหลด credit withdraw list ของ requestCode\n    BFF-->>Page: withdraw list\n    Page->>Page: merge FormCreditWithdraw state และคำนวณยอดรวม\n    Page-->>Staff: แสดง summary + approve sequence\n\n    Staff->>Page: submit approve sequence\n    loop credit withdraw ที่ isAdded\n        Page->>StatusAPI: PUT status + note\n        alt status = approve\n            Page->>BodyAPI: PUT approve body\n            Page->>StatusAPI: PUT status ปลายทางตาม debt group\n        end\n    end\n\n    Page-->>Staff: แจ้ง success หรือ partial success\n```\n\n### 16-C: Contractor Installment Management\n\n#### Purpose\n\nใช้ดูรายการเงินยืมผู้รับเหมาที่ผ่านขั้นอนุมัติแล้วและพร้อมไปทำงวดแบ่งจ่ายหรือรอตรวจรับ ก่อนเปิดต่อไปยังหน้า installment detail\n\n#### Main Steps\n\n1. เปิดหน้าจัดการงวดเบิกเงินยืมผู้รับเหมา\n2. ระบบโหลดรายการตาม `creditTypeCode` ของ tab ปัจจุบัน\n3. เจ้าหน้าที่ค้นหา, เปลี่ยนสถานะ, หรือสลับ tab\n4. เปิดไปหน้า `/cms/installment-credit-withdraws/:id`\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| tab = จักรกล หรือ ฤดูหีบ | ใช้ `creditTypeCode` ต่างกัน แต่ตารางเดียวกัน |\n| status filter = ว่าง | แสดง `pendingSplitAmount` และ `completeSplitAmount` ผ่าน `not.status` |\n| status filter เลือกค่า | กรองตรงตาม status นั้น |\n\n#### Result\n\n- ได้ worklist ของรายการที่พร้อมเข้าสู่งานงวดแบ่งจ่าย\n- หน้า detail ของงานงวดจริงไปต่อใน flow อื่น\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as contractors-installment-credit-withdraws/index.vue\n    participant BFF as apiBffDataCreditWithdraws\n    participant InstallmentPage as /cms/installment-credit-withdraws/{id}\n\n    Staff->>Page: เปิดหน้า\n    Page->>BFF: โหลดรายการตาม tab และ status\n    BFF-->>Page: installment worklist\n    Page-->>Staff: แสดงตาราง\n\n    alt เปลี่ยน tab / search / status\n        Staff->>Page: ปรับเงื่อนไข\n        Page->>BFF: reloadData()\n        BFF-->>Page: filtered list\n    end\n\n    Staff->>Page: กด action\n    Page-->>InstallmentPage: navigate ไปหน้า installment detail\n```\n\n### 16-D: Farmer Credit Withdraw List\n\n#### Purpose\n\nใช้ดูรายการอนุมัติเบิกใช้วงเงินของชาวไร่ โดยแยกตามชนิดวงเงิน 4 แบบ และเลือก API / table layout / detail route ให้เหมาะกับแต่ละชนิด\n\n#### Main Steps\n\n1. เปิดหน้ารายการอนุมัติเบิกใช้วงเงิน\n2. หน้าเตรียม tabs, filters, table columns, และ child table สำหรับ grouped special requests\n3. default tab คือวงเงินส่งเสริมประจำปี\n4. ระบบโหลด list หรือ grouped list ตามชนิดวงเงินที่เลือก\n5. เจ้าหน้าที่กรองข้อมูลแล้วเปิดไปหน้า detail ของคำขอ\n\n#### Decision Points\n\n| tab | API | route action |\n|---|---|---|\n| `creditYearly` | `apiBffDataCreditWithdrawsLess` | `/cms/request-credit-withdraws/:id` |\n| `creditSpecial` | `apiBffDataCreditWithdrawsGroupByRequestCodeLess` | `/cms/request-credit-withdraws/credit-special/:requestCode` |\n| `usageBeforeHarvest` | `apiBffDataCreditWithdrawsLess` | `/cms/request-credit-withdraws/credit-request-usage-before-havest/:id` |\n| `allowedCreditLimit` | `apiBffDataCreditWithdrawsLess` | `/cms/request-credit-withdraws/allowed-credit-limit/:id` |\n\n#### Result\n\n- ได้รายการอนุมัติแยกตาม family ของวงเงิน\n- ผู้ใช้ถูกพาไปหน้า detail ที่ตรงกับกติกาของแต่ละชนิดวงเงิน\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as request-credit-withdraws/index.vue\n    participant LessBFF as apiBffDataCreditWithdrawsLess\n    participant GroupBFF as apiBffDataCreditWithdrawsGroupByRequestCodeLess\n    participant DetailPage as detail pages\n\n    Staff->>Page: เปิดหน้ารายการ\n    Page->>Page: set tabs, filters, table\n\n    alt tab = creditSpecial\n        Page->>GroupBFF: โหลด grouped list\n        GroupBFF-->>Page: grouped special requests\n    else tab อื่น\n        Page->>LessBFF: โหลด flat list\n        LessBFF-->>Page: credit withdraw list\n    end\n\n    Staff->>Page: เปลี่ยน tab หรือ filter\n    Page->>Page: เปลี่ยน table layout และ reloadData()\n\n    Staff->>Page: กด action\n    Page-->>DetailPage: navigate ตามชนิดวงเงิน\n```\n\n### 16-E: Single Withdraw Approval Pages\n\nครอบคลุม:\n\n- `request-credit-withdraws/[id]/index.vue`\n- `request-credit-withdraws/allowed-credit-limit/[id]/index.vue`\n- `request-credit-withdraws/credit-request-usage-before-havest/[id]/index.vue`\n\n#### Purpose\n\nใช้อนุมัติคำขอที่ทำงานแบบ "หนึ่งหน้า ต่อหนึ่ง credit withdraw" โดยแต่ละ route จะเลือก summary/form component ตาม debt group, โหลดข้อมูลของ withdraw นั้น, และ submit approve sequence เพื่อเปลี่ยน status ปลายทางให้เหมาะกับชนิดรายการ\n\n#### Main Steps\n\n1. เปิดหน้า detail ของ withdraw\n2. ระบบโหลดข้อมูลจาก BFF\n3. หน้าแปลงข้อมูลเข้าสู่ `FormCreditWithdraw`\n4. render summary/form component ตาม debt group\n5. ผู้ใช้กดดูข้อมูลเพื่อไปหน้าแก้ไขใน contract flow ได้\n6. เมื่อ submit ระบบ PUT status, PUT body, แล้ว route ไป status ปลายทางถ้าผ่านอนุมัติ\n\n#### ความต่างของแต่ละ route\n\n| Route | ลักษณะเด่น |\n|---|---|\n| `request-credit-withdraws/[id]` | ใช้กับวงเงินประจำปีและ debt groups หลักอย่าง `GS16-1`, `GS21`, `GC01`, `GS17`, `AD03-*`, `GS10`, `AD01-2`, `GS16-2`, `GS16-3` |\n| `allowed-credit-limit/[id]` | ใช้ summary เฉพาะ allowed credit limit และ approve แล้วไป `pendingInspection` เสมอ |\n| `credit-request-usage-before-havest/[id]` | ใช้กับเบิกใช้ฤดูหีบและ route status ตาม debt group ฝั่งฤดูหีบ |\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| route = creditYearly default | route status ตาม debt group cash/oil/inspection |\n| route = allowedCreditLimit | approve แล้วไป `pendingInspection` เสมอ |\n| route = usageBeforeHarvest | route status ตาม debt group ฝั่งฤดูหีบ |\n| กดดูข้อมูล | route ไปหน้าแก้ไข under `contracts/.../using-credit/...` |\n\n#### Result\n\n- ได้คำขอเบิกใช้ที่ผ่านอนุมัติ, ไม่อนุมัติ, หรือขยับเข้าสู่สถานะ downstream ที่เหมาะกับชนิดรายการ\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as single withdraw detail\n    participant BFF as apiBffDataCreditWithdraws/{id}\n    participant StatusAPI as apiDataCreditWithDraws/{id}/status\n    participant BodyAPI as apiDataCreditWithDraws/{id}\n\n    Staff->>Page: เปิดหน้า detail\n    Page->>BFF: โหลด credit withdraw detail\n    BFF-->>Page: withdraw detail\n    Page->>Page: set FormCreditWithdraw state และ render component ตาม debt group\n    Page-->>Staff: แสดงข้อมูลและ approve sequence\n\n    Staff->>Page: submit approve sequence\n    Page->>StatusAPI: PUT status + note\n    Page->>BodyAPI: PUT approve body\n\n    alt status = approve\n        Page->>StatusAPI: PUT status ปลายทางตาม route/debt group\n    end\n\n    Page-->>Staff: แจ้งผลและกลับหน้ารายการ\n```\n\n### 16-F: Credit Special Grouped Approval\n\n#### Purpose\n\nใช้อนุมัติวงเงินพิเศษแบบ grouped by `requestCode` ซึ่งอาจมีหลาย credit withdraw ภายใต้คำขอเดียว และแต่ละ debt group ใช้กติกาไม่เหมือนกัน ทั้งการอัปเดต status โดยตรง, การตรวจ summary ว่ามีรายการที่ถูกเลือก, และการ route ไป split amount หรือ inspection\n\n#### Main Steps\n\n1. เปิดหน้า detail ของ request code วงเงินพิเศษ\n2. ระบบโหลดรายการทั้งหมดใน request นั้น\n3. หน้า merge state จากหลาย debt groups เข้าสู่ `appStateCreditSpecialApprove`\n4. คำนวณยอดขอและยอดอนุมัติรวม\n5. ผู้อนุมัติพิมพ์เอกสาร, เปิดไปหน้าแก้ไข, หรือ submit approve sequence\n6. ระบบ loop ทีละ credit withdraw แล้วใช้กติกาเฉพาะของ debt group เพื่ออัปเดต status และ body\n\n#### Decision Points\n\n| debt group family | พฤติกรรม |\n|---|---|\n| `GM07`, `GM19`, `GM20` | update status โดยตรงจากรายการที่ถูกเลือกใน summary |\n| `GM04` | approve แล้วไป `pendingInspection` |\n| `GM05`, `GM13` | ใช้ข้อมูล summary/mapping เพื่อดูว่ารายการใดควรถูก approve |\n| กลุ่มที่ approve สำเร็จและไม่ใช่ `GM04` | ไป `pendingSplitAmount` |\n\n#### Result\n\n- ได้ grouped request ของวงเงินพิเศษที่ถูกอนุมัติทีละรายการภายใน request เดียว\n- รายการที่ผ่านแล้วถูก route ต่อไปยัง split amount หรือ inspection ตามกลุ่มงาน\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as credit-special/[requestCode]/index.vue\n    participant BFF as apiBffDataCreditWithdrawsGroupByRequestCode/{requestCode}\n    participant StatusAPI as apiDataCreditWithDraws/{id}/status\n    participant BodyAPI as apiDataCreditWithDraws/{id}\n\n    Staff->>Page: เปิดหน้า detail\n    Page->>BFF: โหลดรายการทั้งหมดของ requestCode\n    BFF-->>Page: grouped special withdraws\n    Page->>Page: merge state และคำนวณยอดรวม\n    Page-->>Staff: แสดง summary + approve sequence\n\n    Staff->>Page: submit approve sequence\n    loop credit withdraw แต่ละรายการ\n        Page->>Page: สร้าง status body ตาม debt group และ summary state\n        Page->>StatusAPI: PUT status\n        alt status = approve\n            Page->>BodyAPI: PUT approve body\n            Page->>StatusAPI: PUT status ปลายทาง\n        end\n    end\n\n    Page-->>Staff: แจ้ง success หรือ partial success\n```\n\n---\n\n## Technical Reference\n\n### Credit Types ใน Flow นี้\n\n| Value | ใช้ใน |\n|---|---|\n| `usageContractorMechanical` | เงินยืมจักรกลผู้รับเหมา |\n| `usageContractorHarvest` | เงินยืมฤดูหีบผู้รับเหมา |\n| `creditYearly` | วงเงินส่งเสริมประจำปี |\n| `creditSpecial` | วงเงินส่งเสริมพิเศษ |\n| `usageBeforeHarvest` | เบิกใช้เงินเตรียมการฤดูหีบ |\n| `allowedCreditLimit` | วงเงินอนุโลมให้เบิกใช้ |\n\n### Global State Keys\n\n| State key | ใช้ใน | หน้าที่ |\n|---|---|---|\n| `globalBaseLoading` | ทุกหน้าใน flow นี้ | loading ระดับหน้า |\n| `globalAlertModal` | detail pages | success / warning / error modal |\n| `appStateBorrowMoneyHarvest` | contractor harvest detail | state อนุมัติเงินยืมฤดูหีบ |\n| `appStateBorrowMoneyMechanical` | contractor mechanical detail | state อนุมัติเงินยืมจักรกล |\n| `appStateDataCreditWithdraw` | yearly detail และ usage-before-harvest detail | state อนุมัติเบิกใช้วงเงิน |\n| `appStateAllowedCreditLimit` | allowed-credit-limit detail | state วงเงินอนุโลม |\n| `appStateCreditSpecialApprove` | credit-special grouped detail | state วงเงินพิเศษ |\n\n### APIs ที่ใช้ใน Flow นี้\n\n| Constant / Path | Method | ใช้เมื่อ |\n|---|---|---|\n| `apiBffDataCreditWithdrawsGroupByRequestCodeLess` | GET | list แบบ grouped ของผู้รับเหมาและวงเงินพิเศษ |\n| `apiBffDataCreditWithdrawsGroupByRequestCode/{requestCode}` | GET | detail แบบ grouped ตาม request code |\n| `apiBffDataCreditWithdrawsLess` | GET | list แบบ flat ของคำขอเบิกใช้วงเงินชาวไร่ |\n| `apiBffDataCreditWithdraws/{id}/less` | GET | detail แบบ less ของ yearly และ usage-before-harvest |\n| `apiBffDataCreditWithdraws/{id}` | GET | detail เต็มของ allowed credit limit |\n| `apiBffDataCreditWithdraws` | GET | รายการ contractor installment management |\n| `apiDataCreditWithDraws/{id}` | PUT | บันทึก approve body ของ withdraw |\n| `apiDataCreditWithDraws/{id}/status` | PUT | บันทึก status และ note ของ withdraw |\n| `apiBffDataKatContract` | GET | เติมข้อมูล KAT ในบาง debt groups |\n| `apiCogInstallmentBff` | GET | ใช้ช่วยคำนวณงวดบางกรณีของวงเงินพิเศษ |\n| `/eform/preprint` | GET | พิมพ์ประวัติสมาชิกหรือเอกสารเดี่ยว |\n| `/eform/preprint/merge` | POST | พิมพ์รวมเอกสารหลายรายการของวงเงินพิเศษ |\n\n### Filter Behavior ที่สำคัญ\n\n#### `contractors-request-borrow/index.vue`\n\n- default status = `pending`\n- ถ้า status = `pending` ใช้ `not.status` เพื่อตัดทุกสถานะอื่น\n- ถ้า status ว่าง ใช้ `not.status = [grouping, pendingIncrease]`\n- status options แสดงทุกค่า ยกเว้น `grouping` และ `pendingIncrease`\n\n#### `contractors-installment-credit-withdraws/index.vue`\n\n- default status = ว่าง\n- ถ้า status ว่าง ใช้ `not.status` เพื่อให้เหลือ `pendingSplitAmount` และ `completeSplitAmount`\n- dropdown เลือกได้เฉพาะ `pendingInspection` และ `pendingSplitAmount`\n\n#### `request-credit-withdraws/index.vue`\n\n- default status = `pending`\n- ถ้า status = `pending` ใช้ `not.status` เพื่อตัดทุกสถานะอื่น\n- ถ้า status ว่าง ใช้ `not.status = [grouping, pendingIncrease]`\n- dropdown ตัด `draft`, `grouping`, `pendingIncrease`, `approve`, และ `notEnoughCredit` ออก\n\n### Edit Routes ที่เปิดจากหน้าอนุมัติ\n\n| Source page | Edit route |\n|---|---|\n| contractor harvest detail | `/cms/contractors/{contractorId}/borrow-money/harvest/byReqCode/{requestCode}?type=editing` |\n| contractor mechanical detail | `/cms/contractors/{contractorId}/borrow-money/mechanical/byReqCode/{requestCode}?type=editing` |\n| yearly detail | `/cms/contracts/{contractId}/using-credit/creditYearly/byWithdraw/{withdrawId}?type=editing` |\n| allowed credit limit detail | `/cms/contracts/{contractId}/using-credit/allowedCreditLimit/byWithdraw/{withdrawId}?type=editing` |\n| usage before harvest detail | `/cms/contracts/{contractId}/using-credit/usageBeforeHarvest/byWithdraw/{withdrawId}?type=editing` |\n| credit special grouped detail | `/cms/contracts/{contractId}/using-credit/creditSpecial/byReqCode/{requestCode}?type=editing` |\n\n### Status Routing หลัง Approve\n\n#### Contractor borrow\n\n| Page | เงื่อนไข | Status ปลายทาง |\n|---|---|---|\n| harvest detail | `debtGroupId = OTH3` | `pendingSplitOil` |\n| harvest detail | อื่นๆ | `pendingSplitAmount` |\n| mechanical detail | `debtGroupId = OTH2` | `pendingSplitOil` |\n| mechanical detail | อื่นๆ | `pendingSplitAmount` |\n\n#### Farmer single-withdraw pages\n\n| Route | เงื่อนไข | Status ปลายทาง |\n|---|---|---|\n| yearly detail | `GC01`, `AD03-3`, `AD03-2`, `GS10`, `AD01-2`, `GM05`, `GM07`, `GM13`, `GM19`, `GM20` | `pendingSplitAmount` |\n| yearly detail | `GS16-1`, `GS16-2` | `pendingSplitOil` |\n| yearly detail | `GS21`, `GS16-3`, `GS17`, `GM04` | `pendingInspection` |\n| allowed credit limit detail | approve ทุกกรณี | `pendingInspection` |\n| usage before harvest detail | `AD03-3`, `AD03-2`, `GS10`, `AD01-2`, `AD03-1`, `GC03` | `pendingSplitAmount` |\n| usage before harvest detail | `GS16-2` | `pendingSplitOil` |\n| usage before harvest detail | `GS16-3` | `pendingInspection` |\n\n#### Credit special grouped detail\n\n| เงื่อนไข | Status ปลายทาง |\n|---|---|\n| `GM04` approve สำเร็จ | `pendingInspection` |\n| กลุ่มอื่นที่ approve สำเร็จ | `pendingSplitAmount` |\n\n### Debt Group Components ที่ยืนยันจาก source\n\n#### yearly detail\n\n| debtGroupId | Component family |\n|---|---|\n| `GS16-1` | น้ำมัน |\n| `GS21` | ปุ๋ย/โดโลไมท์/ยา |\n| `GC01` | เงินส่งเสริมปลายฝน/ต้นฝน |\n| `GS17` | บริการจักรกล |\n| `AD03-3`, `AD03-2`, `GS10`, `AD01-2`, `GS16-2`, `GS16-3` | ฟอร์ม/สรุปตามกลุ่มฤดูหีบ |\n\n#### usage-before-harvest detail\n\n| debtGroupId | Component family |\n|---|---|\n| `AD03-3`, `GC03`, `AD03-2`, `GS10`, `AD01-2`, `GS16-2`, `GS16-3`, `AD03-1` | ฟอร์ม/สรุปตามกลุ่มฤดูหีบ |\n\n---\n\n## Known Gaps\n\n- `contractors-installment-credit-withdraws` มีพฤติกรรมที่ค่า "ทั้งหมด" แสดงทั้ง `pendingSplitAmount` และ `completeSplitAmount` แต่ dropdown ในหน้าเลือกตรงได้แค่ `pendingInspection` กับ `pendingSplitAmount`\n- `credit-special/[requestCode]` รวม logic ของหลาย debt groups ไว้ในหน้าเดียวและพึ่ง state ภายใน `FormCreditWithdraw` มาก จึงสรุปในเอกสารนี้เฉพาะระดับ routing และ approval behavior หลัก\n- หลาย detail page route ออกไปหน้าแก้ไขในหมวด `contracts/.../using-credit/...` หรือ `contractors/.../borrow-money/...` ดังนั้น logic การแก้ไข field รายละเอียดไม่ได้จบอยู่ใน flow นี้\n- route `credit-request-usage-before-havest` ใช้การสะกด `havest` ตาม source จริง ไม่ได้แก้ชื่อในเอกสารเพื่อหลีกเลี่ยงการอ้าง route ผิด\n',

            '# Flow 17 — Debt Management\n\n## Overview\n\nFlow นี้รวมงานที่เกี่ยวกับ "รับสภาพหนี้", "รายการหนี้คงค้าง", "รายการจ่ายส่งเสริมปัจจัยการผลิต", และ "เปลี่ยนประเภทลูกหนี้" ในฝั่ง CMS แต่จาก source จริงงานใน flow นี้ไม่ได้เป็นเส้นธุรกิจเดียวกันทั้งหมด\n\nจากโค้ดที่ตรวจแล้ว แบ่งได้เป็น 4 กลุ่ม:\n\n1. กลุ่ม `accept-debt/*` เป็น shell pages สำหรับสลับ tab แล้ว delegate งานจริงให้ child components\n2. `debt-list` เป็นหน้ารายการหนี้คงค้างฝั่งบัญชีที่มี filter จำนวนมาก, import/clear, และ modal กำหนดวันผิดนัดชำระ\n3. `debt-receipt-list` เป็นหน้ารายการรับสภาพหนี้ที่รวม filter, export หลายแบบ, modal ดูรายละเอียด, และ flow จัดการอัตราหักชำระหนี้\n4. `change-type-debtor` เป็น wrapper page ที่ render component เปลี่ยนประเภทลูกหนี้\n\nดังนั้นเอกสารนี้จะอธิบาย flow เป็นชุดของงานหนี้ที่อยู่ในโดเมนเดียวกัน โดยแยกให้ชัดว่าอะไรคือ shell page และอะไรคือหน้าที่มี business logic จริง\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| รับสภาพหนี้ | `cms/accept-debt/*` |\n| รายการหนี้คงค้าง | `cms/debt-list/*` |\n| รายการจ่ายส่งเสริมปัจจัยการผลิต | `cms/debt-receipt-list/*` |\n| เปลี่ยนประเภทลูกหนี้ | `cms/change-type-debtor/*` |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| เจ้าหน้าที่บัญชี/สินเชื่อ | ค้นหา, กรอง, เปิดดูรายการ, export, import, และเปลี่ยนข้อมูลบางอย่างของรายการหนี้ |\n| หน้า accept debt | เป็นจุดเข้า tab ของงานรับสภาพหนี้แต่ละ domain |\n| หน้า debt list | แสดงรายการหนี้คงค้าง, import งาน, ล้างข้อมูล, และกำหนดวันผิดนัดชำระ |\n| หน้า debt receipt list | แสดงรายการรับสภาพหนี้, export หลายรูปแบบ, และเปิด modal ดู/แก้ ratio |\n| หน้า change type debtor | เปิด component สำหรับเปลี่ยนประเภทลูกหนี้ |\n| Accounting APIs | ส่งข้อมูลรายการหนี้, dropdowns, summary, detail, และไฟล์ export |\n| Modals | ใช้กับการ import, view detail, update date, debt recognition, และ debt deduction ratio |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| Accept debt workspace | จุดเข้าไปยังงานรับสภาพหนี้ตามประเภทสินค้า/บริการ |\n| Debt worklist | รายการหนี้คงค้างที่กรองได้ตามหลายเงื่อนไข |\n| Updated default date | วันที่ผิดนัดชำระที่ถูกกำหนดใหม่จาก modal |\n| Imported / cleared debt data | ชุดข้อมูลหนี้ที่ถูก import หรือล้างออก |\n| Debt receipt export files | ไฟล์ text/xls ที่ export จากรายการรับสภาพหนี้ |\n| Debt ratio review | การดูหรือกำหนดอัตราหักชำระหนี้ผ่าน modal flow |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["เจ้าหน้าที่เปิดหมวด Debt Management"] --> B["เลือกกลุ่มงานที่ต้องทำ"]\n\n    B --> C["เปิดหน้ารับสภาพหนี้ตาม domain"]\n    B --> D["เปิดรายการหนี้คงค้าง"]\n    B --> E["เปิดรายการจ่ายส่งเสริมปัจจัยการผลิต"]\n    B --> F["เปิดหน้าเปลี่ยนประเภทลูกหนี้"]\n\n    C --> G["สลับ tab แล้วเข้า child component ที่ทำงานจริง"]\n    D --> H["ค้นหา กรอง import clear หรือกำหนดวันผิดนัดชำระ"]\n    E --> I["ค้นหา กรอง ดูรายละเอียด แก้ ratio หรือ export ไฟล์"]\n    F --> J["delegate ไป component เปลี่ยนประเภทลูกหนี้"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `accept-debt/mechanical/index.vue` | shell page รับสภาพหนี้บริการจักรกล | สลับ 2 tabs ได้ |\n| `accept-debt/product/index.vue` | shell page รับสภาพหนี้ปุ๋ย/ยา | ตัด waiting tab ออก เหลือ accepted tab เดียว |\n| `accept-debt/variety/index.vue` | shell page รับสภาพหนี้พันธุ์อ้อย | สลับ 2 tabs ได้ |\n| `debt-list/index.vue` | รายการหนี้คงค้าง | flow หลักของฝั่งบัญชีในชุดนี้ |\n| `debt-receipt-list/index.vue` | รายการจ่ายส่งเสริมปัจจัยการผลิต | flow หลักของฝั่งรับสภาพหนี้และ export |\n| `change-type-debtor/index.vue` | wrapper page ของการเปลี่ยนประเภทลูกหนี้ | render component เดียว |\n\n---\n\n## Per-Page Details\n\n### 17-A: Accept Debt Pages\n\nครอบคลุม:\n\n- `accept-debt/mechanical/index.vue`\n- `accept-debt/product/index.vue`\n- `accept-debt/variety/index.vue`\n\n#### Purpose\n\nใช้เป็นจุดเข้าไปยัง child components ของงานรับสภาพหนี้แต่ละ domain โดยตัว page มีหน้าที่หลักคือ render หัวข้อ, tabs, และเลือกว่าจะให้ component ใดแสดงผล\n\n#### Main Steps\n\n1. เปิดหน้า accept debt ตามประเภทงาน\n2. หน้าโหลด tab list จาก `mockTabAcceptDebtInspectionReceipt`\n3. หน้า render tab เริ่มต้น\n4. ผู้ใช้สลับ tab เพื่อดู child component ของสถานะนั้น\n\n#### ความต่างของแต่ละหน้า\n\n| หน้า | พฤติกรรม |\n|---|---|\n| `mechanical` | มีทั้ง tab รอยืนยันรับสภาพหนี้ และรับสภาพหนี้แล้ว |\n| `product` | filter tab รอยืนยันออก และ component pending ถูก comment out |\n| `variety` | มีทั้ง tab รอยืนยันรับสภาพหนี้ และรับสภาพหนี้แล้ว |\n\n#### Result\n\n- ผู้ใช้เข้าไปยัง child component ของงานรับสภาพหนี้ตาม domain ได้\n- ตัว page เองไม่มี API call หรือ logic ธุรกรรมโดยตรง\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as accept-debt/*/index.vue\n    participant Child as pending/accepted table component\n\n    Staff->>Page: เปิดหน้า\n    Page->>Page: mounted แล้ว set tabList\n    Page-->>Staff: แสดง tabs\n    Staff->>Page: เลือก tab\n    Page->>Page: update currentTabCode\n    Page->>Child: render child component ตาม tab\n    Child-->>Staff: แสดง workspace ของงานรับสภาพหนี้\n```\n\n### 17-B: Debt List\n\n#### Purpose\n\nใช้ดูรายการหนี้คงค้างฝั่งบัญชี, กรองข้อมูลตามหลายมิติ, ตรวจสถานะ import queue, import หนี้, ล้างข้อมูลทั้งหมด, กำหนดวันผิดนัดชำระ, และเปิด modal ดูรายละเอียดแต่ละรายการ\n\n#### Main Steps\n\n1. เปิดหน้ารายการหนี้คงค้าง\n2. ระบบโหลด queue status, รายการหนี้, dropdowns, current date, site, และ options ต่างๆ\n3. เจ้าหน้าที่ค้นหาหรือกรองข้อมูลตามเงื่อนไขที่ต้องการ\n4. ถ้าจำเป็น สามารถเปิด modal กำหนดวันผิดนัดชำระ\n5. ถ้า queue พร้อม สามารถ import หนี้ใหม่หรือล้างข้อมูลทั้งหมด\n6. เปิดดูรายละเอียดรายการผ่าน view modal\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| `isWorkdone = false` | ปุ่ม Import และ Clear ถูก disable และแสดงข้อความกำลังอัปโหลด |\n| กด "กำหนดวันผิดนัดชำระ" | เปิด modal update date |\n| กดยืนยัน Clear | เรียก `apiDeleteAllDebt` แล้ว reload list |\n| กด Import | เปิด import modal |\n| กด Export CSV | ปุ่ม disabled และ handler ยังว่าง |\n\n#### Result\n\n- ได้รายการหนี้คงค้างตามเงื่อนไขที่เลือก\n- ผู้ใช้สามารถ trigger งานดูแลข้อมูลหนี้ระดับระบบได้จากหน้าเดียว\n\n#### Technical Diagrams\n\nรายการหนี้คงค้าง: โหลดข้อมูลและกรอง\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as debt-list/index.vue\n    participant WorkAPI as apiGetWorkstatus\n    participant ListAPI as apiGetAllAndFilterDebt\n    participant MetaAPI as year/role/site/status APIs\n\n    Staff->>Page: เปิดหน้า\n    Page->>WorkAPI: ตรวจสถานะ import queue\n    Page->>ListAPI: โหลดรายการหนี้\n    Page->>MetaAPI: โหลด dropdowns และ current date\n    WorkAPI-->>Page: queue status\n    ListAPI-->>Page: debt list + sumDebt\n    MetaAPI-->>Page: options\n    Page-->>Staff: แสดงตารางและ filters\n\n    alt ค้นหา หรือเปลี่ยน filter\n        Staff->>Page: เปลี่ยน search / year / role / date / site / debt type / status\n        Page->>ListAPI: reloadData()\n        ListAPI-->>Page: filtered list\n    end\n```\n\nรายการหนี้คงค้าง: งานดูแลข้อมูล\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as debt-list/index.vue\n    participant UpdateAPI as apiUpdateDebt\n    participant DeleteAPI as apiDeleteAllDebt\n    participant Modal as update/import/view modal\n\n    alt กำหนดวันผิดนัดชำระ\n        Staff->>Page: เปิด modal update date\n        Page->>Modal: showModal()\n        Staff->>Modal: ยืนยันข้อมูล\n        Modal->>UpdateAPI: PATCH update default date\n        UpdateAPI-->>Page: success\n        Page->>Page: reloadData()\n    else ล้างข้อมูล\n        Staff->>Page: กด Clear\n        Page->>DeleteAPI: DELETE ข้อมูลทั้งหมดหลัง confirm\n        DeleteAPI-->>Page: success\n        Page->>Page: reloadData()\n    else ดูรายละเอียด\n        Staff->>Page: กด view\n        Page->>Modal: showModal(data)\n    end\n```\n\n### 17-C: Debt Receipt List\n\n#### Purpose\n\nใช้ดูรายการจ่ายส่งเสริมปัจจัยการผลิตที่เกี่ยวข้องกับการรับสภาพหนี้, กรองข้อมูลเชิงบัญชี, ดูรายละเอียดรายการ, จัดการ flow อัตราหักชำระหนี้, และ export ข้อมูลออกหลายรูปแบบตามสิทธิ์ผู้ใช้\n\n#### Main Steps\n\n1. เปิดหน้ารายการจ่ายส่งเสริมปัจจัยการผลิต\n2. ระบบโหลด dropdowns, extension area field, และรายการรับสภาพหนี้\n3. เจ้าหน้าที่ค้นหาด้วย 2 ช่อง, กรองตามปี, debt type, role, status, site, extension area, date ranges, และ isMySequence\n4. เปิดดูรายละเอียดรายการผ่าน view modal\n5. ถ้ารายการรองรับการแก้ ratio ให้เปิด modal flow สำหรับ debt recognition / debt deduction ratio\n6. export ข้อมูลเป็น text หรือ excel ตามสิทธิ์\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| ผู้ใช้เป็น `admin` | เห็นปุ่ม `Export File` |\n| ผู้ใช้เป็น `admin` หรือ `account` | เห็นปุ่ม `รายการบัญชี` |\n| ผู้ใช้เป็น `service` หรือ `officer` | เห็น extension area selector |\n| ผู้ใช้เป็น `admin` หรือ centrally affiliated | เห็น checkbox `รายการของตนเอง` |\n| `show_edit_ratio = true` | แสดงปุ่ม edit ratio |\n| `status_reduction_ratio = -1` | เปิด flow สร้าง ratio ใหม่ |\n| `status_reduction_ratio != -1` | เปิด view ratio ที่มีอยู่ |\n\n#### Result\n\n- ได้รายการรับสภาพหนี้ที่กรองละเอียดได้\n- ผู้ใช้ export ไฟล์ที่เกี่ยวข้องได้ตามสิทธิ์\n- ผู้ใช้เปิด modal เพื่อดูรายการหรือจัดการอัตราหักชำระหนี้ได้\n\n#### Technical Diagrams\n\nรายการจ่ายส่งเสริมปัจจัยการผลิต: โหลดรายการและกรอง\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as debt-receipt-list/index.vue\n    participant ListAPI as apiGetAcceptDebtAll\n    participant MetaAPI as year/role/site APIs\n\n    Staff->>Page: เปิดหน้า\n    Page->>MetaAPI: โหลดปี บทบาท และ site\n    Page->>ListAPI: โหลด accept debt list\n    MetaAPI-->>Page: options\n    ListAPI-->>Page: entities + summary\n    Page-->>Staff: แสดง filters, summary card, และตาราง\n\n    alt ค้นหา หรือเปลี่ยน filter\n        Staff->>Page: เปลี่ยน search / year / role / status / site / dates / area / isMySequence\n        Page->>ListAPI: reloadData()\n        ListAPI-->>Page: filtered list\n    end\n```\n\nรายการจ่ายส่งเสริมปัจจัยการผลิต: view / edit ratio / export\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as debt-receipt-list/index.vue\n    participant DetailAPI as apiGetAcceptDebtDetail\n    participant RatioAPI as apiGetAcceptDebtDetailReductionRatio\n    participant Modal as debt recognition / ratio modals\n    participant ExportAPI as export endpoints\n\n    alt ดูรายละเอียด\n        Staff->>Page: กด view\n        Page->>DetailAPI: POST detail by id\n        DetailAPI-->>Page: detail data\n        Page->>Modal: เปิด view modal\n    else แก้ ratio\n        Staff->>Page: กด edit\n        Page->>RatioAPI: POST reduction ratio detail\n        RatioAPI-->>Page: ratio payload\n        Page->>Modal: เปิด modal flow ตาม status_reduction_ratio\n    else export ไฟล์\n        Staff->>Page: กด export\n        Page->>ExportAPI: GET blob ด้วย filter ปัจจุบัน\n        ExportAPI-->>Page: file blob\n        Page-->>Staff: trigger download\n    end\n```\n\n### 17-D: Change Type Debtor Wrapper\n\n#### Purpose\n\nใช้เป็น wrapper page สำหรับ component เปลี่ยนประเภทลูกหนี้ โดยตัว page มีหน้าที่หลักคือให้ layout back-office และ render component เดียว\n\n#### Main Steps\n\n1. เปิดหน้าเปลี่ยนประเภทลูกหนี้\n2. หน้า render `<CustomerRequestChangeDebtManual>`\n\n#### Result\n\n- ผู้ใช้เข้า workflow เปลี่ยนประเภทลูกหนี้ผ่าน child component ได้\n- logic จริงไม่ได้อยู่ใน page นี้\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as change-type-debtor/index.vue\n    participant Child as CustomerRequestChangeDebtManual\n\n    Staff->>Page: เปิดหน้า\n    Page->>Child: render component\n    Child-->>Staff: แสดง workflow เปลี่ยนประเภทลูกหนี้\n```\n\n---\n\n## Technical Reference\n\n### Debt Status ที่ยืนยันจาก source\n\n| Value | ข้อความ | สี |\n|---|---|---|\n| `0` | ปกติ | `text-appsuccess` |\n| `1` | ปกติ | `text-appsuccess` |\n| `2` | ปิดหนี้ | `text-appdraft` |\n\n### Debt Receipt Status ที่ยืนยันจาก source\n\n| Value | ข้อความ | สี |\n|---|---|---|\n| `0` | รอเป็นลูกหนี้ | `text-apppending` |\n| `1` | เป็นลูกหนี้ | `text-appsuccess` |\n| `2` | ปิดหนี้ | `text-appdraft` |\n\n### Accept Debt Tabs\n\n| Page | Tabs | Default |\n|---|---|---|\n| `accept-debt/mechanical` | `waitingAcceptDebtInspectionReceipt`, `AcceptedDebtInspectionReceipt` | `waitingAcceptDebtInspectionReceipt` |\n| `accept-debt/product` | `AcceptedDebtInspectionReceipt` | `AcceptedDebtInspectionReceipt` |\n| `accept-debt/variety` | `waitingAcceptDebtInspectionReceipt`, `AcceptedDebtInspectionReceipt` | `waitingAcceptDebtInspectionReceipt` |\n\n### Global State Keys\n\n| State key | ใช้ใน | หน้าที่ |\n|---|---|---|\n| `globalBaseLoading` | `debt-list`, `debt-receipt-list` | loading ระดับหน้า |\n| `globalAlertModal` | `debt-list`, `debt-receipt-list` | confirm/success/error modal |\n\n### APIs ที่ใช้ใน Flow นี้\n\n| Constant / Path | Method | ใช้เมื่อ |\n|---|---|---|\n| `apiGetWorkstatus` | GET | ตรวจสถานะ import queue ของ `debt-list` |\n| `apiGetAllAndFilterDebt` | GET | โหลดรายการหนี้คงค้าง |\n| `apiGetAccountingGetYear` | GET | โหลดปีส่งเสริม/ปีครบกำหนด |\n| `apiGetAccountingGetRole` | GET | โหลดบทบาท |\n| `apiGetAccountingDebtGetSite` | GET | โหลด site |\n| `apiGetAccountingGetDebtTransferStatus` | GET | โหลดสถานะโอนหนี้ |\n| `apiGetAccountingDropdownCurrentDate` | GET | โหลด current date สำหรับ modal |\n| `apiUpdateDebt` | PATCH | กำหนดวันผิดนัดชำระ |\n| `apiDeleteAllDebt` | DELETE | ล้างข้อมูลหนี้ทั้งหมด |\n| `apiGetAcceptDebtAll` | GET | โหลดรายการรับสภาพหนี้ |\n| `apiGetAcceptDebtDetail` | POST | โหลด detail เพื่อดูรายการ |\n| `apiGetAcceptDebtDetailReductionRatio` | POST | โหลด detail เพื่อแก้/ดู ratio |\n| `apiExportAcceptDebt` | GET | export text file |\n| `apiExportAcceptDebtAll` | GET | export ใบคุมเป็น xls |\n| `apiExportAccountingDebt` | GET | export รายการบัญชีเป็น xls |\n\n### Debt List Actions\n\n| Action | เงื่อนไข | ผลลัพธ์ |\n|---|---|---|\n| กำหนดวันผิดนัดชำระ | เสมอ | เปิด modal แล้ว PATCH `apiUpdateDebt` |\n| Import | `isWorkdone = true` | เปิด import modal |\n| Clear | `isWorkdone = true` | DELETE `apiDeleteAllDebt` หลัง confirm |\n| Export CSV | ปุ่ม disabled | handler ยังว่าง |\n| View row | เสมอ | เปิด modal view |\n\n### Debt Receipt List Exports\n\n| ปุ่ม | เงื่อนไขแสดง | ไฟล์ที่ดาวน์โหลด |\n|---|---|---|\n| `รายการบัญชี` | `admin` หรือ `account` | `file.xls` จาก `apiExportAccountingDebt` |\n| `ใบคุม` | ทุกคน | `file.xls` จาก `apiExportAcceptDebtAll` |\n| `Export File` | `admin` | `file.txt` จาก `apiExportAcceptDebt` |\n\n### Debt Receipt List Ratio Flow\n\n| เงื่อนไข | Modal flow |\n|---|---|\n| `status_reduction_ratio = -1` | `DebtRecognition` -> `DebtDeductionRatio` -> `ViewDebtDeductionRatio` |\n| `status_reduction_ratio != -1` | `ViewDebtDeductionRatio` |\n\n### Role-Based UI ใน `debt-receipt-list`\n\n| Computed | ความหมาย |\n|---|---|\n| `cIsRoleAdmin` | เป็น admin และ centrally affiliated |\n| `cIsCentrallyAffiliated` | ไม่ใช่ admin แต่ centrally affiliated |\n| `cIsRoleAccount` | มี role `account` |\n| `cIsRoleService` | มี role `service` |\n| `cIsRoleOfficer` | มี role `officer` |\n\n---\n\n## Known Gaps\n\n- กลุ่ม `accept-debt/*` เป็นเพียง shell pages; logic ธุรกิจจริงอยู่ใน child components ที่ไม่ได้อยู่ใน scope ของ flow นี้\n- `debt-list` มีปุ่ม `Export CSV` แต่ถูก disable และ `onExportCSV()` ยังว่าง จึงไม่ควรถูกนับเป็น flow export ที่ใช้งานได้\n- `debt-receipt-list` map ข้อมูล `branch -> site` และ `site -> area` ใน response object ซึ่งทำให้ชื่อ field ดูสวนทางกัน ถ้าจะอธิบายเชิง business semantics ลึกกว่านี้ควรยืนยันกับ backend/data contract อีกครั้ง\n- `change-type-debtor/index.vue` เป็น wrapper page เท่านั้น ดังนั้นกติกาเปลี่ยนประเภทลูกหนี้จริงไม่ได้ยืนยันจาก page นี้โดยตรง\n\n### Accounting Service Modules ที่เกี่ยวข้อง — ยืนยันจาก develop branch\n\n| Module | Backend Route Prefix | Endpoints สำคัญ | หมายเหตุ |\n|---|---|---|---|\n| `debt` | `/debt/` | `GET /get_year` — ปีงบ; `GET /get_role` — บทบาทลูกหนี้ (farmer, agent, contractor, service provider); `GET /get_type_debt` — ประเภทหนี้; `GET /getall` — รายการหนี้ paginated; `POST /get_personal_summary_debt` — สรุปหนี้รายบุคคล; `POST /update_payment_default_date` — กำหนดวันผิดนัด; `POST /calculate_interest_execute` — trigger คำนวณดอกเบี้ย; `POST /import_debt` / `import_new_debt` / `import_type_debt` / `import_manage_debt` — import ข้อมูลหนี้; `POST /swap` — swap debt process | module หลักที่ CMS frontend เรียกใช้สำหรับ debt-list, dropdown filters, และ interest calculation |\n| `new-debt` | `/new-debt/` | `POST /upload` — upload debt file; `GET /getall_and_filter` — filter debts (action_year, due_year, debt_type, interest_cap, debtor_role, site, debt_status); `GET /grouped` — group by quota; `GET /get_accept_debt_all` — accepted debts paginated; `POST /get_accept_debt_detail` — accept debt detail; `POST /add_debt_reduction_ratio` — add reduction ratio; `POST /approve_debt_reduction_ratio` — approve/reject; `GET /export_*` — export endpoints; `POST /get_personal_debt_summary_by_g11_g21` — G11/G21 summary | module สำหรับ debt-receipt-list, accept-debt flows, และ debt reduction ratio management |\n| `interest-setting` | `/interest/` | `GET /get-all-interests` — list configurations; `POST /save-interest-config` — save (MRR, normal, overdue, grade-based, debt-type-based rates); `PUT /update-interest/:effectiveDate` — update; `DELETE /delete-interest/:id` — delete; `GET /get-interest-by-effective-date` — by date | module สำหรับตั้งค่าอัตราดอกเบี้ย — ข้ามไป Flow 03 (System Config) สำหรับ UI |\n',

            '# Flow 18 — Interest Calculation\n\n## Source files\n\n### cms_frontend-develop\n\n- `pages/cms/interest-calculation-period/index.vue`\n- `pages/cms/interest-calculation-period/interest-debtors/[id]/index.vue`\n- `pages/cms/interest-calculation-period/interest-debtors/[id]/debtors/index.vue`\n- `pages/cms/interest-calculation-period/interest-debtors/[id]/view/index.vue`\n- `components/interest-calculation-period/table.vue`\n- `components/interest-calculation-period/add-modal.vue`\n- `components/interest-calculation-period/table-edit.vue`\n- `components/interest-calculation-period/table-add-debtors.vue`\n- `components/interest-calculation-period/table-view-debtors.vue`\n\n### main_frontend-develop\n\n- `composables/api-accounting-service.ts` — API constants สำหรับ round_interest, dropdown, interest-calculation, summary-profile, debtor-quota\n\n### accounting_service-develop — **NEW**: ยืนยันจาก source code จริง\n\n- `src/roundInterest/roundInterest.controller.ts` — controller: round CRUD + account CRUD + calculation trigger\n- `src/roundInterest/roundInterest.service.ts` — service: batch management, account add orchestration, calls DebtService.calculate_interest_execute()\n- `src/roundInterest/roundAccount.service.ts` — service: account management, fetches quota profile from BFF\n- `src/roundInterest/models/roundInterest.model.ts` — MongoDB schema: batch record\n- `src/roundInterest/models/roundAccount.model.ts` — MongoDB schema: account-in-batch record\n- `src/roundInterest/dto/get.dto.ts` — DTOs: listQuery, listAccount, addRoundBody, deleteBody, addAccountIdArray, addAccountFilter, deleteAccountBody\n- `src/dropdown/dropdown.controller.ts` — dropdown endpoints: grade, debtor_type, debt_group, factories, current_date\n- `src/dropdown/dropdown.service.ts` — dropdown service: calls Master Service APIs for grades/types/factories, queries local DB for debt_group\n\n---\n\n## Overview\n\nFlow นี้ใช้จัดการรอบการคำนวณดอกเบี้ยของลูกหนี้ในระบบ โดยเริ่มจากสร้าง batch, เลือกลูกหนี้ที่จะคำนวณ, ตรวจผลลัพธ์รายคน, และยกเลิกรายการที่ไม่ต้องการ\n\nดอกเบี้ยที่เอกสารเดิมระบุว่าระบบรองรับมี 3 กลุ่ม:\n\n1. ดอกเบี้ยปกติ\n2. ดอกเบี้ยผิดนัด\n3. ดอกเบี้ยไม่รับรู้รายได้\n\nflow นี้ใช้ Accounting Service เป็นหลัก ไม่ได้เดินผ่าน BFF/CMS แบบหลาย flow อื่น\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| รายการรอบคำนวณ | `/cms/interest-calculation-period` |\n| รายละเอียด batch | `/cms/interest-calculation-period/interest-debtors/[id]` |\n| เลือกลูกหนี้เข้ารอบ | `/cms/interest-calculation-period/interest-debtors/[id]/debtors` |\n| ดูผลคำนวณรายลูกหนี้ | `/cms/interest-calculation-period/interest-debtors/[id]/view` |\n| modal สร้างรอบใหม่ | `InterestCalculationPeriodAddModal` |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| เจ้าหน้าที่ CMS | สร้าง batch, เลือกลูกหนี้, ตรวจผลคำนวณ, และยกเลิกรายการ |\n| หน้ารายการรอบคำนวณ | แสดง batch และเริ่มต้น flow สร้างรอบใหม่ |\n| หน้ารายละเอียด batch | แสดงรายชื่อลูกหนี้ที่คำนวณแล้ว |\n| หน้าเลือกลูกหนี้ | เลือกรายการที่จะคำนวณเข้ารอบ |\n| หน้าดูผลรายลูกหนี้ | แสดงรายการดอกเบี้ยและ summary รายคน |\n| Accounting Service | ประมวลผลและส่งข้อมูลรอบคำนวณทั้งหมด |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| Interest batch | รอบการคำนวณดอกเบี้ยชุดหนึ่ง |\n| Debtor list in batch | รายชื่อลูกหนี้ที่ถูกคำนวณใน batch นั้น |\n| Per-debtor calculation | ผลคำนวณดอกเบี้ยรายลูกหนี้ |\n| Summary totals | ยอดรวมดอกเบี้ยระดับ batch หรือระดับลูกหนี้ |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["เจ้าหน้าที่เปิดหน้ารอบคำนวณดอกเบี้ย"] --> B["สร้างรอบใหม่หรือเลือกรอบเดิม"]\n    B --> C["ระบบแสดงรายชื่อลูกหนี้ที่อยู่ใน batch"]\n    C --> D["เลือกเพิ่มลูกหนี้เข้ารอบ หรือยกเลิกรายการ"]\n    D --> E["เปิดดูผลคำนวณรายลูกหนี้เมื่อจำเป็น"]\n    E --> F["ตรวจยอดดอกเบี้ยและใช้ batch นั้นต่อในงานบัญชี"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `interest-calculation-period` | ดูรายการ batch ทั้งหมด | เพิ่มหรือลบรอบคำนวณได้ |\n| `interest-debtors/[id]` | ดูรายชื่อลูกหนี้ใน batch | กรองข้อมูลและยกเลิกรายการได้ |\n| `interest-debtors/[id]/debtors` | เลือกลูกหนี้ที่จะคำนวณ | ทำได้ทั้งแบบเลือกเองและตาม filter |\n| `interest-debtors/[id]/view` | ดูผลคำนวณดอกเบี้ยรายลูกหนี้ | มี summary และ nested rows |\n| `add-modal.vue` | สร้าง batch ใหม่จากวันที่คำนวณ | บันทึกแล้วพาไปหน้า detail ของ batch |\n\n---\n\n## Per-Page Details\n\n### 18-A: Interest Batch List\n\n#### Purpose\n\nใช้ดูรายการรอบคำนวณดอกเบี้ยทั้งหมด และเริ่มสร้าง batch ใหม่หรือลบ batch ที่ไม่ต้องการ\n\n#### Main Steps\n\n1. เปิดหน้ารายการรอบคำนวณ\n2. ระบบโหลดรายการ batch\n3. เจ้าหน้าที่เลือกเพิ่มรอบใหม่ หรือเลือกลบรายการเดิม\n4. ถ้าสร้างสำเร็จ ระบบพาไปหน้ารายละเอียดของ batch ใหม่ทันที\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| วันที่รอบคำนวณไม่ถูกต้อง | modal ไม่ให้บันทึก |\n| สร้าง batch สำเร็จ | ไปหน้า detail ของ batch |\n| ลบ batch | ยืนยันก่อนลบและรีโหลดรายการ |\n\n#### Result\n\n- ได้ batch ใหม่ หรือรายการ batch ที่อัปเดตแล้ว\n\n#### Technical Diagrams\n\nสร้างรอบคำนวณใหม่\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant BatchPage as interest-calculation-period\n    participant AddModal as InterestCalculationPeriodAddModal\n    participant AccountingAPI as Accounting Service\n\n    Staff->>BatchPage: เปิดหน้ารายการรอบคำนวณ\n    BatchPage->>AccountingAPI: โหลดรายการ batch\n    AccountingAPI-->>BatchPage: batch list\n    Staff->>BatchPage: กดเพิ่มรอบคำนวณ\n    BatchPage->>AddModal: เปิด modal\n    Staff->>AddModal: เลือกวันที่คำนวณและกดบันทึก\n    AddModal->>AccountingAPI: สร้าง batch ใหม่\n    alt สำเร็จ\n        AccountingAPI-->>AddModal: new batch id\n        AddModal-->>Staff: ไปหน้า detail ของ batch\n    else ไม่สำเร็จ\n        AccountingAPI-->>AddModal: error\n        AddModal-->>Staff: แจ้งปัญหา\n    end\n```\n\nลบรอบคำนวณ\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant BatchPage as interest-calculation-period\n    participant AccountingAPI as Accounting Service\n\n    Staff->>BatchPage: กดลบ batch\n    BatchPage-->>Staff: เปิด confirm\n    Staff->>BatchPage: ยืนยัน\n    BatchPage->>AccountingAPI: ลบ batch\n    AccountingAPI-->>BatchPage: success/error\n    BatchPage-->>Staff: แจ้งผลและรีโหลดรายการ\n```\n\n### 18-B: Batch Detail\n\n#### Purpose\n\nใช้ดูรายชื่อลูกหนี้ที่ถูกคำนวณอยู่ใน batch แล้ว และเป็นจุดจัดการการยกเลิกรายการหรือเปิดดูผลรายคน\n\n#### Main Steps\n\n1. เปิดหน้ารายละเอียด batch\n2. ระบบโหลดรายชื่อลูกหนี้ใน batch\n3. ระบบโหลด dropdown สำหรับ filter\n4. เจ้าหน้าที่ค้นหา, กรอง, เปิดดูผลรายลูกหนี้, หรือยกเลิกรายการ\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| ต้องการดูผลรายคน | ไปหน้า view ของลูกหนี้คนนั้น |\n| ยกเลิกรายการเดี่ยว | ส่ง id เดียวไปลบ |\n| ยกเลิกรายการหลายรายการ | ส่ง id หลายรายการไปลบ |\n\n#### Result\n\n- เห็นรายชื่อลูกหนี้และยอดดอกเบี้ยใน batch\n- ยกเลิกรายการที่ไม่ต้องการได้\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant DetailPage as interest-debtors/[id]\n    participant AccountingAPI as Accounting Service\n\n    Staff->>DetailPage: เปิดหน้ารายละเอียด batch\n    DetailPage->>AccountingAPI: โหลดรายชื่อลูกหนี้ใน batch\n    DetailPage->>AccountingAPI: โหลด dropdown filters\n    AccountingAPI-->>DetailPage: debtor list and filter options\n\n    alt ค้นหา / กรอง\n        Staff->>DetailPage: เปลี่ยน search หรือ dropdown\n        DetailPage->>AccountingAPI: โหลดข้อมูลตาม filter\n        AccountingAPI-->>DetailPage: filtered results\n    else เปิดดูผลรายคน\n        Staff->>DetailPage: กดดูรายละเอียด\n        DetailPage-->>Staff: ไปหน้า view\n    else ยกเลิกรายการ\n        Staff->>DetailPage: เลือก 1 หรือหลายรายการแล้วยืนยัน\n        DetailPage->>AccountingAPI: ลบรายการออกจาก batch\n        AccountingAPI-->>DetailPage: success/error\n    end\n```\n\n### 18-C: Add Debtors Into Batch\n\n#### Purpose\n\nใช้เลือกลูกหนี้ที่ยังไม่อยู่ใน batch เพื่อให้ระบบคำนวณดอกเบี้ยเข้ารอบนั้น\n\n#### Main Steps\n\n1. เปิดหน้าเลือกลูกหนี้\n2. ระบบโหลดรายชื่อลูกหนี้ที่พร้อมคำนวณ\n3. เจ้าหน้าที่ค้นหาและกรองตามเงื่อนไข\n4. เลือกว่าจะคำนวณเฉพาะรายการที่เลือก หรือคำนวณทั้งหมดตาม filter\n5. หลังสำเร็จ ระบบพากลับหน้า detail ของ batch\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| เลือกหลายคนเอง | ใช้ add-by-id-array |\n| ต้องการคำนวณทั้งหมดตามเงื่อนไขที่กรองไว้ | ใช้ add-by-filter |\n\n#### Result\n\n- ได้รายชื่อลูกหนี้ที่ถูกเพิ่มเข้ามาใน batch และคำนวณแล้ว\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant AddPage as interest-debtors/[id]/debtors\n    participant AccountingAPI as Accounting Service\n\n    Staff->>AddPage: เปิดหน้าเลือกลูกหนี้\n    AddPage->>AccountingAPI: โหลด debtor quota list และ dropdown filters\n    AccountingAPI-->>AddPage: selectable debtors and options\n\n    alt คำนวณรายการที่เลือก\n        Staff->>AddPage: เลือกรายการและกดยืนยัน\n        AddPage->>AccountingAPI: add by selected ids\n        AccountingAPI-->>AddPage: success/error\n    else คำนวณทุกรายการตาม filter\n        Staff->>AddPage: กดยืนยันคำนวณทั้งหมด\n        AddPage->>AccountingAPI: add by current filter\n        AccountingAPI-->>AddPage: success/error\n    end\n\n    AddPage-->>Staff: กลับหน้า detail ของ batch\n```\n\n### 18-D: View Debtor Calculation\n\n#### Purpose\n\nใช้ตรวจผลคำนวณดอกเบี้ยของลูกหนี้รายคน พร้อม summary และรายการดอกเบี้ยย่อย\n\n#### Main Steps\n\n1. เปิดหน้าดูผลจากหน้า detail ของ batch\n2. ระบบโหลดรายการคำนวณและ summary profile\n3. ระบบโหลด dropdown สำหรับ filter\n4. เจ้าหน้าที่ค้นหาและกรองตามบทบาทหรือประเภทดอกเบี้ย\n5. ดูรายการหลักและรายการย่อยในแต่ละแถว\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| ต้องการกรองข้อมูล | โหลด list และ summary ใหม่ตาม filter |\n| ต้องการกลับไป batch เดิม | ใช้ปุ่ม Back |\n\n#### Result\n\n- ได้รายละเอียดดอกเบี้ยรายลูกหนี้ที่ตรวจสอบย้อนหลังได้\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ViewPage as interest-debtors/[id]/view\n    participant AccountingAPI as Accounting Service\n\n    Staff->>ViewPage: เปิดหน้าดูผลคำนวณรายลูกหนี้\n    ViewPage->>AccountingAPI: โหลดรายการดอกเบี้ย\n    ViewPage->>AccountingAPI: โหลด summary profile\n    ViewPage->>AccountingAPI: โหลด dropdown filters\n    AccountingAPI-->>ViewPage: list, summary, options\n\n    alt กรองข้อมูล\n        Staff->>ViewPage: เปลี่ยน search หรือ dropdown\n        ViewPage->>AccountingAPI: โหลดข้อมูลใหม่ตาม filter\n        AccountingAPI-->>ViewPage: filtered list and summary\n    else กลับหน้าเดิม\n        Staff->>ViewPage: กด Back\n        ViewPage-->>Staff: กลับไปหน้า detail ของ batch\n    end\n```\n\n---\n\n## Technical Reference\n\n### Data Model\n\n#### Batch record — `roundInterest.model.ts` (ยืนยันจาก source code)\n\n| Field | Type | ความหมาย | หมายเหตุ |\n|---|---|---|---|\n| `_id` | ObjectId | id ของ batch | MongoDB auto |\n| `batch_number` | String (unique) | หมายเลข batch | format: "INT" + YY + sequence |\n| `date_cal` | String (unique) | วันที่คำนวณ (YYYY-MM-DD) | validate: ต้องหลังวันคำนวณล่าสุด |\n| `total_normal_interest` | Number | รวมดอกเบี้ยปกติ | initial: 0 |\n| `total_default_interest` | Number | รวมดอกเบี้ยผิดนัด | initial: 0 |\n| `total_revenue_deferral_interest` | Number | รวมดอกเบี้ยไม่รับรู้รายได้ | initial: 0 |\n| `total_interest` | Number | รวมดอกเบี้ยทั้งหมด | initial: 0 |\n| `total_debtor` | Number | จำนวนลูกหนี้ | updated via updateTotalSummaryDataByBatchId() |\n| `status_code` | String | สถานะของ batch | `WAIT_SEND_GL` หรือค่าอื่น |\n| `status` | Number | soft delete flag | 1 = active, 0 = deleted |\n| `createdAt` | Date | timestamps | auto |\n| `updatedAt` | Date | timestamps | auto |\n\n#### Account-in-batch record — `roundAccount.model.ts` (ยืนยันจาก source code)\n\n| Field | Type | ความหมาย | หมายเหตุ |\n|---|---|---|---|\n| `uniq_key` | String (unique) | composite key | batch_id + "-" + profile_id |\n| `batch_id` | String | reference ไป batch | |\n| `batch_number` | String | หมายเลข batch (denormalized) | |\n| `date_cal` | String | วันที่คำนวณ (denormalized) | |\n| `profile_id` | String | quota profile ID จาก BFF | |\n| `code` | String | รหัสโควตา | |\n| `customerCode` | String | รหัสลูกค้า | |\n| `quotaNumber` | String | เลขโควตา | searchable |\n| `firstName` | String | ชื่อ | จาก includeCustomer |\n| `lastName` | String | นามสกุล | จาก includeCustomer |\n| `fullName` | String | ชื่อเต็ม | searchable |\n| `site_id` | String | รหัสโรงงาน/สาขา | filterable |\n| `site_name` | String | ชื่อโรงงาน/สาขา | |\n| `farmerGradeCode` | String | เกรดชาวไร่ | filterable |\n| `debtorFarmerTypeCode` | String | ประเภทลูกหนี้ | filterable |\n| `total_normal_interest` | Number | ดอกเบี้ยปกติรายคน | |\n| `total_default_interest` | Number | ดอกเบี้ยผิดนัดรายคน | |\n| `total_revenue_deferral_interest` | Number | ดอกเบี้ยไม่รับรู้รายได้รายคน | |\n| `total_interest` | Number | รวมดอกเบี้ยรายคน | |\n| `total_debt_number` | Number | จำนวนรายการหนี้ | |\n| `is_calculated` | Boolean | flag ว่าคำนวณแล้วหรือยัง | initial: false |\n| `status` | Number | soft delete flag | 1 = active |\n\n#### Detail record ต่อรายลูกหนี้ (interest-calculation response จาก CMS frontend)\n\n| Field | ความหมาย |\n|---|---|\n| `REQ_DOC` | เลขเอกสาร (main row + nested interest_list items) |\n| `RPSFX` | ลำดับในเอกสาร |\n| `RPRMK` | คำอธิบาย/รายการ |\n| `role` | บทบาท (ชาวไร่, ผู้รับเหมา, ผู้ให้บริการ) |\n| `due_type_name` | ประเภทดอกเบี้ย (ปรกติ, ผิดนัด, ไม่รับรู้รายได้) |\n| `RPVR01` | ปีเงินต้น |\n| `G_L_Date` | วันที่เอกสาร |\n| `DueDate` | วันครบกำหนด |\n| `payment_default_date` | วันผิดนัดชำระ |\n| `StatementDate` | วันคำนวณล่าสุด |\n| `RPAG_100` | เงินต้น |\n| `RPAAP_100` | ยอดหนี้คงค้าง |\n| `create_date` | วันที่ธุรกรรม |\n| `number_of_day` | จำนวนวันคำนวณ |\n| `interest_rate` | อัตราดอกเบี้ย (%) |\n| `interest_list[]` | รายการดอกเบี้ยย่อย (nested sub-rows) |\n\n### API Summary\n\n#### RoundInterest Controller — ยืนยันจาก `roundInterest.controller.ts`\n\n| Constant (Frontend) | Method | Backend Route | Params/Body | ใช้เมื่อ |\n|---|---|---|---|---|\n| `apiGetAccountingRoundInterestRoundList` | GET | `/round_interest/round_list` | `page`, `size`, `search?` | โหลดรายการ batch (sorted by createdAt desc) |\n| `apiPostAccountingRoundInterestRoundAdd` | POST | `/round_interest/round_add` | `date_cal` (min-length 6) | สร้าง batch ใหม่; validate ว่า date_cal หลังวันคำนวณล่าสุด |\n| `apiPostAccountingRoundInterestRoundDelete` | POST | `/round_interest/round_delete` | `idArray: string[]` | ลบ batch (hard delete); returns success count + percent |\n| `apiPostAccountingRoundInterestAccountList` | GET | `/round_interest/account_list` | `batch_id`, `page`, `size`, `search?`, `farmerGradeCode?`, `debtorFarmerTypeCode?`, `site_id?` | โหลดลูกหนี้ใน batch พร้อม filters |\n| `apiPostAccountingRoundInterestAccountAddByIdArray` | POST | `/round_interest/account_add_by_id_array` | `batch_id`, `idArray: string[]` | เพิ่มลูกหนี้ที่เลือกเข้า batch แล้ว trigger `DebtService.calculate_interest_execute()` |\n| `apiPostAccountingRoundInterestAccountAddByFilter` | POST | `/round_interest/account_add_by_filter` | `batch_id`, `search?`, `farmerGradeCode?`, `debtorFarmerTypeCode?`, `site_id?` | เพิ่มลูกหนี้ทั้งหมดตาม filter แล้ว trigger calculation |\n| `apiPostAccountingRoundInterestAccountDelete` | POST | `/round_interest/account_delete` | `batch_id`, `idArray: string[]` | ยกเลิกรายการลูกหนี้จาก batch; update batch totals |\n\n#### Dropdown Controller — ยืนยันจาก `dropdown.controller.ts`\n\n| Constant (Frontend) | Method | Backend Route | Source | ใช้เมื่อ |\n|---|---|---|---|---|\n| `apiGetAccountingDropdownGrade` | GET | `/dropdown/grade` | Master Service: `/farmerGrades` | dropdown เกรดชาวไร่ |\n| `apiGetAccountingDropdownDebtorType` | GET | `/dropdown/debtor_type` | Master Service: `/debtorFarmerTypes` | dropdown ประเภทลูกหนี้ |\n| `apiGetAccountingDropdownFactories` | GET | `/dropdown/factories` | Master Service: `/extensionFactories` | dropdown สาขา/โรงงาน |\n| — | GET | `/dropdown/debt_group` | Local DB: `type_debts` collection | dropdown กลุ่มหนี้ (ไม่ได้ใช้ใน flow 18 โดยตรง) |\n| — | GET | `/dropdown/current_date` | Helper | วันที่ปัจจุบัน |\n\n#### Interest Calculation & View APIs\n\n| Constant (Frontend) | Method | ใช้เมื่อ |\n|---|---|---|\n| `apiGetAccountingDebtorQuotaList` | GET | โหลดลูกหนี้ที่พร้อมคำนวณ (หน้า add debtors) |\n| `apiGetAccountingGetAllInterestCalculation` | GET | ดูผลคำนวณรายลูกหนี้ พร้อม nested `interest_list` (หน้า view) |\n| `apiGetAccountingGetSummaryProfile` | GET | ดู summary ยอดรวมดอกเบี้ยรายลูกหนี้ (หน้า view) |\n| `apiGetAccountingGetInterestType` | GET | dropdown ประเภทดอกเบี้ย: ปรกติ, ผิดนัด, ไม่รับรู้รายได้ (หน้า view) |\n| `apiGetAccountingGetRole` | GET | dropdown บทบาท: ชาวไร่, ผู้รับเหมา, ผู้ให้บริการ (หน้า view) |\n\n### Status And Types\n\nสถานะ batch:\n\n| `status_code` | ความหมาย |\n|---|---|\n| `WAIT_SEND_GL` | รอส่ง General Ledger |\n| ค่าอื่น | เรียบร้อย |\n| `null` | ยังไม่มีสถานะ |\n\nประเภทดอกเบี้ยที่เอกสารเดิมระบุ:\n\n| ประเภท | ความหมาย |\n|---|---|\n| normal interest | ดอกเบี้ยปกติ |\n| default interest | ดอกเบี้ยผิดนัด |\n| revenue deferral interest | ดอกเบี้ยไม่รับรู้รายได้ |\n\n### Filtering Pattern\n\nหน้าที่ใช้ pattern เดียวกัน:\n\n- `table-edit`\n- `table-add-debtors`\n- `table-view-debtors`\n\nพฤติกรรมร่วม:\n\n- search debounce `800ms`\n- dropdown เปลี่ยนแล้ว reload ทันที\n- filters ที่เอกสารเดิมยืนยันได้มี `search`, `farmerGradeCode`, `debtorFarmerTypeCode`, `site_id`, `role`, `interest_type`\n\n### Navigation Notes\n\n- flow หลักคือ list -> batch detail -> debtor view\n- มีหน้า add debtors สำหรับเพิ่มลูกหนี้เข้ารอบ\n- ในหน้า detail มี method `onAddlist()` ที่พาไปหน้า `/debtors` แต่เอกสารเดิมยังไม่เห็นปุ่มใน UI ที่เรียก method นี้\n\n### UI / Implementation Notes\n\n- `interest_list[]` ในหน้า view ถูกแสดงเป็น nested sub-rows ในตาราง\n- ปุ่ม `onPrint()` มีในบางหน้า แต่เอกสารเดิมระบุว่ายังไม่ implement\n- มีหมายเหตุเรื่อง route case ระหว่าง `Interest-calculation-period` กับโฟลเดอร์ lowercase ซึ่งควรยืนยันจาก source ถ้าจะอ้างเชิงพฤติกรรมเพิ่ม\n\n---\n\n## Known Gaps\n\n- `onPrint()` มีอยู่ในหน้า table-edit และ table-view-debtors แต่ยังเป็น stub (ไม่มี implementation จริง) จึงยังไม่สรุปเป็น flow พิมพ์รายงานใช้งานจริง\n- ~~หน้า add debtors ถูกอ้างผ่าน method `onAddlist()` แต่ยังไม่เห็นปุ่มใน UI~~ **RESOLVED**: จาก source code จริง หน้า table-edit มี method navigate ไป `/debtors` แต่ปุ่มที่เรียก method นี้อยู่ใน component ภายใน — ยืนยันได้ว่าเป็น entry point ใช้งานได้จริง\n- ~~endpoint ในตาราง API เดิมถูกระบุเป็น `inferred` หลายตัว~~ **RESOLVED**: ยืนยันจาก `roundInterest.controller.ts` แล้ว ตาราง API Summary ด้านบนอัปเดตเป็น confirmed routes ทั้งหมด\n- Calculation engine จริงอยู่ใน `DebtService.calculate_interest_execute()` ซึ่งถูกเรียกจาก `RoundInterestService.startProcessAddAccountByIdArray()` — ยังไม่ได้ document logic การคำนวณเชิงลึกเพราะอยู่ใน debt module แยกต่างหาก\n- `RoundAccountService.getQuotaProfile()` เรียก BFF Service: `/sugarcane-farmers/{debtor_id}` เพื่อดึงข้อมูลโปรไฟล์ลูกหนี้ — ถ้า BFF ไม่ตอบหรือ token หมดอายุ อาจเกิด error ในขั้นตอนเพิ่มลูกหนี้\n- View page (table-view-debtors) มี dropdown Role ที่แสดง 4 ค่า: ทั้งหมด, ชาวไร่, ผู้รับเหมา, ผู้ให้บริการ — ค่าเหล่านี้ hardcode ใน frontend ไม่ได้มาจาก `apiGetAccountingGetRole` โดยตรง ควรยืนยันว่า mapping ตรงกัน\n',

            '# Flow 19 — Approval\n\n## Overview\n\nFlow นี้รวมหน้าจออนุมัติหลายแบบที่ดูแลคนละธุรกรรม แต่ใช้แนวคิดร่วมกันคือ "โหลดรายการที่รอการตัดสินใจ -> เปิดตรวจข้อมูล -> อัปเดตสถานะหรือพาไปขั้นถัดไป"\n\nจากเอกสารเดิม flow นี้แบ่งได้เป็น 4 กลุ่มงาน:\n\n1. ตรวจสอบการชำระเงินสดของงานบริการจักรกล\n2. อนุมัติใบสำคัญรับของกลุ่มปุ๋ย/ยาแบบหลายรายการ\n3. อนุมัติรายการขายสินค้าเกษตรเงินสด\n4. หน้าคำร้องชาวไร่ที่ UI ยังไม่จบเต็ม flow\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| อนุมัติชำระบริการจักรกลเงินสด | `approve-cash-contractor` |\n| อนุมัติใบสำคัญรับปุ๋ย/ยา | `approve-cash-ferilizer` |\n| อนุมัติรายการขายสินค้าเกษตรเงินสด | `approve-orders` และ `approve-orders/[id]` |\n| อนุมัติคำร้องชาวไร่ | `approve-sugarcane` |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| เจ้าหน้าที่อนุมัติ | ตรวจรายการ, ดูหลักฐาน, อัปเดตสถานะ, หรืออนุมัติเป็นชุด |\n| หน้ารายการอนุมัติ | แสดงรายการรออนุมัติและตัวกรอง |\n| หน้า detail การอนุมัติ | แสดงข้อมูลที่ใช้ตัดสินใจและ form อนุมัติ |\n| BFF Service | รวมข้อมูลอ่านอย่างเช่น order, slip, inspection receipt, contract |\n| CMS Service | รับคำสั่งเปลี่ยนสถานะ สร้าง invoice หรืออัปเดตธุรกรรม |\n| ระบบชำระเงิน / e-payment | ใช้ในกรณีสร้าง QR เพื่อชำระเงิน |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| Approved transaction | รายการที่ผ่านการอนุมัติหรือขยับไปสถานะถัดไปแล้ว |\n| Rejected / flagged transaction | รายการที่ไม่ผ่านหรือยังต้องรอเอกสารเพิ่ม |\n| Invoice progression | กลุ่มใบสำคัญรับที่ถูกสร้าง invoice และส่งต่อบัญชี |\n| Payment progression | order ที่ถูกพาไปชำระเงินหรือรอแนบหลักฐานต่อ |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["เจ้าหน้าที่เปิดหน้ารายการอนุมัติ"] --> B["เลือกรายการตามประเภทธุรกรรม"]\n    B --> C["ระบบโหลดข้อมูลและหลักฐานที่เกี่ยวข้อง"]\n    C --> D["เจ้าหน้าที่ตรวจข้อมูลแล้วตัดสินใจ"]\n    D --> E{"ผ่านอนุมัติหรือไม่?"}\n    E -->|ผ่าน| F["อัปเดตสถานะหรือพาไปขั้นถัดไป"]\n    E -->|ไม่ผ่าน หรือยังไม่ครบ| G["คงสถานะเดิมหรือหยุด flow"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `approve-cash-contractor` | ตรวจ slip และยืนยันการชำระของบริการจักรกลเงินสด | ทำงานผ่าน modal |\n| `approve-cash-ferilizer` | อนุมัติใบสำคัญรับแบบหลายรายการ | ทำงานทีละกลุ่มแล้วค่อยอัปเดตแต่ละ receipt |\n| `approve-orders` | ดูรายการ order เงินสดที่รออนุมัติ | เปิด detail ต่อ |\n| `approve-orders/[id]` | ตรวจรายละเอียด order และอนุมัติ | มีทั้ง payment flow และ approve sequence |\n| `approve-sugarcane` | ดูคำร้องชาวไร่ | ยังเป็น partial implementation |\n\n---\n\n## Per-Page Details\n\n### 19-A: Approve Cash Contractor\n\n#### Purpose\n\nใช้ตรวจสลิปและยืนยันว่ารายการบริการจักรกลเงินสดได้รับชำระแล้วจริง\n\n#### Main Steps\n\n1. เปิดหน้ารายการที่รอการเงินตรวจสอบ\n2. ระบบโหลด order ที่เข้าเงื่อนไข\n3. เจ้าหน้าที่ค้นหาหรือกรองรายการ\n4. เปิด modal เพื่อตรวจ slip\n5. ถ้าตรวจผ่าน ระบบอัปเดตทั้ง order และ inspection receipt\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| หา slip ไม่เจอ | modal ไม่สามารถแสดงภาพหลักฐานได้ครบ |\n| ยืนยันรายการผ่าน | order ไปสถานะ `success` และ receipt ไป `waitingInvoice` |\n| อัปเดตไม่สำเร็จ | แจ้ง error และคงรายการไว้ |\n\n#### Result\n\n- ได้รายการที่ยืนยันรับยอดเงินแล้ว และพร้อมไปขั้นออก invoice\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as approve-cash-contractor\n    participant BFF as BFF Service\n    participant Modal as CashContractorModalUploadSlip\n    participant CMS as CMS Service\n\n    Page->>BFF: โหลด orders ที่รอการเงินตรวจสอบ\n    BFF-->>Page: order list\n    Staff->>Page: เปิดรายการเพื่อตรวจ slip\n    Page->>Modal: ส่ง order data เข้า modal\n    Modal->>BFF: โหลด inspection receipt และไฟล์แนบ\n    BFF-->>Modal: receipt data และ slip image\n    Staff->>Modal: ยืนยันผลการตรวจ\n    Modal->>CMS: อัปเดต order status\n    Modal->>CMS: อัปเดต receipt status\n    CMS-->>Modal: success/error\n    Modal-->>Page: รีโหลดรายการเมื่อสำเร็จ\n```\n\n### 19-B: Approve Cash Fertilizer\n\n#### Purpose\n\nใช้อนุมัติใบสำคัญรับของกลุ่มปุ๋ย/ยาแบบหลายรายการในคราวเดียว\n\n#### Main Steps\n\n1. เปิดหน้ารายการใบสำคัญรับ\n2. ระบบโหลดรายการแบบ grouped ตาม `preInvoiceNumber`\n3. เจ้าหน้าที่กรองตามสถานะ\n4. เลือกหลายกลุ่มแล้วกดยืนยันอนุมัติ\n5. ระบบสร้าง invoice ให้แต่ละกลุ่มก่อน แล้วค่อยอัปเดต status ของแต่ละ receipt\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| สถานะเป็น `waitingApproveReceipt` | เปิด multi-select และปุ่มอนุมัติ |\n| สถานะเป็น `debtAccepted` | อยู่ในโหมดดูอย่างเดียว |\n| ขั้นตอนสร้าง invoice หรืออัปเดต status ขั้นใดล้มเหลว | flow หยุดและแจ้งไม่สำเร็จ |\n\n#### Result\n\n- ได้รายการที่ถูกส่งต่อไปบัญชีในสถานะ `debtAccepted`\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as approve-cash-ferilizer\n    participant BFF as BFF Service\n    participant CMS as CMS Service\n\n    Page->>BFF: โหลด grouped inspection receipts\n    BFF-->>Page: grouped list\n    Staff->>Page: เลือกหลายกลุ่มและกดยืนยันอนุมัติ\n    Page-->>Staff: เปิด confirm\n    Staff->>Page: ยืนยัน\n\n    loop ทีละกลุ่ม\n        Page->>CMS: สร้าง invoice ของกลุ่มนั้น\n        CMS-->>Page: success/fail\n    end\n\n    loop ทีละ receipt ในกลุ่มที่ผ่าน\n        Page->>CMS: อัปเดต status เป็น debtAccepted\n        CMS-->>Page: success/fail\n    end\n\n    Page-->>Staff: แจ้งผลและรีโหลดรายการ\n```\n\n### 19-C: Approve Orders List\n\n#### Purpose\n\nใช้ดูรายการขายสินค้าเกษตรเงินสดที่รออนุมัติ แล้วเปิดไปหน้า detail ของแต่ละ order\n\n#### Main Steps\n\n1. เปิดหน้ารายการ order\n2. ระบบโหลดรายการตามสถานะเริ่มต้น\n3. เจ้าหน้าที่ค้นหาและกรองตามวันที่, ช่องทางชำระเงิน, หรือสถานะ\n4. เปิดไปหน้า detail ของ order ที่ต้องการอนุมัติ\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| filter สถานะเป็น `pending` | ใช้เงื่อนไข `not.status` แบบพิเศษตามเอกสารเดิม |\n| filter สถานะเป็นค่าอื่น | กรองตรงตามค่านั้น |\n\n#### Result\n\n- ได้รายการ order ที่พร้อมให้เปิดตรวจและอนุมัติต่อ\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as approve-orders\n    participant BFF as BFF Service\n\n    Page->>BFF: โหลดรายการ orders ของ roleOwner sugarcane\n    BFF-->>Page: order list\n\n    alt ค้นหา / กรอง\n        Staff->>Page: เปลี่ยน search, date range, payment method, status\n        Page->>BFF: โหลดข้อมูลตาม filter\n        BFF-->>Page: filtered results\n    end\n\n    Staff->>Page: เปิดรายการที่ต้องการอนุมัติ\n    Page-->>Staff: ไปหน้า approve-orders/[id]\n```\n\n### 19-D: Approve Order Detail\n\n#### Purpose\n\nใช้ดูสรุปรายการสั่งซื้อ, จัดการการชำระเงินในกรณีที่ยังไม่เลือกวิธีชำระ, และส่งคำสั่งอนุมัติผ่าน approve sequence\n\n#### Main Steps\n\n1. เปิดหน้า detail ของ order\n2. ระบบโหลดรายละเอียด order, approvers, attachment และข้อมูล approve extension\n3. ถ้ายังไม่มีวิธีชำระ ให้เลือกวิธีชำระ\n4. ถ้าเป็น QR ระบบสร้าง QR สำหรับชำระเงิน\n5. ถ้าเป็นโอน ระบบอัปเดตวิธีชำระและพาไปหน้ารอแนบสลิป\n6. เจ้าหน้าที่ใช้ `FormApproveSequence` เพื่อส่งผลอนุมัติ\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| payment method เป็น `scan` | สร้าง QR แล้วอัปเดตสถานะชำระเงิน |\n| payment method เป็น `transfer` | ตั้งค่าวิธีชำระ, เปลี่ยนสถานะเป็น `waitingPayslip`, แล้วพาไป flow ถัดไป |\n| approve sequence ส่งกลับ `approve` | มีการ PUT สถานะอีกครั้งเป็น `success` ตามเอกสารเดิม |\n| approve sequence ส่ง status อื่น | บันทึกสถานะนั้นแล้วกลับหน้ารายการ |\n\n#### Result\n\n- ได้ order ที่ผ่าน approve sequence หรือถูกพาเข้าสู่ขั้นการชำระเงินถัดไป\n\n#### Technical Diagrams\n\ndetail order: payment flow\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant DetailPage as approve-orders/[id]\n    participant BFF as BFF Service\n    participant CMS as CMS Service\n    participant PayAPI as QR Payment API\n\n    Staff->>DetailPage: เปิดหน้า detail\n    DetailPage->>BFF: โหลด order detail\n    BFF-->>DetailPage: order summary\n\n    alt ยังไม่เลือก payment method\n        Staff->>DetailPage: เลือกวิธีชำระ\n        alt scan\n            DetailPage->>PayAPI: สร้าง QR code\n            PayAPI-->>DetailPage: qr data\n            Staff->>DetailPage: กดยืนยันชำระ\n            DetailPage->>CMS: อัปเดต status เป็น success\n        else transfer\n            DetailPage->>CMS: อัปเดต paymentMethod\n            DetailPage->>CMS: อัปเดต status เป็น waitingPayslip\n            DetailPage-->>Staff: ไปหน้า order-cash-ferilizer\n        end\n    else มี payment method แล้ว\n        DetailPage-->>Staff: แสดงข้อมูลการชำระและไฟล์แนบ\n    end\n```\n\ndetail order: approve sequence\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant DetailPage as approve-orders/[id]\n    participant CMS as CMS Service\n\n    Staff->>DetailPage: ส่งผลจาก FormApproveSequence\n    DetailPage->>CMS: บันทึก status และ note ที่เลือก\n    CMS-->>DetailPage: save result\n\n    alt status ที่ส่งกลับเป็น approve\n        DetailPage->>CMS: อัปเดต status ซ้ำเป็น success\n        CMS-->>DetailPage: success/error\n    end\n\n    DetailPage-->>Staff: แจ้งผลและกลับหน้ารายการ\n```\n\n### 19-E: Approve Sugarcane\n\n#### Purpose\n\nเป็นหน้ารออนุมัติคำร้องชาวไร่ แต่เอกสารเดิมยืนยันได้ว่าตอนนี้ยังไม่จบ flow จริง เพราะ modal ยังไม่ผูก API\n\n#### Main Steps\n\n1. เปิดหน้ารายการคำร้อง\n2. ระบบโหลด contracts ตามเงื่อนไขที่กำหนด\n3. เจ้าหน้าที่กดดูรายการ\n4. modal แสดงช่องเลือกวันที่รับเอกสาร\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| เปิด modal | เห็น UI สำหรับเลือกวันที่ |\n| กดทำงานต่อ | ยังไม่มี API call ตามเอกสารเดิม |\n\n#### Result\n\n- ตอนนี้ใช้ได้แค่ดูรายการและเปิด modal placeholder\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as approve-sugarcane\n    participant BFF as BFF Service\n\n    Page->>BFF: โหลด contracts ตาม filter\n    BFF-->>Page: contracts\n    Staff->>Page: เปิด modal ระบุวันที่ได้รับเอกสาร\n    Page-->>Staff: แสดง modal พร้อม date picker\n    Note over Page: เอกสารเดิมยังไม่พบ API call หลังจากกดทำงานต่อ\n```\n\n---\n\n## Technical Reference\n\n### Approve Cash Contractor\n\nAPI ที่เอกสารเดิมยืนยันได้:\n\n| Constant | Method | ใช้เมื่อ |\n|---|---|---|\n| `apiBffDataOrder` | GET | โหลด orders ที่รอการเงินตรวจสอบ |\n| `apiBffexportDataInspectionReceipts` | GET | โหลด inspection receipts ของรายการ |\n| `apiBffFileAttachments` | GET | โหลด slip image |\n| `apiDataOrders` | PUT | อัปเดต order status เป็น `success` |\n| `apiDataInspectionReceipts` | PUT | อัปเดต receipt status เป็น `waitingInvoice` |\n\nFilter:\n\n- search\n- `paymentMethod`\n- `status`\n\nDefault note:\n\n- default status filter คือ `waitingVerify`\n\n### Approve Cash Fertilizer\n\nAPI ที่เอกสารเดิมยืนยันได้:\n\n| Constant | Method | ใช้เมื่อ |\n|---|---|---|\n| `apiDataInspectionReceiptsCountGroupByPreInvoiceNumber` | GET | โหลดรายการ grouped by `preInvoiceNumber` |\n| `apiDataInspectionReceiptsInvoid` | POST | สร้าง invoice รายกลุ่ม |\n| `apiDataInspectionReceipts` | PUT | อัปเดต status ทีละ receipt |\n\nStatus ที่สำคัญ:\n\n| Value | ความหมาย |\n|---|---|\n| `waitingApproveReceipt` | รออนุมัติใบสำคัญรับ |\n| `debtAccepted` | ส่งรายการไปบัญชีแล้ว |\n\nNotes:\n\n- ใช้ `debtGroupId: \'GS21\'` เป็น hardcoded filter สำหรับกลุ่มปุ๋ย/ยา\n- ทำงานแบบ 2 loop: create invoice ก่อน แล้วค่อย update status\n\n### Approve Orders List\n\nAPI ที่เอกสารเดิมยืนยันได้:\n\n| Constant | Method | ใช้เมื่อ |\n|---|---|---|\n| `apiBffDataOrder` | GET | โหลดรายการ orders |\n\nFilters:\n\n- search\n- date range\n- `paymentMethod`\n- `status`\n\nStatus filter logic:\n\n- ถ้าเลือก `pending` ใช้ `not.status` แบบพิเศษ\n- ถ้าเลือกค่าอื่น ใช้ filter ตรงตาม status นั้น\n\n### Approve Order Detail\n\nAPI ที่เอกสารเดิมยืนยันได้:\n\n| Constant | Method | ใช้เมื่อ |\n|---|---|---|\n| `apiBffDataOrder/{id}` | GET | โหลด order detail |\n| `apiDataOrders` | POST | สร้าง order ใหม่ใน mode add |\n| `apiDataOrders/{id}` | PUT | อัปเดต order |\n| `apiDataOrders/{id}/status` | PUT | อัปเดต status ใน approve flow |\n| `apiQRPayment` | POST | สร้าง QR code |\n\nMode notes:\n\n- route นี้มี `add` mode และ `approve` mode\n- ในบริบทของ flow approval เอกสารเดิมยืนยันว่าเข้ามาด้วย id จริง จึงใช้งานเป็น `approve` mode\n\nPayment methods:\n\n| Value | ความหมาย |\n|---|---|\n| `transfer` | โอนชำระที่ธนาคาร |\n| `scan` | ชำระผ่าน QR Code |\n\nStatus order ที่เอกสารเดิมอ้างถึง:\n\n| Value | ข้อความ |\n|---|---|\n| `draft` | ฉบับร่าง |\n| `inprogress` | กำลังดำเนินการ |\n| `pending` | รอชำระเงิน |\n| `waitingVerify` | รอการเงินตรวจสอบ |\n| `waitingPayslip` | รอแนบสลิปโอนเงิน |\n| `waitingTaxInvoice` | รอออกใบกำกับภาษี |\n| `success` | ชำระเงินแล้ว |\n| `approveTaxInvoice` | อนุมัติออกใบกำกับภาษีแล้ว |\n\n### Approve Sugarcane\n\nAPI ที่เอกสารเดิมยืนยันได้:\n\n| Constant | Method | ใช้เมื่อ |\n|---|---|---|\n| `apiDataContractBff` | GET | โหลด contracts สำหรับรายการคำร้อง |\n\nNotes:\n\n- เอกสารเดิมระบุว่า modal ยังไม่ผูก API\n- field ใน template บางส่วนยังไม่ map ชัดจากข้อมูลที่โหลด\n\n---\n\n## Known Gaps\n\n- `approve-sugarcane` ยังเป็น partial implementation จึงไม่ควรนับเป็น flow อนุมัติที่ใช้งานครบ\n- ใน `approve-orders/[id]` มีการ PUT status ซ้ำเมื่อ returned status เป็น `approve`; ถ้าจะอธิบายเชิง business rule เพิ่ม ควรกลับไปยืนยันจาก source backend ว่าตั้งใจให้ `approve -> success` เสมอหรือไม่\n- `approve-cash-contractor` พึ่ง `creditWithdrawCode` เพื่อไปหา slip; ถ้าหา receipt ไม่เจอ เอกสารเดิมบอกเพียงว่า slip จะไม่แสดง ยังไม่พออธิบาย fallback behavior อื่น\n',
