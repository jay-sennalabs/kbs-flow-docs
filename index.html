            '# Flow 12 — Contracts\n\n## Source files\n\n### cms_frontend-develop\n\n- `pages/cms/contracts/list.vue`\n- `pages/cms/contracts/[id]/index.vue`\n- `pages/cms/contracts/[id]/collateral/*`\n- `pages/cms/contracts/[id]/guarantor/*`\n- `pages/cms/contracts/[id]/kat-request-changes/*`\n- `pages/cms/contracts/[id]/using-credit/index.vue`\n- `pages/cms/contracts/[id]/using-credit/allowedCreditLimit/index.vue`\n- `pages/cms/contracts/[id]/using-credit/allowedCreditLimit/byWithdraw/[withdrawId].vue`\n- `pages/cms/contracts/[id]/using-credit/creditSpecial/index.vue`\n- `pages/cms/contracts/[id]/using-credit/creditSpecial/byReqCode/[requestCode].vue`\n- `pages/cms/contracts/[id]/using-credit/creditSpecial/[increaseSpecial].vue`\n- `pages/cms/contracts/[id]/using-credit/creditYearly/index.vue`\n- `pages/cms/contracts/[id]/using-credit/creditYearly/byWithdraw/[withdrawId].vue`\n- `pages/cms/contracts/[id]/using-credit/creditYearly/[increaseId].vue`\n- `pages/cms/contracts/[id]/using-credit/usageBeforeHarvest/index.vue`\n- `pages/cms/contracts/[id]/using-credit/usageBeforeHarvest/byWithdraw/[withdrawId].vue`\n- `pages/cms/contracts/request/index.vue`\n- `pages/cms/contract-elbd/index.vue`\n\n---\n\n## Overview\n\nFlow นี้เป็นแกนหลักของงานสัญญาชาวไร่ในระบบ ครอบคลุมตั้งแต่การสร้างสัญญา, เปิดดูข้อมูลสัญญาแบบหลายแท็บ, งานข้างเคียงอย่างหลักทรัพย์/บุคคลค้ำ/คำร้อง KAT, ไปจนถึงการขอใช้วงเงินหลายประเภท\n\nหากมองเป็นช่วงงานใหญ่ ๆ flow นี้แบ่งได้เป็น 5 ส่วน:\n\n1. สร้างและค้นหารายการสัญญา\n2. เปิดหน้า contract detail เพื่อทำงานตามแท็บ\n3. จัดการ side flows เช่น collateral, guarantor, และ KAT request changes\n4. ขอใช้วงเงินใน 4 กลุ่มหลัก\n5. ดูรายการคำขออนุมัติอนุโลมและ eLBD contracts\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| รายการสัญญา | `cms/contracts/list.vue` |\n| หน้า detail สัญญา | `cms/contracts/[id]/index.vue` |\n| หลักทรัพย์และบุคคลค้ำ | `collateral/*`, `guarantor/*` |\n| using credit | `using-credit/*` |\n| KAT request changes | `kat-request-changes/*` |\n| รายการขออนุมัติอนุโลม | `cms/contracts/request/index.vue` |\n| eLBD contracts | `cms/contract-elbd/index.vue` |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| เจ้าหน้าที่สัญญา | สร้างสัญญา, เปิดดู detail, ทำคำร้อง, และส่งขอใช้วงเงิน |\n| หน้า contract list | ค้นหาและเริ่มสร้างสัญญาใหม่ |\n| หน้า contract detail | เป็นจุดรวมข้อมูลสัญญาและแท็บต่าง ๆ |\n| หน้า using-credit | รับข้อมูลขอใช้วงเงินและส่งคำร้อง |\n| หน้า request/approval | ใช้รับหรืออนุมัติคำร้องที่เกี่ยวข้อง |\n| BFF Service | โหลดข้อมูลสัญญา, withdraw, KAT request, request approvals |\n| CMS Service | สร้าง/แก้ไขสัญญา, ส่งคำร้อง, อัปเดตสถานะ, และบันทึก verify identity |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| Main contract | สัญญาหลัก 5 ปี |\n| Children / additional contracts | สัญญารายปีหรือบันทึกเพิ่มเติมที่ผูกกับสัญญาหลัก |\n| Contract profile | ข้อมูลสัญญาปัจจุบันที่แท็บต่าง ๆ ใช้ร่วมกัน |\n| Credit withdrawal requests | คำขอใช้วงเงินที่ผูกกับสัญญา |\n| KAT request changes | คำร้องเปลี่ยนแปลงข้อมูล KAT |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["เจ้าหน้าที่เปิดหมวด Contracts"] --> B["ค้นหาสัญญาเดิมหรือสร้างสัญญาใหม่"]\n    B --> C["เปิดหน้า contract detail"]\n    C --> D["เลือกทำงานในแท็บที่เกี่ยวข้อง"]\n    D --> E["บันทึกข้อมูลสัญญา, หลักทรัพย์, คำร้อง, หรือการใช้วงเงิน"]\n    E --> F["ระบบอัปเดตสถานะและพากลับไปยังจุดที่เกี่ยวข้อง"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `contracts/list.vue` | ค้นหาและสร้างสัญญา | รองรับ main, children, และ additional context |\n| `contracts/[id]/index.vue` | จุดรวมของ contract detail | ใช้ global state และ 11 tabs |\n| `contracts/[id]/collateral/*` | จัดการหลักทรัพย์ค้ำประกัน | แยก land / vehicle |\n| `contracts/[id]/guarantor/*` | จัดการบุคคลค้ำประกัน | มีหน้าคำร้องแยก |\n| `contracts/[id]/using-credit/*` | ขอใช้วงเงิน | แยก 4 กลุ่ม credit type |\n| `contracts/[id]/kat-request-changes/*` | จัดการคำร้อง KAT | มีทั้ง create และ approve flow |\n| `contracts/request/index.vue` | รายการขออนุมัติอนุโลม | ใช้ modal approve |\n| `contract-elbd/index.vue` | รายการสัญญา eLBD | ปุ่มแก้ไขพาไปหน้า customer |\n\n---\n\n## Per-Page Details\n\n### 12-A: Contract List And Create\n\n#### Purpose\n\nใช้ค้นหารายการสัญญาที่มีอยู่ และเริ่มต้นสร้างสัญญาหลักหรือสัญญารายปี\n\n#### Main Steps\n\n1. เปิดหน้ารายการสัญญา\n2. ระบบโหลดรายการแรกตามปีการผลิต สถานะ และคำค้น\n3. เจ้าหน้าที่ค้นหาหรือกรองข้อมูล\n4. เลือกเปิด detail ของสัญญาที่มีอยู่ หรือเริ่มสร้างสัญญาใหม่\n5. ถ้าสร้างใหม่ ให้เลือกชาวไร่ก่อน แล้วค่อยสร้าง main contract หรือ children contract\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| `associateType = main` | เปิด main contract ตรง ๆ |\n| `associateType = children` | เปิด main contract พร้อม query `children` |\n| `associateType = additional` | เปิด main contract พร้อม query ไปยัง children/additional ที่เกี่ยวข้อง |\n| เป็นสัญญา N เขตนอก | เปิด modal เพิ่มข้อมูลไร่/ตันก่อนสร้าง children contract |\n| เจอ error `คุณสมบัติไม่ผ่าน` | พาไป flow ขออนุมัติอนุโลมแทน |\n\n#### Result\n\n- ได้รายการสัญญาที่ค้นหาได้\n- ได้ main contract หรือ yearly contract ใหม่เมื่อสร้างสำเร็จ\n\n#### Technical Diagrams\n\nรายการสัญญาและการเปิด detail\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ListPage as contracts/list.vue\n    participant BFF as BFF Service\n\n    Staff->>ListPage: เปิดหน้ารายการสัญญา\n    ListPage->>BFF: โหลดรายการสัญญา\n    BFF-->>ListPage: contract list\n\n    alt ค้นหา / กรอง\n        Staff->>ListPage: เปลี่ยนปีการผลิต สถานะ หรือคำค้น\n        ListPage->>BFF: โหลดข้อมูลตาม filter\n        BFF-->>ListPage: filtered list\n    else เปิดรายละเอียด\n        Staff->>ListPage: เลือกแถวในตาราง\n        ListPage-->>Staff: ไปหน้า detail ของ contract ตาม associate type\n    end\n```\n\nสร้างสัญญาใหม่\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ListPage as contracts/list.vue\n    participant Modal as Sugarcane Farmer Selection\n    participant CMS as CMS Service\n\n    Staff->>ListPage: กดสร้างสัญญา\n    ListPage->>Modal: เปิด modal เลือกชาวไร่\n    Staff->>Modal: เลือกชาวไร่และประเภทสัญญา\n\n    alt สร้าง main contract\n        Modal->>CMS: สร้างสัญญาหลัก\n        CMS-->>Modal: new contract id\n        Modal-->>Staff: ไปหน้า main contract\n    else สร้าง yearly contract\n        opt เป็นสัญญา N เขตนอก\n            Staff->>Modal: กรอก plantingFieldsAmount และ sugarcaneQuantity\n        end\n        Modal->>CMS: สร้าง children contract\n        CMS-->>Modal: new children id\n        Modal->>CMS: อัปเดตสถานะเริ่มต้นของ children\n        Modal-->>Staff: ไปหน้า main contract พร้อม query children\n    end\n```\n\n### 12-B: Contract Detail\n\n#### Purpose\n\nใช้เป็นหน้าหลักสำหรับดูและทำงานกับสัญญา โดยรวมข้อมูลสัญญาปัจจุบันและรายการสัญญาอื่นใน quota เดียวกันไว้ใน state กลาง\n\n#### Main Steps\n\n1. เปิดหน้า detail ของสัญญา\n2. ระบบ clear state เดิมและสร้าง state ใหม่\n3. โหลด contract profile ปัจจุบัน\n4. โหลดรายการสัญญาอื่นของ quota และปีเดียวกัน\n5. สร้าง tab menu และเปิด tab ตาม query ถ้ามี\n6. เจ้าหน้าที่สลับแท็บเพื่อทำงานต่อ\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| มี query `children` | เลือก context ของสัญญาย่อยหรือ additional ตั้งแต่ต้น |\n| มี query `tab_code` | เปิดไปยัง tab ที่ระบุ |\n| ต้องยกเลิกสัญญา | ใช้ permission คนละตัวตามสถานะสัญญา |\n\n#### Result\n\n- ได้ contract profile กลางที่แต่ละ tab ใช้ต่อร่วมกัน\n\n#### Technical Diagrams\n\nbootstrap หน้า detail\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant DetailPage as contracts/[id]/index.vue\n    participant BFF as BFF Service\n    participant SharedState as globalContractProfile + globalListContactsByCaneQuotaState\n\n    Staff->>DetailPage: เปิดหน้า detail สัญญา\n    DetailPage->>SharedState: clear state เดิม\n    DetailPage->>BFF: โหลด contract profile\n    BFF-->>DetailPage: current contract\n    DetailPage->>BFF: โหลดรายการสัญญาอื่นใน quota และปีเดียวกัน\n    BFF-->>DetailPage: related contract list\n    DetailPage->>SharedState: set current contract และ related list\n    SharedState-->>DetailPage: state พร้อมใช้\n    DetailPage-->>Staff: แสดง 11 tabs\n```\n\nยกเลิกสัญญา\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant DetailPage as contracts/[id]/index.vue\n    participant CMS as CMS Service\n\n    Staff->>DetailPage: กดยกเลิกสัญญา\n    DetailPage-->>Staff: ตรวจ permission และเปิด confirm\n    Staff->>DetailPage: ยืนยัน\n    DetailPage->>CMS: อัปเดตสถานะสัญญาเป็น cancel\n    CMS-->>DetailPage: success/error\n    DetailPage-->>Staff: รีโหลดข้อมูลและแจ้งผล\n```\n\n### 12-C: Collateral, Guarantor, And Request Side Flows\n\n#### Purpose\n\nใช้จัดการงานข้างเคียงของสัญญา เช่น หลักทรัพย์, บุคคลค้ำ, คำร้องของหลักทรัพย์/บุคคลค้ำ, และคำร้อง KAT\n\n#### Main Steps\n\n1. เปิดจาก tab หรือ route ย่อยของ contract\n2. ระบบโหลด context ของสัญญา\n3. ในหน้าที่เกี่ยวข้อง โหลดข้อมูลเฉพาะของหลักทรัพย์/บุคคลค้ำ/คำร้อง\n4. เจ้าหน้าที่แก้ไขข้อมูลหรือส่งคำร้อง\n5. ถ้าเป็น KAT request changes สามารถเข้าสู่ approve flow และ GIS confirmation ได้\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| `?type=land` หรือ `?type=vehicle` ใน collateral | render form คนละแบบ |\n| เป็นหน้าคำร้อง collateral/guarantor | ดูรายการ request และพิมพ์เอกสารได้ |\n| KAT request type ต่างกัน | ต้องกรอกเงื่อนไขเฉพาะของคำร้องนั้น |\n| KAT request อยู่ขั้นอนุมัติ | ใช้ `FormApproveSequence` ใน modal |\n| KAT request อยู่ขั้น GIS confirmation | ใช้ปุ่มยืนยันการดำเนินการ |\n\n#### Result\n\n- ได้ข้อมูลหลักทรัพย์/บุคคลค้ำหรือคำร้อง KAT ที่อัปเดตแล้ว\n\n#### Technical Diagrams\n\ncollateral / guarantor side flow\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant SubPage as collateral / guarantor pages\n    participant BFF as BFF Service\n\n    Staff->>SubPage: เปิดหน้าจัดการข้อมูลย่อย\n    SubPage->>BFF: โหลด context ของสัญญาและข้อมูลรายการย่อย\n    BFF-->>SubPage: contract context and detail\n    SubPage-->>Staff: แสดง form หรือ request list\n```\n\nKAT request changes\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant KatPage as kat-request-changes\n    participant BFF as BFF Service\n    participant CMS as CMS Service\n\n    Staff->>KatPage: เปิดหน้ารายการคำร้อง KAT\n    KatPage->>BFF: โหลด contract profile และรายการคำร้อง\n    BFF-->>KatPage: contract and request list\n\n    alt สร้างคำร้องใหม่\n        Staff->>KatPage: กรอกข้อมูลคำร้องและแนบไฟล์\n        KatPage->>CMS: สร้าง KAT request\n        KatPage->>CMS: บันทึก verify identity\n    else อนุมัติคำร้อง\n        Staff->>KatPage: ส่งผล approve sequence\n        KatPage->>CMS: อัปเดต status และ note\n    else GIS confirmation\n        Staff->>KatPage: กดยืนยันการดำเนินการ\n        KatPage->>CMS: อัปเดต status เป็น success\n    end\n```\n\n### 12-D: Using Credit Families\n\n#### Purpose\n\nใช้ส่งคำขอใช้วงเงินจากสัญญา โดยแบ่งเป็น 4 family หลักซึ่งใช้ pattern ใกล้กัน แต่เงื่อนไข validation, debt groups, OTP, และ flow ขอวงเงินเพิ่มต่างกัน\n\n#### Families\n\n| Family | บทบาท |\n|---|---|\n| Allowed Credit Limit | วงเงินอนุโลมให้เบิกใช้ |\n| Credit Special | วงเงินส่งเสริมพิเศษ |\n| Credit Yearly | วงเงินส่งเสริมประจำปี |\n| Usage Before Harvest | เงินเตรียมการฤดูหีบ |\n\n#### Main Steps\n\n1. เปิดหน้า create หรือ edit ของ family ที่ต้องการ\n2. ระบบโหลด contract context และข้อมูล balance/withdraw ที่เกี่ยวข้อง\n3. ผู้ใช้เพิ่ม debt groups ที่ต้องการ\n4. กรอกข้อมูลในแต่ละ form component\n5. เข้าหน้าสรุปรายการหรือกดบันทึก\n6. ถ้าจำเป็น ระบบเปิด verify identity\n7. ระบบสร้างหรือแก้ไข credit withdraw records และอัปเดต status\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| create vs edit | ใช้ API create หรือ edit คนละชุด |\n| บาง family ต้อง OTP | ต้องผ่าน verify identity ก่อนส่งคำร้อง |\n| credit balance ติดลบ | เปิด flow ขอวงเงินเพิ่มใน family ที่รองรับ |\n| validation เฉพาะ debt group ไม่ผ่าน | ไม่ให้ไปต่อ |\n\n#### Result\n\n- ได้คำขอ credit withdraw ที่ผูกกับสัญญาแล้ว\n\n#### Technical Diagrams\n\nusing credit create flow\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant CreditPage as using-credit create pages\n    participant BFF as BFF/CMS Read APIs\n    participant VerifyModal as Verify Identity Modal\n    participant CMS as CMS Service\n\n    Staff->>CreditPage: เปิดหน้า create ของ credit family\n    CreditPage->>BFF: โหลด contract context และ balance/statistics\n    BFF-->>CreditPage: contract and summary data\n    Staff->>CreditPage: เพิ่ม debt groups และกรอกข้อมูล\n    CreditPage->>CreditPage: ตรวจ validation เฉพาะของ family\n\n    opt family นี้ต้อง OTP\n        CreditPage->>VerifyModal: เปิด verify identity\n        Staff->>VerifyModal: ยืนยันตัวตน\n        VerifyModal-->>CreditPage: verify result\n    end\n\n    CreditPage->>CMS: สร้าง credit withdraw records\n    CreditPage->>CMS: อัปเดต status เป็น pending หรือสถานะที่เกี่ยวข้อง\n    opt มี verify identity\n        CreditPage->>CMS: บันทึก verify identity\n    end\n    CreditPage-->>Staff: กลับไปหน้า contract detail\n```\n\nusing credit edit / increase flow\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant EditPage as using-credit edit pages\n    participant BFF as BFF Service\n    participant CMS as CMS Service\n\n    Staff->>EditPage: เปิดหน้าแก้ไข withdraw หรือ increase item\n    EditPage->>BFF: โหลด withdraw หรือ increase item เดิม\n    BFF-->>EditPage: existing data\n    Staff->>EditPage: แก้ไขข้อมูลและกดบันทึก\n    EditPage->>CMS: อัปเดต credit withdraw records\n    opt เป็น editing flow ที่ต้อง update increase item\n        EditPage->>CMS: อัปเดตสถานะ increase item\n    end\n    EditPage-->>Staff: กลับหน้าที่เกี่ยวข้อง\n```\n\n### 12-E: Contract Request Approval And eLBD\n\n#### Purpose\n\nเป็น flow ปลายทางของคำขออนุโลมและรายการสัญญา eLBD ที่อยู่ในหมวด contracts แต่มีหน้าที่เฉพาะของตัวเอง\n\n#### Main Steps\n\n1. เปิดหน้ารายการคำขออนุมัติอนุโลม หรือหน้ารายการ eLBD\n2. ระบบโหลดรายการตาม search/filter\n3. เจ้าหน้าที่เปิด modal เพื่ออนุมัติคำขออนุโลม หรือเปิด customer page จาก eLBD list\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| request approval status ยัง pending | เปิดปุ่มอนุมัติ |\n| eLBD user มีสิทธิ์รับเอกสาร | เห็นปุ่มแก้ไข |\n\n#### Result\n\n- ได้คำขออนุโลมที่ถูกอัปเดตสถานะแล้ว\n- หรือเปิดไปยัง customer page เพื่อทำงานต่อจาก eLBD list\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant RequestPage as contracts/request or contract-elbd\n    participant BFF as BFF Service\n    participant CMS as CMS Service\n\n    Staff->>RequestPage: เปิดหน้ารายการ\n    RequestPage->>BFF: โหลดรายการ\n    BFF-->>RequestPage: list data\n\n    alt อนุมัติคำขออนุโลม\n        Staff->>RequestPage: เปิด modal approve\n        RequestPage->>CMS: อัปเดต status ของ request approval\n        CMS-->>RequestPage: success/error\n    else เปิด eLBD รายการ\n        Staff->>RequestPage: กดแก้ไข\n        RequestPage-->>Staff: ไปหน้า customer\n    end\n```\n\n---\n\n## Technical Reference\n\n### Contract Enums And Statuses\n\nContract associate type:\n\n| Value | ความหมาย |\n|---|---|\n| `main` | สัญญาหลัก |\n| `children` | สัญญารายปี |\n| `additional` | บันทึกเพิ่มเติม |\n\nContract status ที่เอกสารเดิมยืนยันได้:\n\n| Value | ความหมาย |\n|---|---|\n| `Draft` | รอสร้างสัญญา |\n| `Created` | รอพิมพ์สัญญา |\n| `Printed` | รอชาวไร่ลงนาม |\n| `PendingApprove` | รออนุมัติสัญญา |\n| `PendingDocs` | รอรับสัญญาเข้าแฟ้ม |\n| `IncompleteDocs` | รอเอกสารเพิ่มเติม |\n| `Checked` | รับสัญญาเข้าแฟ้มแล้ว |\n| `CancelDraft` | ยกเลิกแบบคำขอ |\n| `CancelDocs` | ยกเลิกสัญญา |\n| `Cancel` | ยกเลิกสัญญาที่รับเข้าแฟ้มแล้ว |\n| `Approved` | รับเอกสารแล้ว |\n\neLBD statuses:\n\n| Value | ความหมาย |\n|---|---|\n| `createContract` | สร้างสัญญาแล้ว |\n| `confirmDocs` | ยืนยันรับเอกสารสัญญา |\n| `terminate` | ยกเลิกใช้งาน |\n\n### Global State\n\n| State key | ใช้เพื่อ |\n|---|---|\n| `globalContractProfile` | เก็บ current contract profile |\n| `globalListContactsByCaneQuotaState` | เก็บรายการสัญญาของ quota เดียวกัน |\n| `appStateAllowedCreditLimit` | state ของ allowed credit limit |\n| `appStateCreditSpecial` | state ของ credit special |\n| `appStateCreditYearly` | state ของ credit yearly |\n| `appStateUsingBeforeHarvest` | state ของ usage before harvest |\n\n### Contract Detail Tabs\n\nแท็บหลัก 11 ตัวที่เอกสารเดิมยืนยันได้:\n\n| code | label |\n|---|---|\n| `contract` | ข้อมูลสัญญา |\n| `sugarcane_farmer` | ข้อมูลชาวไร่ |\n| `kat` | ข้อมูล KAT |\n| `cal_credit_auto` | คำนวณวงเงินออโต้ |\n| `collateral` | หลักทรัพย์ค้ำประกัน |\n| `guarantor` | บุคคลค้ำประกัน |\n| `representative` | โควตาตัวแทน |\n| `additional` | บันทึกเพิ่มเติมสัญญา |\n| `attachment` | เอกสารแนบ |\n| `using_credit` | การใช้วงเงิน |\n| `harvest` | รายการส่งอ้อยเข้าหีบ |\n\nResponsive tab slider:\n\n- desktop = 8 tabs\n- tablet = 6 tabs\n- mobile = 3 tabs\n\n### Collateral And Guarantor\n\nCollateral routes:\n\n- `?type=land` -> `ContractTabLand`\n- `?type=vehicle` -> `ContractTabVehicle`\n\nRequest pages:\n\n- collateral request ใช้ `GET /bff-service/data-request-collaterals`\n- guarantor request ใช้ `GET /bff-service/data-request-guarantors`\n\n### Using Credit Families\n\nSupported debt groups ที่เอกสารเดิมยืนยันได้:\n\nAllowed Credit Limit:\n\n- `GS21`\n- `GM04`\n- `GS17`\n\nCredit Special:\n\n- `GM05`\n- `GM04`\n- `GM20`\n- `GM19`\n- `GM07`\n- `GM13`\n\nCredit Yearly:\n\n- `GS21`\n- `GS17`\n- `GC01`\n- `GS16-1`\n\nUsage Before Harvest:\n\n- `AD03-1`\n- `GS16-1`\n- `GS16-2`\n- `GC03`\n- `GS10`\n- `AD03-3`\n- `AD01-2`\n- `GS16-3`\n\nFamily-specific notes:\n\n- Allowed Credit Limit และ Credit Special มี OTP ใน create flow\n- Credit Yearly ใช้ OTP เฉพาะบางรายการ เช่น GC01\n- Usage Before Harvest ใช้ OTP ใน create flow และไม่มี OTP ใน edit flow ตามเอกสารเดิม\n\nIncrease flow notes:\n\n- Credit Special และ Credit Yearly มี flow `ขอวงเงินเพิ่ม`\n- สร้าง `data-credit-increase-items`\n- อัปเดต withdraw status ไป `pendingIncrease` หรือ draft ตาม family\n\nValidation notes ที่เอกสารเดิมยืนยันชัด:\n\n- GS21 fertilizer quota check\n- GC01 rate validation\n- GS16-1 / GS16-2 ต้องมี `servicePlan` ในบาง family\n\n### KAT Request Changes\n\nPermissions:\n\n| Permission | Action |\n|---|---|\n| `kat_request_change_operate` | สร้างคำร้องและแก้ไขข้อมูล |\n| `kat_request_change_approve` | approve ผ่าน `FormApproveSequence` |\n| `kat_request_change_approve_gis` | ยืนยันการดำเนินการ GIS |\n\nRequest types ที่เอกสารเดิมยืนยันได้:\n\n- `cancel`\n- `transfer`\n- `adjust`\n- `changeCaneType`\n\n### Request Approval And eLBD\n\nRequest approval APIs:\n\n- `GET /bff-service/data-request-approvals`\n- `GET /bff-service/data-request-approvals/:id`\n- `PUT /cms-service/data-request-approvals/:code/status`\n\neLBD list notes:\n\n- default filter status คือ `createContract`\n- ปุ่ม edit พาไป `/cms/customers/{customerCode}`\n- ไม่ได้พาไปหน้า detail ของ eLBD เองตามเอกสารเดิม\n\n### API Summary\n\nBFF read endpoints ที่เด่น:\n\n- `data-contracts`\n- `data-contract-elbd`\n- `data-request-approvals`\n- `data-credit-withdraws`\n- `data-credit-increase-items`\n- `data-contract-collaterals`\n- `data-request-collaterals`\n- `data-request-guarantors`\n- `data-kat-request-changes`\n\nCMS write endpoints ที่เด่น:\n\n- `data-contracts`\n- `data-request-approvals`\n- `statistics/data-credit/limit`\n- `data-credit-limits`\n- `data-credit-withdraws`\n- `data-credit-increase-items`\n- `data-verify-identities`\n- `data-running-documents`\n- `attachments`\n\n---\n\n## Known Gaps\n\n- `Flow 12` ใหญ่มากและเอกสารเดิมให้รายละเอียดฝั่ง using-credit หนาแน่นกว่าส่วนอื่นมาก รอบนี้จึงสรุปเป็น family-level flow ก่อน ไม่ได้แตก per-debt-group เป็นรายหน้า\n- หน้าแก้ไขใน using-credit หลายตัวมี pattern คล้ายกันแต่ route และเงื่อนไขย้อนกลับต่างกัน หากจะลงลึกระดับ route-by-route มากกว่านี้ควรกลับไปไล่ source ของแต่ละไฟล์โดยตรง\n- eLBD list เปิดไปหน้า customer แทน detail ของ eLBD เองตามเอกสารเดิม ถ้าจะอธิบายว่าทำไมจึงต้องยืนยันจาก source/UX context เพิ่ม\n\n### Using-Credit Hierarchy — ยืนยันจาก develop branch\n\nโครงสร้างไฟล์ที่ยืนยันได้จาก `cms_frontend-develop/pages/cms/contracts/[id]/using-credit/`:\n\n```\nusing-credit/\n├── index.vue (34,071 bytes — main using-credit page)\n├── allowedCreditLimit/\n│   ├── index.vue\n│   └── byWithdraw/[withdrawId].vue\n├── creditSpecial/\n│   ├── index.vue\n│   ├── byReqCode/[requestCode].vue\n│   └── [increaseSpecial].vue\n├── creditYearly/\n│   ├── index.vue\n│   ├── byWithdraw/[withdrawId].vue\n│   └── [increaseId].vue\n└── usageBeforeHarvest/\n    ├── index.vue\n    └── byWithdraw/[withdrawId].vue\n```\n\nหมายเหตุ: ไม่พบ module เฉพาะ contracts ใน `accounting_service-develop` — debt และ interest-setting modules ทำงานผ่าน quota-based debt management แทน\n',

            '# Flow 13 — Guarantee & Collateral\n\n## Overview\n\nFlow นี้ครอบคลุมงานอนุมัติและจัดการหลักประกันในหลายรูปแบบ ได้แก่ หลักทรัพย์ที่ดิน, หลักทรัพย์รถ, บุคคลค้ำประกัน, และคำขอหลักทรัพย์ทั้งของลูกค้ากลุ่มปกติและผู้รับเหมา\n\nภาพรวมของ flow แยกได้เป็น 4 กลุ่มหลัก:\n\n1. ดูรายการหลักประกันและเปิดหน้าอนุมัติ\n2. อนุมัติหลักทรัพย์ของลูกค้า\n3. อนุมัติหลักทรัพย์ของผู้รับเหมา\n4. ดูรายการคำขอหลักทรัพย์และบุคคลค้ำประกัน\n\nหลายหน้าใน flow นี้เป็น shell page ที่ delegate งานให้ child components และบาง tab ยังถูกปิดหรือคอมเมนต์ไว้ในเอกสารเดิม จึงควรอ่านแยกจากส่วนที่เป็น approval flow จริง\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| หลักทรัพย์ลูกค้า | `guarantee/land/*`, `guarantee/vehicle/*` |\n| บุคคลค้ำประกัน | `guarantee/guarantor/*` |\n| คำขอหลักทรัพย์ | `guarantee/request-collateral*`, `collateral/index.vue` |\n| หลักทรัพย์ผู้รับเหมา | `guarantee/contractor-land/*`, `guarantee/contractor-vehicle/*` |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| เจ้าหน้าที่สินเชื่อ / หลักประกัน | เปิดดูรายการ, ตรวจข้อมูล, และอนุมัติหลักประกัน |\n| หน้ารายการหลักทรัพย์ | แสดงรายการที่ดิน รถ หรือบุคคลค้ำที่ต้องจัดการ |\n| หน้า detail / approval | ใช้ดูข้อมูลทั่วไป, เอกสารแนบ, และส่งผลอนุมัติ |\n| หน้าคำขอหลักทรัพย์ | ใช้ดูคำขอยืม-คืนหรือถอนหลักทรัพย์ |\n| BFF Service | โหลดข้อมูลหลักประกัน, contract mapping, และไฟล์แนบ |\n| CMS Service | อัปเดต master data ของทรัพย์/บุคคล และอัปเดต mapping status |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| Approved collateral | หลักทรัพย์ที่ผ่านการอนุมัติแล้ว |\n| Approved guarantor | บุคคลค้ำประกันที่ผ่านการอนุมัติแล้ว |\n| Collateral mapping status | สถานะของการผูกหลักทรัพย์เข้ากับสัญญา |\n| Request views | รายการคำขอหลักทรัพย์เพื่อใช้ติดตามต่อ |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["เจ้าหน้าที่เปิดหมวด Guarantee & Collateral"] --> B["เลือกจัดการที่ดิน รถ บุคคลค้ำ หรือคำขอหลักทรัพย์"]\n    B --> C["ระบบโหลดรายการหรือข้อมูล detail ที่เกี่ยวข้อง"]\n    C --> D["เจ้าหน้าที่ตรวจข้อมูลทั่วไปและเอกสาร"]\n    D --> E["ส่งผลอนุมัติผ่าน approval flow"]\n    E --> F["ระบบอัปเดตข้อมูล master, mapping, และ status"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `guarantee/land/index.vue` | ดูรายการหลักทรัพย์ที่ดิน | page เองเป็น container |\n| `guarantee/land/[id]/index.vue` | ดูรายละเอียดที่ดินแบบหลายแท็บ | บางแท็บ disabled |\n| `guarantee/land/[id]/[code].vue` | อนุมัติหลักทรัพย์ที่ดิน | มี `FormApproveSequence` |\n| `guarantee/vehicle/*` | จัดการหลักทรัพย์รถ | โครงคล้าย land |\n| `guarantee/guarantor/index.vue` | จัดการบุคคลค้ำประกัน | แยก tab ค้ำ / ถอนค้ำ |\n| `guarantee/guarantor/[id]/[code].vue` | อนุมัติบุคคลค้ำประกัน | ต้องมีไฟล์แนบก่อน approve |\n| `guarantee/request-collateral*` | ดูคำขอหลักทรัพย์ | เป็น request views |\n| `guarantee/contractor-land/*` | จัดการหลักทรัพย์ที่ดินของผู้รับเหมา | โครงคล้าย customer แต่ใช้ API คนละชุด |\n| `guarantee/contractor-vehicle/*` | จัดการหลักทรัพย์รถของผู้รับเหมา | โครงคล้าย customer แต่ใช้ API คนละชุด |\n| `collateral/index.vue` | จัดการคำขอหลักทรัพย์รวม | มีปุ่มหลายตัวเป็น placeholder |\n\n---\n\n## Per-Page Details\n\n### 13-A: Customer Collateral Lists\n\n#### Purpose\n\nใช้ดูรายการหลักทรัพย์ที่ดินและรถของลูกค้า ก่อนเปิดเข้าไปดูข้อมูลหรืออนุมัติรายการนั้น\n\n#### Main Steps\n\n1. เปิดหน้ารายการหลักทรัพย์ที่ดินหรือหลักทรัพย์รถ\n2. page แสดง tab ที่ใช้งานได้\n3. เจ้าหน้าที่เลือกเปิดรายการเพื่อดู detail หรืออนุมัติ\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| อยู่หน้า land | ใช้ tab หลักทรัพย์ที่ดิน และจดจำนอง |\n| อยู่หน้า vehicle | ใช้ tab หลักทรัพย์รถ และประวัติการพิมพ์จดหมาย |\n| tab ยืม-คืน / ถอน | ยังไม่ใช้งานใน 2 หน้านี้ตามเอกสารเดิม |\n\n#### Result\n\n- ได้รายการหลักทรัพย์ที่พร้อมเปิดไปดูหรืออนุมัติต่อ\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ListPage as guarantee land / vehicle list pages\n    participant ChildComp as Child Table Components\n\n    Staff->>ListPage: เปิดหน้ารายการหลักทรัพย์\n    ListPage-->>Staff: แสดง tab ที่เปิดใช้งาน\n    Staff->>ListPage: เลือก tab\n    ListPage-->>ChildComp: render component ของ tab นั้น\n    Note over ListPage: page เองไม่ได้ทำ API call หลักตามเอกสารเดิม\n```\n\n### 13-B: Customer Collateral Approval\n\n#### Purpose\n\nใช้ดูรายละเอียดและอนุมัติหลักทรัพย์ที่ดินหรือรถของลูกค้าที่ถูกส่งเข้ามาผูกกับสัญญา\n\n#### Main Steps\n\n1. เปิดหน้า detail ของรายการหลักทรัพย์\n2. ระบบโหลดข้อมูลหลักทรัพย์และไฟล์แนบ\n3. แสดง 2 ส่วนหลักคือข้อมูลทั่วไปและเอกสาร\n4. เจ้าหน้าที่ส่งผลอนุมัติผ่าน `FormApproveSequence`\n5. ระบบอัปเดต master data ของทรัพย์, สร้าง/อัปเดต mapping, แล้วอัปเดต status\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| type เป็น land | render form ของที่ดิน |\n| type เป็น vehicle | render form ของรถ |\n| อยู่หน้า approval by `:code` | เข้าสู่ flow approve จริง |\n\n#### Result\n\n- ได้หลักทรัพย์ลูกค้าที่ผ่านการอนุมัติและผูกเข้ากับสัญญาแล้ว\n\n#### Technical Diagrams\n\nดูข้อมูลหลักทรัพย์ก่อนอนุมัติ\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant DetailPage as guarantee land/vehicle detail\n    participant BFF as BFF Service\n\n    Staff->>DetailPage: เปิดหน้า detail\n    DetailPage->>BFF: โหลดข้อมูลหลักทรัพย์\n    DetailPage->>BFF: โหลดไฟล์แนบที่เกี่ยวข้อง\n    BFF-->>DetailPage: collateral data and attachments\n    DetailPage-->>Staff: แสดง tab ข้อมูลทั่วไปและเอกสาร\n```\n\nอนุมัติหลักทรัพย์ลูกค้า\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ApprovePage as guarantee land/vehicle [code]\n    participant CMS as CMS Service\n\n    Staff->>ApprovePage: กรอกค่าที่เกี่ยวข้องและส่ง approve sequence\n    ApprovePage->>CMS: อัปเดต master data ของที่ดินหรือรถ\n    ApprovePage->>CMS: บันทึก mapping ของ contract\n    ApprovePage->>CMS: อัปเดต status และ note ของ mapping\n    CMS-->>ApprovePage: success/error\n    ApprovePage-->>Staff: แจ้งผลและกลับหน้ารายการ\n```\n\n### 13-C: Guarantor Approval\n\n#### Purpose\n\nใช้อนุมัติบุคคลค้ำประกันที่ถูกผูกเข้ากับสัญญา\n\n#### Main Steps\n\n1. เปิดหน้ารายการบุคคลค้ำประกัน\n2. เลือกดูรายการที่ต้องอนุมัติ\n3. ระบบโหลดข้อมูล mapping guarantor และไฟล์แนบ\n4. เจ้าหน้าที่ตรวจข้อมูลและแนบไฟล์ให้ครบ\n5. ส่งผลอนุมัติผ่าน `FormApproveSequence`\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| ไม่มีไฟล์แนบ | ห้าม approve |\n| มีไฟล์แนบครบ | ดำเนิน approval flow ได้ |\n\n#### Result\n\n- ได้บุคคลค้ำประกันที่ผ่านการอนุมัติและบันทึก mapping status แล้ว\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ApprovePage as guarantee/guarantor/[id]/[code]\n    participant BFF as BFF/CMS Read APIs\n    participant CMS as CMS Service\n\n    Staff->>ApprovePage: เปิดหน้าอนุมัติบุคคลค้ำ\n    ApprovePage->>BFF: โหลด guarantor mapping และไฟล์แนบ\n    BFF-->>ApprovePage: guarantor data and attachments\n    ApprovePage->>ApprovePage: ตรวจว่ามีไฟล์แนบหรือไม่\n    alt ไฟล์ไม่ครบ\n        ApprovePage-->>Staff: แจ้ง error และไม่ให้ approve\n    else ไฟล์ครบ\n        Staff->>ApprovePage: ส่งผล approve sequence\n        ApprovePage->>CMS: อัปเดต guarantor person\n        ApprovePage->>CMS: บันทึก mapping guarantor\n        ApprovePage->>CMS: อัปเดต status mapping\n        CMS-->>ApprovePage: success/error\n    end\n```\n\n### 13-D: Contractor Collateral Approval\n\n#### Purpose\n\nใช้อนุมัติหลักทรัพย์ของผู้รับเหมา โดยโครงคล้ายลูกค้าปกติ แต่ใช้ mapping และ API คนละชุด\n\n#### Main Steps\n\n1. เปิดรายการหลักทรัพย์ผู้รับเหมา\n2. เลือกดูรายการที่ต้องอนุมัติ\n3. ระบบโหลด mapping ของผู้รับเหมาและไฟล์แนบ\n4. เจ้าหน้าที่ตรวจข้อมูลทั่วไปและเอกสาร\n5. ส่งผลอนุมัติผ่าน `FormApproveSequence`\n6. ระบบอัปเดต master data ของทรัพย์, mapping ของผู้รับเหมา, และ status\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| เป็นที่ดินผู้รับเหมา | ใช้ contractor land APIs |\n| เป็นรถผู้รับเหมา | ใช้ contractor vehicle APIs |\n| contract ไม่ใช่ main | ใช้ main contract id จากข้อมูลที่โหลด |\n\n#### Result\n\n- ได้หลักทรัพย์ผู้รับเหมาที่ผ่านการอนุมัติและอัปเดต mapping แล้ว\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ApprovePage as contractor collateral pages\n    participant BFF as BFF Service\n    participant CMS as CMS Service\n\n    Staff->>ApprovePage: เปิดหน้าอนุมัติ\n    ApprovePage->>BFF: โหลด contractor collateral mapping\n    ApprovePage->>BFF: โหลดไฟล์แนบที่เกี่ยวข้อง\n    BFF-->>ApprovePage: mapping data and attachments\n    Staff->>ApprovePage: ปรับข้อมูลและส่ง approve sequence\n    ApprovePage->>CMS: อัปเดต master data ของทรัพย์\n    ApprovePage->>CMS: อัปเดต contractor mapping\n    ApprovePage->>CMS: อัปเดต status mapping\n    CMS-->>ApprovePage: success/error\n    ApprovePage-->>Staff: แจ้งผลและกลับหน้ารายการ\n```\n\n### 13-E: Collateral Request Views\n\n#### Purpose\n\nใช้ดูคำขอที่เกี่ยวกับหลักทรัพย์ เช่น ยืม-คืน ถอนหลักทรัพย์ และรายการรวมในหน้า `collateral`\n\n#### Main Steps\n\n1. เปิดหน้าคำขอหลักทรัพย์\n2. ระบบแสดง tab ตามหมวดของคำขอ\n3. เจ้าหน้าที่ดูรายการผ่าน child components\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| `request-collateral` | มี tab ยืม-คืน และ ถอน |\n| `request-collateral-contractor` | มี tab ยืม-คืน และ ถอน ของผู้รับเหมา |\n| `collateral/index.vue` | มี 3 tab แต่ action buttons หลายปุ่มยังเป็น placeholder |\n\n#### Result\n\n- ได้มุมมองของคำขอหลักทรัพย์เพื่อใช้ติดตามต่อ\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant RequestPage as collateral request pages\n    participant ChildComp as Child Table Components\n\n    Staff->>RequestPage: เปิดหน้าคำขอหลักทรัพย์\n    RequestPage-->>Staff: แสดง tab ตามประเภทคำขอ\n    Staff->>RequestPage: เลือก tab\n    RequestPage-->>ChildComp: render component ของ tab นั้น\n    Note over RequestPage: ปุ่ม action หลายตัวใน collateral/index ยังไม่พบ logic จากเอกสารเดิม\n```\n\n---\n\n## Technical Reference\n\n### Shared Constants And State\n\nconstants ที่เอกสารเดิมยืนยันได้:\n\n| รายการ | ค่า |\n|---|---|\n| `CollateralType` | `land`, `vehicle` |\n| `StepGuarantorTab` | `general`, `documents` |\n| `GarantorsTab` | `one`, `two` |\n| `CollateralMenuTab` | `one`, `two`, `three` |\n| `ContractAssociateType` | `main`, `children`, `additional` |\n\nglobal state:\n\n| State key | ใช้เพื่อ |\n|---|---|\n| `globalAlertModal` | modal แจ้งเตือน/ยืนยัน |\n| `globalBaseLoading` | loading กลาง |\n| `globalContractProfile` | profile สัญญาในบางหน้า |\n\n### Customer Collateral\n\nLand list / detail notes:\n\n- `guarantee/land/index.vue` เป็น container page\n- tab `ยืม-คืน` และ `ถอน` ถูก comment ไว้\n- `guarantee/land/[id]/index.vue` มี 4 tab แต่ 2 tab เป็น disabled history\n\nVehicle list / detail notes:\n\n- `guarantee/vehicle/index.vue` เป็น container page\n- tab `ยืม-คืน` และ `ถอน` ถูก comment ไว้\n- `guarantee/vehicle/[id]/index.vue` มี 4 tab แต่ 2 tab เป็น disabled history\n\napproval APIs ที่เอกสารเดิมยืนยันได้:\n\n| พื้นที่ | API หลัก |\n|---|---|\n| land customer | `GET /bff-service/data-contract-collaterals/:id/lands/:code`, `PUT /cms-service/data-lands/:id`, `POST/PUT /cms-service/data-contracts/.../mapping/lands` |\n| vehicle customer | `GET /bff-service/data-contract-collaterals/:id/vehicles/:code`, `PUT /cms-service/data-vehicles/:id`, `POST/PUT /cms-service/data-contracts/.../mapping/vehicles` |\n\nfile module notes:\n\n| ประเภท | module / type |\n|---|---|\n| ที่ดินลูกค้า | `dataLand` + `imageMaps` / `imageLand` |\n| รถลูกค้า | `dataVehicle` + `vehicleRegis` |\n\n### Guarantor\n\nAPI ที่เอกสารเดิมยืนยันได้:\n\n| API | ใช้เมื่อ |\n|---|---|\n| `GET /bff-service/data-contracts/:id/mapping/guarantors/:code` | โหลด guarantor mapping |\n| `GET /cms-service/attachments` | โหลดไฟล์แนบของ mapping guarantor |\n| `PUT /cms-service/data-guarantor-persons/:id` | อัปเดต guarantor person |\n| `POST /cms-service/data-contracts/:contractId/mapping/guarantors` | บันทึก mapping guarantor |\n| `PUT /cms-service/data-contracts/:id/mapping/guarantors/:code/status` | อัปเดต status ของ mapping |\n\nvalidation note:\n\n- ถ้า `fileAttachment.length == 0` ห้าม approve\n\n### Contractor Collateral\n\nContractor land / vehicle notes:\n\n- URL ใช้ `:code` เป็นหลัก ไม่ได้ใช้ `:id/:code` แบบ customer\n- ชื่อและ quota ของผู้รับเหมาดึงจาก `includeContract.includeContractor`\n\nAPIs ที่เอกสารเดิมยืนยันได้:\n\n| พื้นที่ | API หลัก |\n|---|---|\n| contractor land | `apiBffContractorCollateralMapingLand`, `apiDataLands`, `apiContractorMappingLand` |\n| contractor vehicle | `apiBffContractorCollateralMappingVehicle`, `apiDataVehicles`, `apiContractorMappingVehicle` |\n\nfile modules:\n\n| ประเภท | module / type |\n|---|---|\n| ที่ดินผู้รับเหมา | `dataMappingContractorLand` + `imageLand` / `imageMaps` |\n| รถผู้รับเหมา | `dataContractorVehicle` + `vehicleRegis` |\n\ncustomer vs contractor pattern:\n\n| ด้าน | customer | contractor |\n|---|---|---|\n| route params | `:id/:code` | `:code` |\n| fetch source | contract collateral BFF | contractor collateral mapping BFF |\n| mapping save | contract mapping APIs | contractor mapping APIs |\n\n### Request Views\n\nrequest pages ที่เอกสารเดิมยืนยันได้:\n\n| หน้า | tabs / notes |\n|---|---|\n| `guarantee/request-collateral` | ยืม-คืน, ถอน |\n| `guarantee/request-collateral-contractor` | ยืม-คืน, ถอน |\n| `collateral/index.vue` | หลักทรัพย์, ยืม-คืน, ถอน |\n\nplaceholder notes ใน `collateral/index.vue`:\n\n- เพิ่มการยืม-คืน\n- แจ้งเตือนภาษี\n- ดาวน์โหลดเทมเพลต\n- อัปโหลดข้อมูล\n\nทั้งหมดถูกระบุว่าไม่มี logic ในเอกสารเดิม\n\n### Component Map\n\ncomponents หลักที่ถูกอ้างถึง:\n\n- `LandTable`\n- `LandTableMortgage`\n- `LandFormDetail`\n- `ContractFormLandDetail`\n- `ContractFormLandDocument`\n- `VehicleTable`\n- `VehicleTableHistoryPrintLetter`\n- `VehicleFormDetail`\n- `ContractFormVehicleDetail`\n- `ContractFormVehicleDocument`\n- `GuarantorsApprovePerson`\n- `GuarantorsApproveRequest`\n- `ContractFormGuarantorDetail`\n- `ContractorApproveLand`\n- `ContractorCollateralFormLandDetail`\n- `ContractorCollateralLandDocument`\n- `ContractorApproveVehicle`\n- `ContractorCollateralFormVehicleDetail`\n- `ContractorCollateralVehicleDocument`\n- `FormApproveSequence`\n\n---\n\n## Known Gaps\n\n- หลายหน้า list ใน flow นี้เป็น container page ที่ delegate งานจริงให้ child components จึงยังไม่สรุป behavior ของ table/filter/action ภายใน child components ถ้าเอกสารเดิมไม่ให้หลักฐานชัด\n- `collateral/index.vue` มีปุ่มหลายตัวเป็น placeholder และยังไม่ควรถูกตีความเป็น flow ใช้งานจริง\n- tab history และบาง tab ยืม-คืน/ถอนในหน้า land/vehicle ถูกปิดหรือ disabled อยู่ จึงไม่ควรสรุปเป็น sub-flow ที่ active\n',

          content:
            '# Flow 14 — Land\n\n## Overview\n\nFlow นี้ครอบคลุมงานที่เกี่ยวกับแปลงเช่าและสัญญาเช่าที่ในฝั่ง CMS โดยแยกเป็น 2 กลุ่มหลัก:\n\n1. จัดการข้อมูลแปลงเช่าที่ใช้เป็นฐานข้อมูล\n2. จัดการสัญญาเช่าที่ที่อ้างอิงผู้เช่า, ผู้ให้เช่า, รายละเอียดแปลง, และเอกสารประกอบ\n\nภาพรวมของ flow คือ เจ้าหน้าที่เริ่มจากดูรายการ, เปิดสร้างหรือแก้ไขข้อมูล, แล้วบันทึกเพื่อให้ข้อมูลพร้อมใช้งานต่อในงานสัญญาและการพิมพ์เอกสาร\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| จัดการแปลงเช่า | `cms/land-for-rent/*` |\n| จัดการสัญญาเช่าที่ | `cms/manage-contract-land-rent/*` |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| เจ้าหน้าที่ CMS | ค้นหา, เพิ่ม, แก้ไข, ลบ, และพิมพ์ข้อมูลที่เกี่ยวกับที่ดินเช่า |\n| หน้าแปลงเช่า | ดูแลข้อมูลแปลงเช่าที่เป็นฐานของสัญญา |\n| หน้าสัญญาเช่าที่ | ดูแลข้อมูลคู่สัญญา, รายละเอียดแปลง, ระยะเวลาเช่า, และเอกสาร |\n| BFF Service | ส่งข้อมูลรายการและรายละเอียดสำหรับหน้าจอ |\n| CMS Service | รับคำสั่งสร้าง, แก้ไข, ลบ, และอัปโหลดไฟล์ |\n| eForm | รับคำสั่งพิมพ์เอกสารสัญญา |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| Rental land record | ข้อมูลแปลงเช่าที่พร้อมใช้งาน |\n| Rental land contract | สัญญาเช่าที่พร้อมใช้งานและพิมพ์ได้ |\n| Rental detail lines | รายการแปลงที่ผูกอยู่ในสัญญา |\n| Attachment | เอกสารเพิ่มเติมของสัญญาเช่าที่ |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["เจ้าหน้าที่เปิดหมวดที่ดิน"] --> B["เลือกจัดการแปลงเช่าหรือสัญญาเช่าที่"]\n    B --> C["ระบบโหลดรายการหรือข้อมูลตั้งต้น"]\n    C --> D["เจ้าหน้าที่เพิ่ม แก้ไข หรือลบข้อมูล"]\n    D --> E{"ข้อมูลครบตามเงื่อนไข?"}\n    E -->|ไม่ครบ| F["แจ้งปัญหาและให้แก้ไข"]\n    E -->|ครบ| G["บันทึกข้อมูลและไฟล์แนบที่เกี่ยวข้อง"]\n    G --> H["รีโหลดรายการหรือกลับไป flow เดิม"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `land-for-rent/index.vue` | ค้นหาและจัดการรายการแปลงเช่า | มี filter ประเภทที่ดิน |\n| `land-for-rent/land/[land_id].vue` | จุดเข้า form เพิ่ม/แก้ไขแปลงเช่า | แยกเป็น 2 tab และ delegate ให้ child component |\n| `manage-contract-land-rent/index.vue` | ค้นหาและจัดการรายการสัญญาเช่าที่ | ต้องเลือกปีการผลิตก่อนโหลดรายการ |\n| `manage-contract-land-rent/[id]/index.vue` | สร้างหรือแก้ไขสัญญาเช่าที่ | รองรับ add/edit, print, upload file, และ back ตาม query context |\n\n---\n\n## Per-Page Details\n\n### 14-A: Rental Land List\n\n#### Purpose\n\nใช้ดูแลรายการแปลงเช่าที่เป็นข้อมูลตั้งต้นก่อนนำไปใช้ในงานสัญญา\n\n#### Main Steps\n\n1. เปิดหน้ารายการแปลงเช่า\n2. ระบบโหลดรายการแปลงและประเภทที่ดิน\n3. เจ้าหน้าที่ค้นหาหรือกรองตามประเภทที่ดิน\n4. เลือกเพิ่ม, แก้ไข, หรือลบรายการ\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| ต้องการเพิ่มแปลงเช่า | ไปหน้า add |\n| ต้องการแก้ไขรายการเดิม | ไปหน้า edit ของรายการนั้น |\n| ต้องการลบ | เปิด confirm ก่อนลบและรีโหลดรายการ |\n\n#### Result\n\n- ได้รายการแปลงเช่าที่พร้อมใช้งานต่อ\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant LandList as land-for-rent/index.vue\n    participant LandBFF as Rental Lands BFF\n    participant LandTypeAPI as Master Land Types\n    participant LandAPI as Rental Lands CMS API\n\n    LandList->>LandBFF: โหลดรายการแปลงเช่า\n    LandList->>LandTypeAPI: โหลดประเภทที่ดิน\n    LandBFF-->>LandList: rental land list\n    LandTypeAPI-->>LandList: land type options\n\n    Staff->>LandList: ค้นหาหรือกรองข้อมูล\n    LandList->>LandBFF: โหลดข้อมูลตาม search/filter\n    LandBFF-->>LandList: filtered list\n\n    alt ลบรายการ\n        Staff->>LandList: กดยืนยันลบ\n        LandList->>LandAPI: delete rental land\n        LandAPI-->>LandList: success/error\n    else เพิ่มหรือแก้ไข\n        LandList-->>Staff: navigate ไปหน้า form\n    end\n```\n\n### 14-B: Rental Land Form\n\n#### Purpose\n\nใช้เป็นจุดเข้า form สำหรับสร้างหรือแก้ไขแปลงเช่า โดยแยกข้อมูลทั่วไปกับเอกสารแนบออกจากกัน\n\n#### Main Steps\n\n1. เปิดหน้า add หรือ edit\n2. ระบบกำหนด mode จาก `land_id`\n3. แสดง 2 tab คือข้อมูลทั่วไปและเอกสารแนบ\n4. child components จัดการการบันทึกจริง\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| `land_id = add` | เข้าโหมดสร้างรายการใหม่ |\n| `land_id != add` | เข้าโหมดแก้ไขรายการเดิม |\n\n#### Result\n\n- เปิดสภาพแวดล้อมสำหรับสร้างหรือแก้ไขแปลงเช่าได้ตรง mode\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant LandFormPage as land-for-rent/land/[land_id].vue\n    participant DataTab as LandForRentDataLand\n    participant DocTab as LandForRentDocumentLand\n\n    Staff->>LandFormPage: เปิดหน้า add หรือ edit\n    LandFormPage->>LandFormPage: ตรวจ land_id เพื่อกำหนด mode\n    LandFormPage-->>Staff: แสดง tab ข้อมูลทั่วไปและเอกสารแนบ\n    alt เปิด tab ข้อมูลทั่วไป\n        Staff->>DataTab: จัดการข้อมูลแปลงเช่า\n    else เปิด tab เอกสารแนบ\n        Staff->>DocTab: จัดการไฟล์แนบ\n    end\n```\n\n### 14-C: Rental Land Contract List\n\n#### Purpose\n\nใช้ดูรายการสัญญาเช่าที่ และเป็นจุดเริ่มต้นของการสร้าง แก้ไข ลบ หรือพิมพ์สัญญา\n\n#### Main Steps\n\n1. เปิดหน้ารายการสัญญาเช่าที่\n2. เลือกปีการผลิต\n3. ระบบโหลดรายการตามปีการผลิตและคำค้น\n4. เจ้าหน้าที่เลือกเพิ่ม, แก้ไข, ลบ, หรือพิมพ์\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| ยังไม่เลือกปีการผลิต | รายการยังไม่โหลด |\n| ต้องการพิมพ์ | ส่งคำสั่งไป eForm ในแท็บใหม่ |\n| ต้องการลบ | ยืนยันก่อนลบแล้วรีโหลดรายการ |\n\n#### Result\n\n- ได้รายการสัญญาเช่าที่ตามปีการผลิตที่เลือก\n- เปิดไปสู่หน้าสัญญาหรือเอกสารที่เกี่ยวข้องได้\n\n#### Technical Diagrams\n\nสัญญาเช่าที่: โหลดรายการตามปีการผลิต\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ContractList as manage-contract-land-rent/index.vue\n    participant YearPicker as UIMasterProductYear\n    participant ContractBFF as Rental Land Contracts BFF\n\n    Staff->>YearPicker: เลือกปีการผลิต\n    YearPicker-->>ContractList: selected product year\n    ContractList->>ContractBFF: โหลดรายการตามปีการผลิตและคำค้น\n    ContractBFF-->>ContractList: contract list\n```\n\nสัญญาเช่าที่: พิมพ์เอกสารจากหน้ารายการ\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ContractList as manage-contract-land-rent/index.vue\n    participant eForm as /eform/preprint/merge\n\n    Staff->>ContractList: กดพิมพ์\n    ContractList->>ContractList: สร้าง form แบบ dynamic\n    ContractList->>eForm: ส่งรายการเอกสารเพื่อ merge\n    eForm-->>Staff: เปิดเอกสารในแท็บใหม่\n```\n\n### 14-D: Rental Land Contract Form\n\n#### Purpose\n\nใช้สร้างหรือแก้ไขสัญญาเช่าที่ พร้อมรายละเอียดผู้เช่า ผู้ให้เช่า รายการแปลงเช่า ระยะเวลาเช่า หมายเหตุ และไฟล์แนบ\n\n#### Main Steps\n\n1. เปิดหน้า add หรือ edit\n2. ระบบโหลดค่า setting ที่ใช้สร้างตัวเลือกของระยะเวลาเช่า\n3. ถ้าเป็น edit ให้โหลดข้อมูลสัญญาเดิม\n4. เลือกผู้เช่าและผู้ให้เช่าผ่าน modal\n5. กำหนดช่วงเวลาเช่าและให้ระบบคำนวณวันสิ้นสุด\n6. เพิ่มรายละเอียดแปลงเช่า\n7. บันทึกข้อมูลหลัก แล้วค่อยอัปโหลดไฟล์แนบถ้ามี\n8. กลับไปหน้าปลายทางตาม context ที่เปิดเข้ามา\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| add mode | ตั้งค่าเริ่มต้นของ form |\n| edit mode | โหลดข้อมูลเดิมและเปิดปุ่มพิมพ์ได้ |\n| ยังไม่มีรายละเอียดแปลงเช่า | ไม่ให้บันทึก |\n| ลบรายการ detail ที่บันทึกไปแล้ว | ใช้ soft delete |\n| เปิดมาจาก flow อื่นพร้อม query params | back กลับตาม context เดิม |\n\n#### Result\n\n- ได้สัญญาเช่าที่ใหม่หรือสัญญาที่อัปเดตแล้ว\n- ได้ไฟล์แนบที่ผูกกับสัญญาถ้ามีการอัปโหลด\n\n#### Technical Diagrams\n\nสัญญาเช่าที่: โหลด form และข้อมูลตั้งต้น\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ContractPage as manage-contract-land-rent/[id]/index.vue\n    participant SettingAPI as General System API\n    participant ContractBFF as Rental Land Contracts BFF\n\n    Staff->>ContractPage: เปิดหน้า add หรือ edit\n    ContractPage->>SettingAPI: โหลดตัวเลือกระยะเวลาเช่า\n    alt edit mode\n        ContractPage->>ContractBFF: โหลดข้อมูลสัญญาเดิม\n        ContractBFF-->>ContractPage: contract detail\n    else add mode\n        ContractPage->>ContractPage: ตั้งค่าเริ่มต้นของ form\n    end\n```\n\nสัญญาเช่าที่: บันทึกข้อมูลและอัปโหลดไฟล์\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ContractPage as manage-contract-land-rent/[id]/index.vue\n    participant ContractAPI as Rental Land Contracts CMS API\n    participant FileAPI as Attachments API\n\n    Staff->>ContractPage: กรอกข้อมูลและเพิ่ม rental detail\n    Staff->>ContractPage: กดบันทึก\n    ContractPage->>ContractPage: ตรวจว่ามีรายละเอียดแปลงเช่าที่ใช้งานอยู่\n    alt ไม่มีรายละเอียดแปลงเช่า\n        ContractPage-->>Staff: แจ้ง error\n    else มีข้อมูลครบ\n        alt create\n            ContractPage->>ContractAPI: create contract\n        else update\n            ContractPage->>ContractAPI: update contract\n        end\n        ContractAPI-->>ContractPage: contract id\n        opt มีไฟล์แนบ\n            ContractPage->>FileAPI: upload attachment\n            FileAPI-->>ContractPage: success/error\n        end\n        ContractPage-->>Staff: กลับหน้าปลายทางตาม context\n    end\n```\n\nสัญญาเช่าที่: จัดการรายการแปลงภายในสัญญา\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ContractPage as manage-contract-land-rent/[id]/index.vue\n    participant DetailModal as ManageContractLandRentModalFormDetail\n    participant ContractAPI as Rental Land Contracts CMS API\n\n    Staff->>ContractPage: กดเพิ่มหรือแก้ไขรายละเอียดแปลง\n    ContractPage->>DetailModal: เปิด modal\n    Staff->>DetailModal: กรอกข้อมูล detail\n    DetailModal-->>ContractPage: ส่งข้อมูลกลับเข้า dataContractRent[]\n\n    alt ลบรายการที่บันทึกแล้ว\n        Staff->>ContractPage: กดลบ\n        ContractPage->>ContractPage: set isDelete = 1\n    else แก้ไข detail ที่มีอยู่\n        Staff->>ContractPage: แก้ไขใน modal\n        ContractPage->>ContractAPI: auto-save รายการที่แก้ไข\n        ContractAPI-->>ContractPage: success/error\n    end\n```\n\n---\n\n## Technical Reference\n\n### Shared Notes\n\nGlobal state ที่เอกสารเดิมยืนยันได้:\n\n| State key | ใช้ใน |\n|---|---|\n| `globalBaseLoading` | หน้า list และ detail หลักของ flow นี้ |\n| `globalAlertModal` | หน้า list และ detail หลักของ flow นี้ |\n\nEnums / constants:\n\n| รายการ | ค่า |\n|---|---|\n| `LandForRentTab` | `one`, `two` |\n| `FileModule.dataRentalLands` | `dataRentalLands` |\n\n### Rental Land List\n\nไฟล์ที่เกี่ยวข้อง:\n\n- `cms/land-for-rent/index.vue`\n\nAPI constants:\n\n| Constant | ใช้เพื่อ |\n|---|---|\n| `apiBffRentalLands` | โหลดรายการแปลงเช่า |\n| `apiMasterLandTypes` | โหลด master ประเภทที่ดิน |\n| `apiDataRentLands` | ลบรายการแปลงเช่า |\n\nNotes:\n\n- search debounce `800ms`\n- filter ประเภทที่ดินถูก map เป็น dropdown พร้อมตัวเลือก "ทั้งหมด"\n- มี modal history ใน DOM แต่ยังไม่เห็นปุ่มเปิดใน UI\n\n### Rental Land Form\n\nไฟล์ที่เกี่ยวข้อง:\n\n- `cms/land-for-rent/land/[land_id].vue`\n\nTabs:\n\n| Tab | ชื่อ | Component |\n|---|---|---|\n| `one` | ข้อมูลทั่วไป | `LandForRentDataLand` |\n| `two` | เอกสารแนบ | `LandForRentDocumentLand` |\n\nMode detection:\n\n- `land_id = add` ใช้โหมดสร้าง\n- ค่านอกเหนือจากนั้นใช้โหมดแก้ไข\n\n### Rental Land Contract List\n\nไฟล์ที่เกี่ยวข้อง:\n\n- `cms/manage-contract-land-rent/index.vue`\n\nAPI constants:\n\n| Constant | ใช้เพื่อ |\n|---|---|\n| `apiBffRentalLandContracts` | โหลดรายการและรายละเอียดสัญญา |\n| `apiDataRentalLandContracts` | ลบสัญญา |\n\nNotes:\n\n- `mounted()` ยังไม่โหลดข้อมูลจนกว่าจะเลือกปีการผลิต\n- search debounce `800ms`\n- action หลักคือ edit, delete, print\n\nPrint pattern:\n\n- สร้าง form แบบ dynamic\n- submit แบบ `POST` ไป `/eform/preprint/merge`\n- ส่งเอกสาร 2 รายการคือสัญญาเช่าที่และสัญญาโอนสิทธิการเช่า\n\n### Rental Land Contract Form\n\nไฟล์ที่เกี่ยวข้อง:\n\n- `cms/manage-contract-land-rent/[id]/index.vue`\n\nAPI constants:\n\n| Constant | ใช้เพื่อ |\n|---|---|\n| `apiMasterCogGeneralSystem` | โหลดตัวเลือกของระยะเวลาเช่า |\n| `apiBffRentalLandContracts` | โหลดข้อมูลสัญญาเดิม |\n| `apiDataRentalLandContracts` | สร้างหรือแก้ไขสัญญา |\n| `apiDataAttachments` | อัปโหลดไฟล์แนบ |\n\nForm sections:\n\n- ข้อมูลผู้เช่าและผู้ให้เช่า\n- รายละเอียดระยะเวลาเช่า\n- รายละเอียดแปลงเช่า\n- หมายเหตุและไฟล์แนบ\n\nเลือกคู่สัญญาผ่าน modal:\n\n| Modal | ใช้เพื่อ |\n|---|---|\n| `ManageContractLandRentModalSelectionSugarCaneFarmer` | เลือกผู้เช่า |\n| `ManageContractLandRentModalSelectionVarietyAndLandOwner` | เลือกผู้ให้เช่า |\n| `ManageContractLandRentModalFormDetail` | เพิ่มหรือแก้ไขรายละเอียดแปลงเช่า |\n\nAuto-calculate end date:\n\n```text\nอ่านปีตั้งต้นจาก production year\nใช้วันที่ฐานเป็น YYYY-04-30\nบวกระยะเวลาเช่าเป็นจำนวนปี\nได้ endDate ใน field ที่ disabled\n```\n\nSubmit guard:\n\n- ต้องมี `rentalInfoList` ที่ไม่ถูกลบอย่างน้อย 1 รายการ\n\nSoft delete:\n\n- รายการ detail ที่มี `_id` ใช้ `isDelete: 1`\n- รายการใหม่ที่ยังไม่มี `_id` จะถูกนำออกจาก array โดยตรงเมื่อถูกลบ\n\nFile upload:\n\n- upload หลังจาก create/update สำเร็จ\n- ใช้ `FormData`\n- แนบ `module: dataRentalLands`\n- ใช้ type `image_land_rent`\n\nBack / navigate logic:\n\n- ถ้ามี query `reqCode` / `contract` / `type` ให้กลับไป flow using-credit\n- ถ้ามี query `increase` / `contract` / `increaseSpecial` / `type` ให้กลับไป flow increase\n- ถ้าไม่มี query ให้กลับไปหน้ารายการสัญญาเช่าที่\n\nBody fields ที่เอกสารเดิมยืนยันได้:\n\n- `productionYearId`\n- `contractNumber`\n- `contractDate`\n- `lesseeQuotaNumber`\n- `rentalRaiTotal`\n- `rentalFeeTotal`\n- `startDate`\n- `endDate`\n- `rentalPeriod`\n- `status`\n- `note`\n- `rentalInfoList`\n\n---\n\n## Known Gaps\n\n- หน้าสร้าง/แก้ไขแปลงเช่า (`land-for-rent/land/[land_id].vue`) เป็น shell page ที่ delegate งานจริงให้ child components จึงยังไม่สรุปลึกถึง create/update ภายในโดยไม่มี source child components\n',

            '# Flow 15 — Loan Management\n\n## Source files\n\n### cms_frontend-develop\n\n- `pages/cms/manage-loan-contract/index.vue`\n- `pages/cms/manage-loan-contract/[id]/index.vue`\n- `pages/cms/manage-using-credit/index.vue`\n- `pages/cms/manage-using-credit/using-credit-oil.vue`\n- `pages/cms/manage-using-credit/manage-payment/index.vue`\n- `pages/cms/manage-using-credit/payment/index.vue`\n- `pages/cms/manage-using-credit/[id]/index.vue`\n- `pages/cms/manage-using-credit/payment/[id]/index.vue`\n- `pages/cms/manage-using-credit/list-upload-bill-oil/index.vue`\n- `pages/cms/manage-using-credit/list-upload-bill-oil/upload-bill.vue`\n- `pages/cms/manage-using-credit/list-debt/index.vue`\n- `pages/cms/manage-using-credit/oil-lists/index.vue`\n- `pages/cms/credit-increase/index.vue`\n- `pages/cms/credit-increase/[id]/index.vue`\n- `pages/cms/payment-contractor/index.vue` — **NEW**: หน้ารับชำระค่าบริการจักรกล, ใช้ `UIMasterProductYear` + `SelectionSugarcaneFarmer`, เปิด modal `CashContractorListPay`\n\n### bff_service-develop\n\n- composables: `api-bff.ts` — constants สำหรับ `apiBffCreditIncreaseLess`, `apiBffCreditIncrease`, `apiBffFileAttachments`, `apiBffexportDataInspectionReceipts`\n\n### cms_service-develop\n\n- controller/service สำหรับ credit-increase, credit-withdraw, inspection-receipt status updates\n\n### accounting_service-develop — **NEW**\n\n- `src/cms-sync-data/cms-sync-data.controller.ts` — sync data module: migrate customers/farmers, sync inspection receipts → payment management, export data, import files\n- `src/cms-sync-data/cms-sync-data.service.ts`\n- `src/new-debt/new-debt.controller.ts` — new debt management: upload, filter, group by quota, accept debt, reduction ratio, export\n- `src/new-debt/new-debt.service.ts`\n- `src/new-debt/dto/` — DTOs: newDebtListDTO, acceptDebtPageDto, debtReductionRatioDto, debtReductionRatioApproveDto\n\n---\n\n## Overview\n\nFlow นี้รวมหน้าที่เกี่ยวกับ "สัญญากู้ยืม", "การใช้วงเงิน", และ "การอนุมัติขอวงเงิน" ในฝั่ง CMS แต่จาก source จริง งานใน flow นี้ไม่ได้อยู่ในระดับความสมบูรณ์เท่ากัน\n\nจากโค้ดที่ตรวจแล้ว แยกได้เป็น 3 กลุ่ม:\n\n1. `manage-loan-contract` เป็นหน้ารายการและหน้าดูเอกสารประกอบสัญญาแบบ mock\n2. `manage-using-credit` เป็นชุดหน้าต้นแบบสำหรับงานเบิกใช้วงเงิน, บิลน้ำมัน, รับสภาพหนี้, และจัดการการจ่ายเงิน โดยหลายหน้ามีแค่ shell page, mock data, หรือ modal placeholder\n3. `credit-increase` เป็นกลุ่มที่มี API จริงและมี flow อนุมัติครบที่สุด รวมถึงการ cascade สถานะลงไปยังรายการขอเบิกใช้\n\nดังนั้น ถ้ามองเชิงธุรกิจ flow นี้ไม่ใช่เส้นทางเดียวตั้งแต่ต้นจนจบ แต่เป็นชุดหน้าที่อยู่รอบงานสินเชื่อและการอนุมัติวงเงิน โดย flow ที่ใช้งานจริงชัดที่สุดคือ `credit-increase`\n\n---\n\n## Scope\n\n| พื้นที่ | รายการ |\n|---|---|\n| เอกสารสัญญากู้ยืม | `cms/manage-loan-contract/*` |\n| งานต้นแบบด้านการใช้วงเงิน | `cms/manage-using-credit/*` |\n| อนุมัติขอวงเงิน | `cms/credit-increase/*` |\n| รับชำระค่าบริการจักรกล | `cms/payment-contractor/index.vue` — **NEW** |\n| Accounting: CMS Sync Data | `accounting_service-develop/src/cms-sync-data/*` — **NEW** |\n| Accounting: New Debt Management | `accounting_service-develop/src/new-debt/*` — **NEW** |\n\n---\n\n## Actors\n\n| Actor | บทบาท |\n|---|---|\n| เจ้าหน้าที่ CMS | เปิดรายการ, ดูเอกสาร, ตรวจคำขอ, อนุมัติหรือส่งกลับแก้ไข |\n| หน้าสัญญากู้ยืม | แสดงรายการ mock และเอกสารประกอบสัญญาเป็น tab |\n| หน้าการใช้วงเงิน | ทำหน้าที่เป็น shell page, mock list, หรือ modal review ตามบริบทย่อย |\n| หน้าอนุมัติขอวงเงิน | โหลดคำขอจริง, ให้ผู้อนุมัติปรับยอด, ตรวจรายการเบิก, และ submit ผลอนุมัติ |\n| BFF Service | ส่งข้อมูล list, detail, attachment, summary, และข้อมูลรวมสำหรับการแสดงผล |\n| CMS Service | รับคำสั่งอัปเดตสถานะวงเงิน, รายการเพิ่มวงเงิน, รายการเบิกใช้, และไฟล์แนบ |\n| eForm | ใช้พิมพ์ประวัติชาวไร่และแบบฟอร์มอนุมัติ |\n\n---\n\n## Key Outputs\n\n| รายการ | ความหมาย |\n|---|---|\n| Loan document view | จุดเปิดดูเอกสารสัญญากู้ยืม, สัญญาค้ำ, และบันทึกยินยอม |\n| Prototype workbench | หน้าต้นแบบสำหรับงานเบิกใช้วงเงิน, บิลน้ำมัน, รับสภาพหนี้, และจ่ายเงิน |\n| Credit increase decision | ผลอนุมัติหรือไม่อนุมัติคำขอวงเงิน |\n| Updated withdraw statuses | สถานะของ credit withdraw ที่ถูก cascade ต่อจากการอนุมัติวงเงิน |\n| Approval attachment | ไฟล์แนบลงนามอนุมัติของคำขอวงเงิน |\n| Printed documents | เอกสาร preprint ที่เปิดจากหน้า detail |\n\n---\n\n## Business Flow\n\n```mermaid\nflowchart TD\n    A["เจ้าหน้าที่เปิดหมวด Loan Management"] --> B["เลือกกลุ่มงานที่ต้องทำ"]\n    B --> C["ดูเอกสารสัญญากู้ยืมแบบ mock"]\n    B --> D["เปิดหน้าต้นแบบการใช้วงเงินหรือรายการประกอบ"]\n    B --> E["เปิดรายการอนุมัติขอวงเงิน"]\n\n    C --> F["เปิดหน้า detail และสลับดูเอกสารตาม tab"]\n    D --> G["ดู default tab, mock list, หรือ modal placeholder"]\n    E --> H["กรองรายการแล้วเปิดคำขอที่ต้องอนุมัติ"]\n    H --> I["ตรวจข้อมูลวงเงิน รายการเบิก และผู้อนุมัติ"]\n    I --> J{"ผลการอนุมัติเป็นอย่างไร?"}\n    J -->|อนุมัติ| K["อัปเดตคำขอวงเงินและ cascade สถานะไปยังรายการเบิกใช้"]\n    J -->|ไม่อนุมัติ| L["อัปเดตคำขอวงเงินและ set รายการที่เกี่ยวข้องเป็น rejected"]\n    J -->|ส่งกลับแก้ไข| M["เปลี่ยนรายการเพิ่มวงเงินและรายการเบิกใช้เป็น editing"]\n```\n\n---\n\n## Pages In This Flow\n\n| Page / Component | Purpose | Notes |\n|---|---|---|\n| `manage-loan-contract/index.vue` | ดูรายการคำขอสัญญากู้ยืมและเปิดหน้าเอกสาร | mock list 2 รายการ, `reloadData()` ว่าง |\n| `manage-loan-contract/[id]/index.vue` | ดูเอกสารประกอบสัญญาแบบ tab | สลับ tab ได้จริงจาก page state |\n| `manage-using-credit/index.vue` | shell page ของงานอนุมัติคำร้องขอใช้วงเงิน | render ได้จริงเฉพาะ default tab |\n| `manage-using-credit/using-credit-oil.vue` | shell page ของงานอนุมัติขอเบิกน้ำมัน | render ได้จริงเฉพาะ default tab |\n| `manage-using-credit/manage-payment/index.vue` | shell page ของงานจัดการการจ่ายเงิน | render ได้จริงเฉพาะ default tab |\n| `manage-using-credit/payment/index.vue` | shell page ของงานอนุมัติขอใช้วงเงิน | render ได้จริงเฉพาะ default tab |\n| `manage-using-credit/[id]/index.vue` | mock detail ของคำขอใช้วงเงิน | แสดงข้อมูล static และ approve sequence shell |\n| `manage-using-credit/payment/[id]/index.vue` | mock detail ของการอนุมัติขอใช้วงเงิน | แสดง history/table/cards แบบ static |\n| `manage-using-credit/list-upload-bill-oil/index.vue` | ดูรายการอัปโหลดบิลน้ำมันและเปิดหน้า upload | ใช้ mock data |\n| `manage-using-credit/list-upload-bill-oil/upload-bill.vue` | หน้าอัปโหลดบิลน้ำมัน | file inputs disabled, tab ปุ่มไม่ผูกการเปลี่ยน state |\n| `manage-using-credit/list-debt/index.vue` | ดูรายการรับสภาพหนี้และเปิด modal ตรวจรายการ | ใช้ mock data และ modal ภายในหน้า |\n| `manage-using-credit/oil-lists/index.vue` | ดูรายการเติมน้ำมันและเปิด modal พิมพ์/ยืนยัน | ใช้ mock data |\n| `credit-increase/index.vue` | ดูรายการคำขอวงเงินจริง, ค้นหา, กรอง, และเปิด detail | ใช้ API จริง |\n| `credit-increase/[id]/index.vue` | ตรวจคำขอวงเงิน, ปรับยอดอนุมัติ, ดูรายการเบิก, พิมพ์, และ submit approve sequence | flow หลักของกลุ่มนี้ |\n\n---\n\n## Per-Page Details\n\n### 15-A: Loan Contract Document Pages\n\n#### Purpose\n\nใช้ดูรายการคำขอสัญญากู้ยืมแบบ mock และเปิดหน้าเอกสารประกอบสัญญาเพื่อสลับดูเอกสารแต่ละชุด\n\n#### Main Steps\n\n1. เปิดหน้ารายการสัญญากู้ยืม\n2. ระบบแสดงรายการ mock และช่องค้นหา\n3. เจ้าหน้าที่กดเปิดรายการที่ต้องการ\n4. หน้า detail แสดง 3 tabs ของเอกสารประกอบสัญญา\n5. ผู้ใช้สลับ tab เพื่อดูเอกสารแต่ละประเภท\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| อยู่ที่หน้ารายการ | ค้นหาได้แต่ไม่ reload ข้อมูลจริง |\n| เปิดหน้า detail | ใช้ `mockManageLoanContract` สร้าง tab list |\n| เปลี่ยน tab | page เปลี่ยน `currentTabCode` และ render component ตาม tab |\n\n#### Result\n\n- ผู้ใช้เปิดดูเอกสารประกอบสัญญาแต่ละชุดได้จากหน้าเดียว\n- ยังไม่เกิดการโหลดข้อมูลจริงจาก API\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant ListPage as manage-loan-contract/index.vue\n    participant DetailPage as manage-loan-contract/[id]/index.vue\n\n    Staff->>ListPage: เปิดหน้ารายการ\n    ListPage-->>Staff: แสดง mock rows และช่องค้นหา\n    Staff->>ListPage: กดเปิดรายการ\n    ListPage-->>DetailPage: navigate ไป detail\n    DetailPage->>DetailPage: mounted แล้ว set tabList จาก mockManageLoanContract\n    DetailPage-->>Staff: แสดง tab เอกสาร 3 ชุด\n    Staff->>DetailPage: เปลี่ยน tab\n    DetailPage->>DetailPage: update currentTabCode\n    DetailPage-->>Staff: render component ของ tab ที่เลือก\n```\n\n### 15-B: Using Credit Shell Pages\n\nครอบคลุม:\n\n- `manage-using-credit/index.vue`\n- `manage-using-credit/using-credit-oil.vue`\n- `manage-using-credit/manage-payment/index.vue`\n- `manage-using-credit/payment/index.vue`\n\n#### Purpose\n\nใช้เป็นจุดเข้าไปยังงานย่อยด้านการใช้วงเงิน, การเบิกน้ำมัน, การจ่ายเงิน, และการอนุมัติขอใช้วงเงิน ผ่าน tab headers\n\n#### Main Steps\n\n1. เปิดหน้า shell ตามหมวดงาน\n2. หน้าโหลด `tabList` จาก mock constant\n3. หน้า render default tab ที่กำหนดไว้ใน `currentTabCode`\n4. ถ้า default tab นั้นมี child component ก็แสดง component นั้น\n\n#### Decision Points\n\n| หน้า | default tab ที่ render | หมายเหตุ |\n|---|---|---|\n| `manage-using-credit/index.vue` | `usageBeforeHarvest` | มี child component เฉพาะ tab นี้ |\n| `using-credit-oil.vue` | `sugarCane` | tab ผู้รับเหมายังว่าง |\n| `manage-payment/index.vue` | `canMatch` | อีก 3 tabs ยังไม่ render component |\n| `payment/index.vue` | `sugarCane` | tab ผู้รับเหมายังว่าง |\n\n#### Result\n\n- หน้าเหล่านี้ทำหน้าที่เป็น shell page สำหรับ default tab เป็นหลัก\n- จาก source ปัจจุบันปุ่ม tab ในหน้าเหล่านี้ยังไม่ผูก event เปลี่ยน `currentTabCode`\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as manage-using-credit/* shell page\n    participant Child as default child component\n\n    Staff->>Page: เปิดหน้า\n    Page->>Page: mounted แล้ว set tabList จาก mock constant\n    Page->>Page: ใช้ currentTabCode ค่าเริ่มต้น\n    alt default tab มี child component\n        Page->>Child: render component ของ default tab\n        Child-->>Staff: แสดงเนื้อหาภายใน child component\n    else default tab ไม่มี child component\n        Page-->>Staff: แสดงพื้นที่ว่างของ shell page\n    end\n```\n\n### 15-C: Using Credit Mock Detail Pages\n\nครอบคลุม:\n\n- `manage-using-credit/[id]/index.vue`\n- `manage-using-credit/payment/[id]/index.vue`\n\n#### Purpose\n\nใช้แสดงหน้ารายละเอียดต้นแบบของคำขอใช้วงเงินและคำขออนุมัติขอใช้วงเงิน เพื่อให้ผู้ใช้เห็น layout สรุปข้อมูล, ตารางประวัติ, cards สรุป, และ approve sequence shell\n\n#### Main Steps\n\n1. เปิดหน้า detail จาก route ที่มี `:id`\n2. หน้าแสดง header และรายละเอียด static\n3. แสดงตารางประวัติหรือการ์ดสรุปตาม layout\n4. แสดง `FormApproveSequence` แบบไม่มีข้อมูล operation จริง\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| เปิดหน้า detail | ใช้ข้อมูล static ที่ฝังใน template |\n| กด back button ที่ header | ใน source ปัจจุบันยังไม่ผูก handler |\n| ส่ง approve sequence | ยังไม่ผูก logic ธุรกิจจริงใน page นี้ |\n\n#### Result\n\n- ได้หน้า detail ต้นแบบสำหรับงาน review/approve\n- ยังไม่สามารถอ้าง flow อนุมัติจริงจาก 2 หน้านี้ได้\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant DetailPage as manage-using-credit detail page\n    participant ApproveBox as FormApproveSequence\n\n    Staff->>DetailPage: เปิดหน้า detail\n    DetailPage-->>Staff: แสดงข้อมูลสรุปแบบ static\n    DetailPage-->>Staff: แสดงตาราง/การ์ดตาม layout\n    DetailPage->>ApproveBox: render approve sequence shell\n    ApproveBox-->>Staff: แสดงกล่องอนุมัติแบบ placeholder\n```\n\n### 15-D: Oil Bill Pages\n\nครอบคลุม:\n\n- `manage-using-credit/list-upload-bill-oil/index.vue`\n- `manage-using-credit/list-upload-bill-oil/upload-bill.vue`\n\n#### Purpose\n\nใช้ดูรายการบิลน้ำมันแบบ mock และเปิดหน้าอัปโหลดบิลน้ำมันที่เป็นต้นแบบของการประมวลผล/จับคู่บิล\n\n#### Main Steps\n\n1. เปิดหน้ารายการบิลน้ำมัน\n2. ระบบแสดง table mock พร้อมปุ่ม "อัปโหลดบิลน้ำมัน"\n3. ผู้ใช้กดไปหน้า upload\n4. หน้า upload แสดง form file 2 ช่องและ tab ผลจับคู่\n5. default tab แสดง component ฝั่ง `canMatch`\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| อยู่หน้ารายการ | ค้นหาได้ใน UI แต่ไม่มี reload จริง |\n| กดปุ่มอัปโหลด | route ไปหน้า upload-bill |\n| อยู่หน้า upload | file inputs ทั้ง 2 ช่อง disabled |\n| เปลี่ยน tab ผลจับคู่ | ปุ่ม tab ยังไม่ผูกการเปลี่ยน `currentTabCode` |\n\n#### Result\n\n- ผู้ใช้ไปถึงหน้า upload ได้\n- flow อัปโหลดและประมวลผลบิลจริงยังไม่ถูก implement\n\n#### Technical Diagrams\n\nรายการบิลน้ำมัน: เปิดหน้า upload\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant BillList as list-upload-bill-oil/index.vue\n    participant UploadPage as upload-bill.vue\n\n    Staff->>BillList: เปิดหน้ารายการบิล\n    BillList-->>Staff: แสดง mock table\n    Staff->>BillList: กด "อัพโหลดบิลน้ำมัน"\n    BillList-->>UploadPage: navigate ไปหน้า upload\n```\n\nหน้า upload: render default tab แบบ prototype\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant UploadPage as upload-bill.vue\n    participant MatchView as UsingCreditUploadBillCanMatch\n\n    Staff->>UploadPage: เปิดหน้า upload\n    UploadPage->>UploadPage: mounted แล้ว set tabList จาก mockUploadBillTab\n    UploadPage-->>Staff: แสดง file inputs ที่ disabled\n    UploadPage->>MatchView: render default tab canMatch\n    MatchView-->>Staff: แสดงผลลัพธ์ต้นแบบ\n```\n\n### 15-E: Debt Acceptance And Oil Usage Pages\n\nครอบคลุม:\n\n- `manage-using-credit/list-debt/index.vue`\n- `manage-using-credit/oil-lists/index.vue`\n\n#### Purpose\n\nใช้ดูรายการรับสภาพหนี้แบบ mock, เปิด modal ตรวจสอบรายการ, และดูรายการเติมน้ำมันพร้อม modal พิมพ์/ยืนยันแบบต้นแบบ\n\n#### Main Steps\n\n1. เปิดหน้ารายการรับสภาพหนี้หรือรายการเติมน้ำมัน\n2. ระบบแสดง search/filter และ mock table\n3. ในหน้ารับสภาพหนี้ ผู้ใช้กดแถวเพื่อเปิด modal ตรวจสอบ\n4. ในหน้ารายการเติมน้ำมัน ผู้ใช้กดปุ่มพิมพ์เพื่อเปิด modal กรอกข้อมูลเติมน้ำมัน\n\n#### Decision Points\n\n| หน้า | การกระทำ | ผลลัพธ์ |\n|---|---|---|\n| `list-debt` | กดปุ่ม "รับสภาพหนี้" ด้านบน | ยังไม่มี handler |\n| `list-debt` | กด action ในแถว | เปิด modal ภายในหน้า |\n| `oil-lists` | กด print action | เปิด modal ฟอร์มเติมน้ำมัน |\n| `oil-lists` | กด submit modal | ยังไม่มี logic บันทึกจริง |\n\n#### Result\n\n- ผู้ใช้ดู layout งานรับสภาพหนี้และเติมน้ำมันได้\n- ทั้ง 2 หน้ายังอยู่ในระดับ mock/prototype\n\n#### Technical Diagrams\n\nรายการรับสภาพหนี้: เปิด modal ตรวจสอบ\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant DebtPage as list-debt/index.vue\n    participant DebtModal as modalRequestUsingCreditDebt\n\n    Staff->>DebtPage: เปิดหน้ารายการรับสภาพหนี้\n    DebtPage-->>Staff: แสดง mock table และ filters\n    Staff->>DebtPage: กด action ของรายการ\n    DebtPage->>DebtModal: show()\n    DebtModal-->>Staff: แสดงข้อมูล mock + form ตรวจสอบ\n    Staff->>DebtModal: กดบันทึก\n    DebtModal->>DebtModal: hide()\n```\n\nรายการเติมน้ำมัน: เปิด modal พิมพ์/ยืนยัน\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant OilPage as oil-lists/index.vue\n    participant OilModal as createModalBillAndImport\n\n    Staff->>OilPage: เปิดหน้ารายการเติมน้ำมัน\n    OilPage-->>Staff: แสดง mock table\n    Staff->>OilPage: กด print action\n    OilPage->>OilModal: show()\n    OilModal-->>Staff: แสดงฟอร์มวันที่, ลิตร, ราคา, และไฟล์บิล\n```\n\n### 15-F: Credit Increase List\n\n#### Purpose\n\nใช้ดูรายการคำขอเพิ่มวงเงินจริง, ค้นหา, กรองสถานะ, จำกัดเฉพาะลำดับอนุมัติของตนเอง, และเปิดไปหน้า detail ของคำขอที่ต้องพิจารณา\n\n#### Main Steps\n\n1. เปิดหน้ารายการอนุมัติขอวงเงิน\n2. หน้าเตรียม dropdown สถานะ, field เขตส่งเสริม, และ table columns\n3. ระบบโหลด list จาก `apiBffCreditIncreaseLess`\n4. ผู้ใช้ค้นหา, เปลี่ยนสถานะ, เปลี่ยนเขตส่งเสริม, หรือสลับ `isMySequence`\n5. เปิดคำขอที่ต้องอนุมัติต่อ\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| สถานะ = `pending` | ใช้ `not.status` เพื่อตัดสถานะที่ปิดงานแล้วออก |\n| สถานะ = ว่าง | ตัดเฉพาะ `terminate` ออก |\n| สถานะ = ค่าอื่น | filter ตรงตามค่านั้น |\n| ผู้ใช้เป็นส่วนกลางหรือหลายเขต | แสดง selector เขตส่งเสริม |\n| เปลี่ยน `isMySequence` | reload list พร้อม `isMySequence = 1/0` |\n\n#### Result\n\n- ได้รายการคำขอวงเงินตามเงื่อนไขที่เลือก\n- ผู้อนุมัติเปิดไปหน้า detail ของคำขอจริงได้\n\n#### Technical Diagram\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as credit-increase/index.vue\n    participant BFF as apiBffCreditIncreaseLess\n\n    Staff->>Page: เปิดหน้ารายการ\n    Page->>Page: เตรียม fields และ table options\n    Page->>BFF: โหลดรายการตาม filter เริ่มต้น\n    BFF-->>Page: credit increase list\n    Page-->>Staff: แสดงตาราง\n\n    alt ค้นหา หรือเปลี่ยน filter\n        Staff->>Page: เปลี่ยน search / status / extension area / isMySequence\n        Page->>BFF: reloadData()\n        BFF-->>Page: filtered list\n    end\n\n    Staff->>Page: กดเปิดรายการ\n    Page-->>Staff: navigate ไป credit-increase/[id]\n```\n\n### 15-G: Credit Increase Detail\n\n#### Purpose\n\nใช้ตรวจคำขอเพิ่มวงเงิน, ดูพื้นที่และสัญญาตัน, วงเงินตามเกณฑ์, วงเงินที่ขอ, หนี้ถึงกำหนด, ข้อมูลหลักประกัน, รายการเบิกใช้, ผู้ลงนาม, ไฟล์อนุมัติ, และส่งผลอนุมัติจริง\n\n#### Main Steps\n\n1. เปิดหน้า detail ของคำขอวงเงิน\n2. ระบบโหลดข้อมูลคำขอแบบ `less` และไฟล์แนบลงนามเดิม\n3. ระบบคำนวณยอดขอเบิกและยอดอนุมัติแยก yearly/special\n4. ผู้อนุมัติดูข้อมูลสรุป, เปิดรายการเบิกใช้, พิมพ์เอกสาร, หรือเลื่อนไปส่วน approve\n5. ถ้าต้องปรับรายการเบิกใช้ ให้เปิด modal รายการขอวงเงินและเลือกอนุมัติ/ไม่อนุมัติ/แก้ไขทีละรายการ\n6. ผู้อนุมัติกรอกยอดอนุมัติ, แนบไฟล์ลงนาม, แล้ว submit ผ่าน `FormApproveSequence`\n7. ระบบอัปเดตคำขอวงเงินและ cascade สถานะลงไปยัง increase items และ credit withdraws\n\n#### Decision Points\n\n| เงื่อนไข | ผลลัพธ์ |\n|---|---|\n| กดเลื่อนไปกล่องอนุมัติ | scroll ไป sequence ของผู้ใช้ที่ login |\n| กดพิมพ์ประวัติชาวไร่ | เปิด `/eform/preprint` ในแท็บใหม่ |\n| กดพิมพ์แบบฟอร์มอนุมัติ | ส่ง `/eform/preprint/merge` |\n| เปิด modal รายการขอวงเงิน | เลือก toggle reject/grouping หรือ route ไปหน้าแก้ไขรายการเบิก |\n| submit status = `approve` และยอดอนุมัติครอบคลุม | increase item เป็น `approve`, withdraw ถูก route ตาม debt group |\n| submit status = `approve` แต่ยอดอนุมัติไม่พอ | increase item และ withdraw กลายเป็น `editing` |\n| submit status = `rejected` | increase item และ withdraw กลายเป็น `rejected` |\n\n#### Result\n\n- ได้คำขอวงเงินที่อนุมัติ, ไม่อนุมัติ, หรือส่งกลับแก้ไข\n- ได้การ cascade สถานะไปยังรายการขอเบิกใช้ที่เกี่ยวข้อง\n\n#### Technical Diagrams\n\ndetail: bootstrap หน้าและคำนวณข้อมูลตั้งต้น\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as credit-increase/[id]/index.vue\n    participant IncreaseBFF as apiBffCreditIncrease/{id}/less\n    participant FileBFF as apiBffFileAttachments\n\n    Staff->>Page: เปิดหน้า detail\n    Page->>Page: setDataFields()\n    Page->>IncreaseBFF: getDataCreditIncrease()\n    IncreaseBFF-->>Page: credit increase detail\n    Page->>FileBFF: โหลดไฟล์ลงนามเดิม\n    FileBFF-->>Page: attachment list\n    Page->>Page: setDataInit()\n    Page->>Page: setSumApprove()\n    Page-->>Staff: แสดงข้อมูลสรุปและกล่องอนุมัติ\n```\n\ndetail: เปิด modal รายการเบิกใช้และส่งไปแก้ไข\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as credit-increase/[id]/index.vue\n    participant Modal as รายการขอวงเงิน\n    participant ContractPage as contracts/.../using-credit/...\n\n    Staff->>Page: กดดูรายการเบิกใช้ yearly หรือ special\n    Page->>Page: เตรียม dataIncreaseItem และเปิด modal\n    Modal-->>Staff: แสดงรายการเบิกใช้\n\n    alt toggle อนุมัติ/ไม่อนุมัติ รายการเบิกใช้\n        Staff->>Modal: กดปุ่มสถานะ\n        Modal->>Page: clickApprove()\n        Page->>Page: update status ของ credit withdraw และ reload detail\n    else แก้ไขรายการเบิกใช้\n        Staff->>Modal: กดแก้ไข\n        Page-->>ContractPage: navigate ไปหน้า using-credit ของ contract\n    end\n```\n\ndetail: submit approve sequence\n\n```mermaid\nsequenceDiagram\n    actor Staff\n    participant Page as credit-increase/[id]/index.vue\n    participant FileAPI as apiDataAttachments\n    participant IncreaseStatusAPI as apiDataCreditIncrease/{id}/status\n    participant IncreaseAPI as apiDataCreditIncrease/{id}\n    participant ItemAPI as apiDataCreditIncreaseItems/{itemId}/status\n    participant WithdrawAPI as apiDataCreditWithDraws/{withdrawId}\n    participant WithdrawStatusAPI as apiDataCreditWithDraws/{withdrawId}/status\n\n    Staff->>Page: submit approve sequence\n\n    alt มีไฟล์ลงนาม\n        Page->>FileAPI: POST attachment\n        FileAPI-->>Page: success\n    end\n\n    Page->>IncreaseStatusAPI: PUT status + note\n    IncreaseStatusAPI-->>Page: status response\n    Page->>IncreaseAPI: PUT approved amounts + summary\n    IncreaseAPI-->>Page: updated increase\n\n    alt status = approve และยอดอนุมัติพอ\n        loop แต่ละ increase item\n            Page->>ItemAPI: set item = approve\n            loop แต่ละ credit withdraw ที่ไม่ถูก reject\n                Page->>WithdrawAPI: PUT body ที่สร้างจาก createApproveBody()\n                Page->>WithdrawStatusAPI: set status ตาม debt group routing\n            end\n        end\n    else status = approve แต่ยอดอนุมัติไม่พอ\n        loop แต่ละ increase item และ withdraw\n            Page->>ItemAPI: set item = editing\n            Page->>WithdrawStatusAPI: set withdraw = editing\n        end\n    else status = rejected\n        loop แต่ละ increase item และ withdraw\n            Page->>ItemAPI: set item = rejected\n            Page->>WithdrawStatusAPI: set withdraw = rejected\n        end\n    end\n```\n\n---\n\n## Technical Reference\n\n### Credit Types ที่ใช้ใน Flow นี้\n\n| Value | ข้อความ |\n|---|---|\n| `creditYearly` | วงเงินส่งเสริมประจำปี |\n| `creditSpecial` | วงเงินพิเศษ |\n| `usageBeforeHarvest` | เบิกใช้เงินเตรียมการฤดูหีบ |\n\n### Credit Increase Status ที่ยืนยันจาก source\n\n| Value | ข้อความ |\n|---|---|\n| `draft` | ฉบับร่าง |\n| `pending` | รอตรวจสอบ |\n| `approve` | อนุมัติ |\n| `rejected` | ไม่อนุมัติ |\n| `terminate` | ยกเลิกใช้งาน |\n\nหมายเหตุ:\n\n- หน้า list ใช้ `CreditIncreaseMsg` กับ `CreditIncreaseColor` สำหรับค่าใน enum นี้\n- ถ้า backend ส่งสถานะอื่นเข้ามา หน้า list จะ fallback ไปใช้ `appGetTextApproveStatus(...)`\n\n### Credit Withdraw Status ที่ถูกใช้งานใน Flow นี้\n\n| Value | ใช้เมื่อ |\n|---|---|\n| `grouping` | toggle กลับไปสถานะรออนุมัติขอวงเงินจาก modal รายการเบิกใช้ |\n| `approve` | อนุมัติรายการเบิกใช้สำเร็จ |\n| `rejected` | ไม่อนุมัติรายการเบิกใช้ |\n| `pendingSplitAmount` | รอทำงวดแบ่งจ่าย |\n| `pendingSplitOil` | รอทยอยเบิกน้ำมัน |\n| `pendingInspection` | รอตรวจรับ |\n| `editing` | อนุมัติวงเงินแล้วแต่ยอดยังไม่พอ ต้องกลับไปแก้ไขรายการ |\n\n### Mock Tabs And Default State\n\n| Page | Tabs จาก source | Default | หมายเหตุ |\n|---|---|---|---|\n| `manage-loan-contract/[id]` | สัญญากู้ยืมเงิน, สัญญาค้ำประกัน, บันทึกคำยินยอม/หลักฐาน | `loan_contract` | page นี้สลับ tab ได้จริง |\n| `manage-using-credit/index` | วงเงินส่งเสริมประจำปี, วงเงินส่งเสริมพิเศษ, เบิกใช้ฤดูหีบ, วงเงินอนุโลมให้เบิกใช้ | `usageBeforeHarvest` | ปุ่ม tab ยังไม่ผูก click handler |\n| `using-credit-oil.vue` | ชาวไร่, ผู้รับเหมา | `sugarCane` | ปุ่ม tab ยังไม่ผูก click handler |\n| `manage-payment/index.vue` | บัญชีธนาคารสาขาครบุรี, บัญชีธนาคารสาขาสีคิ้ว, iPay (KTB), Cashlink (Krungri) | `canMatch` | ปุ่ม tab ยังไม่ผูก click handler |\n| `payment/index.vue` | ชาวไร่, ผู้รับเหมา | `sugarCane` | ปุ่ม tab ยังไม่ผูก click handler |\n| `upload-bill.vue` | จับคู่บิลอ้อยได้, จับคู่บิลอ้อยไม่ได้ | `canMatch` | ปุ่ม tab ยังไม่ผูก click handler |\n\n### Global State Keys\n\n| State key | ใช้ใน | หน้าที่ |\n|---|---|---|\n| `globalAlertModal` | `credit-increase/[id]` และบางหน้า mock list | แสดง confirm/success/error modal |\n| `globalBaseLoading` | `credit-increase/index` และ `credit-increase/[id]` | แสดง loading ระดับหน้า |\n| `appStateDataCreditWithdraw` | `credit-increase/[id]` | เก็บ state ชั่วคราวเพื่อสร้าง body สำหรับ update credit withdraw |\n\n### APIs ที่เกี่ยวข้องกับ `credit-increase`\n\n| Constant / Path | Method | ใช้เมื่อ |\n|---|---|---|\n| `apiBffCreditIncreaseLess` | GET | โหลดรายการคำขอวงเงิน |\n| `${apiBffCreditIncrease}/{id}/less` | GET | โหลด detail แบบสรุปตอนเปิดหน้า |\n| `${apiBffCreditIncrease}/{id}` | GET | โหลด detail แบบเต็มก่อน cascade status |\n| `apiBffFileAttachments` | GET | โหลดไฟล์แนบลงนามของคำขอวงเงิน |\n| `apiDataAttachments` | POST | อัปโหลดไฟล์ลงนาม |\n| `${apiDataCreditIncrease}/{id}/status` | PUT | บันทึก status และ note ของคำขอวงเงิน |\n| `${apiDataCreditIncrease}/{id}` | PUT | บันทึกยอดอนุมัติและข้อมูลสรุปของคำขอวงเงิน |\n| `${apiDataCreditIncreaseItems}/{itemId}/status` | PUT | อัปเดตสถานะ increase item |\n| `${apiDataCreditWithDraws}/{withdrawId}` | PUT | อัปเดต body ของรายการเบิกใช้หลังอนุมัติ |\n| `${apiDataCreditWithDraws}/{withdrawId}/status` | PUT | อัปเดตสถานะรายการเบิกใช้ |\n| `apiDataContractBff` | GET | โหลดข้อมูล contract ก่อน route ไปแก้ไขรายการเบิกใช้ |\n| `${apiBffSummaryKatLandCreditRequestByQuotaNumber}/{quotaNumber}` | GET | โหลด summary เพิ่มเติมตาม quota |\n| `/eform/preprint` | GET | พิมพ์ประวัติชาวไร่ |\n| `/eform/preprint/merge` | POST | พิมพ์แบบฟอร์มอนุมัติ |\n\n### List Filter Logic ของ `credit-increase/index.vue`\n\n| เงื่อนไข status filter | Query behavior |\n|---|---|\n| `pending` | ใช้ `filter.not.status` เพื่อกัน `draft/approve/rejected/terminate` และค่าอื่นใน enum ออกจากผลลัพธ์ |\n| ว่าง | ใช้ `filter.not.status = terminate` |\n| ค่าอื่น | ใช้ `filter.status = value` |\n\n### Debt Group Routing ใน Approval Cascade\n\n| Debt groups | Withdraw status หลัง approve |\n|---|---|\n| `GC01`, `AD03-3`, `AD03-2`, `GS10`, `AD01-2`, `GM05`, `GM07`, `GM13`, `GM19`, `GM20` | `pendingSplitAmount` |\n| `GS16-1`, `GS16-2` | `pendingSplitOil` |\n| `GS21`, `GS16-3`, `GS17`, `GM04` | `pendingInspection` |\n| กลุ่มอื่น | `approve` |\n\n---\n\n## Known Gaps\n\n- `manage-loan-contract` และเกือบทุกหน้าใน `manage-using-credit` ยังเป็น mock/prototype จึงไม่ควรถูกอธิบายเป็น production flow เต็มรูปแบบ\n- หลายหน้าในกลุ่ม prototype มีปุ่ม tab แต่ source ยังไม่ผูก event เปลี่ยน `currentTabCode` ทำให้ใช้งานได้จริงแค่ default tab ของหน้า\n- หลายตารางในหน้าต้นแบบใช้ placeholder field names หรือ mock rows ที่ไม่ตรงกับ columns ทั้งหมด จึงไม่ควรตีความเป็น data contract จริงจาก UI เหล่านี้\n- `credit-increase/[id]` route ไปหน้า `contracts/.../using-credit/...` เพื่อแก้รายการเบิกใช้ ดังนั้น logic แก้ไขเชิงลึกอยู่ใน Flow 12 ไม่ได้จบอยู่ใน flow นี้\n- validation ที่กันยอดอนุมัติมากกว่ายอดที่ขอยังอยู่ในคอมเมนต์ TODO ของหน้า detail และยังไม่ทำงานจริงใน source ที่ตรวจ\n\n### หน้าใหม่ที่ยังไม่ได้อธิบาย Per-Page Detail ครบ\n\n| หน้า | สถานะ | หมายเหตุ |\n|---|---|---|\n| `payment-contractor/index.vue` | partial implementation | ใช้ `UIMasterProductYear` + `SelectionSugarcaneFarmer` เป็น filters แต่ยังไม่ผูก productionYear/farmer เข้ากับ API query จริง; โหลด inspection receipts แบบ pagination ไม่กรอง; ปุ่ม upload slip เทียบ `status` กับ `StatusOrder.waitingPayslip` แม้ตารางใช้ `InspectionReceiptStatusMsg` |\n\n### Accounting Service Modules ที่เกี่ยวข้องแต่ยังไม่ได้อธิบายเชิงลึก\n\n| Module | Endpoints (สำคัญ) | หมายเหตุ |\n|---|---|---|\n| `cms-sync-data` | `GET /cms_sync_data/syncDataManagePayment` — sync inspection receipts → payment management; `POST /cms_sync_data/syncDataManagePaymentByCode` — sync ทีละรายการ; `GET /cms_sync_data/migrateCustomers` — migrate customers batch 1000; export endpoints (bookBanks, sugarcaneFarmers, contractors, varietyAndLandOwners); import endpoints (sendingSugarcaneSep1, products, cogProductPrices, cogSugarcaneAssessment, updateOcsbNumber) | module นี้ทำงานเบื้องหลังเพื่อ sync ข้อมูลระหว่าง CMS กับ Accounting Service ไม่มีหน้า UI โดยตรงใน flow นี้ |\n| `new-debt` | `POST /new-debt/upload` — upload debt file; `GET /new-debt/getall_and_filter` — filter debts (action_year, due_year, debt_type, interest_cap, debtor_role, site, debt_status); `GET /new-debt/grouped` — group by quota; `GET /new-debt/get_accept_debt_all` — accepted debts paginated; `POST /new-debt/get_accept_debt_detail` — accept debt detail; `POST /new-debt/add_debt_reduction_ratio` — add reduction ratio; `POST /new-debt/approve_debt_reduction_ratio` — approve/reject reduction; export endpoints (accept_debt, accept_debt_all, accounting_debt); `POST /new-debt/get_personal_debt_summary_by_g11_g21` — personal debt summary | module นี้จัดการข้อมูลหนี้ใหม่ที่ import เข้าระบบ, การรับสภาพหนี้, และอัตราส่วนลดหนี้ — เกี่ยวข้องกับ flow การใช้วงเงินและสัญญากู้ยืมแต่ยังไม่มีหน้า CMS frontend ที่เรียกใช้โดยตรง |\n',
